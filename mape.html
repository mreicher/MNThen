        window.smoothedVelocity    = { lat: 0, lng: 0 };
        window.isStationary        = false;
        window.stationaryStartTime = null;
    }

    const newPosition = _makePosition(lat, lng, rawAccuracy, rawHeading, rawSpeedMPS, currentTime);


    // ═══ SECTION 5: SPEED ESTIMATION (GPS + Displacement Fusion) ═══════════════

    let reliableSpeedMPS = rawSpeedMPS;

    if (lastPos && timeDelta > 0.15 && timeDelta < 5.0) {
        const dist      = distFn(lastPos, newPosition);
        const calcSpeed = Math.min(dist / timeDelta, _SPEED_SANITY_CAP_MPS);

        if (dist > _GPS_JUMP_DIST_M && timeDelta < _GPS_JUMP_TIME_SEC) {
            if (window._gpsDebug) {
                console.debug('GPS jump filtered:', dist.toFixed(1) + 'm in', timeDelta.toFixed(2) + 's');
            }
        } else {
            const gpsLagging = reliableSpeedMPS < 0.5 && calcSpeed > 1.0;
            const gpsStale   = calcSpeed > reliableSpeedMPS * 1.5 && calcSpeed > 2.0;
            if (gpsLagging || gpsStale) reliableSpeedMPS = calcSpeed;
        }
    }

    window._emaSpeedFast = window._emaSpeedFast ?? reliableSpeedMPS;
    window._emaSpeedSlow = window._emaSpeedSlow ?? reliableSpeedMPS;
    window._emaSpeedFast = _EMA_FAST_ALPHA * reliableSpeedMPS + (1 - _EMA_FAST_ALPHA) * window._emaSpeedFast;
    window._emaSpeedSlow = _EMA_SLOW_ALPHA * reliableSpeedMPS + (1 - _EMA_SLOW_ALPHA) * window._emaSpeedSlow;

    let modeSpeedMPH = Math.min(window._emaSpeedFast * _MPS_TO_MPH, _SPEED_DISPLAY_CAP_MPH);
    const speedMPH   = Math.min(window._emaSpeedSlow * _MPS_TO_MPH, _SPEED_DISPLAY_CAP_MPH);
    const speedMPS   = window._emaSpeedSlow;

    const highSpeedThr = SPEED_THRESHOLDS?.HIGH_SPEED ?? 45;
    const rawGPSMPH    = rawSpeedMPS * _MPS_TO_MPH;
    const rawCalcMPH   = (lastPos && timeDelta > 0.15)
        ? Math.min((distFn(lastPos, newPosition) / timeDelta) * _MPS_TO_MPH, _SPEED_SANITY_CAP_MPS * _MPS_TO_MPH)
        : 0;

    if (rawGPSMPH >= highSpeedThr) {
        modeSpeedMPH = rawGPSMPH;
    } else if (rawCalcMPH >= highSpeedThr) {
        modeSpeedMPH = rawCalcMPH;
    }


    // ═══ SECTION 6: MODE & INACTIVITY ══════════════════════════════════════════

    const modeChanged      = ModeManager.update(modeSpeedMPH);
    const isInCenteredMode = ModeManager.isCentered();

    if (speedMPH >= 1.0) {
        _clearInactivityTimer();
    } else {
        _startInactivityTimer();
    }


    // ═══ SECTION 7: GPS RECOVERY STATE ═════════════════════════════════════════

    if (window.isGPSSearching) {
        window.isGPSSearching         = false;
        window.positionBuffer         = [newPosition];
        window.lastVelocity           = { lat: 0, lng: 0 };
        window.smoothedVelocity       = { lat: 0, lng: 0 };
        window.isStationary           = false;
        window.stationaryStartTime    = null;
        window.stationaryLockPosition = null;
        hideGPSSearchingState?.();
    }


    // ═══ SECTION 8: PROXIMITY CALCULATIONS ═════════════════════════════════════

    let closestDistance = Infinity;
    let closestLocation = null;
    const locationsWithDistance = [];

    const posChanged = lastPos && (
        Math.abs(lat - lastPos.lat) > 1e-7 ||
        Math.abs(lng - lastPos.lng) > 1e-7
    );

    if (!posChanged && window._lastClosestDistance !== undefined && window._lastClosestLocation) {
        closestDistance = window._lastClosestDistance;
        closestLocation = window._lastClosestLocation;
    } else if (Array.isArray(gameLocations) && gameLocations.length) {
        const R = _PROXIMITY_LATLNG_RADIUS;
        const latMin = lat - R, latMax = lat + R;
        const lngMin = lng - R, lngMax = lng + R;

        for (const loc of gameLocations) {
            if (!loc?.lat) continue;
            if (loc.lat < latMin || loc.lat > latMax || loc.lng < lngMin || loc.lng > lngMax) continue;
            const dist = distFn(newPosition, loc);
            locationsWithDistance.push({ location: loc, distance: dist });
            if (dist < closestDistance) {
                closestDistance = dist;
                closestLocation = loc;
            }
        }
        window._lastClosestDistance = closestDistance;
        window._lastClosestLocation = closestLocation;
    }

    window.proximityState = (closestLocation && closestDistance !== Infinity)
        ? { closestLocation, distanceMeters: closestDistance }
        : null;


    // ═══ SECTION 9: ENTERPRISE CACHING (Throttled) ═════════════════════════════

    if (locationsWithDistance.length &&
        (!window._lastCacheUpdate || (currentTime - window._lastCacheUpdate) > _CACHE_INTERVAL_MS)) {
        const cacheFn = window.enterpriseCacheManager?.cacheLocationData;
        if (cacheFn) {
            for (const { location, distance } of locationsWithDistance) {
                if (distance <= _CACHE_MAX_DIST_M) cacheFn(location, newPosition);
            }
        }
        window._lastCacheUpdate = currentTime;
    }


    // ═══ SECTION 10: FIRST-FIX INITIALIZATION ══════════════════════════════════

    if (!lastPos) {
        _initializeUserLocationState(newPosition, currentTime, forceUpdate);
        return;
    }


    // ═══ SECTION 11: MOTION ANALYSIS (FIX 1: HEADING) ═════════════════════════

    const distance      = distFn(lastPos, newPosition);
    const latDelta      = Math.abs(lat - lastPos.lat);
    const lngDelta      = Math.abs(lng - lastPos.lng);
    const eastWestMove  = lngDelta > latDelta * 1.2;
    const speedFactor   = Math.min(1, Math.max(0.01, speedMPS / 15));

    if (timeDelta > 0 && timeDelta < 5) {
        const lastSpeedMPH = (lastPos.speedMPS || 0) * _MPS_TO_MPH;
        const accel = Math.abs(speedMPH - lastSpeedMPH) / timeDelta;
        for (const { belowMPH, maxAccel } of _ACCEL_REJECT) {
            if (speedMPH < belowMPH && accel > maxAccel) return;
        }
    }

    let validatedHeading = rawHeading;
    const lastHeading    = lastPos.heading ?? null;

    // FIX 1: Tier-aware heading filter. 
    // If walking (<8mph), allow heading updates at 1.5 m/s (~3.4 mph) instead of 4 m/s.
    if (lastHeading != null && rawHeading != null) {
        const headingFilterSpeed = (speedMPH < 8) ? 1.5 : _HEADING_FILTER_SPEED_MPS;
        
        if (rawSpeedMPS < headingFilterSpeed &&
            _headingDiffDeg(rawHeading, lastHeading) > _HEADING_FILTER_DIFF_DEG) {
            validatedHeading = lastHeading;
        }
    }

    const displayHeading = _normalizeHeading(lastHeading, validatedHeading);

    const hDiff = _headingDiffDeg(validatedHeading, lastHeading);
    const directionChangeFactor = hDiff > _HEADING_SMOOTH_THRESHOLD
        ? Math.max(0.5, 1 - hDiff / 240)
        : 1.0;


    // ═══ SECTION 12: INTERPOLATED TIER CONFIGURATION ═══════════════════════════

    const tier = resolveSpeedTier(modeSpeedMPH);
    const tp   = tier.params;
    const ewAdj = eastWestMove ? 0.88 : 1.0;

    const speedTier = {
        microMovementThreshold: tp.micro,
        minDistanceThreshold:    tp.minDist * (eastWestMove ? 0.92 : 1.0),
        maxAccuracy:             tp.maxAcc,
        maxSpeedThreshold:       tp.maxSpd,
        mapUpdateInterval:       Math.max(33, tp.mapInt * ewAdj),
        mapUpdateDistance:       tp.mapDist,
        panDuration:             tp.panDur * ewAdj,
        easeLinearity:           tp.easeLin * (eastWestMove ? 0.92 : 1.0)
    };


    // ═══ SECTION 13: LARGE-JUMP HANDLING ═══════════════════════════════════════

    if (distance > _LARGE_JUMP_M || forceUpdate) {
        _handleLargeDistanceJump(newPosition, currentTime);
        _commitState(newPosition, currentTime, forceUpdate);
        return;
    }


    // ═══ SECTION 14: STATIONARY DETECTION (FIX 2: GPS DANCE) ══════════════════

    if (distance < _STAT_THRESHOLD_M) {
        if (!window.stationaryStartTime) window.stationaryStartTime = currentTime;
        const statDuration = currentTime - window.stationaryStartTime;

        if (!window.isStationary && statDuration >= _STAT_CONFIRM_MS) {
            _confirmStationary(newPosition, currentTime);
            _cleanupMarkerStyles?.();
            return;
        }

        if (window.isStationary) {
            // FIX 2: Adaptive lock radius. 
            // Scales with accuracy: 20m acc -> 5m lock, 5m acc -> 1.25m lock.
            const adaptiveLockM = Math.max(_STAT_LOCK_M, Math.min(newPosition.accuracy * 0.25, 2.0));
            
            const distFromLock = distFn(window.stationaryLockPosition, newPosition);
            if (distFromLock < adaptiveLockM && newPosition.accuracy < lastPos.accuracy * _ACCURACY_STAT_RATIO) {
                scheduleMarkerUpdate(lat, lng);
                window.lastPosition = newPosition;
                window.stationaryLockPosition = { lat, lng };
                updateDistanceBox?.(forceUpdate);
            }
            return;
        }

        if (distance > 0.15) {
            const cur = userMarker.getLatLng();
            const tgt = L.latLng(lat, lng);
            if (cur.distanceTo(tgt) > 0.3) {
                scheduleMarkerUpdate(lat, lng, { animate: true, duration: 1.2, easeLinearity: 0.05 });
                _commitState(newPosition, currentTime, forceUpdate);
            }
        }
        return;

    } else {
        window.stationaryStartTime    = null;
        window.isStationary           = false;
        window.stationaryLockPosition = null;
        if (window.stationaryCheckTimeout) {
            clearTimeout(window.stationaryCheckTimeout);
            window.stationaryCheckTimeout = null;
        }
    }


    // ═══ SECTION 15: QUALITY GATES (FIX 3: ACCURACY STREAK) ═════════════════════

    // FIX 3: Initialize accuracy streak counter
    window._poorAccuracyStreak = window._poorAccuracyStreak || 0;

    if (!forceUpdate) {
        if (newPosition.accuracy > speedTier.maxAccuracy) {
            window._poorAccuracyStreak++;
            // Allow 3 consecutive bad frames before killing update
            if (window._poorAccuracyStreak > 3) return;
        } else {
            // Reset streak if accuracy is acceptable
            window._poorAccuracyStreak = 0;
        }
        
        if (distance < speedTier.minDistanceThreshold) return;
        if (timeDelta > 0 && distance / timeDelta > speedTier.maxSpeedThreshold) return;
    } else {
        window._poorAccuracyStreak = 0;
    }

    if (window.isStationary || (speedMPH < 0.5 && distance < 0.1)) {
        if (newPosition.accuracy < lastPos.accuracy * _ACCURACY_IMPROVE_RATIO) {
            scheduleMarkerUpdate(lat, lng);
            _commitState(newPosition, currentTime, forceUpdate, { resetBuffer: true });
        } else if (window.isStationary) {
            const dfl = distFn(window.stationaryLockPosition, newPosition);
            if (newPosition.accuracy < lastPos.accuracy * _ACCURACY_STAT_RATIO && dfl < _STAT_LOCK_M) {
                scheduleMarkerUpdate(lat, lng);
                window.lastPosition = newPosition;
                window.stationaryLockPosition = { lat, lng };
                updateDistanceBox?.(forceUpdate);
            }
        }
        return;
    }

    if (distance > _FAST_PASS_DIST_M || newPosition.accuracy < lastPos.accuracy * _ACCURACY_IMPROVE_RATIO) {
        scheduleMarkerUpdate(lat, lng);
        _commitState(newPosition, currentTime, forceUpdate, { resetBuffer: true });
        return;
    }


    // ═══ SECTION 16: CSS PERFORMANCE HINTS (One-time) ═════════════════════════

    if (!window._markerStylesOptimized) {
        const el = userMarker.getElement?.();
        if (el) {
            el.style.willChange         = 'transform';
            el.style.backfaceVisibility = 'hidden';
            el.style.transform          = 'translateZ(0)';
            window._markerStylesOptimized = true;
        }
    }


    // ═══ SECTION 17: SMOOTHING, DEAD-RECKONING & PREDICTION ═══════════════════

    try {
        window.lastVelocity     = window.lastVelocity     || { lat: 0, lng: 0 };
        window.smoothedVelocity = window.smoothedVelocity || { lat: 0, lng: 0 };

        const instantVelocity = {
            lat: timeDelta > 0 ? (lat - lastPos.lat) / timeDelta : 0,
            lng: timeDelta > 0 ? (lng - lastPos.lng) / timeDelta : 0
        };

        const vAlpha = Math.max(0.15, Math.min(0.5, 0.4 - speedMPH * 0.003));
        window.smoothedVelocity = {
            lat: window.smoothedVelocity.lat * vAlpha + instantVelocity.lat * (1 - vAlpha),
            lng: window.smoothedVelocity.lng * vAlpha + instantVelocity.lng * (1 - vAlpha)
        };

        const cosLat = Math.cos(lat * Math.PI / 180);
        let effectiveSpeedMPS = speedMPS;
        
        // Reuse 'distance' from Section 11
        if (effectiveSpeedMPS == null && timeDelta > 0) {
            effectiveSpeedMPS = distance / timeDelta;
        }

        const accuracyConfidence = Math.min(1, Math.max(0.1, 10 / (rawAccuracy || 20)));
        const predWindow = Math.min(
            _PREDICTION_MAX_SEC, 
            (0.3 + speedFactor * 0.5) * accuracyConfidence
        );

        let predictedLat, predictedLng;

        if (validatedHeading !== null) {
            const headingRad = validatedHeading * Math.PI / 180;
            predictedLat = lat + (effectiveSpeedMPS * Math.cos(headingRad) / _EARTH_M_PER_DEG) * predWindow;
            predictedLng = lng + (effectiveSpeedMPS * Math.sin(headingRad) / (_EARTH_M_PER_DEG * cosLat)) * predWindow;
        } else {
            predictedLat = lat + window.smoothedVelocity.lat * predWindow;
            predictedLng = lng + window.smoothedVelocity.lng * predWindow;
        }

        const drPosition = _makePosition(predictedLat, predictedLng, rawAccuracy, validatedHeading, effectiveSpeedMPS, currentTime);

        if (!window.positionBuffer) window.positionBuffer = [];
        window.positionBuffer.push(drPosition);
        if (window.positionBuffer.length > _BUFFER_MAX_LEN) window.positionBuffer.shift();

        const decayFactor = 0.45 + speedFactor * 0.45;
        let totalWeight = 0, wLat = 0, wLng = 0;

        for (const pos of window.positionBuffer) {
            const age        = (currentTime - pos.timestamp) / 1000;
            const timeWeight = Math.exp(-age * decayFactor);
            const accWeight  = pos.accuracy > 0 ? Math.min(1, 20 / pos.accuracy) : 0.5;
            const weight     = timeWeight * accWeight;
            wLat += pos.lat * weight;
            wLng += pos.lng * weight;
            totalWeight += weight;
        }

        const bufferedPosition = {
            lat:      wLat / totalWeight,
            lng:      wLng / totalWeight,
            accuracy: drPosition.accuracy,
            heading:  drPosition.heading,
            timestamp: currentTime,
            speedMPS: drPosition.speedMPS
        };


        // ═══ SECTION 18: SMOOTHING FACTOR CALCULATION ══════════════════════════

        const baseSF = Math.min(tp.sMax, Math.max(tp.sMin, tp.sBase + speedFactor * tp.sMult));
        const sfDist = Math.min(0.05, distance * 0.0035);
        const sfTime = timeDelta > 0
            ? Math.min(0.03, Math.max(-0.015, (timeDelta - 0.35) * 0.045))
            : 0;
        const sfDir  = (hDiff > 20 && (speedMPH < 45 || hDiff > 45))
            ? Math.max(0, 0.04 - hDiff / 200 * 0.06)
            : 0;
        const sfEW   = eastWestMove ? 0.018 : 0;

        const rawSF  = (baseSF + sfDist + sfTime - sfDir + sfEW) * directionChangeFactor;
        const finalSF = Math.min(0.52, Math.max(0.11, rawSF));

        const smoothedPosition = {
            lat: lastPos.lat * (1 - finalSF) + bufferedPosition.lat * finalSF,
            lng: lastPos.lng * (1 - finalSF) + bufferedPosition.lng * finalSF,
            accuracy: bufferedPosition.accuracy,
            heading: bufferedPosition.heading,
            timestamp: currentTime,
            speedMPS: bufferedPosition.speedMPS
        };


        // ═══ SECTION 19: ANIMATION PARAMETERS ══════════════════════════════════

        let animDur = speedTier.panDuration;
        const durDist = Math.min(0.02, distance * 0.001);
        const durTime = timeDelta > 0 ? Math.max(-0.01, Math.min(0.02, (0.25 - timeDelta) * 0.04)) : 0;
        const durDir  = hDiff > 20 ? Math.min(0.04, hDiff / 300 * 0.08) : 0;
        const durEW   = eastWestMove ? Math.min(0.025, distance * 0.0005) : 0;
        const finalAnimDur = Math.max(0.03, (animDur - durDist + durTime + durDir + durEW) * directionChangeFactor);

        const finalEaseLin = eastWestMove
            ? Math.max(0.07, Math.min(0.19, (0.13 - speedMPH * 0.0006) * directionChangeFactor))
            : Math.max(0.08, Math.min(0.23, (0.15 - speedMPH * 0.0011) * directionChangeFactor));

        const laBase  = tp.laBase + speedFactor * tp.laMult;
        const laBoost = speedMPH < 15 ? Math.min(0.08, distance * 0.0055) : 0;
        const laDir   = hDiff > 25 ? Math.min(0.14, hDiff / 200 * 0.22) : 0;
        const laEW    = (speedMPH < 15 && eastWestMove) ? Math.min(0.055, distance * 0.0013) : 0;
        const lookAheadFactor = Math.max(0.01, Math.min(tp.laMax, laBase + laBoost - laDir + laEW));


        // ═══ SECTION 20: VISUAL UPDATES (FIX 4: MAP TRAP) ═══════════════════════

        const performVisualUpdates = () => {
            const updateOptions = {
                animate: true,
                duration: finalAnimDur,
                easeLinearity: finalEaseLin
            };
            if (displayHeading != null) updateOptions.heading = displayHeading;
            scheduleMarkerUpdate(smoothedPosition.lat, smoothedPosition.lng, updateOptions);

            const mapInterval = speedTier.mapUpdateInterval;
            const aggressiveness = typeof highSpeedAggressiveness === 'function'
                ? Math.max(0.1, highSpeedAggressiveness(speedMPH)) : 0.5;

            let mapDistThr = speedTier.mapUpdateDistance * (1 - 0.4 * aggressiveness);
            if (eastWestMove) mapDistThr *= 0.92;

            const isHighDrift = distance > 8.0 && modeSpeedMPH >= highSpeedThr;
            window._driftCounter = isHighDrift ? (window._driftCounter || 0) + 1 : 0;

            const justCentered = modeChanged && isInCenteredMode;
            
            // FIX 4: Auto-recover from "Map Trap"
            // If moving fast (>12mph) and in manual mode, assume user wants to re-follow
            // if they haven't touched the screen in 5 seconds.
            if (window.isMapInteracting && speedMPH > 12) {
                const timeSinceMapUpdate = currentTime - (window.lastMapUpdateTime || 0);
                if (timeSinceMapUpdate > 5000) {
                    window.isMapInteracting = false;
                    // followUser is implicitly handled by isMapInteracting=false in most map implementations,
                    // or we can force it here depending on external logic.
                    if (typeof window.followUser !== 'undefined') window.followUser = true;
                }
            }

            const shouldUpdateMap = justCentered ||
                (currentTime - (window.lastMapUpdateTime || 0)) > mapInterval ||
                distance > mapDistThr ||
                window._driftCounter >= 2;

            if (shouldUpdateMap && map) {
                const lookAheadPos = {
                    lat: smoothedPosition.lat + (bufferedPosition.lat - lastPos.lat) * lookAheadFactor,
                    lng: smoothedPosition.lng + (bufferedPosition.lng - lastPos.lng) * lookAheadFactor
                };

                const bounds = map.getBounds?.();

                if (bounds && !window.isMapInteracting && window.followUser) {
                    if (isInCenteredMode) {
                        const markerLL = L.latLng(smoothedPosition.lat, smoothedPosition.lng);
                        const mapSize = map.getSize();
                        const markerPx = map.latLngToContainerPoint(markerLL);
                        const edgePad = Math.max(60, mapSize.x * 0.18);
                        const edgePadY = Math.max(80, mapSize.y * 0.20);
                        const nearEdge = markerPx.x < edgePad ||
                            markerPx.x > (mapSize.x - edgePad) ||
                            markerPx.y < edgePadY ||
                            markerPx.y > (mapSize.y - edgePadY);

                        if (justCentered || nearEdge || window._driftCounter >= 2) {
                            _panMapToCenter(lookAheadPos, speedTier, directionChangeFactor, eastWestMove, speedMPH, lookAheadFactor);
                        }
                    } else {
                        if (_isNearViewportEdge(smoothedPosition, bounds, speedMPH)) {
                            _panMapIfNearEdge(lookAheadPos, speedTier, directionChangeFactor, eastWestMove, bounds, speedMPH);
                        }
                    }
                }
                window.lastMapUpdateTime = currentTime;
            }

            _handleProximityZoomLogic(speedMPH, eastWestMove);
            _enforceViewportSafety?.(speedMPH, userMarker.getLatLng?.());
        };

        if (window._nextLocationUpdateRAF) cancelAnimationFrame(window._nextLocationUpdateRAF);
        window._visualFallbackActive = true;

        window._nextLocationUpdateRAF = requestAnimationFrame(() => {
            window._visualFallbackActive = false;
            window._nextLocationUpdateRAF = null;
            performVisualUpdates();
        });

        if (window._visualFallbackTimer) clearTimeout(window._visualFallbackTimer);
        window._visualFallbackTimer = setTimeout(() => {
            if (window._visualFallbackActive && window._nextLocationUpdateRAF) {
                cancelAnimationFrame(window._nextLocationUpdateRAF);
                window._nextLocationUpdateRAF = null;
                window._visualFallbackActive = false;
                performVisualUpdates();
            }
            window._visualFallbackTimer = null;
        }, _VISUAL_FALLBACK_MS);

        window.lastPosition   = smoothedPosition;
        window.lastVelocity   = instantVelocity;
        window.lastUpdateTime = currentTime;
        window.lastUpdateTimestamp = currentTime;
        updateDistanceBox?.(forceUpdate);

    } catch (err) {
        console.error("updateUserLocation: recoverable error:", err);

        if (window.animationFrameId) cancelAnimationFrame(window.animationFrameId);
        if (window._nextLocationUpdateRAF) cancelAnimationFrame(window._nextLocationUpdateRAF);
        if (window._visualFallbackTimer) clearTimeout(window._visualFallbackTimer);

        window.animationFrameId = null;
        window._nextLocationUpdateRAF = null;
        window._visualFallbackTimer = null;
        window._visualFallbackActive = false;

        scheduleMarkerUpdate(lat, lng, { animate: true, duration: 0.6, easeLinearity: 0.10 });
        _commitState(newPosition, currentTime, forceUpdate, { resetBuffer: true });
    }
}

/* Proximity zoom logic — smoothed transition version. */
function _handleProximityZoomLogic(speedMPH, eastWestMove) {
    const PROX_NEAR_M = 13.716;       // 45 ft
    const PROX_FAR_M = 21.336;        // 70 ft  (entry threshold)
    const PROX_EXIT_FAR_M = 24.384;   // 80 ft  (exit hysteresis — must get this far to leave)
    const PROX_ZOOM_IN = 19;
    const PROX_ZOOM_OUT = 17;
    const PROX_THROTTLE_MS = 250;
    const TRANSITION_THROTTLE_MS = 600; // longer throttle while actively transitioning

    if (!window.proximityState || !map || window.isMapInteracting) {
        window._zoomAuthorityThisFrame = false;
        if (typeof _handleProximityZoom === 'function') {
            _handleProximityZoom(speedMPH, eastWestMove);
        }
        return;
    }

    const distM = window.proximityState.distanceMeters;
    const nowMs = Date.now();

    /* ── 1. Continuous zone factor (no more hard flip) ── */
    let zoneFactor;
    if (distM <= PROX_NEAR_M) {
        zoneFactor = 1.0;
    } else if (distM >= PROX_EXIT_FAR_M) {
        zoneFactor = 0.0;
    } else {
        const t = Math.max(0, Math.min(1, (distM - PROX_NEAR_M) / (PROX_EXIT_FAR_M - PROX_NEAR_M)));
        // Smoothstep: 3t² − 2t³  — zero derivative at boundaries prevents perceived "hit"
        zoneFactor = 1.0 - (t * t * (3 - 2 * t));
    }

    // Preserve boolean flag for any legacy consumers, but derived smoothly
    const isEffectivelyInside = zoneFactor > 0.005;
    window._inProximityZone = isEffectivelyInside;

    /* ── 2. Target zoom (continuous) ── */
    const targetZoom = PROX_ZOOM_OUT + zoneFactor * (PROX_ZOOM_IN - PROX_ZOOM_OUT);

    /* ── 3. Target center (blend between user-only and fitBounds-style padded center) ── */
    const userLL = userMarker?.getLatLng?.();
    const proxLoc = window.proximityState.closestLocation;
    const poiLL = (proxLoc?.lat != null && proxLoc?.lng != null)
        ? L.latLng(proxLoc.lat, proxLoc.lng)
        : null;

    let targetCenter;
    if (userLL && poiLL) {
        // Midpoint of user and POI
        const midLat = (userLL.lat + poiLL.lat) / 2;
        const midLng = (userLL.lng + poiLL.lng) / 2;
        const midpoint = L.latLng(midLat, midLng);

        // Replicate the asymmetric padding shift that fitBounds applies.
        // paddingTopLeft: [64,64], paddingBottomRight: [64,96].
        // Vertical asymmetry is 32 px; fitBounds shifts the center north by 16 px.
        const midPx = map.latLngToContainerPoint(midpoint);
        const shiftedPx = L.point(midPx.x, midPx.y - 16); // 16 px north
        const shiftedLL = map.containerPointToLatLng(shiftedPx);
        const paddedCenter = L.latLng(shiftedLL.lat, midpoint.lng);

        // Linear interpolation: outside = userLL, inside = paddedCenter
        targetCenter = L.latLng(
            userLL.lat + zoneFactor * (paddedCenter.lat - userLL.lat),
            userLL.lng + zoneFactor * (paddedCenter.lng - userLL.lng)
        );
    } else if (userLL) {
        targetCenter = userLL;
    } else {
        targetCenter = map.getCenter();
    }

    /* ── 4. Decide whether to issue a new command ── */
    const currentZoom = map.getZoom();
    const zoomDelta = Math.abs(targetZoom - currentZoom);
    const centerDelta = targetCenter ? map.getCenter().distanceTo(targetCenter) : 0;

    // Use longer throttle while actively transitioning so the animation can finish
    const inTransition = zoneFactor > 0.01 && zoneFactor < 0.99;
    const throttleMs = inTransition ? TRANSITION_THROTTLE_MS : PROX_THROTTLE_MS;
    const throttleOk = !window._lastProxZoomRequest || (nowMs - window._lastProxZoomRequest) >= throttleMs;
    const proxZoomBlocked = window._zoomAuthorityThisFrame === true;
    window._zoomAuthorityThisFrame = false;

    // Avoid restarting an animation for a micro-delta or if already near target
    const lastTarget = window._lastProxTarget;
    const targetChanged = !lastTarget ||
        Math.abs(targetZoom - lastTarget.zoom) > 0.12 ||
        (targetCenter && lastTarget.center && targetCenter.distanceTo(lastTarget.center) > 3);

    if ((zoomDelta >= 0.15 || centerDelta > 2) && throttleOk && !proxZoomBlocked && targetChanged) {
        window._lastProxZoomRequest = nowMs;
        window._lastProxTarget = { zoom: targetZoom, center: targetCenter };

        // Duration: give transitions more time; quick corrections when settled
        const isSettled = zoneFactor === 0.0 || zoneFactor === 1.0;
        const zoomDur = isSettled
            ? Math.min(2.0, Math.max(0.8, zoomDelta * 0.55))
            : Math.min(3.0, Math.max(1.4, zoomDelta * 0.7 + centerDelta * 0.015));

        // Single animation primitive for the entire range — no more fitBounds / flyTo mismatch
        map.flyTo(targetCenter, targetZoom, {
            duration: zoomDur,
            easeLinearity: zoneFactor > 0.5 ? 0.25 : (eastWestMove ? 0.13 : 0.15)
        });
    }

    // Reset tracking when fully outside so the next approach starts fresh
    if (!isEffectivelyInside) {
        window._lastProxZoomRequest = null;
        window._lastProxTarget = null;
    }
}

/* Calculates a new map center in roaming mode when user approaches viewport edge. */
function _calculateRoamingTarget(userPos, bounds, speedMPH) {
    const currentCenter = map.getCenter();
    
    if (!_isNearViewportEdge(userPos, bounds, speedMPH)) {
        return currentCenter;
    }
    
    const viewportWidth = bounds.getEast() - bounds.getWest();
    const viewportHeight = bounds.getNorth() - bounds.getSouth();
    
    const marginLat = viewportHeight * 0.20;
    const marginLng = viewportWidth * 0.20;
    
    let adjustedLat = currentCenter.lat;
    let adjustedLng = currentCenter.lng;
    
    const distFromNorth = bounds.getNorth() - userPos.lat;
    const distFromSouth = userPos.lat - bounds.getSouth();
    const distFromEast = bounds.getEast() - userPos.lng;
    const distFromWest = userPos.lng - bounds.getWest();
    
    if (distFromNorth < marginLat) {
        adjustedLat = userPos.lat + (viewportHeight * 0.30);
    } else if (distFromSouth < marginLat) {
        adjustedLat = userPos.lat - (viewportHeight * 0.30);
    }
    
    if (distFromEast < marginLng) {
        adjustedLng = userPos.lng + (viewportWidth * 0.30);
    } else if (distFromWest < marginLng) {
        adjustedLng = userPos.lng - (viewportWidth * 0.30);
    }
    
    return { lat: adjustedLat, lng: adjustedLng };
}

/* Pans the map in roaming mode when the user approaches a viewport edge. */
function panMapInRoaming(
    target,
    speedTier,
    directionChangeFactor,
    eastWestMovement,
    speedMPH
) {
    /* Throttle – limit calls to roughly 20 fps. */
    const PAN_THROTTLE_MS = 50;                     // ~20 fps
    const now = Date.now();

    if (window._lastPanTime && now - window._lastPanTime < PAN_THROTTLE_MS) {
        return;                                     // Too soon; skip this frame
    }

    /*  Core dependency validation (unchanged semantics). */
    if (!map || typeof map.getBounds !== 'function') {
        console.warn('[PanRoaming] Map instance unavailable');
        return;
    }

    const bounds = map.getBounds();
    if (!bounds) {
        return;
    }

    /*  Input validation – mirrors original early‑returns. */
    if (!target || typeof target.lat !== 'number' || typeof target.lng !== 'number') {
        console.warn('[PanRoaming] Invalid target coordinates:', target);
        return;
    }

    if (!speedTier || typeof speedTier !== 'object') {
        console.warn('[PanRoaming] Invalid speed tier:', speedTier);
        return;
    }

    /* Mode enforcement – only run in roaming mode. */
    if (typeof ModeManager?.isCentered !== 'function') {
        console.warn('[PanRoaming] ModeManager unavailable');
        return;
    }

    if (ModeManager.isCentered()) {
        // Preserve original warning (only once per session to avoid spam)
        if (!window._centeredModeWarningShown) {
            console.warn('[PanRoaming] Called in centered mode — ignored');
            window._centeredModeWarningShown = true;
        }
        return;
    }
    // Reset warning flag when we are in the correct mode
    window._centeredModeWarningShown = false;

    /*  Global state initialisation – keep shape identical. */
    if (!window.centeringState || typeof window.centeringState !== 'object') {
        window.centeringState = {
            isCentered: false,
            lastPanPosition: null,
            panVelocity: { x: 0, y: 0 }
        };
    } else {
        // Force the flag to false (original behaviour)
        window.centeringState.isCentered = false;
    }

    /* edge detection with speed-scaled margins and critical zone */
    const mapSize = map.getSize();
    if (!mapSize || !mapSize.x || !mapSize.y) return;
    
    const targetPixel = map.latLngToContainerPoint(target);
    if (!targetPixel || typeof targetPixel.x !== 'number' || typeof targetPixel.y !== 'number') {
        return;
    }

    // Dynamic margin calculation (matches _isNearViewportEdge)
    const MIN_MARGIN = 150;
    const SPEED_FACTOR = 2.0;
    const CRITICAL_MARGIN = 40;
    
    const safeSpeed = isFinite(speedMPH) && speedMPH > 0 ? speedMPH : 0;
    const dynamicMargin = MIN_MARGIN + (safeSpeed * SPEED_FACTOR);
    const maxSafeMargin = Math.min(mapSize.x, mapSize.y) * 0.45;
    const marginPx = Math.max(Math.min(dynamicMargin, maxSafeMargin), CRITICAL_MARGIN);

    // Check if near edge
    const nearLeft   = targetPixel.x < marginPx;
    const nearRight  = targetPixel.x > (mapSize.x - marginPx);
    const nearTop    = targetPixel.y < marginPx;
    const nearBottom = targetPixel.y > (mapSize.y - marginPx);
    
    const isNearEdge = nearLeft || nearRight || nearTop || nearBottom;
    
    // Check if in CRITICAL zone (emergency territory)
    const criticalLeft   = targetPixel.x < CRITICAL_MARGIN;
    const criticalRight  = targetPixel.x > (mapSize.x - CRITICAL_MARGIN);
    const criticalTop    = targetPixel.y < CRITICAL_MARGIN;
    const criticalBottom = targetPixel.y > (mapSize.y - CRITICAL_MARGIN);
    
    const isInCriticalZone = criticalLeft || criticalRight || criticalTop || criticalBottom;
    
    // Check if completely off screen (absolute emergency)
    const isOffScreen = (
        targetPixel.x < 0 ||
        targetPixel.x > mapSize.x ||
        targetPixel.y < 0 ||
        targetPixel.y > mapSize.y
    );

    if (!isNearEdge && !isInCriticalZone && !isOffScreen) {
        // Target comfortably inside the view – nothing to do.
        window.centeringState.lastPanPosition = null;
        return;
    }

    /* Velocity‑based intensity (optional smoothing). */
    let panIntensity = 1.0;                                 // default multiplier

    if (window.centeringState.lastPanPosition && speedMPH > 0) {
        const elapsedMs = now - window._lastPanTime;
        if (elapsedMs > 0) {
            const deltaPx = targetPixel.subtract(window.centeringState.lastPanPosition);
            const velocity = deltaPx.divideBy(elapsedMs / 1000); // px/s

            // Exponential smoothing (70 % old, 30 % new)
            window.centeringState.panVelocity = {
                x: velocity.x * 0.3 + window.centeringState.panVelocity.x * 0.7,
                y: velocity.y * 0.3 + window.centeringState.panVelocity.y * 0.7
            };

            // Faster vehicle → stronger pan, capped to a reasonable range
            panIntensity = Math.min(1.5, Math.max(0.5, speedMPH / 30));
        }
    }

    /*  Execute the actual roaming‑mode pan with robust error handling. */
    try {
        const start = performance.now();

        // EMERGENCY: If off screen or in critical zone, bypass normal pan and force immediate correction
        if (isOffScreen || isInCriticalZone) {
            console.warn('[PanRoaming] ' + (isOffScreen ? 'OFF SCREEN' : 'CRITICAL ZONE') + ' - forcing immediate pan');
            
            // Force instant pan to recenter
            map.panTo(target, { 
                animate: false, 
                noMoveStart: true 
            });
            
            // Skip throttle for emergency
            window._lastPanTime = 0;
        } else {
            // Normal roaming mode pan
            _executeRoamingModePan(
                target,
                speedTier,
                directionChangeFactor * panIntensity, // apply intensity boost
                eastWestMovement,
                speedMPH,
                bounds
            );
            
            window._lastPanTime = now;
        }

        // Telemetry (debug only) 
        if (window.DEBUG_PANNING) {
            const dur = performance.now() - start;
            console.debug(`[PanRoaming] Executed in ${dur.toFixed(1)} ms`);
        }

        // Update state for the next frame
        window.centeringState.lastPanPosition = targetPixel;
    } catch (err) {
        console.error('[PanRoaming] Pan execution failed:', err);

        // Graceful degradation – reset our tracking state
        window.centeringState.lastPanPosition = null;
        window.centeringState.panVelocity = { x: 0, y: 0 };

        // Fallback to a simple built‑in pan (best‑effort)
        try {
            map.panTo(target, { animate: true, duration: 0.5 });
        } catch (fallbackErr) {
            console.warn('[PanRoaming] Fallback pan also failed');
        }
    }
}

/*  Pans the map to keep the user centered — **centered mode only**. */
function _panMapToCenter(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor = 0) {
    if (!map) {
        console.warn('[PanCenter] Map not available');
        return;
    }
    
    const bounds = map.getBounds?.();
    if (!bounds) {
        console.warn('[PanCenter] Bounds not available');
        return;
    }
    
    if (
        !target ||
        typeof target.lat !== 'number' ||
        typeof target.lng !== 'number' ||
        !isFinite(target.lat) ||
        !isFinite(target.lng)
    ) {
        console.warn('[PanCenter] Invalid target coordinates:', target);
        return;
    }
    
    // Enforce mode contract: this function is ONLY for centered mode
    if (!ModeManager.isCentered()) {
        console.warn('[PanCenter] Called outside centered mode — ignored');
        return;
    }
    
    // Initialize centering state if needed
    if (!window.centeringState) {
        window.centeringState = { isCentered: true };
    }
    window.centeringState.isCentered = true;
    
    // Execute centered-mode panning
    _executeCenteredModePan(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor);
}

/* Optional cleanup that can be called when the UI switches out of roaming mode. It resets all globals that this module touches, ensuring a clean slate. */
function cleanupRoamingState() {
    if (window.centeringState) {
        window.centeringState.lastPanPosition = null;
        window.centeringState.panVelocity = { x: 0, y: 0 };
    }
    window._lastPanTime = 0;
    window._centeredModeWarningShown = false;
}

/*ROAMING MODE (< HIGH_SPEED MPH): Only pan when near viewport edges */
function _executeRoamingModePan(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, bounds) {
    // Validate inputs
    if (!map || !target || !isFinite(target.lat) || !isFinite(target.lng)) return;
    
    const mapSize = map.getSize();
    if (!mapSize || !mapSize.x || !mapSize.y) return;
    
    // Convert target to screen pixels (VIEWPORT check, not geographical)
    const targetPixel = map.latLngToContainerPoint(target);
    if (!targetPixel || typeof targetPixel.x !== 'number' || typeof targetPixel.y !== 'number') {
        return;
    }
    
    // Speed-scaled margin calculation (matches other functions)
    const MIN_MARGIN = 150;
    const SPEED_FACTOR = 2.0;
    const CRITICAL_MARGIN = 40;
    
    const safeSpeed = isFinite(speedMPH) && speedMPH > 0 ? speedMPH : 0;
    const dynamicMargin = MIN_MARGIN + (safeSpeed * SPEED_FACTOR);
    const maxSafeMargin = Math.min(mapSize.x, mapSize.y) * 0.45;
    const marginPx = Math.max(Math.min(dynamicMargin, maxSafeMargin), CRITICAL_MARGIN);
    
    // Check if near any edge (VIEWPORT-based)
    const nearLeft   = targetPixel.x < marginPx;
    const nearRight  = targetPixel.x > (mapSize.x - marginPx);
    const nearTop    = targetPixel.y < marginPx;
    const nearBottom = targetPixel.y > (mapSize.y - marginPx);
    
    const isNearEdge = nearLeft || nearRight || nearTop || nearBottom;
    
    // Check if in CRITICAL zone
    const criticalLeft   = targetPixel.x < CRITICAL_MARGIN;
    const criticalRight  = targetPixel.x > (mapSize.x - CRITICAL_MARGIN);
    const criticalTop    = targetPixel.y < CRITICAL_MARGIN;
    const criticalBottom = targetPixel.y > (mapSize.y - CRITICAL_MARGIN);
    
    const isInCriticalZone = criticalLeft || criticalRight || criticalTop || criticalBottom;
    
    // Check if completely off screen
    const isOffScreen = (
        targetPixel.x < 0 ||
        targetPixel.x > mapSize.x ||
        targetPixel.y < 0 ||
        targetPixel.y > mapSize.y
    );
    
    // Early return if not near edge and not in danger
    if (!isNearEdge && !isInCriticalZone && !isOffScreen) {
        return;
    }
    
    // Calculate distance from center for duration adjustment
    const currentCenter = map.getCenter();
    const centerPixel = map.latLngToContainerPoint(currentCenter);
    
    const pixelDistance = Math.sqrt(
        Math.pow(targetPixel.x - centerPixel.x, 2) + 
        Math.pow(targetPixel.y - centerPixel.y, 2)
    );
    
    // Normalize distance (0 to 1, where 1 = half screen width/height)
    const maxDistance = Math.sqrt(
        Math.pow(mapSize.x / 2, 2) + 
        Math.pow(mapSize.y / 2, 2)
    );
    const normalizedDist = Math.min(1.0, pixelDistance / maxDistance);
    
    // EMERGENCY: If off screen or critical, force instant pan
    if (isOffScreen || isInCriticalZone) {
        console.warn('[Roaming] ' + (isOffScreen ? 'OFF SCREEN' : 'CRITICAL') + ' - instant pan');
        
        map.panTo([target.lat, target.lng], {
            animate: false,
            noMoveStart: true
        });
        return;
    }
    
    // Calculate animation duration
    let panDuration = (speedTier?.panDuration ?? 0.3) * (directionChangeFactor ?? 1.0);
    
    if (eastWestMovement) {
        panDuration *= 0.90;
    }
    
    // Adjust duration based on distance - closer to edge = faster response
    if (normalizedDist < 0.20) {
        panDuration *= 0.75;
    }
    
    panDuration = Math.max(0.1, Math.min(1.0, panDuration));
    
    // Calculate easing
    let easeLinearity = speedTier?.easeLinearity ?? 0.2;
    easeLinearity = Math.max(0.1, Math.min(0.4, easeLinearity));
    
    // Execute pan
    const centerTarget = [target.lat, target.lng];
    
    map.panTo(centerTarget, {
        animate: true,
        duration: panDuration,
        easeLinearity: easeLinearity,
        noMoveStart: true
    });
    
    if (window.DEBUG_PANNING) {
        console.debug(`[Roaming] Pan near edge: speed=${safeSpeed.toFixed(1)}mph, dist=${normalizedDist.toFixed(2)}, duration=${(panDuration*1000).toFixed(0)}ms`);
    }
}

/* CENTERED MODE (≥ HIGH_SPEED MPH): Always keep marker at exact center with look-ahead */
function _executeCenteredModePan(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor) {
    let centerLat = target.lat;
    let centerLng = target.lng;
    
    // Safe look-ahead using smoothed velocity
    if (
        lookAheadFactor > 0 &&
        window.smoothedVelocity?.lat != null &&
        window.smoothedVelocity?.lng != null
    ) {
        const biasScale = 0.00002;
        const biasLat = window.smoothedVelocity.lat * lookAheadFactor * biasScale;
        centerLat += biasLat;
        
        const lngMultiplier = eastWestMovement ? 0.85 : 1.0;
        const biasLng = window.smoothedVelocity.lng * lookAheadFactor * biasScale * lngMultiplier;
        centerLng += biasLng;
    }
    
    let panDuration = (speedTier?.panDuration ?? 0.2) * (directionChangeFactor ?? 1.0);
    
    // EXCLUSIVE RANGES: Only one multiplier applies based on speed
    if (speedMPH >= 30) {
        panDuration *= 0.70;
    } else if (speedMPH >= 20) {
        panDuration *= 0.80;
    } else if (speedMPH >= SPEED_THRESHOLDS.HIGH_SPEED) { 
        panDuration *= 0.90;
    }
    
    if (eastWestMovement) {
        panDuration *= 0.90;
    }
    
    panDuration = Math.max(0.05, Math.min(0.5, panDuration));
    
    let easeLinearity = speedTier?.easeLinearity ?? 0.15;
    
    if (speedMPH >= 20) {
        easeLinearity = Math.min(0.25, easeLinearity * 1.4);
    } else if (speedMPH >= SPEED_THRESHOLDS.HIGH_SPEED) { 
        easeLinearity = Math.min(0.20, easeLinearity * 1.2);
    }
    
    easeLinearity = Math.max(0.1, Math.min(0.5, easeLinearity));
    
    const centerTarget = [centerLat, centerLng];
    
    map.panTo(centerTarget, {
        animate: true,
        duration: panDuration,
        easeLinearity: easeLinearity,
        noMoveStart: true
    });
    
    console.debug(`[Centered] Pan to center: speed=${speedMPH.toFixed(1)}mph, duration=${(panDuration*1000).toFixed(0)}ms`);
}

// --- CLEANUP FUNCTION ---
function disposeMapLoop() {
    // RAF timers
    if (window._nextLocationUpdateRAF) {
        cancelAnimationFrame(window._nextLocationUpdateRAF);
        window._nextLocationUpdateRAF = null;
    }
    if (window.animationFrameId) {
        cancelAnimationFrame(window.animationFrameId);
        window.animationFrameId = null;
    }
    
    // Standard timeouts
    if (window.gpsTimeoutTimer) {
        clearTimeout(window.gpsTimeoutTimer);
        window.gpsTimeoutTimer = null;
    }
    if (window.debounceTimeoutId) {
        clearTimeout(window.debounceTimeoutId);
        window.debounceTimeoutId = null;
    }
    if (window._visualFallbackTimer) {
        clearTimeout(window._visualFallbackTimer);
        window._visualFallbackTimer = null;
    }
    if (window._markerFallbackTimer) {
        clearTimeout(window._markerFallbackTimer);
        window._markerFallbackTimer = null;
    }
    if (window.inactivityTimer) {
        clearTimeout(window.inactivityTimer);
        window.inactivityTimer = null;
    }
    if (window._viewportSafetyResetTimer) {
        clearTimeout(window._viewportSafetyResetTimer);
        window._viewportSafetyResetTimer = null;
    }
    if (window._pzState?.lastZoomInTimer) {
        clearTimeout(window._pzState.lastZoomInTimer);
    }
    if (window._pzState?.lastZoomOutTimer) {
        clearTimeout(window._pzState.lastZoomOutTimer);
    }
    
    // Intervals (these WILL leak if not cleared)
    if (window._gpsPowerInterval) {
        clearInterval(window._gpsPowerInterval);
        window._gpsPowerInterval = null;
        window._gpsPowerManagerSetup = false;
    }
    if (window._idleProximityCheckInterval) {
        clearInterval(window._idleProximityCheckInterval);
        window._idleProximityCheckInterval = null;
    }
    if (window.distanceBoxCountdownInterval) {
        clearInterval(window.distanceBoxCountdownInterval);
        window.distanceBoxCountdownInterval = null;
    }
    
    // Clean up visibility handler for countdown
    if (window._countdownVisibilityHandler) {
        document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
        window._countdownVisibilityHandler = null;
    }
    
    // Reset flags
    window._visualFallbackActive = false;
    window._viewportSafetyEnforced = false;
    
    console.log("Map loop timers/RAF disposed. State preserved.");
}
        
/* Core function that resets the map to a new position. Shared logic between initialization and jump handling. */
function _resetMapToPosition(newPosition, options = {}) {
    // Basic validation
    if (!map || !userMarker || !newPosition) return;
    
    // Options with defaults
    const currentTime = options.currentTime || Date.now();
    const resetType = options.resetType || 'jump';
    const forceUpdate = options.forceUpdate || false;
    const clearStationary = options.clearStationary !== false;
    
    // State reset (type-specific)
    if (resetType === 'init') {
        // Initialization-specific setup
        setupMapInteractionHandlers();
        
        // Initialize position buffer
        window.positionBuffer = window.positionBuffer || [];
        window.positionBuffer.length = 0;
        updatePositionBuffer(newPosition);
        
        // Set initialization-specific state
        window.stationaryStartTime = currentTime;
        window.isMapInteracting = false;
        window.lastInteractionTime = currentTime;
        window.blockSpeedZoom = false;
        window.zoomedInState = false;
        window._lastCenteredMode = false;
        window._viewportSafetyEnforced = false;
    } else {
        // Jump handling-specific setup
        if (clearStationary && window.stationaryCheckTimeout) {
            clearTimeout(window.stationaryCheckTimeout);
            window.stationaryCheckTimeout = null;
        }
        
        // Reset buffer with current position only
        window.positionBuffer = [newPosition];
        window.stationaryStartTime = null;
    }
    
    // Shared state updates
    window.lastPosition = newPosition;
    window.lastUpdateTime = currentTime;
    window.lastVelocity = { lat: 0, lng: 0 };
    window.smoothedVelocity = { lat: 0, lng: 0 };
    window.isStationary = false;
    window.stationaryLockPosition = null;
    window.followUser = true;
    
    // Shared map operations
    const mapContainer = map.getContainer();
    const originalTransition = mapContainer.style.transition;
    mapContainer.style.transition = 'none';
    
    // Calculate target zoom
    const currentZoom = map.getZoom();
    const intelligentZoom = (typeof getSpeedBasedZoom === 'function') 
  ? getSpeedBasedZoom(newPosition.speedMPS) 
  : -1;
    
    let targetZoom;
    if (resetType === 'init') {
        targetZoom = (typeof intelligentZoom === 'number' && intelligentZoom > 0)
            ? intelligentZoom
            : 17;
    } else {
        targetZoom = (typeof intelligentZoom === 'number' && intelligentZoom > 0)
            ? intelligentZoom
            : currentZoom;
    }
    
    // Center map and position marker
    try {
        userMarker.setLatLng([newPosition.lat, newPosition.lng]);
        map.setView([newPosition.lat, newPosition.lng], targetZoom, {
            animate: false,
            noMoveStart: true,
            noMoveEnd: true
        });
    } catch (error) {
        console.error(`${resetType} centering failed:`, error);
        
        const fallbackZoom = (resetType === 'init') ? 17 : currentZoom;
        map.setView([newPosition.lat, newPosition.lng], fallbackZoom, { animate: false });
        userMarker.setLatLng([newPosition.lat, newPosition.lng]);
    }
    
    // Restore transition after delay
    const restoreDelay = (resetType === 'init') ? 50 : 16;
    setTimeout(() => {
        if (mapContainer.isConnected) {
            mapContainer.style.transition = originalTransition;
        }
    }, restoreDelay);
    
    // Post-reset actions
    if (resetType === 'init') {
        // Initialization-specific UI updates
        if (typeof updateDistanceBox === 'function') {
            updateDistanceBox(forceUpdate);
        }
        
        if (typeof updateAccuracyIndicator === 'function') {
            updateAccuracyIndicator(newPosition.accuracy);
        }
    } else {
        // Jump handling-specific actions
        if (typeof isSignificantMovement === 'function' && 
            isSignificantMovement(newPosition) &&
            typeof resetInactivityTimer === 'function') {
            resetInactivityTimer(false);
        }
    }
    
    // Always enforce viewport safety
    _enforceViewportSafety(newPosition.speedMPS * 2.23694, userMarker.getLatLng());
}

/* Initializes user location state */
function _initializeUserLocationState(newPosition, currentTime, forceUpdate = false) {
    _resetMapToPosition(newPosition, {
        currentTime: currentTime,
        resetType: 'init',
        forceUpdate: forceUpdate,
        clearStationary: true
    });
}

/* Handles large distance jumps */
function _handleLargeDistanceJump(newPosition, currentTime) {
    _resetMapToPosition(newPosition, {
        currentTime: currentTime,
        resetType: 'jump',
        forceUpdate: false,
        clearStationary: true
    });

        typeof pos1.lat !== 'number' || typeof pos1.lng !== 'number' || 
        typeof pos2.lat !== 'number' || typeof pos2.lng !== 'number' ||
        isNaN(pos1.lat) || isNaN(pos1.lng) || isNaN(pos2.lat) || isNaN(pos2.lng)) {
        return Infinity;

    const R = 6371000;
    const toRad = Math.PI / 180;
    const lat1 = pos1.lat * toRad;

    const deltaLat = (pos2.lat - pos1.lat) * toRad;

    const a = sinDeltaLat * sinDeltaLat +
              Math.cos(lat1) * Math.cos(lat2r) * sinDeltaLng * sinDeltaLng;

    button.style.borderRadius = "4px";
    button.style.cursor = "pointer";
    
    button.addEventListener("click", function() {
        document.body.removeChild(overlay);
        if (callback && typeof callback === 'function') {
            callback();
        }
    });
    
    overlay.addEventListener("click", function(e) {
        if (e.target === overlay) {
            document.body.removeChild(overlay);
        }
    });
    
    popupContainer.appendChild(titleElement);
    popupContainer.appendChild(messageElement);
    popupContainer.appendChild(button);
    overlay.appendChild(popupContainer);
    document.body.appendChild(overlay);
    
    button.focus();
}

let recenterTimer;            

function recenterMap() {
    const btn = cachedElements?.recenterButton ?? document.getElementById('recenterButton');
    if (!btn || !userMarker?.getLatLng()) return;

    btn.disabled = true;                 // block spam
    btn.style.backgroundColor = 'var(--primary-color)';
    btn.style.color = 'white';

    map.closePopup();
    map.panTo(userMarker.getLatLng(), {
        animate: true,
        duration: 0.5,
        easeLinearity: 0.25,
        noZoom: true
    });

    followUser = true;
    announceToScreenReader('Map re-centred on your location');

    clearTimeout(recenterTimer);
    recenterTimer = setTimeout(() => {
        btn.style.backgroundColor = 'white';
        btn.style.color = 'var(--primary-color)';
        btn.disabled = false;
    }, 500);
}

/* ---------- 2-MINUTE LOCATION COOLDOWN ---------- */
const COOLDOWN_PERIOD_MS = 2 * 60 * 1000;
const STORAGE_KEY = 'locationCooldowns';
const DEBOUNCE_TIME_MS = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 500 : 300;
const CLEANUP_INTERVAL_MS = 60 * 1000;
const MAP_RESET_CHECK_INTERVAL_MS = 1000;
const CENTERED_POPUP_DURATION_MS = 3000;
const EXIT_DELAY_MS = 500;

class LocationCooldownManager {
  constructor() {
    this.cooldowns = this.loadFromStorage();
    this.currentLocationId = null;
    this.lastActionTime = 0;
    this.resetCooldownIds = new Set();
    this.wasOverSpeedThreshold = false;
    this._monitoringLocationId = null;
    this._announcedLocations = new Set();
    this._centeredPopupTimeout = null;
    this._exitTimeout = null;
    this._badgeDismissed = false;
    this._currentDisplayMode = null;
    this._closeFuncObserver = null;
    this._closeFuncPoll = null;
    
    this._sessionPrefs = this._loadSessionPrefs();
    this._prefsChecked = new Set();

    this.cleanupInterval = null;
    this.mapResetInterval = null;
    this.toastInterval = null;
    this.activeToast = null;

    this.cleanupExpiredCooldowns();
    this.startPeriodicCleanup();
    this.startMapResetMonitoring();
    // DO NOT patch showLocationHunt - _openLocationPage handles entry
    this.patchCloseFunctions();
    this.patchCreateBottomActionBar();
  }

  _loadSessionPrefs() {
    try {
      const raw = sessionStorage.getItem('cooldownSessionPrefs');
      if (!raw) return { hideCooldownUI: false };
      const parsed = JSON.parse(raw);
      return { hideCooldownUI: !!parsed.hideCooldownUI };
    } catch (e) {
      console.warn('Failed to load session prefs:', e);
      return { hideCooldownUI: false };
    }
  }

  _saveSessionPrefs() {
    try {
      sessionStorage.setItem('cooldownSessionPrefs', JSON.stringify(this._sessionPrefs));
    } catch (e) {
      console.error('Failed to save session prefs:', e);
    }
  }

  clearSessionPrefs() {
    sessionStorage.removeItem('cooldownSessionPrefs');
    this._sessionPrefs = { hideCooldownUI: false };
    this._prefsChecked.clear();
  }

  checkCooldown(locationId) {
    if (locationId == null) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const id = String(locationId);
    const startTime = this.cooldowns[id];

    if (!startTime) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const elapsed = Date.now() - startTime;

    if (!isFinite(elapsed) || elapsed < 0) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    if (elapsed >= COOLDOWN_PERIOD_MS) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const remainingMs = COOLDOWN_PERIOD_MS - elapsed;
    return {
      isOnCooldown: true,
      remainingMs: Math.max(0, remainingMs),
      remainingSeconds: Math.max(0, Math.ceil(remainingMs / 1000)),
    };
  }

  _clearCooldownState(id) {
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  enterLocation(locationId) {
    if (locationId == null) {
      return { success: false, reason: 'invalid_id', message: 'Invalid location ID' };
    }
    const id = String(locationId);
    const now = Date.now();
    if (now - this.lastActionTime < DEBOUNCE_TIME_MS) {
      return { success: false, reason: 'debounced', message: 'Action too rapid' };
    }
    this.lastActionTime = now;
    if (this.currentLocationId === id) {
      return { success: false, reason: 'already_inside', message: 'Already in this location' };
    }
    const status = this.checkCooldown(id);
    if (status.isOnCooldown) {
      return {
        success: false,
        reason: 'on_cooldown',
        message: 'This location cannot be revisited for two minutes',
        remainingMs: status.remainingMs,
        remainingSeconds: status.remainingSeconds,
        locationId: id,
      };
    }
    this.currentLocationId = id;
    this.resetCooldownIds.delete(id);
    return { success: true, reason: 'allowed', message: 'Location entry allowed' };
  }

  leaveLocation(locationId = null) {
    const id = locationId ? String(locationId) : this.currentLocationId;
    if (!id || id === 'null' || id === 'undefined') return;

    const wasCurrentLocation = this.currentLocationId === id;
    if (this.currentLocationId === id) this.currentLocationId = null;

    if (!wasCurrentLocation) return;

    if (this.cooldowns[id]) {
        const status = this.checkCooldown(id);
        if (status.isOnCooldown) return;
    }

    this.cooldowns[id] = Date.now();
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  startMapResetMonitoring() {
    this.mapResetInterval = setInterval(() => {
      this.checkAndResetMap();
    }, MAP_RESET_CHECK_INTERVAL_MS);
  }

  checkAndResetMap() {
    const now = Date.now();
    let shouldReset = false;
    let resetReason = null;

    if (typeof window.currentSpeed === 'number' && window.currentSpeed > 6) {
      if (!this.wasOverSpeedThreshold) {
        shouldReset = true;
        resetReason = 'speed_threshold';
        this.wasOverSpeedThreshold = true;
      }
    } else {
      this.wasOverSpeedThreshold = false;
    }

    if (!shouldReset && Object.keys(this.cooldowns).length > 0) {
      for (const id of Object.keys(this.cooldowns)) {
        if (this.resetCooldownIds.has(id)) continue;

        const status = this.checkCooldown(id);
        if (!status.isOnCooldown && this.isWithinThreshold(id)) {
          shouldReset = true;
          resetReason = 'cooldown_expired';
          this.resetCooldownIds.add(id);
          break;
        }
      }
    }

    if (shouldReset) {
      console.log(`Map reset triggered: ${resetReason}`);
      this.resetMapToUser();
    }
  }

  resetMapToUser() {
    if (typeof window.updateUserLocation === 'function' && window.lastPosition) {
      const fakePosition = {
        coords: {
          latitude: window.lastPosition.lat,
          longitude: window.lastPosition.lng,
          accuracy: window.lastPosition.accuracy || 20,
          speed: (window.currentSpeed || 0) / 2.23694,
          heading: window.lastPosition.heading || null
        },
        timestamp: Date.now()
      };

      updateUserLocation(fakePosition, false);

      window.followUser = true;
      window.isMapInteracting = false;

      window.blockSpeedZoom = true;
      if (typeof window.blockProximityZoom !== 'undefined') {
        window.blockProximityZoom = true;
      }
      
      setTimeout(() => {
        window.blockSpeedZoom = false;
        if (typeof window.blockProximityZoom !== 'undefined') {
          window.blockProximityZoom = false;
        }
      }, 2000);

    } else {
      try {
        if (typeof window.recenterMap === 'function') {
          window.recenterMap();
        } else if (window.map && window.userMarker) {
          const userPos = window.userMarker.getLatLng();
          if (userPos && window.map.setView) {
            window.map.flyTo(userPos, window.map.getZoom?.() || 16, {
              animate: true,
              duration: 1.0,
              easeLinearity: 0.25
            });
          }
        }

        window.isMapInteracting = false;
        window.followUser = true;
      } catch (e) {
        console.error('Fallback map reset failed:', e);
      }
    }
  }

  formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  isWithinThreshold(locationId) {
    try {
      let location = null;
      const sources = [window.gameLocations, window.locations];
      for (const source of sources) {
        if (Array.isArray(source)) {
          location = source.find(loc => loc?.id === locationId);
          if (location) break;
        }
      }
      if (!location && window.locationsMap && typeof window.locationsMap === 'object') {
        location = Object.values(window.locationsMap).find(loc => loc?.id === locationId);
      }

      if (!location) return false;

      const lat = parseFloat(location.lat);
      const lng = parseFloat(location.lng);
      if (!isFinite(lat) || !isFinite(lng)) return false;

      if (typeof calculateDistance !== 'function' || !window.userMarker) return false;

      const userPos = window.userMarker.getLatLng();
      if (!userPos || !isFinite(userPos.lat) || !isFinite(userPos.lng)) return false;

      const distanceFeet = calculateDistance(userPos.lat, userPos.lng, lat, lng);
      if (!isFinite(distanceFeet) || distanceFeet < 0) return false;

      const threshold = (typeof CONFIG?.DISTANCE_THRESHOLD === 'number')
        ? CONFIG.DISTANCE_THRESHOLD
        : 20;
      return distanceFeet <= threshold;
    } catch (e) {
      console.error('Error in isWithinThreshold:', e);
      return false;
    }
  }

  notifyUserWithCountdown(locationId, remainingSeconds) {
    if (this._sessionPrefs.hideCooldownUI) {
        this._monitoringLocationId = locationId;
        this._prefsChecked.add(locationId);
        return;
    }

    if (this._monitoringLocationId === locationId) {
        return;
    }

    this.clearToastInterval();
    this._badgeDismissed = false;
    this._currentDisplayMode = null;

    if (this._centeredPopupTimeout) {
        clearTimeout(this._centeredPopupTimeout);
        this._centeredPopupTimeout = null;
    }
    if (this._exitTimeout) {
        clearTimeout(this._exitTimeout);
        this._exitTimeout = null;
    }

    this._monitoringLocationId = locationId;

    const updatePopup = () => {
        if (this._monitoringLocationId !== locationId) {
            this.clearToastInterval();
            return;
        }

        if (this._sessionPrefs.hideCooldownUI) {
            this.clearToast();
            return;
        }

        if (this._badgeDismissed) return;

        const isNearby = this.isWithinThreshold(locationId);
        const status = this.checkCooldown(locationId);

        if (!status.isOnCooldown) {
            this._handleCooldownExpired(locationId, isNearby);
            return;
        }

        if (isNearby) {
            this._handleNearbyWithCooldown(locationId, status.remainingSeconds);
        } else {
            this._handleLeftProximity();
        }
    };

    updatePopup();
    this.toastInterval = setInterval(updatePopup, 1000);
  }

 _handleCooldownExpired(locationId, isNearby) {
    this.clearToastInterval();
    this._monitoringLocationId = null;
    this._currentDisplayMode = null;
    this._prefsChecked.delete(locationId);

    if (isNearby) {
        const location = window.gameLocations?.find(loc => loc?.id === locationId) ||
                         window.locations?.find(loc => loc?.id === locationId) ||
                         Object.values(window.locationsMap || {}).find(loc => loc?.id === locationId);

        if (location && typeof window._openLocationPage === 'function') {
            console.log('[Cooldown] Expired while user nearby - auto-opening:', locationId);
            window._openLocationPage(location);
        }
    }
}

_handleNearbyWithCooldown(locationId, remainingSeconds) {
    if (this._exitTimeout) {
        clearTimeout(this._exitTimeout);
        this._exitTimeout = null;
    }
    const targetMode = this._announcedLocations.has(locationId) ? 'corner' : 'center';
    if (this._currentDisplayMode !== targetMode) {
        this._transitionToMode(targetMode, remainingSeconds, locationId);
    } else {
        this._updateCountdownDisplay(remainingSeconds);
    }
}

  _handleLeftProximity() {
    if (!this._exitTimeout) {
      this._exitTimeout = setTimeout(() => {
        this._hideAll();
        this._currentDisplayMode = null;
        this._badgeDismissed = false;
        this._exitTimeout = null;
      }, EXIT_DELAY_MS);
    }
  }

  _transitionToMode(targetMode, remainingSeconds, locationId) {
    if (targetMode === 'center') {
      this._currentDisplayMode = 'center';
      this._hideCornerBadge();
      this._showCenteredPopup(remainingSeconds);
      this._announcedLocations.add(locationId);
      
      if (this._centeredPopupTimeout) clearTimeout(this._centeredPopupTimeout);
      this._centeredPopupTimeout = setTimeout(() => {
        if (this._currentDisplayMode === 'center') {
          this._currentDisplayMode = 'corner';
          this._removeCenteredPopup();
          this._showOrUpdateCornerBadge(remainingSeconds);
        }
        this._centeredPopupTimeout = null;
      }, CENTERED_POPUP_DURATION_MS);
      
    } else {
      this._currentDisplayMode = 'corner';
      this._removeCenteredPopup();
      this._showOrUpdateCornerBadge(remainingSeconds);
    }
  }

  _updateCountdownDisplay(remainingSeconds) {
    if (this._currentDisplayMode === 'center') {
      const countdownEl = document.getElementById('cd-centered-countdown');
      if (countdownEl) {
        countdownEl.textContent = this.formatTime(remainingSeconds);
      }
    } else if (this._currentDisplayMode === 'corner') {
      const textEl = document.getElementById('cd-corner-text');
      if (textEl) {
        textEl.textContent = this.formatTime(remainingSeconds);
      }
    }
  }

  _showCenteredPopup(remainingSeconds) {
    let popup = document.getElementById('cd-centered-popup');
    
    if (!popup) {
      popup = document.createElement('div');
      popup.id = 'cd-centered-popup';
      popup.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10001;
        background: rgba(0, 0, 0, 0.88);
