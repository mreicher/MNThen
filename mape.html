function isSignificantMovement(newPosition) {
    if (!lastPositionForJitter) {
        lastPositionForJitter = newPosition;
        lastSignificantMovement = Date.now();
        return true;
    }

    const distance = calculateDistance(lastPositionForJitter, newPosition);
    
    // Prevent invalid GPS spikes from poisoning the baseline position
    if (!isFinite(distance) || distance < 0) {
        return false;
    }

    const now = Date.now();
    const timeSince = now - lastSignificantMovement;

    if (
        (distance >= CONFIG.JITTER_THRESHOLD && timeSince >= CONFIG.SIGNIFICANT_MOVEMENT_COOLDOWN) ||
        distance >= CONFIG.JITTER_THRESHOLD * 5
    ) {
        lastPositionForJitter = newPosition;
        lastSignificantMovement = now;
        return true;
    }
    return false;
}

function resetInactivityTimer(isExplicitInteraction = true) {
    if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
    }
    
    inactivityTimer = createTrackedTimeout(() => {
        if (!map || !userMarker) return;
        
        map.closePopup();
        if (!window.isMapInteracting) {  
            window.followUser = true;                  
            window.isMapInteracting = false; // Ensure state is fully released
            
            const userPos = userMarker.getLatLng();
            // isFinite prevents failure at exact 0 lat/lng coordinates
            if (userPos && isFinite(userPos.lat) && isFinite(userPos.lng)) {
                map.panTo(userPos, { animate: true, duration: 0.5, noZoom: true });
            }
        }
    }, CONFIG.INACTIVITY_TIMEOUT);
    
    if (isExplicitInteraction) {
        window.isMapInteracting = false;  
    }
}

function optimizeImages(root = document) {
  if (!root || !root.querySelectorAll) {
    console.warn('optimizeImages: Invalid root element provided');
    return;
  }

  try {
    const images = root.querySelectorAll('img:not([data-optimized])');
    
    images.forEach(img => {
      try {
        if (img.hasAttribute('data-optimized') || 
            img.closest('template') || 
            img.getRootNode() instanceof ShadowRoot) {
          return;
        }

        const src = img.currentSrc || img.src;
        
        if (!src || src.startsWith('data:') || src === 'about:blank') {
          img.setAttribute('data-optimized', 'no-valid-src');
          return;
        }

        const hasExplicitDimensions = img.hasAttribute('width') || img.hasAttribute('height');
        const hasNaturalDimensions = img.naturalWidth > 0 && img.naturalHeight > 0;
        
        if (hasExplicitDimensions || hasNaturalDimensions) {
          img.setAttribute('data-optimized', 'dimensions-exist');
          if (!img.hasAttribute('loading')) img.loading = 'lazy';
          return;
        }

        const isSVG = src.includes('.svg') || img.src.includes('.svg') || img.type === 'image/svg+xml';
        const isCritical = img.hasAttribute('data-critical') || 
                          img.closest('[data-critical]') ||
                          img.classList.contains('critical-image');
        
        if (isSVG) {
          img.setAttribute('data-optimized', 'svg');
          if (!isCritical && !img.hasAttribute('loading')) img.loading = 'lazy';
          return;
        }

        img.setAttribute('data-optimized', 'processing');

        if (!isCritical && !img.hasAttribute('loading')) {
          img.loading = 'lazy';
        }

        const setDimensions = () => {
          try {
            if (img.naturalWidth > 0 && img.naturalHeight > 0) {
              if (!img.hasAttribute('width') && !img.style.width) {
                img.setAttribute('width', img.naturalWidth);
              }
              if (!img.hasAttribute('height') && !img.style.height) {
                img.setAttribute('height', img.naturalHeight);
              }
              img.setAttribute('data-optimized', 'dimensions-set');
              
              if (!img.style.aspectRatio) {
                img.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
              }
            } else {
              img.setAttribute('data-optimized', 'no-dimensions');
            }
          } catch (error) {
            img.setAttribute('data-optimized', 'dimension-error');
            console.warn('Error setting image dimensions:', error, img.src);
          }
        };

        if (img.complete) {
          if (img.naturalWidth > 0) {
            setDimensions();
          } else {
            img.setAttribute('data-optimized', 'error-broken');
            img.setAttribute('width', '1');
            img.setAttribute('height', '1');
            img.style.visibility = 'hidden';
          }
          return;
        }

        const onLoad = () => {
          if (img.decode) {
            img.decode()
              .then(setDimensions)
              .catch(() => setDimensions());
          } else {
            setTimeout(setDimensions, 0);
          }
        };

        const onError = () => {
          img.setAttribute('data-optimized', 'error-load');
          img.setAttribute('width', '1');
          img.setAttribute('height', '1');
          img.style.opacity = '0.5';
        };

        // `once: true` automatically cleans up listeners after firing
        img.addEventListener('load', onLoad, { once: true });
        img.addEventListener('error', onError, { once: true });

      } catch (imgError) {
        console.warn('Error optimizing image:', imgError, img?.src || 'unknown image');
        img?.setAttribute('data-optimized', 'processing-error');
      }
    });
    
  } catch (error) {
    console.error('Error in optimizeImages:', error);
  }
}
        
function setupImageOptimizationObserver() {
  if (typeof MutationObserver === 'undefined') return;
  
  const pendingRoots = new Set();
  let rafId = null;

  const processPending = () => {
    rafId = null;
    pendingRoots.forEach(root => optimizeImages(root));
    pendingRoots.clear();
  };

  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      if (mutation.type !== 'childList' || mutation.addedNodes.length === 0) continue;
      
      for (const node of mutation.addedNodes) {
        if (node.nodeType !== Node.ELEMENT_NODE) continue;
        
        if (node.tagName === 'IMG') {
          // Scan the parent to catch the newly added IMG
          pendingRoots.add(node.parentElement || document.body);
        } else if (node.querySelector('img')) {
          // Only scan containers if they actually contain images
          pendingRoots.add(node);
        }
      }
    }

    // Batch all mutations into a single DOM scan per frame
    if (pendingRoots.size > 0 && rafId === null) {
      rafId = requestAnimationFrame(processPending);
    }
  });
  
  observer.observe(document.body, {
    childList: true,
    subtree: true
  });
  
  return {
    observer,
    destroy: () => {
      if (rafId) cancelAnimationFrame(rafId);
      observer.disconnect();
    }
  };
}

// Initialize on DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    optimizeImages();
    setupImageOptimizationObserver();
  });
} else {
  optimizeImages();
  setupImageOptimizationObserver();
}

/* EVENT LISTENER SETUP */
function setupEventListeners() {
    const setupButtonEvents = () => {
        const buttonConfigs = [
            { id: 'recenterButton', handler: fullResetMap, required: true },
            { id: 'returnButton', handler: returnToIndex, required: true },
            { id: 'tipsButton', handler: showNavigationTips, required: false }
        ];
        buttonConfigs.forEach(config => {
            try {
                const element = document.getElementById(config.id);
                if (element) {
                    element.addEventListener('click', config.handler);
                } else if (config.required) {
                    console.error(`Required button element not found: ${config.id}`);
                }
            } catch (error) {
                console.error(`Error setting up ${config.id} event:`, error);
            }
        });
    };

    const setupAccessibilityEvents = () => {};

    const setupSystemEvents = () => {
        try {
            document.addEventListener('visibilitychange', () => {
                try {
                    if (typeof handleVisibilityChange === 'function') handleVisibilityChange();
                } catch (error) {
                    console.error('Visibility change handler error:', error);
                }
            });
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (map) map.invalidateSize();
                    if (typeof updateDistanceBox === 'function') updateDistanceBox();
                }, 250);
            });
        } catch (error) {
            console.error('Error setting up system events:', error);
        }
    };

    try {
        setupButtonEvents();
        setupAccessibilityEvents();
        setupSystemEvents();
    } catch (error) {
        console.error('Critical error in setupEventListeners:', error);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const initSteps = [
        { name: 'Cache Elements', fn: cacheElements },
        { name: 'Initialize Map', fn: initMap },
        { name: 'Setup Event Listeners', fn: setupEventListeners },
        { name: 'Setup Map Interaction Handlers', fn: setupMapInteractionHandlers },
        { name: 'Optimize Images', fn: optimizeImages },
        { name: 'Initialize UI', fn: initializeUI }
    ];
    let successCount = 0;

    initSteps.forEach(step => {
        try {
            if (typeof step.fn === 'function') {
                step.fn();
                successCount++;
            } else {
                console.warn(`${step.name} function not available`);
            }
        } catch (error) {
            console.error(`${step.name} failed:`, error);
        }
    });
    console.log(`Application initialization: ${successCount}/${initSteps.length} steps completed`);
});

/* Initialize UI elements that should start hidden. */
function initializeUI() {
  try {
    const additionalInfoContainer = cachedElements?.additionalInfoContainer;
    if (additionalInfoContainer) {
      additionalInfoContainer.style.display = 'none';
    }
    
    // ----- Lochunt Container -----
    const lochuntContainer = cachedElements?.lochuntContainer;
    if (lochuntContainer) {
      lochuntContainer.style.display = 'none';
    }
    
    console.debug('UI initialization complete');
  } catch (error) {
    console.error('UI initialization error:', error);
  }
}

/* ─── iOS Ghost Click Shield ─── */
(function() {
    'use strict';

    const SHIELD_DURATION_MS = 500;
    const MAP_BUTTON_SELECTOR = '.map-button, #recenterButton, #returnButton, #tipsButton';
    const OVERLAY_SELECTOR = '.modal, .popup-overlay, .navigation-tips-overlay, .source-info-content, #cd-centered-popup, #cd-corner-badge, #summaryModal, #sourceInfoPopup, .reminder-modal';

    let shieldActive = false;
    let shieldTimer = null;
    let lastTouchTime = 0;
    let lastTouchTarget = null;
    let openingOverlay = false;

    function isOverlayElement(el) {
        return !!(el && el.closest && el.closest(OVERLAY_SELECTOR));
    }

    function isMapButton(el) {
        return !!(el && el.closest && el.closest(MAP_BUTTON_SELECTOR));
    }

    function activateShield() {
        shieldActive = true;
        lastTouchTime = Date.now();
        if (shieldTimer) clearTimeout(shieldTimer);
        shieldTimer = setTimeout(() => {
            shieldActive = false;
            shieldTimer = null;
        }, SHIELD_DURATION_MS);
    }

    document.addEventListener('touchstart', function(e) {
        openingOverlay = isMapButton(e.target);
    }, true);

    document.addEventListener('touchend', function(e) {
        lastTouchTarget = e.target;
        if (isOverlayElement(e.target)) {
            activateShield();
        }
        openingOverlay = false;
    }, true);

    document.addEventListener('click', function(e) {
        if (!isMapButton(e.target)) return;

        const timeSinceTouch = Date.now() - lastTouchTime;
        if (!shieldActive || timeSinceTouch >= SHIELD_DURATION_MS) return;

        if (lastTouchTarget) {
            const clickBtn = e.target.closest(MAP_BUTTON_SELECTOR);
            const touchBtn = lastTouchTarget.closest ? lastTouchTarget.closest(MAP_BUTTON_SELECTOR) : null;
            if (clickBtn && clickBtn === touchBtn) return;
        }

        e.stopImmediatePropagation();
        e.preventDefault();
    }, true);

    if (typeof MutationObserver !== 'undefined') {
        const observer = new MutationObserver(function(mutations) {
            if (openingOverlay) return;

            for (const mutation of mutations) {
                if (mutation.type !== 'childList') continue;
                for (const node of mutation.removedNodes) {
                    if (node.nodeType !== Node.ELEMENT_NODE) continue;
                    if (
                        (node.matches && node.matches(OVERLAY_SELECTOR)) ||
                        (node.querySelector && node.querySelector(OVERLAY_SELECTOR))
                    ) {
                        activateShield();
                        return;
                    }
                }
            }
        });

        const startObserving = () => {
            // Observe ONLY direct children of body. Overlays are appended
            // to body, so this catches them. Without subtree:true, this
            // ignores Leaflet tile/marker mutations, saving massive CPU.
            observer.observe(document.body, { childList: true });
        };

        if (document.body) {
            startObserving();
        } else {
            document.addEventListener('DOMContentLoaded', startObserving, { once: true });
        }
    }
})();
