let _idleProximityCheckInterval;

function startIdleProximityCheck() {
    if (_idleProximityCheckInterval) return;

    _idleProximityCheckInterval = setInterval(() => {
        try {
            if (!window.map || !window.gameLocations?.length || !window.userMarker) return;
            updateDistanceBox();
        } catch (err) {
            console.warn('Idle proximity check error:', err);
        }
    }, 10000);

    if (memoryManager?.registerCleanupTask) {
        memoryManager.registerCleanupTask(stopIdleProximityCheck);
    }
}

function stopIdleProximityCheck() {
    if (_idleProximityCheckInterval) {
        clearInterval(_idleProximityCheckInterval);
        _idleProximityCheckInterval = null;
    }
}

/* ──────────────────────────────────────────────
   IDLE PROXIMITY ZOOM CHECK
   Runs independently of GPS updates so the zoom
   triggers even when the user is stationary.
   ────────────────────────────────────────────── */
var _idleProximityZoomInterval = null;

function startIdleProximityZoomCheck() {
    if (_idleProximityZoomInterval !== null) return;

    _idleProximityZoomInterval = setInterval(function() {
        try {
            if (!window.map || !window.proximityState) return;
            var speedMPS = (window.lastPosition && window.lastPosition.speedMPS) || 0;
            var speedMPH = speedMPS * 2.23694;
            var eastWestMove = false; // Conservative default for idle check
            if (typeof _handleProximityZoomLogic === 'function') {
                _handleProximityZoomLogic(speedMPH, eastWestMove);
            }
        } catch (err) {
            if (typeof console !== 'undefined' && console.warn) {
                console.warn('Idle proximity zoom check error:', err);
            }
        }
    }, 2000);

    if (typeof memoryManager !== 'undefined' && memoryManager &&
        typeof memoryManager.registerCleanupTask === 'function') {
        memoryManager.registerCleanupTask(stopIdleProximityZoomCheck);
    }
}

function stopIdleProximityZoomCheck() {
    if (_idleProximityZoomInterval !== null) {
        clearInterval(_idleProximityZoomInterval);
        _idleProximityZoomInterval = null;
    }
}

function updateLoadingStatus(processed, total, elapsed) {
    if (processed === total) {
        console.log(`Loaded ${processed} markers in ${elapsed.toFixed(2)}ms`);
    }
}

/* ──────────────────────────────────────────────
   PWA INSTALL BANNER
   ────────────────────────────────────────────── */
let deferredPrompt;
let pwaInstallBanner, closePwaBanner, cancelPwaBanner, installPwaButton;

function getDeviceType() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
    if (/android/i.test(ua)) return 'android';
    return 'desktop';
}

function isRunningAsPWA() {
    if (window.matchMedia('(display-mode: standalone)').matches) return true;
    if (window.navigator.standalone === true) return true;
    if (document.referrer.includes('android-app://')) return true;
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('utm_source') === 'pwa' || urlParams.get('source') === 'pwa') return true;
    return false;
}

function canInstallPWA() {
    const deviceType = getDeviceType();
    if (deviceType === 'android') return 'beforeinstallprompt' in window || /Chrome/.test(navigator.userAgent);
    if (deviceType === 'ios') {
        const isIOS13OrLater = /OS 1[3-9]_|OS [2-9][0-9]_/.test(navigator.userAgent);
        const isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/.test(navigator.userAgent);
        return isIOS13OrLater && isSafari;
    }
    if (deviceType === 'desktop') return 'beforeinstallprompt' in window;
    return false;
}

async function isAppInstalled() {
    if (isRunningAsPWA()) return true;

    // getInstalledRelatedApps API (limited support)
    if ('getInstalledRelatedApps' in navigator) {
        try {
            const relatedApps = await navigator.getInstalledRelatedApps();
            if (relatedApps.length > 0) return true;
        } catch (_) {}
    }

    // iOS: check localStorage flag from previous standalone session
    if (getDeviceType() === 'ios' && localStorage.getItem('pwa-ios-installed') === 'true') {
        return true;
    }

    // NOTE: Do NOT check service worker scope here. Having a SW is a
    // prerequisite for PWA, not evidence of installation. The old check
    // matched every visitor after their first page load, preventing the
    // banner from ever showing.
    return false;
}

function updateBannerContent() {
    if (!pwaInstallBanner) return;

    const deviceType = getDeviceType();
    const titleEl = pwaInstallBanner.querySelector('h3');
    const instructionsEl = pwaInstallBanner.querySelector('.banner-content p');

    if (titleEl) titleEl.textContent = 'Install App';

    if (instructionsEl) {
        if (deviceType === 'ios') {
            instructionsEl.innerHTML = 'Tap the Share button <span aria-hidden="true">⬆️</span> then "Add to Home Screen"';
        } else if (deferredPrompt) {
            instructionsEl.textContent = deviceType === 'desktop'
                ? 'Click "Install" to add this app to your desktop'
                : 'Tap "Install" to add this app to your home screen';
        } else {
            instructionsEl.textContent = 'Use your browser menu to "Add to Home Screen"';
        }
    }

    // Show/hide install button — native prompt only on Android/desktop
    if (installPwaButton) {
        const canShowButton = deviceType !== 'ios' && !!deferredPrompt;
        installPwaButton.style.display = canShowButton ? '' : 'none';
    }
}

async function initPWABanner() {
    if (await isAppInstalled()) return;
    if (!canInstallPWA()) return;

    const deviceType = getDeviceType();

    // Android/desktop: wait for the native prompt event
    if ((deviceType === 'android' || deviceType === 'desktop') && !deferredPrompt) return;

    // iOS: delay prompt until second visit
    if (deviceType === 'ios') {
        const visits = parseInt(localStorage.getItem('pwaVisitCount') || '0', 10);
        localStorage.setItem('pwaVisitCount', String(visits + 1));
        if (visits < 1) return;
    }

    pwaInstallBanner = document.getElementById('pwaInstallBanner');
    closePwaBanner = document.getElementById('closePwaBanner');
    cancelPwaBanner = document.getElementById('cancelPwaBanner');
    installPwaButton = document.getElementById('installPwaButton');

    if (!pwaInstallBanner) return;

    const dismissBanner = () => {
        pwaInstallBanner.classList.remove('show');
        try { sessionStorage.setItem('pwaBannerDismissed', 'true'); } catch (_) {}
    };

    const hideBanner = () => {
        pwaInstallBanner.classList.remove('show');
    };

    if (closePwaBanner) closePwaBanner.addEventListener('click', dismissBanner);
    if (cancelPwaBanner) cancelPwaBanner.addEventListener('click', dismissBanner);

    updateBannerContent();

    createTrackedTimeout(() => {
        try { if (sessionStorage.getItem('pwaBannerDismissed') === 'true') return; } catch (_) {}
        pwaInstallBanner.classList.add('show');
    }, 2000);

    if (installPwaButton) {
        installPwaButton.addEventListener('click', async () => {
            if (deviceType === 'android' || deviceType === 'desktop') {
                if (!deferredPrompt) {
                    alert('Please use your browser menu to "Add to Home Screen" or "Install App"');
                    hideBanner();
                    return;
                }

                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;

                if (outcome === 'accepted') {
                    try {
                        sessionStorage.setItem('appJustInstalled', 'true');
                        localStorage.setItem('pwa-installed', 'true');
                        sessionStorage.setItem('pwaBannerDismissed', 'true');
                    } catch (_) {}

                    const notice = document.getElementById('pwaPostInstallNotice');
                    if (notice) {
                        notice.setAttribute('aria-hidden', 'false');
                        notice.classList.add('show');
                        const dismissBtn = document.getElementById('dismissPostInstall');
                        const hideNotice = () => {
                            notice.classList.remove('show');
                            notice.setAttribute('aria-hidden', 'true');
                        };
                        if (dismissBtn) dismissBtn.onclick = hideNotice;
                        createTrackedTimeout(hideNotice, 12000);
                    }
                } else {
                    try { sessionStorage.setItem('pwaBannerDismissed', 'true'); } catch (_) {}
                }

                deferredPrompt = null;
                hideBanner();

            } else if (deviceType === 'ios') {
                installPwaButton.style.display = 'none';
                const instructionsEl = pwaInstallBanner.querySelector('.banner-content p');
                if (instructionsEl) {
                    instructionsEl.innerHTML = 'Tap the Share button <span aria-hidden="true">⬆️</span> at the bottom of your screen, then select "Add to Home Screen"';
                    instructionsEl.classList.add('pwa-ios-instructions');
                }
                createTrackedTimeout(hideBanner, 6000);
            }
        });
    }
}

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (pwaInstallBanner) updateBannerContent();
});

window.addEventListener('appinstalled', () => {
    try {
        localStorage.setItem('pwa-installed', 'true');
        sessionStorage.setItem('appJustInstalled', 'true');
    } catch (_) {}
    if (pwaInstallBanner?.classList.contains('show')) {
        pwaInstallBanner.classList.remove('show');
    }
});

// iOS: flag when running in standalone mode
if (getDeviceType() === 'ios') {
    if (window.navigator.standalone) {
        try { localStorage.setItem('pwa-ios-installed', 'true'); } catch (_) {}
    }
    document.addEventListener('visibilitychange', () => {
        if (window.navigator.standalone) {
            try { localStorage.setItem('pwa-ios-installed', 'true'); } catch (_) {}
        }
    });
}

document.addEventListener('DOMContentLoaded', async function() {
    try {
        if (sessionStorage.getItem('appJustInstalled') === 'true') return;
        if (sessionStorage.getItem('pwaBannerDismissed') === 'true') return;
    } catch (_) {}

    if (await isAppInstalled()) return;
    await initPWABanner();
});

/* ──────────────────────────────────────────────
   LOADING MESSAGE — CSS-driven styles
   ────────────────────────────────────────────── */
let _loadingProgressInterval;

function showLoadingMessage() {
    if (document.getElementById('loadingMessage')) return;

    loadingMessageMinDisplayTime = Date.now() + 6000;

    const loadingMessage = document.createElement('div');
    loadingMessage.id = 'loadingMessage';

    const card = document.createElement('div');
    card.className = 'loading-card';

    const logo = document.createElement('img');
    logo.className = 'loading-logo';
    logo.src = 'https://mnthen.com/images/logo.webp';
    logo.alt = 'Minnesota Then Logo';

    const title = document.createElement('h1');
    title.className = 'loading-title';
    title.textContent = 'The Museum Without Walls';

    const subtitle = document.createElement('h2');
    subtitle.className = 'loading-subtitle';
    subtitle.textContent = 'Where Every Step Tells a Story';

    const statusContainer = document.createElement('div');
    statusContainer.className = 'loading-status';
    const statusText = document.createElement('p');
    statusText.id = 'loadingStatusText';
    statusText.textContent = 'Location found, proceeding to stabilization...';
    statusContainer.appendChild(statusText);

    const progressTrack = document.createElement('div');
    progressTrack.className = 'loading-progress-track';
    const progressBar = document.createElement('div');
    progressBar.className = 'loading-progress-bar';
    progressBar.id = 'loadingProgressBar';
    progressTrack.appendChild(progressBar);

    const noteContainer = document.createElement('div');
    noteContainer.className = 'loading-note';
    const noteText = document.createElement('p');
    noteText.textContent = 'Preparing your experience.';
    noteContainer.appendChild(noteText);

    card.appendChild(logo);
    card.appendChild(title);
    card.appendChild(subtitle);
    card.appendChild(statusContainer);
    card.appendChild(progressTrack);
    card.appendChild(noteContainer);
    loadingMessage.appendChild(card);
    document.body.appendChild(loadingMessage);

    // Progress animation
    const totalDuration = 10000;
    const updateMs = 100;
    const steps = totalDuration / updateMs;
    let progress = 0;

    const animations = [
    "Loading the map...",                     // Leaflet is initializing tiles
    "Finding your location...",               // navigator.geolocation is pinging
    "Connecting to GPS satellites...",         // Waiting for high-accuracy fix
    "Looking for nearby history...",           // Proximity math is running
    "Almost ready..."                         // Final DOM renders
];

    _loadingProgressInterval = setInterval(() => {
        progress += (100 / steps);
        if (progressBar) progressBar.style.width = `${Math.min(progress, 100)}%`;
        if (statusText) {
            const idx = Math.min(Math.floor(progress / (100 / animations.length)), animations.length - 1);
            statusText.textContent = animations[idx];
        }
        if (progress >= 100) {
            clearInterval(_loadingProgressInterval);
            _loadingProgressInterval = null;
            tryHideLoadingMessage();
        }
    }, updateMs);

    // Register cleanup so interval doesn't survive page unload
    if (memoryManager?.registerCleanupTask) {
        memoryManager.registerCleanupTask(() => {
            if (_loadingProgressInterval) {
                clearInterval(_loadingProgressInterval);
                _loadingProgressInterval = null;
            }
        });
    }
}

function tryHideLoadingMessage() {
    if (Date.now() >= loadingMessageMinDisplayTime) {
        fadeOutLoadingMessage();
    } else {
        const timeRemaining = loadingMessageMinDisplayTime - Date.now();
        createTrackedTimeout(fadeOutLoadingMessage, timeRemaining + 100);
    }
}

function fadeOutLoadingMessage() {
    const loadingMessage = document.getElementById('loadingMessage');
    if (!loadingMessage) return;

    if (_loadingProgressInterval) {
        clearInterval(_loadingProgressInterval);
        _loadingProgressInterval = null;
    }

    const progressBar = document.getElementById('loadingProgressBar');
    if (progressBar) progressBar.style.width = '100%';

    const distanceBox = cachedElements.distanceBox || document.getElementById('distanceBox');
    if (distanceBox) distanceBox.classList.add('show');

    loadingMessage.style.opacity = '0';
    createTrackedTimeout(() => { loadingMessage.remove(); }, 500);
}

function hideLoadingMessage() {
    tryHideLoadingMessage();
}

/* ──────────────────────────────────────────────
   ACCURACY INDICATOR — CSS-driven
   ────────────────────────────────────────────── */
function updateAccuracyIndicator(accuracy) {
    const indicator = document.getElementById('accuracyIndicator');
    if (!indicator) return;

    indicator.classList.remove('accuracy-high', 'accuracy-medium', 'accuracy-low');
    if (accuracy < 20) indicator.classList.add('accuracy-high');
    else if (accuracy < 50) indicator.classList.add('accuracy-medium');
    else indicator.classList.add('accuracy-low');
}

/* ──────────────────────────────────────────────
   USER LOCATION INITIALIZATION
   ────────────────────────────────────────────── */
function initializeUserLocation(position) {
    if (!position?.coords) {
        handleLocationError(new Error('Invalid initial position'));
        return;
    }

    const { latitude: lat, longitude: lng, accuracy, heading, speed } = position.coords;

    if (isNaN(lat) || isNaN(lng)) {
        handleLocationError(new Error('Invalid initial coordinates'));
        return;
    }

    if (Math.abs(lat) > 90 || Math.abs(lng) > 180) {
        handleLocationError(new Error('Coordinates out of valid range'));
        return;
    }

    // Already initialized — just update the marker
    if (window._initializationComplete) {
        if (userMarker) userMarker.setLatLng([lat, lng]);
        if (map) map.panTo([lat, lng], { animate: false });
        return;
    }

    // Guard against concurrent initialization
    if (window._initializationInProgress) {
        window._pendingInitPosition = position;
        return;
    }
    window._initializationInProgress = true;

    // Announce accuracy
    if (typeof announceToScreenReader === 'function') {
        if (accuracy > 100) {
            announceToScreenReader(`Location acquired with ${accuracy.toFixed(0)} meter accuracy. Map loading.`);
        } else {
            announceToScreenReader('Location acquired. Map ready for navigation.');
        }
    }

    try {
        // Retry if userMarker isn't ready yet
        if (!userMarker) {
            window._markerRetryCount = (window._markerRetryCount || 0) + 1;

            if (window._markerRetryCount <= 3) {
                window._initializationInProgress = false;
                createTrackedTimeout(() => {
                    const latestPosition = window._pendingInitPosition || position;
                    window._pendingInitPosition = null;
                    initializeUserLocation(latestPosition);
                }, 100 * window._markerRetryCount);
                return;
            }

            // Exhausted retries
            window._initializationInProgress = false;
            window._markerRetryCount = 0;
            handleLocationError(new Error('Map marker initialization failed'));
            return;
        }

        window._markerRetryCount = 0;
        userMarker.setLatLng([lat, lng]);

        if (!map) throw new Error('Map not initialized');

        const initialZoom = 17;
        map.setView([lat, lng], initialZoom, { animate: false });

        // Seed the position buffer for smoothing — one entry only
        // so the Kalman filter gets a clean baseline without a
        // false zero-velocity prior from multiple identical copies.
        if (typeof seedPositionBuffer === 'function') {
            seedPositionBuffer({
                lat, lng, accuracy,
                timestamp: position.timestamp || Date.now(),
                heading: heading ?? null,
                speedMPS: speed || 0
            });
        }

        if (typeof hideLoadingMessage === 'function') hideLoadingMessage();

        // Start the hunt
        if (typeof startHunt === 'function' && !window._huntStarted) {
            window._huntStarted = true;
            startHunt();
        }

        // Start idle proximity check
        if (typeof startIdleProximityCheck === 'function' && !window._proximityCheckStarted) {
            window._proximityCheckStarted = true;
            startIdleProximityCheck();
        }

        window._initializationComplete = true;
        window._initializationInProgress = false;
        window._lastSuccessfulInit = Date.now();
        window._initRecoveryAttempts = 0;

        // Start the GPS watch synchronously — no deferral.
        // A 0ms timeout still pushes watch registration to the next
        // task queue cycle (after paint), adding one full frame of lag
        // before any position events can fire.
        const watchId = startPositionUpdates();
        if (watchId === null) {
            createTrackedTimeout(() => {
                if (!window.positionWatchId) startPositionUpdates();
            }, 3000);
        }

        // Apply any position that arrived while we were initializing
        if (window._pendingInitPosition) {
            const pending = window._pendingInitPosition;
            window._pendingInitPosition = null;
            const pLat = pending?.coords?.latitude;
            const pLng = pending?.coords?.longitude;
            if (userMarker && pLat != null && pLng != null && !isNaN(pLat) && !isNaN(pLng)) {
                userMarker.setLatLng([pLat, pLng]);
            }
        }

    } catch (err) {
        console.error('Error during location initialization:', err);
        window._initializationInProgress = false;

        if (!window._initializationComplete) {
            window._huntStarted = false;
            window._proximityCheckStarted = false;
        }

        handleLocationError(err);

        window._initRecoveryAttempts = (window._initRecoveryAttempts || 0) + 1;

        if (window._initRecoveryAttempts <= 3) {
            const backoffMs = Math.min(15000, Math.pow(2, window._initRecoveryAttempts) * 1000);
            createTrackedTimeout(() => {
                if (navigator.geolocation && !window._initializationComplete) {
                    navigator.geolocation.getCurrentPosition(
                        initializeUserLocation,
                        handleLocationError,
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                }
            }, backoffMs);
        } else if (typeof showPopup === 'function') {
            showPopup(
                'Location Error',
                'Unable to get your location after multiple attempts. Please check your GPS settings and refresh the page.',
                'error'
            );
        }
    }
}


/* ──────────────────────────────────────────────
   GPS POWER MODE — shared utility
   ────────────────────────────────────────────── */
function getWatchOptions() {
    const speedMPH = (window.lastPosition?.speedMPS ?? 0) * 2.23694;
    
    const stationary = window.isStationary || speedMPH < 0.3;
    const driving = speedMPH >= 5 || (!window.isStationary && speedMPH >= 4);
    
    const options = {
        enableHighAccuracy: true,
        maximumAge: stationary ? 5000 : driving ? 1000 : 2000,
        timeout: stationary ? 20000 : driving ? 10000 : 15000,
    };

    // Non-enumerable: accessible to power manager, invisible to native API
    Object.defineProperty(options, 'restartInterval', {
        value: stationary ? 15000 : 5000,
        enumerable: false,
    });

    return options;
}

/* ──────────────────────────────────────────────
   POSITION UPDATES — GPS watch + power manager
   ────────────────────────────────────────────── */
function startPositionUpdates() {
    try {
        // Clean up existing watch — only ONCE
        if (window.positionWatchId != null) {
            navigator.geolocation.clearWatch(window.positionWatchId);
            window.positionWatchId = null;
        }

        // ── Fast-start: deliver a cached fix immediately if one exists,
        //    then transparently upgrade to fresh high-accuracy fixes.
        //
        //    Strategy:
        //      • First watch: maximumAge=5000 — fires instantly from cache,
        //        places the marker with no perceptible delay.
        //      • After the first callback arrives, swap to maximumAge=0 so
        //        all subsequent fixes are fresh off the chip.
        //
        //    FIX: Capture the old watch ID locally before reassigning to
        //    avoid a race condition where a second callback fires during the
        //    swap and clears the newly-created watch ID instead of the old one.

        let fastStartDone = false;

        const fastStartHandler = (position) => {
            handlePositionUpdate(position);

            if (!fastStartDone) {
                fastStartDone = true;

                // Capture before overwriting — prevents race condition
                const oldWatchId = window.positionWatchId;
                navigator.geolocation.clearWatch(oldWatchId);

                // Upgrade to zero-age watch for all subsequent fixes
                window.positionWatchId = navigator.geolocation.watchPosition(
                    handlePositionUpdate,
                    handleLocationError,
                    { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
                );
            }
        };

        window.positionWatchId = navigator.geolocation.watchPosition(
            fastStartHandler,
            handleLocationError,
            { enableHighAccuracy: true, timeout: 30000, maximumAge: 5000 }
        );

        // ── Network listeners ──
        // Guard prevents duplicate listeners across calls to startPositionUpdates(),
        // but the flag must be cleared on full app teardown alongside listener removal.
        if (!window._positionUpdatesListenersSetup) {
            window._positionUpdatesListenersSetup = true;

            // Use createTrackedTimeout if available, fall back to native setTimeout
            // so the online handler doesn't throw if the app loads out of order.
            const trackedTimeout = typeof createTrackedTimeout === 'function'
                ? createTrackedTimeout
                : setTimeout;

            const onlineHandler = () => {
                if (window.onlineRestartTimeout) clearTimeout(window.onlineRestartTimeout);
                window.onlineRestartTimeout = trackedTimeout(() => {
                    // Only restart if the watch was killed by going offline
                    if (window.positionWatchId == null) {
                        window.positionWatchId = navigator.geolocation.watchPosition(
                            handlePositionUpdate,
                            handleLocationError,
                            { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
                        );
                    }
                    window.onlineRestartTimeout = null;
                }, 500);
            };

            const offlineHandler = () => {
                if (window.onlineRestartTimeout) {
                    clearTimeout(window.onlineRestartTimeout);
                    window.onlineRestartTimeout = null;
                }
                // Don't kill the watch on offline — fixes may still arrive
                // from cached satellite data.
            };

            // Clear the background throttle timestamp when the tab becomes
            // visible again. Without this, if a background fix arrived at T+0s and
            // the user returns at T+5s, the first foreground fix is dropped because
            // _lastBackgroundUpdate is only 5s old — leaving the user staring at a
            // stale marker for a full GPS cycle (up to ~1s or more).
            const visibilityHandler = () => {
                if (!document.hidden) {
                    window._lastBackgroundUpdate = null;
                }
            };

            window.addEventListener('online', onlineHandler);
            window.addEventListener('offline', offlineHandler);
            document.addEventListener('visibilitychange', visibilityHandler);

            if (memoryManager?.trackEventListener) {
                memoryManager.trackEventListener(window, 'online', onlineHandler);
                memoryManager.trackEventListener(window, 'offline', offlineHandler);
                memoryManager.trackEventListener(document, 'visibilitychange', visibilityHandler);
            }
        }

        return window.positionWatchId;

    } catch (err) {
        console.error('Geolocation unavailable:', err);
        handleLocationError({ code: 0, message: 'Geolocation unavailable' });
        return null;
    }
}

/* ──────────────────────────────────────────────
   POSITION UPDATE HANDLER
   ────────────────────────────────────────────── */
function handlePositionUpdate(position) {
    if (!position?.coords ||
        isNaN(position.coords.latitude) ||
        isNaN(position.coords.longitude)) {
        return;
    }

    const positionTimestamp = position.timestamp || Date.now();
    const currentTime = Date.now();

    // Allow the very first fix through regardless of age.
    // The fast-start watch (maximumAge=5000) is specifically designed to fire
    // a cached fix for immediate marker placement. If the cached fix is older
    // than 30s (common after backgrounding or device sleep), the old guard
    // would silently drop it and defeat the entire fast-start strategy.
    // After the first fix, enforce the 30s staleness limit as before.
    const isFirstFix = !window.lastValidPosition;
    if (!isFirstFix && currentTime - positionTimestamp > 30_000) return;

    // Background throttle: one fix per 30s when tab is hidden
    if (document.hidden) {
        if (!window._lastBackgroundUpdate || currentTime - window._lastBackgroundUpdate > 30_000) {
            window._lastBackgroundUpdate = currentTime;
        } else {
            return;
        }
    }

    const rawLat = position.coords.latitude;
    const rawLng = position.coords.longitude;

    // Use ?? instead of || for accuracy and speed.
    // 0 is a valid (if unlikely) accuracy value, and 0 is a valid speed (stopped).
    // || would incorrectly substitute the fallback when the device reports 0.
    const rawAccuracy = position.coords.accuracy ?? 20;
    const rawSpeedMPS = position.coords.speed ?? 0;
    const rawHeading = position.coords.heading ?? null;

    let fusedLat = rawLat;
    let fusedLng = rawLng;
    let fusedHeading = rawHeading;
    let isMoving = rawSpeedMPS > 0.5;

    if (window.sensorFusion) {
        // Pre-boost Kalman velocity variance if the device
        // just started moving from a stationary state. Without this,
        // smoothPosition() processes the fix with low velocity variance
        // (from the stationary period), causing the filter to resist
        // tracking the new movement for an entire GPS cycle (~1s).
        //
        // NOTE: window.isStationary must be maintained externally — this code
        // reads but never writes it. Ensure it is reset to false once motion
        // is confirmed, or this boost will fire on every update while moving.
        if (window.isStationary && window.sensorFusion.isDeviceMoving(rawSpeedMPS)) {
            const kf = window.sensorFusion._kalmanFilter;
            if (kf && kf.P && kf.x) {
                // Boost velocity variance to respond quickly to motion onset
                kf.P[2][2] = 225;
                kf.P[3][3] = 225;
                // Zero cross-covariance between position and velocity
                kf.P[0][2] = 0; kf.P[2][0] = 0;
                kf.P[1][3] = 0; kf.P[3][1] = 0;

                // Also cap position variance if it has drifted large during
                // the stationary period, so the filter doesn't over-weight a
                // noisy first-movement fix.
                kf.P[0][0] = Math.min(kf.P[0][0], 50);
                kf.P[1][1] = Math.min(kf.P[1][1], 50);
            }
        }

        const smoothed = window.sensorFusion.smoothPosition(
            rawLat, rawLng, rawAccuracy, positionTimestamp,
            rawSpeedMPS, rawSpeedMPS >= 0.5 ? rawHeading : null
        );
        fusedLat = smoothed.lat;
        fusedLng = smoothed.lng;
        fusedHeading = window.sensorFusion.getHeading(rawHeading, rawSpeedMPS);
        isMoving = window.sensorFusion.isDeviceMoving(rawSpeedMPS);
    }

    window.lastPositionAccuracy = rawAccuracy;
    window.lastValidPosition = {
        lat: fusedLat,
        lng: fusedLng,
        timestamp: positionTimestamp,
        accuracy: rawAccuracy,
        speedMPS: rawSpeedMPS,
        heading: fusedHeading,
        isMoving
    };

    if (window.lastUpdateTime) {
        window.timeSinceLastUpdate = currentTime - window.lastUpdateTime;
    }
    window.lastUpdateTime = currentTime;

    const enhancedPosition = {
        timestamp: positionTimestamp,
        coords: {
            latitude: fusedLat,
            longitude: fusedLng,
            accuracy: rawAccuracy,
            altitude: position.coords.altitude,
            altitudeAccuracy: position.coords.altitudeAccuracy,
            heading: fusedHeading,
            speed: rawSpeedMPS
        }
    };

    // Lower forceUpdate threshold from 10 m/s (~36 km/h) to 5 m/s (~18 km/h)
    // so cyclists are also covered in mixed-use mode, not just drivers.
    const forceUpdate = rawSpeedMPS > 5;
    updateUserLocation(enhancedPosition, forceUpdate);
}
        
/* ──────────────────────────────────────────────
   VISIBILITY CHANGE HANDLER
   ────────────────────────────────────────────── */
function handleVisibilityChange() {
    if (document.hidden) {
        // Tab/app going to background
        window.lastHiddenTime = Date.now();
        lastKnownPosition = userMarker?.getLatLng() ?? null;
        resetInactivityTimer(false);

        disposeMapLoop();
        window.isReWaking = false;

        if (window.visibilityDebounceTimer) {
            clearTimeout(window.visibilityDebounceTimer);
            window.visibilityDebounceTimer = null;
        }
    } else {
        // Tab/app returning to foreground
        const awayMs = Date.now() - (window.lastHiddenTime || 0);
        const threshold = CONFIG?.BACKGROUND_THRESHOLD ?? 30_000;

        // Cancel any pending debounce
        if (window.visibilityDebounceTimer) {
            clearTimeout(window.visibilityDebounceTimer);
            window.visibilityDebounceTimer = null;
        }

        if (awayMs > threshold) {
            // Debounce to handle rapid tab switches
            window.visibilityDebounceTimer = createTrackedTimeout(() => {
                window.visibilityDebounceTimer = null;

                // Recalculate time away to ensure freshness
                const currentAwayMs = Date.now() - (window.lastHiddenTime || 0);
                if (currentAwayMs <= threshold) return;

                if (window.isReWaking) return;

                window.isReWaking = true;

                Promise.resolve(updateLocationAfterBackground())
                    .catch((error) => {
                        console.error("Background location update failed:", error);
                    })
                    .finally(() => {
                        createTrackedTimeout(() => { window.isReWaking = false; }, 2000);
                    });
            }, 500);
        } else {
            // Short absence → immediate refresh
            if (map && lastKnownPosition) {
                map.invalidateSize({ pan: false });
                userMarker?.setLatLng(lastKnownPosition);
            }
        }
        resetInactivityTimer(true);
    }
}

/* ──────────────────────────────────────────────
   BACKGROUND LOCATION UPDATE
   ────────────────────────────────────────────── */
let geolocationRequestPending = false;
let warmupWatchId = null;
let _backgroundUpdateTimeout = null;

function updateLocationAfterBackground() {
    // NOTE: window.lastHiddenTime must be set by your visibilitychange handler
    // *before* this function is called. Do NOT set it here as a fallback —
    // defaulting to Date.now() would make awayMs always ~0, silently preventing
    // disposeMapLoop() from ever running after a genuine long absence.

    // Don't refresh if we recently got a background update
    const timeSinceLastBg = Date.now() - (window._lastBackgroundUpdate || 0);
    if (timeSinceLastBg < 30_000 && window.lastPosition) {
        if (map) {
            map.invalidateSize({ pan: false });
            userMarker?.setLatLng([window.lastPosition.lat, window.lastPosition.lng]);
        }
        return;
    }

    if (window._isLocationUpdateInProgress) return;

    if (!("geolocation" in navigator)) return;

    window._isLocationUpdateInProgress = true;

    // Only dispose map loop if away longer than 30s.
    // If lastHiddenTime was never set externally, treat as long absence (safe default).
    const awayMs = Date.now() - (window.lastHiddenTime || 0);
    if (awayMs > 30000) {
        disposeMapLoop();
    }

    // Clean up any existing watch
    if (warmupWatchId !== null) {
        navigator.geolocation.clearWatch(warmupWatchId);
        warmupWatchId = null;
    }

    // Clear any existing timeout
    if (_backgroundUpdateTimeout) {
        clearTimeout(_backgroundUpdateTimeout);
        _backgroundUpdateTimeout = null;
    }

    geolocationRequestPending = true;
    const MAX_DURATION = 30000;

    const cleanup = () => {
        geolocationRequestPending = false;
        if (warmupWatchId !== null) {
            navigator.geolocation.clearWatch(warmupWatchId);
            warmupWatchId = null;
        }
        if (_backgroundUpdateTimeout) {
            clearTimeout(_backgroundUpdateTimeout);
            _backgroundUpdateTimeout = null;
        }
        window._isLocationUpdateInProgress = false;
    };

    // ── Retry Modal (CSS-driven) ──
    const showRetryModal = () => {
        if (document.getElementById('geolocation-retry-modal')) return;

        const overlay = document.createElement('div');
        overlay.id = 'geolocation-retry-modal';
        overlay.className = 'geo-retry-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        overlay.setAttribute('aria-label', 'Location retry');

        const card = document.createElement('div');
        card.className = 'geo-retry-card';

        const title = document.createElement('div');
        title.className = 'geo-retry-title';
        title.textContent = 'Location Needed';

        const text = document.createElement('p');
        text.className = 'geo-retry-text';
        text.innerHTML = 'We\'re still locating your device.<br>Please ensure location services are enabled, and try again.';

        const retryBtn = document.createElement('button');
        retryBtn.className = 'geo-retry-btn';
        retryBtn.textContent = '↻ Try Again';

        const closeBtn = document.createElement('button');
        closeBtn.className = 'geo-retry-cancel';
        closeBtn.textContent = 'Cancel';

        // FIX: Remove modal if page navigates away while it's open.
        // Without this the overlay persists in the DOM as a ghost element.
        const onPageHide = () => overlay.remove();
        window.addEventListener('pagehide', onPageHide, { once: true });

        const dismissModal = () => {
            window.removeEventListener('pagehide', onPageHide);
            overlay.remove();
        };

        retryBtn.addEventListener('click', () => {
            // NOTE: cleanup() has already run by the time the modal appears,
            // so _isLocationUpdateInProgress is false and re-entry is safe.
            dismissModal();
            updateLocationAfterBackground();
        });

        closeBtn.addEventListener('click', dismissModal);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) dismissModal();
        });

        card.appendChild(title);
        card.appendChild(text);
        card.appendChild(retryBtn);
        card.appendChild(closeBtn);
        overlay.appendChild(card);
        document.body.appendChild(overlay);
    };

    // FIX: Read speed from the canonical lastValidPosition store first,
    // falling back to lastPosition. Reading only lastPosition?.speedMPS
    // could yield stale or undefined speed and incorrectly show the modal
    // while the user is still moving.
    const safeToShowModal = () => {
        const speedMPS = window.lastValidPosition?.speedMPS ?? window.lastPosition?.speedMPS ?? 0;

            if (window.sensorFusion && window.sensorFusion._kalmanFilter) {
                const kf = window.sensorFusion._kalmanFilter;
                const breakoutSpeed = timeDelta > 0 ? distance / timeDelta : 0;
                if (breakoutSpeed > 0.3 && validatedHeading != null) {
                    const rad = validatedHeading * Math.PI / 180;
                    kf.seedVelocity(
                        breakoutSpeed * Math.cos(rad),
                        breakoutSpeed * Math.sin(rad),
                        15.0
                    );
                } else {
                    kf.reset();
                }
                kf._justInitialized = true;
            }

            window.smoothedVelocity = timeDelta > 0
                ? { lat: (lat - lastPos.lat) / timeDelta, lng: (lng - lastPos.lng) / timeDelta }
                : { lat: 0, lng: 0 };

            // Fall through to actively-moving logic below
        } else {
            const distFromLock = calculateDistance(window.stationaryLockPosition, newPosition);
            if (distFromLock < 2.0 && newPosition.accuracy < lastPos.accuracy * 0.7) {
                scheduleMarkerUpdate(lat, lng, { animate: true, duration: 0.4, easeLinearity: 0.06 });

                if (!window._stationaryNudgeAnchor) {
                    window._stationaryNudgeAnchor = {
                        lat: window.stationaryLockPosition.lat,
                        lng: window.stationaryLockPosition.lng
                    };
                }
                const distFromAnchor = calculateDistance(window._stationaryNudgeAnchor, newPosition);
                if (distFromAnchor < 1.0) {
                    window.stationaryLockPosition = { lat, lng };
                }
            }

            window.lastPosition = newPosition;
            window.lastUpdateTime = currentTime;
            window.lastUpdateTimestamp = currentTime;
            if (typeof updateDistanceBox === 'function') {
                updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
            }
            return;
        }
    }

    // ── Entering Stationary ──
    const isEffectivelyStill = isDeviceMoving === false
        ? (distance < STAT_THRESHOLD * 2)
        : (distance < STAT_THRESHOLD);

    if (isEffectivelyStill) {
        if (!window.stationaryStartTime) window.stationaryStartTime = currentTime;
        const confirmTime = (isDeviceMoving === false) ? 800 : STAT_CONFIRM_MS;

        if (currentTime - window.stationaryStartTime >= confirmTime) {
            _confirmStationary(newPosition, currentTime);
            if (typeof _cleanupMarkerStyles === 'function') _cleanupMarkerStyles();
            window.lastUpdateTime = currentTime;
            if (typeof updateDistanceBox === 'function') {
                updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
            }
            return;
        }

        if (distance > 0.3) {
            scheduleMarkerUpdate(lat, lng, { animate: true, duration: 0.5, easeLinearity: 0.06 });
        }

        window.lastPosition = newPosition;
        window.lastUpdateTime = currentTime;
        if (typeof updateDistanceBox === 'function') {
            updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
        }
        return;
    }

    // ── Actively Moving ──
    window.stationaryStartTime = null;
    window.isStationary = false;
    window.stationaryLockPosition = null;

    if (speedMPS >= 0.15 && window.deadReckoning && !window.deadReckoning.isActive()) {
        window.deadReckoning.start();
    }

    // ── Quality Gates ──
    if (!forceUpdate) {
        if (newPosition.accuracy > speedTier.maxAccuracy * 3) {
            window.lastUpdateTime = currentTime;
            if (typeof updateDistanceBox === 'function') {
                updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
            }
            return;
        }
        if (distance < speedTier.minDistanceThreshold) {
            window.lastPosition = newPosition;
            window.lastUpdateTime = currentTime;
            if (typeof updateDistanceBox === 'function') {
                updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
            }
            return;
        }
        if (timeDelta > 0 && distance / timeDelta > speedTier.maxSpeedThreshold) {
            window.lastUpdateTime = currentTime;
            if (typeof updateDistanceBox === 'function') {
                updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
            }
            return;
        }
    }

    // ── Kalman Smoothing ──
    let kalmanResult = null;
    if (window.sensorFusion) {
        kalmanResult = window.sensorFusion.smoothPosition(
            lat, lng, rawAccuracy, currentTime, rawSpeedMPS, validatedHeading
        );
    }

    const smoothedPosition = kalmanResult || {
        lat, lng,
        accuracy: rawAccuracy,
        heading: validatedHeading,
        timestamp: currentTime,
        speedMPS
    };

    window._predictedPosition = { lat: smoothedPosition.lat, lng: smoothedPosition.lng };
    window._predictedPositionTime = currentTime;

    const kalmanVelocity = window.sensorFusion
        ? window.sensorFusion.getSmoothedVelocityDegPerSec()
        : (window.smoothedVelocity || { lat: 0, lng: 0 });
    window.smoothedVelocity = kalmanVelocity;

    const lookAheadSeconds = speedMPH < 3  ? 0.3 :
                             speedMPH < 15 ? 0.3 + (speedMPH - 3) * 0.06 :
                             speedMPH < 45 ? 1.0 + (speedMPH - 15) * 0.027 :
                                            Math.min(2.5, 1.81 + (speedMPH - 45) * 0.02);

    const lookAheadPos = {
        lat: smoothedPosition.lat + kalmanVelocity.lat * lookAheadSeconds,
        lng: smoothedPosition.lng + kalmanVelocity.lng * lookAheadSeconds
    };

    // ── Marker Update (Sync) ──
    // Stamp timestamp BEFORE moving the marker so the DR loop's 200ms gate
    // kicks in immediately and doesn't overwrite this position on the next frame.
    window.lastPosition = newPosition;
    window.lastUpdateTime = currentTime;
    window.lastUpdateTimestamp = currentTime;

    const displayPos = window._predictedPosition || smoothedPosition;
    if (userMarker) {
        const markerEl = userMarker.getElement ? userMarker.getElement() : null;
        if (markerEl) {
            markerEl.style.transition = 'none';
            const iconEl = markerEl.querySelector('.user-marker-icon');
            if (iconEl) iconEl.style.transition = 'none';
        }
        try {
            userMarker.setLatLng([displayPos.lat, displayPos.lng]);
        } catch (err) {
            console.warn('[MarkerUpdate] setLatLng failed:', err);
        }
    }

    if (typeof _ensureWillChange === 'function') _ensureWillChange();
    if (typeof _scheduleWillChangeReset === 'function') _scheduleWillChangeReset();

    // ── Map Update (Async RAF) ──
    window._nextLocationUpdateRAF = requestAnimationFrame(() => {
        window._nextLocationUpdateRAF = null;

        if (window._isProximityZoomAnimating && !window._userGestureActive) return;
        if (window._userGestureActive && window._userGestureType === 'pinch') return;
        if (window.isMapInteracting) return;
        if (!map || !window.followUser) return;

        const shouldUpdateMap = (Date.now() - (window.lastMapUpdateTime || 0)) > speedTier.mapUpdateInterval ||
            isInCenteredMode || modeChanged;

        const panPos = window._predictedPosition || lookAheadPos;

        if (isInCenteredMode) {
            _panMapToCenter(panPos, speedTier, directionChangeFactor,
                eastWestMove, speedMPH, lookAheadSeconds);
        } else if (shouldUpdateMap) {
            map.panTo([panPos.lat, panPos.lng], {
                animate: true,
                duration: Math.max(0.08, speedTier.panDuration),
                easeLinearity: speedTier.easeLinearity,
                noMoveStart: true
            });
        }
        window.lastMapUpdateTime = Date.now();
        _handleProximityZoomLogic(modeSpeedMPH, eastWestMove);
    });

    window.lastVelocity = window.smoothedVelocity;

    // Final DR restart check
    if (!window.isLocationHuntVisible &&
        speedMPS >= 0.15 &&
        window.deadReckoning &&
        typeof window.deadReckoning.start === 'function' &&
        !window.deadReckoning.isActive()) {
        window.deadReckoning.start();
    }

    if (typeof updateDistanceBox === 'function') {
        updateDistanceBox(forceUpdate, newPosition, closestLocation, closestDistance);
    }
}
        
/* ──────────────────────────────────────────────
   PROXIMITY ZOOM LOGIC
   Smooth, predictive, continuous zoom with speed-adaptive hysteresis.
   Ensures BOTH user marker and location marker remain visible.
   Backwards compatible: user marker stays in center 60% of viewport.
   ────────────────────────────────────────────── */
function _handleProximityZoomLogic(speedMPH, eastWestMove) {
    const PROX_NEAR_M = 15.24;
    const PROX_FAR_M = 25.0;
    const PROX_ZOOM_IN = 19;
    const PROX_ZOOM_OUT = 17;
    const MAX_PROX_SPEED_MPH = 10;
    const PROX_COOLDOWN_MS = 400;

    if (window._proxZoomTargetLevel == null) window._proxZoomTargetLevel = PROX_ZOOM_OUT;
    if (window._proxZoomCurrentLevel == null) window._proxZoomCurrentLevel = PROX_ZOOM_OUT;

    window._proxSpeedEMA = window._proxSpeedEMA ?? speedMPH;
    window._proxSpeedEMA = 0.6 * speedMPH + 0.4 * window._proxSpeedEMA;
    const smoothedSpeedMPH = window._proxSpeedEMA;

    const approachSpeed = _estimateApproachSpeedMPS();
    const distM = window.proximityState?.distanceMeters ?? Infinity;
    const timeToNearSec = (approachSpeed > 0.3 && isFinite(distM))
        ? (distM - PROX_NEAR_M) / approachSpeed
        : Infinity;

    // DEBUG OVERLAY - placed after variables are defined
    const debugEl = document.getElementById('proxDebug');
    if (debugEl) {
        let targetZoomDisplay = window._proxZoomTargetLevel;
        debugEl.innerHTML = `dist:${isFinite(distM) ? Math.round(distM) : '?'}m spd:${Math.round(smoothedSpeedMPH)}mph tgt:${targetZoomDisplay} anim:${window._isProximityZoomAnimating ? 'Y' : 'N'}`;
    }

    if (!window.proximityState || !map) {
        _cleanupProximityZoomAnimation();
        _resetProximityZoomSmoothing();
        window._proxZoomTargetLevel = PROX_ZOOM_OUT;
        return;
    }

    const speedGateBreached = smoothedSpeedMPH > MAX_PROX_SPEED_MPH + 3;

    if (speedGateBreached) {
        window._proxZoomTargetLevel = PROX_ZOOM_OUT;
        if (window._proxZoomState === 'ZOOMED_IN') {
            _executeProximityZoom(PROX_ZOOM_OUT, 'IDLE', eastWestMove);
        } else {
            _cleanupProximityZoomAnimation();
            _resetProximityZoomSmoothing();
        }
        return;
    }

    if (window._isProximityZoomAnimating) return;

    const now = Date.now();
/*
    const cooldownKey = window._proxZoomTargetLevel > window._proxZoomCurrentLevel ? 'IN' : 'OUT';
    const lastTimeForDir = window._lastProxZoomTimeByDir?.[cooldownKey] || 0;
    if (now - lastTimeForDir < PROX_COOLDOWN_MS) return;
*/
    if (!isFinite(distM) || distM === Infinity) {
        window._proxZoomTargetLevel = PROX_ZOOM_OUT;
        if (window._proxZoomState === 'ZOOMED_IN') {
            _executeProximityZoom(PROX_ZOOM_OUT, 'IDLE', eastWestMove);
        } else {
            _resetProximityZoomSmoothing();
        }
        return;
    }

    if (!window._proxZoomState) {
        window._proxZoomState = 'IDLE';
    }

let targetZoom = PROX_ZOOM_OUT;

    if (distM <= PROX_NEAR_M && smoothedSpeedMPH <= MAX_PROX_SPEED_MPH) {
        targetZoom = PROX_ZOOM_IN;
    } else if (distM < PROX_FAR_M && smoothedSpeedMPH <= MAX_PROX_SPEED_MPH) {
        const t = (PROX_FAR_M - distM) / (PROX_FAR_M - PROX_NEAR_M);
        const easedT = t * t * (3 - 2 * t);
        targetZoom = PROX_ZOOM_OUT + (PROX_ZOOM_IN - PROX_ZOOM_OUT) * easedT;
    } else if (timeToNearSec < 3.0 && timeToNearSec > 0 && smoothedSpeedMPH <= MAX_PROX_SPEED_MPH) {
        targetZoom = PROX_ZOOM_OUT + 0.5;
    }

    window._proxZoomTargetLevel = targetZoom;

    // Evaluate cooldown based on actual intended direction, not stale state
    const cooldownKey = targetZoom > (window._proxZoomCurrentLevel ?? PROX_ZOOM_OUT) ? 'IN' : 'OUT';
    const lastTimeForDir = window._lastProxZoomTimeByDir?.[cooldownKey] || 0;
    if (now - lastTimeForDir < PROX_COOLDOWN_MS) return;

    const currentZoom = map.getZoom();
    const zoomDiff = Math.abs(targetZoom - currentZoom);

    if (zoomDiff < 0.1) {
        window._proxZoomCurrentLevel = targetZoom;
        window._proxZoomState = (Math.abs(targetZoom - PROX_ZOOM_IN) < 0.3) ? 'ZOOMED_IN' : 'IDLE';
        return;
    }

    if (zoomDiff >= 0.4) {
        const discreteTarget = targetZoom > (PROX_ZOOM_IN + PROX_ZOOM_OUT) / 2
            ? PROX_ZOOM_IN
            : PROX_ZOOM_OUT;

        const newState = discreteTarget === PROX_ZOOM_IN ? 'ZOOMED_IN' : 'IDLE';

        if (newState !== window._proxZoomState || zoomDiff > 1.0) {
            window._proxZoomState = newState;
            if (!window._lastProxZoomTimeByDir) window._lastProxZoomTimeByDir = {};
            window._lastProxZoomTimeByDir[cooldownKey] = now;
            _executeProximityZoom(discreteTarget, newState, eastWestMove);
        }
    }
}

function _estimateApproachSpeedMPS() {
    if (!window.proximityState || !window.lastVelocity) return 0;

    const closest = window.proximityState.closestLocation;
    if (!closest || !closest.lat || !closest.lng) return 0;

    const userPos = window.lastPosition;
    if (!userPos) return 0;

    const dLat = closest.lat - userPos.lat;
    const dLng = closest.lng - userPos.lng;
    const bearingToLoc = Math.atan2(dLng * Math.cos(userPos.lat * Math.PI / 180), dLat);

    const vNorth = window.lastVelocity.lat * 111111;
    const vEast = window.lastVelocity.lng * 111111 *
                  Math.cos(userPos.lat * Math.PI / 180);
    const userBearing = Math.atan2(vEast, vNorth);

    const speed = Math.sqrt(vNorth * vNorth + vEast * vEast);
    let angleDiff = Math.abs(userBearing - bearingToLoc);
    if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;

    if (angleDiff > Math.PI / 2) return 0;
    return speed * Math.cos(angleDiff);
}

/* ──────────────────────────────────────────────
   Compute map center that keeps user in center 60%
   and location visible. Returns { lat, lng }.
   If location is already visible, returns userLL unchanged.
   ────────────────────────────────────────────── */
function _computeFramingCenter(userLL, locationLL, zoom) {
    if (!userLL || !locationLL || !map) return userLL;

    const size = map.getSize();
    const userPx = map.project(userLL, zoom);
    const locPx = map.project(locationLL, zoom);
    const centerPx = map.project(map.getCenter(), zoom);

    // Center 60% box: user must stay within ±30% of viewport center
    const maxOffsetX = size.x * 0.30;
    const maxOffsetY = size.y * 0.30;

    // User's offset from current center
    const userDx = userPx.x - centerPx.x;
    const userDy = userPx.y - centerPx.y;

    // If user is already outside center 60%, something else went wrong — just return user
    if (Math.abs(userDx) > maxOffsetX || Math.abs(userDy) > maxOffsetY) {
        return userLL;
    }

    // Location's offset from current center
    const locDx = locPx.x - centerPx.x;
    const locDy = locPx.y - centerPx.y;

    // How much room does the user have before hitting the edge of center 60%?
    const roomLeft  = maxOffsetX + userDx;   // user can move this much left before hitting -maxOffsetX
    const roomRight = maxOffsetX - userDx;   // user can move this much right before hitting +maxOffsetX
    const roomUp    = maxOffsetY + userDy;   // user can move this much up before hitting -maxOffsetY
    const roomDown  = maxOffsetY - userDy;   // user can move this much down before hitting +maxOffsetY

    // To keep user in center 60%, the location must be within these bounds relative to center
    const locMinX = -roomLeft;
    const locMaxX = roomRight;
    const locMinY = -roomUp;
    const locMaxY = roomDown;

    // Compute how much we need to shift center so location fits in the allowed zone
    // while user stays fixed in their current screen position.
    // Shift center opposite to location overflow: if location is too far right,
    // shift center left (negative shiftX) so location appears more left.
    let shiftX = 0, shiftY = 0;

    if (locDx < locMinX) {
        shiftX = locDx - locMinX;   // negative: shift center left
    } else if (locDx > locMaxX) {
        shiftX = locDx - locMaxX;   // positive: shift center right
    }

    if (locDy < locMinY) {
        shiftY = locDy - locMinY;   // negative: shift center up
    } else if (locDy > locMaxY) {
        shiftY = locDy - locMaxY;   // positive: shift center down
    }

    // If no shift needed, location is already visible without displacing user
    if (Math.abs(shiftX) < 1 && Math.abs(shiftY) < 1) return userLL;

    // Clamp shift so user never leaves center 60% even with rounding errors
    const newCenterPx = L.point(
        centerPx.x + shiftX,
        centerPx.y + shiftY
    );

    // Validate: after shift, user must still be within center 60%
    const newUserDx = userPx.x - newCenterPx.x;
    const newUserDy = userPx.y - newCenterPx.y;

    if (Math.abs(newUserDx) > maxOffsetX + 1 || Math.abs(newUserDy) > maxOffsetY + 1) {
        // Shift would push user out of bounds — clamp to keep user in frame
        const clampedShiftX = Math.max(-roomLeft, Math.min(roomRight, shiftX));
        const clampedShiftY = Math.max(-roomUp, Math.min(roomDown, shiftY));
        return map.unproject(L.point(centerPx.x + clampedShiftX, centerPx.y + clampedShiftY), zoom);
    }

    return map.unproject(newCenterPx, zoom);
}

let _proxZoomAnimationId = 0;

function _executeProximityZoom(targetZoom, nextState, eastWestMove) {
    const currentZoom = map.getZoom();
    const zoomDelta = Math.abs(targetZoom - currentZoom);

    if (zoomDelta < 0.15) {
        window._proxZoomState = nextState;
        window._proxZoomCurrentLevel = targetZoom;
        return;
    }

    const timeSinceGestureEnd = Date.now() - (window._userGestureEndTime || 0);
    if (window._userGestureActive || timeSinceGestureEnd < 800) {
        window._proximityZoomDeferred = {
            targetZoom, nextState, timestamp: Date.now()
        };
        return;
    }

    window._lastProxZoomTime = Date.now();
    window._proxZoomState = nextState;
    window._isProximityZoomAnimating = true;
    window._programmaticFlyInProgress = true;

    const zoomDur = Math.min(0.6, Math.max(0.2, zoomDelta * 0.2));
    const userLL = userMarker?.getLatLng?.();

    if (!userLL) {
        window._isProximityZoomAnimating = false;
        window._programmaticFlyInProgress = false;
        return;
    }

    requestAnimationFrame(() => {
        if (!window._isProximityZoomAnimating) {
            window._programmaticFlyInProgress = false;
            return;
        }

        const closestLoc = window.proximityState?.closestLocation;
        const locationLL = closestLoc ? L.latLng(closestLoc.lat, closestLoc.lng) : null;
        const targetCenter = (targetZoom >= 18 && locationLL)
            ? _computeFramingCenter(userLL, locationLL, targetZoom)
            : userLL;

        map.setView([targetCenter.lat, targetCenter.lng], targetZoom, {
            animate: true,
            duration: zoomDur,
            easeLinearity: 0.25
        });

        _attachProximityZoomEndHandler(zoomDur * 1000 + 1000);
    });
}

function _attachProximityZoomEndHandler(fallbackMs) {
    const myId = ++_proxZoomAnimationId;
    let handled = false;
    let fallbackId = null;

    const onDone = () => {
        if (handled || myId !== _proxZoomAnimationId) return;
        handled = true;

        if (map) {
            map.off('moveend', onDone);
            map.off('zoomend', onDone);
        }

        if (fallbackId) { clearTimeout(fallbackId); fallbackId = null; }

        window._isProximityZoomAnimating = false;
        window._programmaticFlyInProgress = false;
        window._currentProximityZoomCleanup = null;

        if (window._proximityZoomDeferred &&
            !window._userGestureActive &&
            Date.now() - window._proximityZoomDeferred.timestamp < 3000) {
            const d = window._proximityZoomDeferred;
            window._proximityZoomDeferred = null;
            // Defer to next tick so onDone fully unwinds before new animation starts
            setTimeout(() => _executeProximityZoom(d.targetZoom, d.nextState, false), 0);
        }
    };

    if (map) {
        map.on('moveend', onDone);
        map.on('zoomend', onDone);
    }

    window._currentProximityZoomCleanup = () => {
        if (handled) return;
        handled = true;
        // Increment so any pending onDone for this animation becomes a no-op
        _proxZoomAnimationId++;

        if (map) {
            map.off('moveend', onDone);
            map.off('zoomend', onDone);
        }

        if (fallbackId) { clearTimeout(fallbackId); fallbackId = null; }

        window._isProximityZoomAnimating = false;
        window._programmaticFlyInProgress = false;
        window._currentProximityZoomCleanup = null;
    };

    fallbackId = createTrackedTimeout(() => {
        fallbackId = null;
        if (!handled && myId === _proxZoomAnimationId) onDone();
    }, fallbackMs);
}

function _cleanupProximityZoomAnimation() {
    if (!window._isProximityZoomAnimating) return;

    if (window._currentProximityZoomCleanup) {
        window._currentProximityZoomCleanup();
    } else {
        _proxZoomAnimationId++;
        window._isProximityZoomAnimating = false;
        window._programmaticFlyInProgress = false;
    }
}

function _resetProximityZoomSmoothing() {
    window._proxZoomState = 'IDLE';
    window._lastProxZoomTime = 0;
    window._inProximityZone = false;
    window._proxZoomTargetLevel = 17;
    window._proxZoomCurrentLevel = 17;
    window._proxSpeedEMA = null;
    if (window._lastProxZoomTimeByDir) {
        window._lastProxZoomTimeByDir.IN = 0;
        window._lastProxZoomTimeByDir.OUT = 0;
    }
}
        
/*  Pans the map to keep the user centered — **centered mode only**. */
function _panMapToCenter(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor) {
    lookAheadFactor = lookAheadFactor || 0;

    // Guard: never pan-to-center while a proximity zoom animation is running.
    // flyTo and panTo use the same internal animation queue; firing both
    // simultaneously causes visible map jitter.
    if (window._isProximityZoomAnimating) return;

    if (!map) {
        console.warn('[PanCenter] Map not available');
        return;
    }

    if (!target ||
        typeof target.lat !== 'number' ||
        typeof target.lng !== 'number' ||
        !isFinite(target.lat) ||
        !isFinite(target.lng)) {
        console.warn('[PanCenter] Invalid target coordinates:', target);
        return;
    }

    if (typeof ModeManager !== 'undefined' &&
        typeof ModeManager.isCentered === 'function' &&
        !ModeManager.isCentered()) {
        console.warn('[PanCenter] Called outside centered mode — ignored');
        return;
    }

    if (!window.centeringState) window.centeringState = { isCentered: true };
    window.centeringState.isCentered = true;

    _executeCenteredModePan(target, speedTier, directionChangeFactor,
        eastWestMovement, speedMPH, lookAheadFactor);
}


/**
 * CENTERED MODE: Always keep the marker at the exact center with look-ahead.
 */
function _executeCenteredModePan(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor) {
    if (!map) return;

    let centerLat = target.lat;
    let centerLng = target.lng;

    // ── Look-ahead ──
    const laSec = lookAheadFactor || 0;
    if (laSec > 0 && window.smoothedVelocity) {
        const svLat = window.smoothedVelocity.lat;
        const svLng = window.smoothedVelocity.lng;
        if (svLat != null && svLng != null && isFinite(svLat) && isFinite(svLng)) {
            // ── CHANGED: Compensate for Mercator east-west compression instead of penalizing ──
            const lngMultiplier = eastWestMovement ? 1.12 : 1.0;
            centerLat += svLat * laSec;
            centerLng += svLng * laSec * lngMultiplier;
        }
    }

    const highSpeedThreshold =
        (typeof SPEED_THRESHOLDS !== 'undefined' && SPEED_THRESHOLDS != null && SPEED_THRESHOLDS.HIGH_SPEED)
            ? SPEED_THRESHOLDS.HIGH_SPEED : 15;

    const safeSpeed = (isFinite(speedMPH) && speedMPH > 0) ? speedMPH : 0;

    /* ── Resolve effective duration ── */
    const baseDuration = (speedTier && speedTier.panDuration != null) ? speedTier.panDuration : 0.2;
    const factor = (directionChangeFactor != null) ? directionChangeFactor : 1.0;

    const transitionProgress = (typeof ModeManager !== 'undefined' &&
                                typeof ModeManager.getTransitionProgress === 'function')
        ? ModeManager.getTransitionProgress()
        : 1;

    // ── CHANGED: Smoothstep for perceptual settling ──
    const smoothProgress = transitionProgress * transitionProgress * (3 - 2 * transitionProgress);

    let panDuration;
    if (transitionProgress < 1) {
        const transitionDuration = 0.8;
        panDuration = transitionDuration + (baseDuration * factor - transitionDuration) * smoothProgress;

    }

    if (isArrived) {
        if (isOnCooldown && cooldownStatus?.remainingSeconds !== undefined) {
            if (!window.distanceBoxCountdownInterval) {

                let lastDisplayedText = null;

                const scheduleNext = () => {
                    if (!window.distanceBoxCountdownInterval) return;
                    window._countdownNextFrame = setTimeout(() => {
                        window._countdownNextFrame = null;
                        if (!window.distanceBoxCountdownInterval) return;
                        window._countdownRafId = requestAnimationFrame(tick);
                    }, 1000);
                };

                const tick = () => {
                    window._countdownRafId = null;

                    if (document.hidden) {
                        scheduleNext();
                        return;
                    }

                    const currentClosest = window.lastClosestLocation;
                    if (!currentClosest?.id || !window.cooldownManager) {
                        _stopCountdown();
                        return;
                    }

                    const status = window.cooldownManager.checkCooldown(currentClosest.id);

                    if (!status?.isOnCooldown) {
                        const arrivedText = 'Arrived.';
                        if (lastDisplayedText !== arrivedText) {
                            distanceBox.textContent = arrivedText;
                            applyArrivedStyling(distanceBox);
                            lastDisplayedText = arrivedText;
                        }
                        window.currentlyArrived = true;

                        if (typeof handleProximityAndAutoOpen === 'function') {
                            const currentUserLatLng = userMarker?.getLatLng();
                            const currentUserPos = currentUserLatLng
                                ? { lat: currentUserLatLng.lat, lng: currentUserLatLng.lng }
                                : userPos;
                            handleProximityAndAutoOpen(currentUserPos, performance.now(), currentClosest, window.lastClosestDistance ?? closestDistance);
                        }

                        _stopCountdown();

                        if (window._cooldownExpiryTimeout) {
                            clearTimeout(window._cooldownExpiryTimeout);
                            window._cooldownExpiryTimeout = null;
                            window._cooldownExpiryLocationId = null;
                        }
                        return;
                    }

                    const mins = Math.floor(status.remainingSeconds / 60);
                    const secs = status.remainingSeconds % 60;
                    const newText = `Available in ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                    if (newText !== lastDisplayedText) {
                        distanceBox.textContent = newText;
                        applyArrivedStyling(distanceBox);
                        lastDisplayedText = newText;
                    }

                    scheduleNext();
                };

                window.distanceBoxCountdownInterval = true;
                tick();

                const resumeOnVisible = () => {
                    if (!document.hidden && window.distanceBoxCountdownInterval) {
                        if (!window._countdownNextFrame && !window._countdownRafId) {
                            window._countdownRafId = requestAnimationFrame(tick);
                        }
                    }
                };
                if (window._countdownVisibilityHandler) {
                    document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
                }
                window._countdownVisibilityHandler = resumeOnVisible;
                document.addEventListener('visibilitychange', resumeOnVisible);

                if (cooldownStatus.remainingMs > 0) {
                    if (window._cooldownExpiryTimeout) {
                        clearTimeout(window._cooldownExpiryTimeout);
                    }
                    window._cooldownExpiryLocationId = closestLocation.id;
                    window._cooldownExpiryTimeout = setTimeout(() => {
                        window._cooldownExpiryTimeout = null;
                        const locId = window._cooldownExpiryLocationId;
                        window._cooldownExpiryLocationId = null;

                        const currentUserLatLng = userMarker?.getLatLng();
                        const loc = gameLocations?.find(l => l?.id === locId);
                        if (currentUserLatLng && loc) {
                            const dist = calculateDistance(
                                { lat: currentUserLatLng.lat, lng: currentUserLatLng.lng },
                                { lat: loc.lat, lng: loc.lng }
                            );
                            if ((dist * 3.28084) <= PROXIMITY_THRESHOLD &&
                                typeof window._openLocationPage === 'function') {
                                window._openLocationPage(loc);
                            }
                        }
                    }, cooldownStatus.remainingMs + 200);
                }
            }

        } else {
            if (window.distanceBoxCountdownInterval) {
                _stopCountdown();
            }
            if (window._cooldownExpiryTimeout) {
                clearTimeout(window._cooldownExpiryTimeout);
                window._cooldownExpiryTimeout = null;
                window._cooldownExpiryLocationId = null;
            }

            distanceBox.textContent = 'Arrived.';
            applyArrivedStyling(distanceBox);
        }

    } else {
        const distanceText = distanceFeet < 5280
            ? `${distanceFeet.toLocaleString()} feet`
            : `${(distanceFeet / 5280).toFixed(2)} miles`;
        distanceBox.textContent = `Closest Stop: ${distanceText}`;
        applyDefaultStyling(distanceBox);

        if (window._countdownVisibilityHandler) {
            document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            window._countdownVisibilityHandler = null;
        }
        if (window._countdownNextFrame) {
            clearTimeout(window._countdownNextFrame);
            window._countdownNextFrame = null;
        }
    }

    window.currentlyArrived = isArrived && !isOnCooldown;
}

function calculateDistance(pos1OrLat, pos2OrLng, lat2, lng2) {
    // ── Flat coordinate signature: calculateDistance(lat1, lng1, lat2, lng2) ──
    // Inlined to avoid allocating two temporary objects per call.
    if (typeof lat2 === 'number' && typeof lng2 === 'number') {
        if (typeof pos1OrLat !== 'number' || typeof pos2OrLng !== 'number' ||
            isNaN(pos1OrLat) || isNaN(pos2OrLng) || isNaN(lat2) || isNaN(lng2)) {
            return Infinity;
        }

        // Identical-position shortcut — skips all trig
        if (pos1OrLat === lat2 && pos2OrLng === lng2) return 0;

        const toRad  = Math.PI / 180;
        const lat1r  = pos1OrLat * toRad;
        const lat2r  = lat2 * toRad;
        const dLat   = (lat2 - pos1OrLat) * toRad;
        const dLng   = (lng2 - pos2OrLng) * toRad;

        const sinDLat = Math.sin(dLat * 0.5);
        const sinDLng = Math.sin(dLng * 0.5);

        let a = sinDLat * sinDLat +
                Math.cos(lat1r) * Math.cos(lat2r) * sinDLng * sinDLng;

        // Clamp to [0,1] — prevents NaN when floating-point rounding
        // pushes a slightly above 1 for very close positions
        if (a > 1) a = 1;

        return 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ── Object signature: calculateDistance({lat, lng}, {lat, lng}) ──
    const pos1 = pos1OrLat;
    const pos2 = pos2OrLng;

    if (!pos1 || !pos2 ||
        typeof pos1.lat !== 'number' || typeof pos1.lng !== 'number' ||
        typeof pos2.lat !== 'number' || typeof pos2.lng !== 'number' ||
        isNaN(pos1.lat) || isNaN(pos1.lng) || isNaN(pos2.lat) || isNaN(pos2.lng)) {
        return Infinity;
    }

    // Identical-position shortcut
    if (pos1.lat === pos2.lat && pos1.lng === pos2.lng) return 0;

    const toRad  = Math.PI / 180;
    const lat1r  = pos1.lat * toRad;
    const lat2r  = pos2.lat * toRad;
    const dLat   = (pos2.lat - pos1.lat) * toRad;
    const dLng   = (pos2.lng - pos1.lng) * toRad;

    const sinDLat = Math.sin(dLat * 0.5);
    const sinDLng = Math.sin(dLng * 0.5);

    let a = sinDLat * sinDLat +
            Math.cos(lat1r) * Math.cos(lat2r) * sinDLng * sinDLng;

    // Clamp to [0,1]
    if (a > 1) a = 1;

    return 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getGeolocationOptions(speedMPS = 0) {
    const isStationary = speedMPS < 0.5;
    const isWalking = speedMPS >= 0.5 && speedMPS < 3;
    const isMoving = speedMPS >= 3;
    
    return {
        enableHighAccuracy: true,
        timeout: isMoving ? 10000 : isWalking ? 15000 : 30000,
        maximumAge: isMoving ? 1000 : isWalking ? 3000 : 15000
    };
}

function handleLocationError(error) {
    console.warn("Error getting user location:", error);

    // Early exit for Permission Denied (Code 1).
    // Browsers remember a "Deny" click. Retrying is completely futile and
    // just wastes 3 timeout cycles before finally showing the user the
    // "Please allow access" message. Show it immediately instead.
    if (error?.code === 1) {
        retryCount = 0;
        hideLoadingMessage();
        showPopup("Location Error", "Please allow access to your location to use this feature.");
        if (typeof onLocationFailure === 'function') {
            onLocationFailure(error);
        }
        return;
    }

    // Retry on recoverable errors (including iOS 17's code 0), up to MAX_RETRIES
    if (retryCount < CONFIG.MAX_RETRIES) {
        retryCount++;
        
        // Exponential backoff instead of linear.
        // 1s, 2s, 4s. Capped at 10 seconds. Much kinder to the battery/CPU
        // than hammering the GPS chip with rapid retries.
        const backoffMs = Math.min(10000, CONFIG.RETRY_DELAY * Math.pow(2, retryCount - 1));
        
        console.log(`Retrying to get location (Attempt ${retryCount} of ${CONFIG.MAX_RETRIES} in ${backoffMs}ms)`);

        setTimeout(() => {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("Location retrieved successfully after retry");
                    hideLoadingMessage();
                    updateUserLocation(position, true);
                    retryCount = 0;
                },
                handleLocationError,

                getGeolocationOptions(0) 
            );
        }, backoffMs);
        return;
    }

    // Max retries reached
    retryCount = 0;
    hideLoadingMessage();

    let errorMessage = "An error occurred while getting your location.";
    if (error?.code !== undefined) {
        switch (error.code) {
            case 1:
                errorMessage = "Please allow access to your location to use this feature.";
                break;
            case 2:
                errorMessage = "Your location is currently unavailable. Please try again later.";
                break;
            case 3:
                errorMessage = "Getting your location took too long. Please try again.";
                break;
            case 0:
                // iOS 17 Safari sometimes returns non-standard code 0
                errorMessage = "Unable to determine your location. Please check your device settings and try again.";
                break;
        }
    }

    showPopup("Location Error", errorMessage);
    if (typeof onLocationFailure === 'function') {
        onLocationFailure(error);
    }
}
