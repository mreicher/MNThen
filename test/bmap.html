        if (e.target === overlay) { closePopup(); }
    });

    popup.appendChild(popupTitle);
    popup.appendChild(popupContent);
    popup.appendChild(closeButton);
    overlay.appendChild(popup);
    document.body.appendChild(overlay);
    
    // Lock background scrolling when popup is open
    document.body.style.overflow = "hidden";
    
    // Add escape key listener
    document.addEventListener('keydown', handleEscape);

    overlay.style.opacity = '0';
    popup.style.transform = 'translateY(20px)';
    popup.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    overlay.style.transition = 'opacity 0.3s ease';

    // Use requestAnimationFrame instead of setTimeout(10) for reliable animation trigger
    requestAnimationFrame(() => {
        overlay.style.opacity = '1';
        popup.style.transform = 'translateY(0)';
    });

    // Auto-focus the close button for keyboard/screen reader users
    closeButton.focus();
}

function initAudioPlayer() {
    const audio             = document.getElementById('locationAudio');
    const playPauseBtn      = document.getElementById('playPauseBtn');
    const rewindBtn         = document.getElementById('rewindBtn');
    const forwardBtn        = document.getElementById('forwardBtn');
    const progressBar       = document.getElementById('progressBar');
    const progressContainer = document.querySelector('.progress');
    const currentTimeSpan   = document.getElementById('currentTime');
    const durationSpan      = document.getElementById('duration');

    if (!audio || !playPauseBtn || !progressBar) {
        console.error('[Audio] Required elements missing');
        return function noop() {};
    }

    // ─── Platform Detection ───────────────────────────────────────────────
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    // Removed unused isAndroid variable

    // ─── Save original source ─────────────────────────────────────────────
    if (audio.src && audio.src !== window.location.href && !audio.dataset.originalSrc) {
        audio.dataset.originalSrc = audio.src;
    }

    // ─── State ────────────────────────────────────────────────────────────
    let wakeLock             = null;
    let isPlayerActive       = true;
    let retryCount           = 0;
    const maxRetries         = 3;
    let lastPlaybackPosition = 0;
    let userWantsPlayback    = false;
    let screenWentAway       = false;
    let wasPlayingWhenHidden = false;
    let mediaSessionReady    = false;

    // ─── Shared AudioContext ───────────────────────────────────────────────
    function getSharedAudioContext() {
        if (window._sharedAudioCtx && window._sharedAudioCtx.state !== 'closed') {
            if (window._sharedAudioCtx.state === 'suspended' ||
                window._sharedAudioCtx.state === 'interrupted') {
                window._sharedAudioCtx.resume().catch(() => {});
            }
            return window._sharedAudioCtx;
        }
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return null;
            window._sharedAudioCtx = new AC();

            if (isIOS) {
                window._sharedAudioCtx.onstatechange = () => {
                    const ctx = window._sharedAudioCtx;
                    if (ctx && ctx.state === 'interrupted') {
                        setTimeout(() => {
                            if (window._sharedAudioCtx &&
                                window._sharedAudioCtx.state === 'interrupted') {
                                window._sharedAudioCtx.resume().catch(() => {});
                            }
                        }, 100);
                    }
                };
            }
            return window._sharedAudioCtx;
        } catch (e) {
            console.warn('[Audio] AudioContext creation failed:', e);
            return null;
        }
    }

    // ─── Media Session API ────────────────────────────────────────────────
    function setupMediaSession() {
        if (mediaSessionReady || !('mediaSession' in navigator)) return;
        mediaSessionReady = true;

        try {
            navigator.mediaSession.metadata = new MediaMetadata({
                title:  document.getElementById('locationTitle')?.textContent   || 'Minnesota Then',
                artist: document.getElementById('locationCreator')?.textContent || 'Historical Audio',
                album:  'Minnesota Then Tour',
                artwork: [
                    { src: 'https://www.mnthen.com/images/icon-192.png', sizes: '192x192', type: 'image/png' },
                    { src: 'https://www.mnthen.com/images/icon-512.png', sizes: '512x512', type: 'image/png' }
                ]
            });

            navigator.mediaSession.setActionHandler('play',         () => { if (audio.paused)  togglePlay(); });
            navigator.mediaSession.setActionHandler('pause',        () => { if (!audio.paused) togglePlay(); });
            navigator.mediaSession.setActionHandler('seekbackward', (d) => { seek(-(d.seekOffset || 10)); });
            navigator.mediaSession.setActionHandler('seekforward',  (d) => { seek(d.seekOffset || 10);   });

            updateMediaSessionPosition();
        } catch (e) {
            console.warn('[Audio] Media Session setup failed:', e);
        }
    }

    function updateMediaSessionPosition() {
        if (!('mediaSession' in navigator) || !navigator.mediaSession.setPositionState) return;
        if (!isFinite(audio.duration)) return;
        try {
            navigator.mediaSession.setPositionState({
                duration:     audio.duration,
                playbackRate: audio.playbackRate,
                position:     Math.min(audio.currentTime, audio.duration)
            });
        } catch (e) {}
    }

    // ─── Wake Lock ────────────────────────────────────────────────────────
    const supportsWakeLock = 'wakeLock' in navigator;

    async function requestWakeLock() {
        if (!supportsWakeLock || !isPlayerActive || wakeLock) return;
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { wakeLock = null; });
        } catch (err) {}
    }

    async function releaseWakeLock() {
        if (wakeLock) {
            try { await wakeLock.release(); } catch (e) {}
            wakeLock = null;
        }
    }

    // ─── Position Throttle ────────────────────────────────────────────────
    let _lastSaveTime = 0;
    function throttledSavePosition(time) {
        const now = Date.now();
        if (now - _lastSaveTime >= 1000) {
            _lastSaveTime = now;
            try { localStorage.setItem('audioPosition', time.toString()); } catch (e) {}
        }
    }

    // ─── Visibility / Background Handling ─────────────────────────────────
    const visibilityHandler = () => {
        if (document.hidden) {
            if (!isNaN(audio.currentTime) && audio.currentTime > 0) {
                lastPlaybackPosition = audio.currentTime;
                throttledSavePosition(audio.currentTime);
            }

            if (userWantsPlayback) {
                wasPlayingWhenHidden = true;
                screenWentAway = true;

                if (!audio.paused) {
                    audio.pause();
                }

                playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
                playPauseBtn.setAttribute('aria-label', 'Play');
                releaseWakeLock();
            }
        } else {
            if (screenWentAway && wasPlayingWhenHidden) {
                if (window._sharedAudioCtx &&
                    (window._sharedAudioCtx.state === 'suspended' ||
                     window._sharedAudioCtx.state === 'interrupted')) {
                    window._sharedAudioCtx.resume().catch(() => {});
                }

                setTimeout(() => {
                    if (screenWentAway && audio.paused) {
                        showSourcePopup(
                            'Audio Paused',
                            `Press play to resume from ${formatTime(lastPlaybackPosition)}`
                        );
                        screenWentAway = false;
                        wasPlayingWhenHidden = false;
                    }
                }, 300);
            }
        }
    };
    document.addEventListener('visibilitychange', visibilityHandler);

    const blurHandler = () => {
        if (!isNaN(audio.currentTime) && audio.currentTime > 0) {
            lastPlaybackPosition = audio.currentTime;
        }
    };
    window.addEventListener('blur', blurHandler);

    // ─── Audio Element Events ─────────────────────────────────────────────
    audio.addEventListener('play', () => {
        playPauseBtn.innerHTML = '<i class="bi bi-pause" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Pause');
        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader('Audio playback started');
        }
    });

    audio.addEventListener('pause', () => {
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Play');
        releaseWakeLock();
        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader('Audio playback paused');
        }
    });

    // ─── Core Playback Toggle ─────────────────────────────────────────────
    function togglePlay() {
        if (!isPlayerActive) return;

        const hasValidSrc = audio.src &&
                            audio.src !== window.location.href &&
                            audio.src !== '' &&
                            audio.src !== 'about:blank';
        if (!hasValidSrc) return;

        if (audio.paused) {
            const resumePos = audio.dataset.resumePosition;
            if (resumePos && parseFloat(resumePos) > 0) {
                audio.currentTime = parseFloat(resumePos);
                delete audio.dataset.resumePosition;
            }

            getSharedAudioContext();

            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        userWantsPlayback = true;
                        requestWakeLock();
                        setupMediaSession();
                        retryCount = 0;
                    })
                    .catch((error) => {
                        if (error.name === 'AbortError') return;
                        handlePlayError(error);
                    });
            }
        } else {
            audio.pause();
            userWantsPlayback = false;
            if (!isNaN(audio.currentTime)) {
                lastPlaybackPosition = audio.currentTime;
            }
        }
    }

    // ─── Error Handling ───────────────────────────────────────────────────
    function handlePlayError(error) {
        console.error('[Audio] Play failed:', error?.name, error?.message);

        releaseWakeLock();
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>';
        playPauseBtn.setAttribute('aria-label', 'Play');

        if (error?.name === 'NotAllowedError') {
            showSourcePopup(
                'Tap to Play Audio',
                'Please tap the play button again to start audio playback.'
            );
        } else if (error?.name === 'NotSupportedError') {
            showSourcePopup(
                'Audio Error',
                'This audio format is not supported on your device.'
            );
        } else if (screenWentAway || wasPlayingWhenHidden) {
            const pos = lastPlaybackPosition || 0;
            audio.dataset.resumePosition = pos.toString();
            showSourcePopup(
                'Audio Interrupted',
                `Audio was paused when you left the screen. Press play to resume from ${formatTime(pos)}.`
            );
            screenWentAway = false;
            wasPlayingWhenHidden = false;
        } else if (retryCount < maxRetries) {
            retryCount++;
            setTimeout(() => attemptRecovery(), 1000 * retryCount);
        } else {
            playPauseBtn.innerHTML = '<i class="bi bi-exclamation-triangle" aria-hidden="true"></i>'; 
            playPauseBtn.setAttribute('aria-label', 'Audio Error');
            showSourcePopup(
                'Audio Error',
                'Unable to play audio after multiple attempts. Please refresh and try again.'
            );
        }
    }

    // ─── Recovery ─────────────────────────────────────────────────────────
    function attemptRecovery() {
        if (!isPlayerActive) return;

        console.log(`[Audio] Recovery attempt ${retryCount}/${maxRetries}`);

        const savedPos  = lastPlaybackPosition || 0;
        const targetSrc = audio.dataset.originalSrc || audio.getAttribute('data-src');

        if (targetSrc && (!audio.src || audio.src === window.location.href)) {
            audio.src = targetSrc;
        }

        if (audio.error || !audio.src || audio.src === window.location.href) {
            audio.load();
        }

        const onReady = () => {
            if (savedPos > 0 && !screenWentAway) {
                audio.currentTime = savedPos;
            } else if (screenWentAway) {
                audio.currentTime = 0;
            }
            retryCount = 0;
            audio.removeEventListener('loadedmetadata', onReady);
            audio.removeEventListener('canplay', onReady);
        };

        audio.addEventListener('loadedmetadata', onReady);
        audio.addEventListener('canplay', onReady);
    }

    // ─── Seek ─────────────────────────────────────────────────────────────
    function seek(seconds) {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        audio.currentTime = Math.max(0, Math.min(audio.currentTime + seconds, audio.duration));
        updateMediaSessionPosition();
        if (typeof announceToScreenReader === 'function') {
            const direction = seconds > 0 ? 'forward' : 'backward';
            announceToScreenReader(`Skipped ${Math.abs(seconds)} seconds ${direction}`);
        }
    }

    // ─── Progress UI ──────────────────────────────────────────────────────
    function updateProgress() {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        const percent = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = `${percent}%`;
        currentTimeSpan.textContent = formatTime(audio.currentTime);

        if (audio.currentTime > 0) {
            lastPlaybackPosition = audio.currentTime;
            throttledSavePosition(audio.currentTime);
        }
    }

    function setProgress(e) {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        const rect = progressContainer.getBoundingClientRect();
        const clientX = e.clientX ?? e.touches?.[0]?.clientX;
        if (clientX === undefined || rect.width <= 0) return;
        audio.currentTime = Math.max(0, Math.min(((clientX - rect.left) / rect.width) * audio.duration, audio.duration)); 
        updateMediaSessionPosition();
        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader(`Jumped to ${formatTime(audio.currentTime)}`);
        }
    }

    function setDuration() {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        durationSpan.textContent = formatTime(audio.duration);
        updateMediaSessionPosition();
    }

    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // ─── Event Bindings ───────────────────────────────────────────────────
    playPauseBtn.addEventListener('click', togglePlay);
    rewindBtn?.addEventListener('click',  () => seek(-10));
    forwardBtn?.addEventListener('click', () => seek(10));

    audio.addEventListener('timeupdate',    updateProgress);
    audio.addEventListener('loadedmetadata', setDuration);
    audio.addEventListener('durationchange', setDuration);

    audio.addEventListener('ended', () => {
        userWantsPlayback = false;
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Play');
        releaseWakeLock();
        progressBar.style.width = '0%';

        try { localStorage.removeItem('audioPosition'); } catch (e) {}

        if ('mediaSession' in navigator) {
            navigator.mediaSession.playbackState = 'none';
        }

        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader('Audio playback completed');
        }
        if (typeof showAdditionalInfo === 'function') {
            showAdditionalInfo();
        }
    });

    audio.addEventListener('error', (e) => {
        console.error('[Audio] Element error:', audio.error?.code, audio.error?.message);
        if (!isPlayerActive) return;

        releaseWakeLock();
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Play');

        if (screenWentAway || wasPlayingWhenHidden) {
            const pos = lastPlaybackPosition || 0;
            audio.dataset.resumePosition = pos.toString();
            showSourcePopup(
                'Audio Interrupted',
                `Audio was paused when you left the screen. Press play to resume from ${formatTime(pos)}.`
            );
            attemptRecovery();
            screenWentAway = false;
            wasPlayingWhenHidden = false;
        } else if (retryCount < maxRetries) {
            retryCount++;
            setTimeout(() => attemptRecovery(), 1000 * retryCount);
        } else {
            playPauseBtn.innerHTML = '<i class="bi bi-exclamation-triangle" aria-hidden="true"></i>'; 
            playPauseBtn.setAttribute('aria-label', 'Audio Error');
            showSourcePopup(
                'Audio Error',
                'Unable to recover audio. Please refresh and try again.'
            );
        }
    });

    // Added touch scrubbing support. The setProgress function 
    // already handled e.touches, but the events were never bound!
    if (progressContainer) {
        progressContainer.addEventListener('click', setProgress);
        
        let isScrubbing = false;
        
        const handleScrubStart = (e) => {
            isScrubbing = true;
            setProgress(e);
        };
        
        const handleScrubMove = (e) => {
            if (!isScrubbing) return;
            setProgress(e);
            e.preventDefault(); // Prevent page scrolling while scrubbing
        };
        
        const handleScrubEnd = () => {
            isScrubbing = false;
        };
        
        progressContainer.addEventListener('touchstart', handleScrubStart, { passive: false });
        progressContainer.addEventListener('touchmove', handleScrubMove, { passive: false });
        progressContainer.addEventListener('touchend', handleScrubEnd);
        progressContainer.addEventListener('touchcancel', handleScrubEnd);
    }

    // Network recovery
    const onlineHandler = () => {
        if (audio.error && isPlayerActive) {
            console.log('[Audio] Network recovered, attempting reload');
            attemptRecovery();
        }
    };
    window.addEventListener('online', onlineHandler);

    // ─── Initial Load ─────────────────────────────────────────────────────
    audio.load();

    const resetToStart = () => {
        audio.currentTime = 0;
        audio.removeEventListener('loadedmetadata', resetToStart);
    };

    if (audio.readyState >= 1) {
        audio.currentTime = 0;
    } else {
        audio.addEventListener('loadedmetadata', resetToStart);
    }

    // ─── Cleanup ──────────────────────────────────────────────────────────
    return function cleanup() {
        console.log('[Audio] Cleanup starting');
        isPlayerActive = false;
        releaseWakeLock();
    
        document.removeEventListener('visibilitychange', visibilityHandler);
        window.removeEventListener('blur',   blurHandler);
        window.removeEventListener('online', onlineHandler);
        
        if (progressContainer && progressContainer.isConnected) {
            progressContainer.removeEventListener('touchstart', handleScrubStart);
            progressContainer.removeEventListener('touchmove', handleScrubMove);
            progressContainer.removeEventListener('touchend', handleScrubEnd);
            progressContainer.removeEventListener('touchcancel', handleScrubEnd);
        }
    
        if (audio && audio.isConnected) {
            audio.pause();
            userWantsPlayback = false;
        }
    
        console.log('[Audio] Cleanup complete');
        };
    }

function handleContinueClick() {
    const FADE_DURATION_MS = 300;

    // ── Hide overlay ─────────────────────────────────────────────────────────
    document.querySelector('.additional-info-overlay')?.classList.remove('show');
    document.body.classList.remove('additional-info-open');

    // ── Resume audio if it was playing when popup opened ─────────────────────
    if (window._audioWasPlayingWhenPopupOpened) {
        document.getElementById('locationAudio')?.play().catch(() => {});
        window._audioWasPlayingWhenPopupOpened = false;
    }

    try { localStorage.removeItem('audioPosition'); } catch (_) {}

    // ── Cooldown ─────────────────────────────────────────────────────────────
    if (window.cooldownManager) {
        const idToLeave = window.cooldownManager.currentLocationId || lastVisitedLocationId;
        if (idToLeave != null) {
            window.cooldownManager.leaveLocation(idToLeave);
            console.log('[Cooldown] Started cooldown for location', idToLeave);
        }
    }

    if (window._lastProximityTriggerByLocation && lastVisitedLocationId != null) {
        delete window._lastProximityTriggerByLocation[lastVisitedLocationId];
    }

    // ── Reset proximity + zoom state ─────────────────────────────────────────
    window.isLocationHuntVisible       = false;
    window.zoomedInState               = false;
    window.isNearLocation              = false;
    window.blockSpeedZoom              = false;
    window.currentProximityLocationId  = null;
    window._inProximityZone            = false;
    window._proximityZoomActive        = false;

    getSpeedBasedZoom.reset();
    clearStationaryState();

    // ── Cancel countdown timers ──────────────────────────────────────────────
    if (window._countdownVisibilityHandler) {
        document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
        window._countdownVisibilityHandler = null;
    }
    if (window._countdownRafId) {
        cancelAnimationFrame(window._countdownRafId);
        window._countdownRafId = null;
    }
    if (window._countdownNextFrame) {
        clearTimeout(window._countdownNextFrame);
        window._countdownNextFrame = null;
    }
    if (window.distanceBoxCountdownInterval) {
        clearInterval(window.distanceBoxCountdownInterval);
        window.distanceBoxCountdownInterval = null;
    }

    // ── Proximity zoom timestamps ─────────────────────────────────────────────
    const now = Date.now();
    window.lastProximityZoomOutTime        = now;
    window.lastProximityZoomOutLocationId  = lastVisitedLocationId;
    window.lastProximityZoomInTime         = now - 2000;
    window.lastProximityZoomTime           = now;
    window._didPrefetch19                  = false;

    // ── Re-center map on user ────────────────────────────────────────────────
    const userLL        = window.userMarker?.getLatLng?.();
    const centerLatLng  = userLL ?? (window.lastPosition
        ? { lat: window.lastPosition.lat, lng: window.lastPosition.lng }
        : null);

    if (map && centerLatLng) {
        window.isMapInteracting      = false;
        window.followUser            = true;
        window._blockAutoMapUpdates  = true;

        map.setView(
            [centerLatLng.lat, centerLatLng.lng],
            map.getZoom(),
            { animate: true, duration: 0.6, easeLinearity: 0.18 }
        );

        createTrackedTimeout(() => {
            window._blockAutoMapUpdates = false;
        }, 800);
    }

    // ── Resume navigation ────────────────────────────────────────────────────
    window.deadReckoning?.start?.();
    ensureGPSActive();
    closeModalWithAnimation(FADE_DURATION_MS);
}

function closeModalWithAnimation(fadeDuration) {
    const additionalInfoContainer = cachedElements.additionalInfoContainer || 
        document.querySelector('.additional-info-container');
    const lochuntContainer = cachedElements.lochuntContainer || 
        document.querySelector('.lochunt-container');

    // ── Hide overlay immediately so it doesn't block interaction during fade ──
    const overlay = document.querySelector('.additional-info-overlay');
    if (overlay) overlay.classList.remove('show');
    document.body.classList.remove('additional-info-open');

    if (additionalInfoContainer) {
        additionalInfoContainer.classList.add('fade-out');
        
        setTimeout(() => {
            if (additionalInfoContainer) {
                additionalInfoContainer.style.display = 'none';
                additionalInfoContainer.classList.remove('fade-out', 'fade-in');
            }

            if (lochuntContainer) {
                lochuntContainer.classList.add('fade-out');
                
                setTimeout(() => {
                    if (lochuntContainer) {
                        lochuntContainer.style.display = 'none';
                        lochuntContainer.classList.remove('fade-out');
                    }
                    
                    finalizeModalClose();
                    
                }, fadeDuration);
            } else {
                finalizeModalClose();
            }
        }, fadeDuration);
    } else {
        if (lochuntContainer) {
            lochuntContainer.classList.add('fade-out');
            
            setTimeout(() => {
                if (lochuntContainer) {
                    lochuntContainer.style.display = 'none';
                    lochuntContainer.classList.remove('fade-out');
                }
                finalizeModalClose();
            }, fadeDuration);
        } else {
            finalizeModalClose();
        }
    }
}

function finalizeModalClose() {
    announceToScreenReader('Returned to map view');

    try {
        localStorage.removeItem('audioPosition');
    } catch (e) {}
    
    if (window.audioPlayerCleanup) {
        try {
            window.audioPlayerCleanup();
        } catch (e) {
            console.error('Audio cleanup failed:', e);
        }
        window.audioPlayerCleanup = null;
    }

    if (typeof _restoreFullTracking === 'function') {
        _restoreFullTracking();
    } 

    updateDistanceBox();
    
    document.body.focus();
}
        
function clearStationaryState() {
    // Clear stationary detection
    window.isStationary = false;
    window.stationaryLockPosition = null;
    window.stationaryStartTime = null;

    if (window.stationaryCheckTimeout) {
        clearTimeout(window.stationaryCheckTimeout);
        window.stationaryCheckTimeout = null;
    }

    if (window.positionBuffer?.length > 0) {
        const lastPos = window.positionBuffer[window.positionBuffer.length - 1];
        if (Date.now() - lastPos.timestamp > 10000) {
            console.debug("clearStationaryState: Clearing buffer due to stale last position (>10s old)");
            window.positionBuffer = [];
        }
    } else if (!window.positionBuffer) {
        window.positionBuffer = [];
    }

    window.lastUpdateTime = null;
}
        
function ensureGPSActive() {
    const GPS_HEARTBEAT_MS = 15000; // 15 seconds without a fix = dead

    if (window.positionWatchId == null) {
        console.log("GPS watch inactive - restarting");
        startPositionUpdates();
        return;
    }

    const lastFixAge = window.lastUpdateTimestamp
        ? (Date.now() - window.lastUpdateTimestamp)
        : Infinity;

    if (lastFixAge > GPS_HEARTBEAT_MS) {
        console.log(`GPS watch stale (${Math.round(lastFixAge / 1000)}s) - restarting`);
        if (window.positionWatchId != null) {
            navigator.geolocation.clearWatch(window.positionWatchId);
            window.positionWatchId = null;
        }
        startPositionUpdates();
    } else {
        console.log("GPS watch active - awaiting fresh updates");
    }
}
        
function _restoreFullTracking() {
    window.followUser = true;
    window.isMapInteracting = false;
    window.isLocationHuntVisible = false;

    if (window.lastPosition?.lat !== undefined && window.lastPosition?.lng !== undefined) {

        const seedPosition = {
            lat: window.lastPosition.lat,
            lng: window.lastPosition.lng,
            accuracy: window.lastPosition.accuracy || 20,
            heading: window.lastPosition.heading ?? null,
            timestamp: Date.now(),
            speedMPS: window.lastPosition.speedMPS || 0
        };

        // Fallback if seedPositionBuffer is unavailable
        if (typeof seedPositionBuffer === 'function') {
            seedPositionBuffer(seedPosition, 5);
        } else {
            window.positionBuffer = [seedPosition];
        }

        const restorationPosition = {
            coords: {
                latitude: seedPosition.lat,
                longitude: seedPosition.lng,
                accuracy: seedPosition.accuracy,
                heading: seedPosition.heading,
                speed: seedPosition.speedMPS
            },
            timestamp: seedPosition.timestamp
        };

        // forceUpdate=false prevents map jumps
        updateUserLocation(restorationPosition, false);
    }
}

function startHunt() {
    gameLocations = [...locations].sort((a, b) => a.id - b.id);
    window.gameLocations = gameLocations;
    lastVisitedLocationId = null;
    loadAllLocations();

    // iOS PWA Recovery — do this before starting proximity checks
    var recovered = false;
    try {
        const activeLocationId = localStorage.getItem('activeLocationId');
        if (activeLocationId) {
            const location = gameLocations.find(loc => String(loc.id) === String(activeLocationId));
            if (location) {
                recovered = true;
                requestAnimationFrame(() => {
                    if (typeof showLocationHunt === 'function') {
                        showLocationHunt(location);
                    }
                });
            } else {
                localStorage.removeItem('activeLocationId');
                localStorage.removeItem('audioPosition');
            }
        }
    } catch (e) {
        console.warn('[Recovery] Failed to restore session:', e);
    }

    // Only start proximity checks if not recovering into a location
    if (!recovered) {
        startIdleProximityCheck();
    }
}
        
function getMarkerColor(tours) {
    if (typeof tours !== 'string') return '#0f2bab';
    
    switch (tours.toLowerCase()) {
        case 'person':
            return '#FFA500';
        case 'gangster':
            return '#3f9b0b';
        case 'event':
            return '#8B0000';
        case 'place':
            return '#800080';
        default:
            return '#0f2bab';
    }
}

let markersCreated = false;
let activePopups = new Set();

function recenterOnUser() {
    if (userMarker && map) {
        map.closePopup();
        map.panTo(userMarker.getLatLng(), {
            animate: true,
            duration: 0.5,
            noZoom: true
        });
        window.followUser = true;
        window.isMapInteracting = false;
    }
}
        
function createMarkersOnly() {
    if (!gameLocations || !Array.isArray(gameLocations) || gameLocations.length === 0) {
        console.warn("No game locations available");
        return;
    }
    
    if (markerClusterGroup) {
        markerClusterGroup.clearLayers();
    }
    
    activePopups.clear();
    const esc = (str) => typeof str === 'string' 
        ? str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) 
        : '';
    gameLocations.forEach((location) => {
        if (!location || typeof location.lat !== 'number' || typeof location.lng !== 'number') {
            console.warn("Invalid location data:", location);
            return;
        }
        const markerColor = getMarkerColor(location.tours);
        location.markerColor = markerColor;
        
        const safeName = esc(String(location.name));
        const safeId = esc(String(location.id));
        const safeImage = esc(String(location.sumimage || location.image || ''));
        
        let safeLink = '';
        if (location.link) {
            try {
                const url = new URL(location.link, window.location.href);
                if (url.protocol === 'http:' || url.protocol === 'https:') safeLink = url.href;
            } catch (e) {}
        }
        const locationMarker = L.marker([location.lat, location.lng], {
            icon: L.divIcon({
                className: 'custom-pin-icon',
                html: `<div class="pin-head" style="background-color: ${markerColor};"></div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 30],
            }),
            riseOnHover: false,
            bubblingMouseEvents: false
        });
        
        const popupContent = `
            <div class="popup-content">
                <img loading="eager" src="${safeImage}" alt="${safeName}" class="location-image"
                     onerror="this.src='${esc(String(location.image || ''))}'">
                <h4 class="location-name">
                    ${safeLink ? `<a href="${safeLink}" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: inherit;">${safeName}</a>` : safeName}
                </h4>
                <div class="popup-buttons">
                    <button class="button route-button" data-lat="${location.lat}" data-lng="${location.lng}" data-location-id="${safeId}" style="touch-action: manipulation; user-select: none;">Directions</button>
                    <button class="button summary-button" data-location-id="${safeId}" style="touch-action: manipulation; user-select: none;">Summary</button>
                </div>
            </div>
        `;
        
        locationMarker.bindPopup(popupContent, {
            offset: L.point(0, -25),
            className: 'custom-popup',
            maxWidth: 300,
            closeButton: true,
            autoClose: true,
            closeOnClick: true
        });
        
        locationMarker.on('popupopen', function(e) {
            activePopups.add(locationMarker);
            attachPopupEventListeners(e.popup._contentNode, location);
        });
        locationMarker.on('popupclose', function(e) {
            activePopups.delete(locationMarker);
        });
        markerClusterGroup.addLayer(locationMarker);
    });
    
    if (!map.hasLayer(markerClusterGroup)) {
        map.addLayer(markerClusterGroup);
    }
    
    markersCreated = true;
}

function attachPopupEventListeners(popupElement, location) {
    const routeButton = popupElement.querySelector('.route-button');
    const summaryButton = popupElement.querySelector('.summary-button');
    if (routeButton && !routeButton.hasAttribute('data-listener-attached')) {
        routeButton.setAttribute('data-listener-attached', 'true');
        routeButton.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();
            showNavigationModal(location.lat, location.lng);
        });
    }
    if (summaryButton && !summaryButton.hasAttribute('data-listener-attached')) {
        summaryButton.setAttribute('data-listener-attached', 'true');
        summaryButton.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();
            showLocationSummary(location.id);
        });
    }
}

function closeAllPopups() {
    activePopups.forEach(marker => {
        if (marker.isPopupOpen()) {
            marker.closePopup();
        }
    });
    activePopups.clear();
}

function returnToIndex() {
   const distanceBox = document.querySelector('#distanceBox'); 
   if (distanceBox) distanceBox.style.display = 'none';
   
   function isPWA() {
       if (window.matchMedia('(display-mode: standalone)').matches) return true;
       if (window.navigator.standalone === true) return true;
       if (document.referrer.includes('android-app://')) return true;
       return false;
   }
   
   function closePWAApp() {
       window.location.href = "https://www.mnthen.com";
   }

   const popupDiv = document.createElement("div");
   popupDiv.setAttribute('role', 'dialog');
   popupDiv.setAttribute('aria-modal', 'true');
   popupDiv.setAttribute('aria-label', 'Exit application');
   popupDiv.style.cssText = `
       position: fixed; inset: 0;
       background-color: rgba(0,0,0,0.6);
       backdrop-filter: blur(4px);
       display: flex; justify-content: center; align-items: center;
       z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
   `;

   const darkBlue = "var(--dark-blue)";

function isSignificantMovement(newPosition) {
    if (!lastPositionForJitter) {
        lastPositionForJitter = newPosition;
        lastSignificantMovement = Date.now();
        return true;
    }

    const distance = calculateDistance(lastPositionForJitter, newPosition);
    
    // Prevent invalid GPS spikes from poisoning the baseline position
    if (!isFinite(distance) || distance < 0) {
        return false;
    }

    const now = Date.now();
    const timeSince = now - lastSignificantMovement;

    if (
        (distance >= CONFIG.JITTER_THRESHOLD && timeSince >= CONFIG.SIGNIFICANT_MOVEMENT_COOLDOWN) ||
        distance >= CONFIG.JITTER_THRESHOLD * 5
    ) {
        lastPositionForJitter = newPosition;
        lastSignificantMovement = now;
        return true;
    }
    return false;
}

function resetInactivityTimer(isExplicitInteraction = true) {
    // Stored on window (not the local `inactivityTimer` variable) because
    // disposeMapLoop()'s timeoutHandles list already targets
    // window.inactivityTimer by name. Keeping it local meant that cleanup
    // was always clearing an id that was never set, so a pending inactivity
    // countdown could survive a full map teardown/re-init and later fire
    // against whatever map/userMarker exist by then.
    if (window.inactivityTimer) {
        clearTrackedTimeout(window.inactivityTimer);
        window.inactivityTimer = null;
    }
    
    window.inactivityTimer = createTrackedTimeout(() => {
        if (!map || !userMarker) return;
        
        map.closePopup();
        if (!window.isMapInteracting) {  
            window.followUser = true;                  
            window.isMapInteracting = false; // Ensure state is fully released
            
            const userPos = userMarker.getLatLng();
            // isFinite prevents failure at exact 0 lat/lng coordinates
            if (userPos && isFinite(userPos.lat) && isFinite(userPos.lng)) {
                map.panTo(userPos, { animate: true, duration: 0.5 });
            }
        }
    }, CONFIG?.INACTIVITY_TIMEOUT ?? 300_000); // 5 min fallback if CONFIG failed to load
    
    if (isExplicitInteraction) {
        window.isMapInteracting = false;  
    }
}

function optimizeImages(root = document) {
  if (!root || !root.querySelectorAll) {
    console.warn('optimizeImages: Invalid root element provided');
    return;
  }

  // Shared by both the "already known broken at process-time" and
  // "failed to load later" paths. These used to diverge (visibility:hidden
  // vs opacity:0.5) purely based on *when* the browser happened to notice
  // the failure, not on any real difference in the two cases — unified here
  // on visibility:hidden. The distinct data-optimized values ('error-broken'
  // vs 'error-load') are preserved so anything depending on that attribute
  // still sees exactly what it did before.
  const markImageBroken = (img, state) => {
    img.setAttribute('data-optimized', state);
    img.setAttribute('width', '1');
    img.setAttribute('height', '1');
    img.style.visibility = 'hidden';
  };

  try {
    const images = root.querySelectorAll('img:not([data-optimized])');
    
    images.forEach(img => {
      try {
        // Note: no re-check of hasAttribute('data-optimized') here — the
        // querySelectorAll above already guarantees that for every element
        // in this (static) NodeList, and nothing in this loop can
        // retroactively change which elements were captured in it.
        if (img.closest('template') || 
            img.getRootNode() instanceof ShadowRoot) {
          return;
        }

        const src = img.currentSrc || img.src;
        
        if (!src || src.startsWith('data:') || src === 'about:blank') {
          img.setAttribute('data-optimized', 'no-valid-src');
          return;
        }

        const hasExplicitDimensions = img.hasAttribute('width') || img.hasAttribute('height');
        const hasNaturalDimensions = img.naturalWidth > 0 && img.naturalHeight > 0;
        
        if (hasExplicitDimensions || hasNaturalDimensions) {
          img.setAttribute('data-optimized', 'dimensions-exist');
          if (!img.hasAttribute('loading')) img.loading = 'lazy';
          return;
        }

        const isSVG = src.includes('.svg') || img.src.includes('.svg') || img.type === 'image/svg+xml';
        const isCritical = img.hasAttribute('data-critical') || 
                          img.closest('[data-critical]') ||
                          img.classList.contains('critical-image');
        
        if (isSVG) {
          img.setAttribute('data-optimized', 'svg');
          if (!isCritical && !img.hasAttribute('loading')) img.loading = 'lazy';
          return;
        }

        img.setAttribute('data-optimized', 'processing');

        if (!isCritical && !img.hasAttribute('loading')) {
          img.loading = 'lazy';
        }

        const setDimensions = () => {
          try {
            if (img.naturalWidth > 0 && img.naturalHeight > 0) {
              if (!img.hasAttribute('width') && !img.style.width) {
                img.setAttribute('width', img.naturalWidth);
              }
              if (!img.hasAttribute('height') && !img.style.height) {
                img.setAttribute('height', img.naturalHeight);
              }
              img.setAttribute('data-optimized', 'dimensions-set');
              
              if (!img.style.aspectRatio) {
                img.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
              }
            } else {
              img.setAttribute('data-optimized', 'no-dimensions');
            }
          } catch (error) {
            img.setAttribute('data-optimized', 'dimension-error');
            console.warn('Error setting image dimensions:', error, img.src);
          }
        };

        if (img.complete) {
          if (img.naturalWidth > 0) {
            setDimensions();
          } else {
            markImageBroken(img, 'error-broken');
          }
          return;
        }

        const onLoad = () => {
          if (img.decode) {
            img.decode()
              .then(setDimensions)
              .catch(() => setDimensions());
          } else {
            setTimeout(setDimensions, 0);
          }
        };

        const onError = () => {
          markImageBroken(img, 'error-load');
        };

        // `once: true` automatically cleans up listeners after firing
        img.addEventListener('load', onLoad, { once: true });
        img.addEventListener('error', onError, { once: true });

      } catch (imgError) {
        console.warn('Error optimizing image:', imgError, img?.src || 'unknown image');
        img?.setAttribute('data-optimized', 'processing-error');
      }
    });
    
  } catch (error) {
    console.error('Error in optimizeImages:', error);
  }
}
        
function setupImageOptimizationObserver() {
  if (typeof MutationObserver === 'undefined') return;
  
  const pendingRoots = new Set();
  let rafId = null;

  const processPending = () => {
    rafId = null;
    pendingRoots.forEach(root => optimizeImages(root));
    pendingRoots.clear();
  };

  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      if (mutation.type !== 'childList' || mutation.addedNodes.length === 0) continue;
      
      for (const node of mutation.addedNodes) {
        if (node.nodeType !== Node.ELEMENT_NODE) continue;
        
        if (node.tagName === 'IMG') {
          // Scan the parent to catch the newly added IMG
          pendingRoots.add(node.parentElement || document.body);
        } else if (node.querySelector('img')) {
          // Only scan containers if they actually contain images
          pendingRoots.add(node);
        }
      }
    }

    // Batch all mutations into a single DOM scan per frame
    if (pendingRoots.size > 0 && rafId === null) {
      rafId = requestAnimationFrame(processPending);
    }
  });
  
  observer.observe(document.body, {
    childList: true,
    subtree: true
  });
  
  return {
    observer,
    destroy: () => {
      if (rafId) cancelAnimationFrame(rafId);
      pendingRoots.clear();
      observer.disconnect();
    }
  };
}

// Initialize on DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    optimizeImages();
    // Stored so destroy()/observer are actually reachable — previously the
    // return value was discarded at both call sites, meaning the observer
    // could never be torn down (relevant for SPA-style page teardown
    // without a full navigation).
    window.imageOptimizerHandle = setupImageOptimizationObserver();
  });
} else {
  optimizeImages();
  window.imageOptimizerHandle = setupImageOptimizationObserver();
}

/* EVENT LISTENER SETUP */

function handleInteractionStart() {
    // CRITICAL: The map is moving programmatically. 
    // Ignore this to keep followUser = true and isMapInteracting = false.
    if (window._programmaticFlyInProgress) {
        return;
    }

    window.followUser = false;
    window.isMapInteracting = true;
    _clearInactivityTimer();
}

function handleInteractionEnd() {
    // CRITICAL: Ignore if we are in the middle of a programmatic animation
    if (window._programmaticFlyInProgress) {
        return;
    }

    window.isMapInteracting = false;
    
    // Check speed to determine if we should restart the inactivity timer
    const speedMPS = window.lastPosition?.speedMPS || 0;
    if (speedMPS * 2.23694 < 1.0) {
        _startInactivityTimer();
    }
}

function setupMapEvents() {
    if (!map) {
        console.error('Map not available for event setup');
        return;
    }
    
    // Clean up to prevent duplicate listeners
    map.off('dragstart zoomstart', handleInteractionStart);
    map.off('dragend zoomend', handleInteractionEnd);

    try {
        // We only listen for drag/zoom events. 
        // By relying on these specific events, we ignore internal 'move' 
        // events generated by setView/panTo during programmatic updates.
        map.on('dragstart zoomstart', handleInteractionStart);
        map.on('dragend zoomend', handleInteractionEnd);
    } catch (error) {
        console.error('Error setting up map events:', error);
    }
}

function setupEventListeners() {
    const setupButtonEvents = () => {
        const buttonConfigs = [
            { id: 'recenterButton', handler: fullResetMap, required: true },
            { id: 'returnButton', handler: returnToIndex, required: true },
            { id: 'tipsButton', handler: showNavigationTips, required: false }
        ];
        buttonConfigs.forEach(config => {
            try {
                const element = document.getElementById(config.id);
                if (element) {
                    element.addEventListener('click', config.handler);
                } else if (config.required) {
                    console.error(`Required button element not found: ${config.id}`);
                }
            } catch (error) {
                console.error(`Error setting up ${config.id} event:`, error);
            }
        });
    };
       const setupAccessibilityEvents = () => {};
    const setupSystemEvents = () => {
        try {
            document.addEventListener('visibilitychange', () => {
                try {
                    if (typeof handleVisibilityChange === 'function') handleVisibilityChange();
                } catch (error) {
                    console.error('Visibility change handler error:', error);
                }
            });
            let resizeTimeoutId = null;
            window.addEventListener('resize', () => {
                if (resizeTimeoutId != null) clearTrackedTimeout(resizeTimeoutId);
                resizeTimeoutId = createTrackedTimeout(() => {
                    resizeTimeoutId = null;
                    if (map) map.invalidateSize();
                    if (typeof updateDistanceBox === 'function') updateDistanceBox();
                }, 250);
            });
        } catch (error) {
            console.error('Error setting up system events:', error);
        }
    };
    try {
        setupMapEvents();
        setupButtonEvents();
        setupAccessibilityEvents();
        setupSystemEvents();
    } catch (error) {
        console.error('Critical error in setupEventListeners:', error);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const initSteps = [
        { name: 'Cache Elements', fn: cacheElements },

        { name: 'Optimize Images', fn: optimizeImages },

});

/* ─── iOS Ghost Click Shield ─── */
(function() {
    'use strict';

    const SHIELD_DURATION_MS = 500;
    const MAP_BUTTON_SELECTOR = '.map-button, #recenterButton, #returnButton, #tipsButton';
    const OVERLAY_SELECTOR = '.modal, .popup-overlay, .navigation-tips-overlay, .source-info-content, #cd-centered-popup, #cd-corner-badge, #summaryModal, #sourceInfoPopup, .reminder-modal';

    let shieldActive = false;
    let shieldTimer = null;
    let lastTouchTime = 0;
    let lastTouchTarget = null;
    let openingOverlay = false;

    function isOverlayElement(el) {
        return !!(el && el.closest && el.closest(OVERLAY_SELECTOR));
    }

    function isMapButton(el) {
        return !!(el && el.closest && el.closest(MAP_BUTTON_SELECTOR));
    }

    function activateShield() {
        shieldActive = true;
        lastTouchTime = Date.now();
        if (shieldTimer) clearTimeout(shieldTimer);
        shieldTimer = setTimeout(() => {
            shieldActive = false;
            shieldTimer = null;
        }, SHIELD_DURATION_MS);
    }

    document.addEventListener('touchstart', function(e) {
        openingOverlay = isMapButton(e.target);
    }, true);

    document.addEventListener('touchend', function(e) {
        lastTouchTarget = e.target;
        if (isOverlayElement(e.target)) {
            activateShield();
        }
        openingOverlay = false;
    }, true);

    document.addEventListener('click', function(e) {
        if (!isMapButton(e.target)) return;

        const timeSinceTouch = Date.now() - lastTouchTime;
        if (!shieldActive || timeSinceTouch >= SHIELD_DURATION_MS) return;

        if (lastTouchTarget) {
            const clickBtn = e.target.closest(MAP_BUTTON_SELECTOR);
            const touchBtn = lastTouchTarget.closest ? lastTouchTarget.closest(MAP_BUTTON_SELECTOR) : null;
            if (clickBtn && clickBtn === touchBtn) return;
        }

        e.stopImmediatePropagation();
        e.preventDefault();
    }, true);

    if (typeof MutationObserver !== 'undefined') {
        const observer = new MutationObserver(function(mutations) {
            if (openingOverlay) return;

            for (const mutation of mutations) {
                if (mutation.type !== 'childList') continue;
                for (const node of mutation.removedNodes) {
                    if (node.nodeType !== Node.ELEMENT_NODE) continue;
                    if (
                        (node.matches && node.matches(OVERLAY_SELECTOR)) ||
                        (node.querySelector && node.querySelector(OVERLAY_SELECTOR))
                    ) {
                        activateShield();
                        return;
                    }
                }
            }
        });

        const startObserving = () => {
            // Observe ONLY direct children of body. Overlays are appended
            // to body, so this catches them. Without subtree:true, this
            // ignores Leaflet tile/marker mutations, saving massive CPU.
            observer.observe(document.body, { childList: true });
        };

        if (document.body) {
            startObserving();
        } else {
            document.addEventListener('DOMContentLoaded', startObserving, { once: true });
        }
    }
