let _loadingProgressInterval;

function showLoadingMessage() {
    if (document.getElementById('loadingMessage')) return;

    loadingMessageMinDisplayTime = Date.now() + 6000;

    const loadingMessage = document.createElement('div');
    loadingMessage.id = 'loadingMessage';

    const card = document.createElement('div');
    card.className = 'loading-card';

    const logo = document.createElement('img');
    logo.className = 'loading-logo';
    logo.src = 'https://mnthen.com/images/logo.webp';
    logo.alt = 'Minnesota Then Logo';

    const title = document.createElement('h1');
    title.className = 'loading-title';
    title.textContent = 'The Museum Without Walls';

    const subtitle = document.createElement('h2');
    subtitle.className = 'loading-subtitle';
    subtitle.textContent = 'Where Every Step Tells a Story';

    const statusContainer = document.createElement('div');
    statusContainer.className = 'loading-status';
    const statusText = document.createElement('p');
    statusText.id = 'loadingStatusText';
    statusText.textContent = 'Location found, proceeding to stabilization...';
    statusContainer.appendChild(statusText);

    const progressTrack = document.createElement('div');
    progressTrack.className = 'loading-progress-track';
    const progressBar = document.createElement('div');
    progressBar.className = 'loading-progress-bar';
    progressBar.id = 'loadingProgressBar';
    progressTrack.appendChild(progressBar);

    const noteContainer = document.createElement('div');
    noteContainer.className = 'loading-note';
    const noteText = document.createElement('p');
    noteText.textContent = 'Preparing your experience.';
    noteContainer.appendChild(noteText);

    card.appendChild(logo);
    card.appendChild(title);
    card.appendChild(subtitle);
    card.appendChild(statusContainer);
    card.appendChild(progressTrack);
    card.appendChild(noteContainer);
    loadingMessage.appendChild(card);
    document.body.appendChild(loadingMessage);

    // Progress animation
    const totalDuration = 6000;
    const updateMs = 100;
    const steps = totalDuration / updateMs;
    let progress = 0;

    const animations = [
    "Loading the map...",                     // Leaflet is initializing tiles
    "Finding your location...",               // navigator.geolocation is pinging
    "Connecting to GPS satellites...",         // Waiting for high-accuracy fix
    "Looking for nearby history...",           // Proximity math is running
    "Almost ready..."                         // Final DOM renders
];

    _loadingProgressInterval = setInterval(() => {
        progress += (100 / steps);
        if (progressBar) progressBar.style.width = `${Math.min(progress, 100)}%`;
        if (statusText) {
            const idx = Math.min(Math.floor(progress / (100 / animations.length)), animations.length - 1);
            statusText.textContent = animations[idx];
        }
        if (progress >= 100) {
            clearInterval(_loadingProgressInterval);
            _loadingProgressInterval = null;
            tryHideLoadingMessage();
        }
    }, updateMs);

    // Register cleanup so interval doesn't survive page unload
    if (memoryManager?.registerCleanupTask) {
        memoryManager.registerCleanupTask(() => {
            if (_loadingProgressInterval) {
                clearInterval(_loadingProgressInterval);
                _loadingProgressInterval = null;
            }
        });
    }
}

function tryHideLoadingMessage() {
    if (Date.now() >= loadingMessageMinDisplayTime) {
        fadeOutLoadingMessage();
    } else {
        const timeRemaining = loadingMessageMinDisplayTime - Date.now();
        createTrackedTimeout(fadeOutLoadingMessage, timeRemaining);
    }
}

function fadeOutLoadingMessage() {
    const loadingMessage = document.getElementById('loadingMessage');
    if (!loadingMessage) return;

    if (_loadingProgressInterval) {
        clearInterval(_loadingProgressInterval);
        _loadingProgressInterval = null;
    }

    const progressBar = document.getElementById('loadingProgressBar');
    if (progressBar) progressBar.style.width = '100%';

    const distanceBox = cachedElements.distanceBox || document.getElementById('distanceBox');
    if (distanceBox) distanceBox.classList.add('show');

    loadingMessage.style.opacity = '0';
    createTrackedTimeout(() => { loadingMessage.remove(); }, 500);
}

function hideLoadingMessage() {
    tryHideLoadingMessage();
}

/* ──────────────────────────────────────────────
   ACCURACY INDICATOR — CSS-driven
   ────────────────────────────────────────────── */
function updateAccuracyIndicator(accuracy) {
    const indicator = document.getElementById('accuracyIndicator');
    if (!indicator) return;

    indicator.classList.remove('accuracy-high', 'accuracy-medium', 'accuracy-low');
    if (accuracy < 20) indicator.classList.add('accuracy-high');
    else if (accuracy < 50) indicator.classList.add('accuracy-medium');
    else indicator.classList.add('accuracy-low');
}

/* ──────────────────────────────────────────────
   USER LOCATION INITIALIZATION
   ────────────────────────────────────────────── */
    function initializeUserLocation(position) {
        position = window._consumeWarmupPosition?.(position) ?? position;
    
        if (!position?.coords) {
            handleLocationError(new Error('Invalid initial position'));
            return;
        }
    
        const { latitude: lat, longitude: lng, accuracy, heading, speed } = position.coords;
    
        if (isNaN(lat) || isNaN(lng) || Math.abs(lat) > 90 || Math.abs(lng) > 180) {
            handleLocationError(new Error('Invalid coordinates'));
            return;
        }
    
        if (window._initializationComplete) {
            userMarker?.setLatLng([lat, lng]);
            map?.panTo([lat, lng], { animate: false });
            const kf = window.sensorFusion?._kalmanFilter;
            if (kf && kf.x !== null) kf._shiftReference();
            return;
        }
    
        if (window._initializationInProgress) {
            const existing = window._pendingInitPosition;
            const existingAge = existing ? (Date.now() - (existing.timestamp || 0)) : Infinity;
            const newAge = Date.now() - (position.timestamp || Date.now());
            const existingAcc = existing?.coords?.accuracy ?? Infinity;
            const newAcc = accuracy ?? Infinity;
            if (!existing || newAge < existingAge - 2000 || newAcc < existingAcc * 0.8) {
                window._pendingInitPosition = position;
            }
            return;
        }
        window._initializationInProgress = true;
    
        if (typeof announceToScreenReader === 'function') {
            const msg = accuracy > 100
                ? `Location acquired with ${accuracy.toFixed(0)} meter accuracy. Map loading.`
                : 'Location acquired. Map ready for navigation.';
            announceToScreenReader(msg);
        }
    
        try {
            if (!userMarker) {
                window._markerRetryCount = (window._markerRetryCount || 0) + 1;
                if (window._markerRetryCount <= 3) {
                    window._initializationInProgress = false;
                    requestAnimationFrame(() => {
                        const pos = window._pendingInitPosition || position;
                        window._pendingInitPosition = null;
                        initializeUserLocation(pos);
                    });
                    return;
                }
                window._initializationInProgress = false;
                window._markerRetryCount = 0;
                handleLocationError(new Error('Map marker initialization failed'));
                return;
            }
    
            window._markerRetryCount = 0;
            userMarker.setLatLng([lat, lng]);
    
            if (!map) throw new Error('Map not initialized');
            map.setView([lat, lng], 17, { animate: false });
    
            seedPositionBuffer?.({
                lat, lng, accuracy,
                timestamp: position.timestamp || Date.now(),
                heading: heading ?? null,
                speedMPS: speed || 0,
            });
    
            const kf = window.sensorFusion?._kalmanFilter;
            if (kf) {
                const hasWarmStartHistory = window._warmupFixCount >= 2 &&
                                            window._warmupPositionHistory?.length >= 2;
                const hasReliableMotion = speed > 0.5 && heading != null && isFinite(heading);
    
                if (hasWarmStartHistory) {
                    // Place marker at last known fix immediately, backfill KF history
                    // in rAF chunks to avoid blocking the main thread at load.
                    const history = window._warmupPositionHistory;
                    const lastFix = history[history.length - 1];
                    if (lastFix) userMarker.setLatLng([lastFix.lat, lastFix.lng]);
    
                    let idx = 1;
                    function backfillChunk() {
                        const end = Math.min(idx + 3, history.length);
                        for (; idx < end; idx++) {
                            const fix = history[idx];
                            kf.update(fix.lat, fix.lng, fix.accuracy,
                                window.sensorFusion._toPerfNow(fix.timestamp), fix.speedMPS);
                        }
                        if (idx < history.length) {
                            if (typeof requestIdleCallback === 'function') {
                                requestIdleCallback(backfillChunk, { timeout: 50 });
                            } else {
                                requestAnimationFrame(backfillChunk);
                            }
                        }
                    }
                    requestAnimationFrame(backfillChunk);
    
                } else if (hasReliableMotion) {
                    const rad = heading * Math.PI / 180;
                    kf.seedVelocity(speed * Math.cos(rad), speed * Math.sin(rad), 0.5);
                } else {
                    kf.seedVelocity(0, 0, 6.0);
                }
            }
    
            hideLoadingMessage?.();
    
            queueMicrotask(() => {
                if (typeof startHunt === 'function' && !window._huntStarted) {
                    window._huntStarted = true;
                    startHunt();
                }
            });
    
            requestAnimationFrame(() => {
                if (typeof startIdleProximityCheck === 'function' && !window._proximityCheckStarted) {
                    window._proximityCheckStarted = true;
                    startIdleProximityCheck();
                }
            });
    
            // Apply any better fix that arrived during initialization.
            const pending = window._pendingInitPosition;
            if (pending) {
                window._pendingInitPosition = null;
                const pLat = pending?.coords?.latitude;
                const pLng = pending?.coords?.longitude;
                const pSpd = pending?.coords?.speed;
                const pHdg = pending?.coords?.heading;
                if (userMarker && pLat != null && pLng != null && !isNaN(pLat) && !isNaN(pLng)) {
                    userMarker.setLatLng([pLat, pLng]);
                    if (kf && kf.x !== null) {
                        kf._shiftReference();
                        if (pSpd > 0.3 && pHdg != null) {
                            const rad = pHdg * Math.PI / 180;
                            kf.seedVelocity(pSpd * Math.cos(rad), pSpd * Math.sin(rad), 2.0);
                        }
                    }
                }
            }
    
            window._initializationComplete = true;
            window._initializationInProgress = false;
            window._lastSuccessfulInit = Date.now();
            window._initRecoveryAttempts = 0;
    
            const watchId = startPositionUpdates();
            if (watchId === null) {
                requestAnimationFrame(() => {
                    if (!window.positionWatchId) startPositionUpdates();
                });
            }
    
            window._drPreArmed = true;
            if (window.deadReckoning && typeof window.deadReckoning.start === 'function') {
                window.deadReckoning.start();
            }
    
        } catch (err) {
            console.error('Location initialization error:', err);
            window._initializationInProgress = false;
    
            if (!window._initializationComplete) {
                window._huntStarted = false;
                window._proximityCheckStarted = false;
            }
    
            handleLocationError(err);
    
            window._initRecoveryAttempts = (window._initRecoveryAttempts || 0) + 1;
    
            if (window._initRecoveryAttempts <= 3) {
                const backoffMs = Math.min(5000, Math.pow(2, window._initRecoveryAttempts) * 500);
                createTrackedTimeout(() => {
                    if (navigator.geolocation && !window._initializationComplete) {
                        navigator.geolocation.getCurrentPosition(
                            initializeUserLocation,
                            handleLocationError,
                            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                        );
                    }
                }, backoffMs);
            } else {
                showPopup?.(
                    'Location Error',
                    'Unable to get your location after multiple attempts. Please check your GPS settings and refresh the page.',
                    'error'
                );
            }
        }
    }
        
/* ──────────────────────────────────────────────
   GPS POWER MODE — shared utility
   ────────────────────────────────────────────── */
    function getWatchOptions() {
        const speedMPH = (window.lastPosition?.speedMPS ?? 0) * 2.23694;
        
        const stationary = window.isStationary || speedMPH < 0.3;
        const driving = speedMPH >= 5 || (!window.isStationary && speedMPH >= 4);
        
        return {
            enableHighAccuracy: true,
            maximumAge: stationary ? 5000 : driving ? 1000 : 2000,
            timeout: stationary ? 20000 : driving ? 10000 : 15000,
        };
    }

/* ──────────────────────────────────────────────
   POSITION UPDATES — GPS watch + power manager
   ────────────────────────────────────────────── */
    function startPositionUpdates() {
        try {
            if (window.positionWatchId != null) {
                navigator.geolocation.clearWatch(window.positionWatchId);
                window.positionWatchId = null;
            }
    
            const opts = getWatchOptions();
            
            window.positionWatchId = navigator.geolocation.watchPosition(
                handlePositionUpdate,
                handleLocationError,
                { 
                    enableHighAccuracy: true, 
                    timeout: opts.timeout, 
                    maximumAge: opts.maximumAge
                }
            );
    
            if (!window._positionUpdatesListenersSetup) {
                window._positionUpdatesListenersSetup = true;
    
                const onlineHandler = () => {
                    if (window.onlineRestartTimeout) {
                        clearTimeout(window.onlineRestartTimeout);
                        window.onlineRestartTimeout = null;
                    }
                    
                    window.onlineRestartTimeout = createTrackedTimeout(() => {
                        window.onlineRestartTimeout = null;
                        
                        if (window.positionWatchId != null) {
                            navigator.geolocation.clearWatch(window.positionWatchId);
                        }
                        
                        const restartOpts = getWatchOptions();
                        window.positionWatchId = navigator.geolocation.watchPosition(
                            handlePositionUpdate,
                            handleLocationError,
                            { 
                                enableHighAccuracy: true, 
                                timeout: restartOpts.timeout, 
                                maximumAge: 0
                            }
                        );
                        
                        console.log('[GPS] Restarted watch after network recovery');
                    }, 800);
                };
    
                const offlineHandler = () => {
                    if (window.onlineRestartTimeout) {
                        clearTimeout(window.onlineRestartTimeout);
                        window.onlineRestartTimeout = null;
                    }
                    
                    window._networkWasOffline = true;
                    
                    window.onlineRestartTimeout = createTrackedTimeout(() => {
                        window.onlineRestartTimeout = null;
                        
                        if (window.positionWatchId != null) {
                            navigator.geolocation.clearWatch(window.positionWatchId);
                        }
                        
                        window.positionWatchId = navigator.geolocation.watchPosition(
                            handlePositionUpdate,
                            handleLocationError,
                            { 
                                enableHighAccuracy: false,
                                timeout: 30000, 
                                maximumAge: 10000
                            }
                        );
                        
                        console.log('[GPS] Fallback to pure GPS after offline stall');
                    }, 10000);
                };
    
                window.addEventListener('online', onlineHandler);
                window.addEventListener('offline', offlineHandler);
    
                if (typeof memoryManager?.trackEventListener === 'function') {
                    memoryManager.trackEventListener(window, 'online', onlineHandler);
                    memoryManager.trackEventListener(window, 'offline', offlineHandler);
                }
                
                // These names must match disposeMapLoop() cleanup:
                window._networkOnlineHandler = onlineHandler;
                window._networkOfflineHandler = offlineHandler;
            }
    
            return window.positionWatchId;
    
        } catch (err) {
            console.error('Geolocation unavailable:', err);
            handleLocationError({ code: 0, message: 'Geolocation unavailable' });
            return null;
        }
    }
        
/* ──────────────────────────────────────────────
   POSITION UPDATE HANDLER
   ────────────────────────────────────────────── */
    function handlePositionUpdate(position) {
        if (!position?.coords ||
            isNaN(position.coords.latitude) ||
            isNaN(position.coords.longitude)) {
            return;
        }
    
        const positionTimestamp = position.timestamp || Date.now();
        const currentTime = Date.now();
    
        // Discard stale fixes (> 30 seconds old)
        if (currentTime - positionTimestamp > 30_000) return;
    
        // Background throttle: one fix per 30s when tab is hidden
        if (document.hidden) {
            if (!window._lastBackgroundUpdate || currentTime - window._lastBackgroundUpdate > 30_000) {
                window._lastBackgroundUpdate = currentTime;
            } else {
                return;
            }
        }
    
        const rawLat = position.coords.latitude;
        const rawLng = position.coords.longitude;
        const rawAccuracy = position.coords.accuracy || 20;
        
        const rawSpeedMPS = (position.coords.speed != null && isFinite(position.coords.speed))
        ? Math.max(0, position.coords.speed)
        : null;
        
        const rawHeading = position.coords.heading ?? null;
    
        let fusedLat = rawLat;
        let fusedLng = rawLng;
        let fusedHeading = rawHeading;
        let isMoving = rawSpeedMPS != null ? rawSpeedMPS > 0.5 : false;
    
        if (window.sensorFusion) {
            // Pre-boost Kalman velocity variance if the device
            // just started moving from a stationary state. Without this,
            // smoothPosition() processes the fix with low velocity variance
            // (from the stationary period), causing the filter to resist
            // tracking the new movement for an entire GPS cycle (~1s).
            if (window.isStationary && window.sensorFusion.isDeviceMoving(rawSpeedMPS ?? 0.8)) {
                const kf = window.sensorFusion._kalmanFilter;
                if (kf && kf.P && kf.x) {
                    kf.P[2][2] = 225;
                    kf.P[3][3] = 225;

    var isDrActive = window.deadReckoning &&
        typeof window.deadReckoning.isActive === 'function' &&
        window.deadReckoning.isActive();
    var isCentered = typeof ModeManager !== 'undefined' &&
        typeof ModeManager.isCentered === 'function' &&
        ModeManager.isCentered();

    if (isDrActive && isCentered) {
        if (map.getZoom() !== targetZoom) {
            try {
                map.setZoom(targetZoom, { animate: false });
            } catch (e) {
                console.error('init zoom failed:', e);
            }
        }
    } else {
        try {
            map.setView([newPosition.lat, newPosition.lng], targetZoom, {
                animate: false, noMoveStart: true, noMoveEnd: true

            console.error('init centering failed:', e);
            map.setView([newPosition.lat, newPosition.lng], 18, { animate: false });
        }

    // ── SYNC DR ───────────────────────────────────────────────────
    if (window.deadReckoning) {
        if (typeof window.deadReckoning.start === 'function') window.deadReckoning.start();
        if (typeof window.deadReckoning.invalidateMarkerCache === 'function') window.deadReckoning.invalidateMarkerCache();

    requestAnimationFrame(function () {
        requestAnimationFrame(function () {
            if (document.body && document.body.contains(mapContainer)) {
                mapContainer.style.transition = originalTransition;
            }
        });
    });

    if (typeof updateDistanceBox === 'function') updateDistanceBox(forceUpdate);
    if (typeof updateAccuracyIndicator === 'function') updateAccuracyIndicator(newPosition.accuracy);

function updateDistanceBox(forceUpdate = false, precalcUserPos = null, precalcClosestLocation = null, precalcClosestDistance = Infinity) {
    const distanceBox = cachedElements.distanceBox || document.getElementById('distanceBox');
    if (!distanceBox) return;
    if (document.hidden) return;

    if (!userMarker || !gameLocations || gameLocations.length === 0) {
        distanceBox.textContent = 'Initializing...';
        resetDistanceBoxStyling(distanceBox);
        return;
    }

    let closestDistance;
    let closestLocation;
    let userPos;

    if (precalcUserPos && precalcClosestLocation && isFinite(precalcClosestDistance)) {
        userPos = precalcUserPos;
        closestDistance = precalcClosestDistance;
        closestLocation = precalcClosestLocation;
    } else {
        const latestPos = window.lastPosition;
        const userLatLng = latestPos
            ? { lat: latestPos.lat, lng: latestPos.lng }
            : (userMarker ? userMarker.getLatLng() : null);

        if (!userLatLng || !isFinite(userLatLng.lat) || !isFinite(userLatLng.lng)) {
            distanceBox.textContent = 'Initializing...';
            resetDistanceBoxStyling(distanceBox);
            return;
        }

        let userLat = userLatLng.lat;
        let userLng = userLatLng.lng;

        if (userLat === 0 && userLng === 0) {
            const center = map.getCenter();
            userLat = center.lat;
            userLng = center.lng;
        }

        closestDistance = Infinity;
        closestLocation = null;
        userPos = { lat: userLat, lng: userLng };

        for (const location of gameLocations) {
            if (!location || typeof location.lat !== 'number' || typeof location.lng !== 'number') {
                continue;
            }
            const locationPos = { lat: location.lat, lng: location.lng };
            const distance = calculateDistance(userPos, locationPos);
            if (isFinite(distance) && distance < closestDistance) {
                closestDistance = distance;
                closestLocation = location;
            }
        }

        if (!isFinite(closestDistance) || closestDistance === Infinity || !closestLocation) {
            distanceBox.textContent = 'Initializing...';
            resetDistanceBoxStyling(distanceBox);
            return;
        }
    }

    window.lastClosestDistance = closestDistance;
    window.lastClosestLocation = closestLocation;

    const currentTime = performance.now();
    if (typeof handleProximityAndAutoOpen === 'function') {
        handleProximityAndAutoOpen(userPos, currentTime, closestLocation, closestDistance);
    }

    const distanceFeet = Math.round(closestDistance * 3.28084);

    const PROXIMITY_THRESHOLD = (typeof CONFIG !== 'undefined' && CONFIG.DISTANCE_THRESHOLD)
        ? CONFIG.DISTANCE_THRESHOLD
        : 20;
    const isArrived = distanceFeet <= PROXIMITY_THRESHOLD;

    let cooldownStatus = null;
    let isOnCooldown = false;
    if (isArrived && closestLocation?.id && window.cooldownManager) {
        cooldownStatus = window.cooldownManager.checkCooldown(closestLocation.id);
        isOnCooldown = !!cooldownStatus?.isOnCooldown;
    }

    function _stopCountdown() {
        if (window._countdownRafId) {
            cancelAnimationFrame(window._countdownRafId);
            window._countdownRafId = null;
        }
        if (window._countdownNextFrame) {
            clearTimeout(window._countdownNextFrame);
            window._countdownNextFrame = null;
        }
        window.distanceBoxCountdownInterval = null;

        if (window._countdownVisibilityHandler) {
            document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            window._countdownVisibilityHandler = null;
        }
    }

    if (window.distanceBoxCountdownInterval && !isArrived) {
        _stopCountdown();

        if (window._cooldownExpiryTimeout) {
            clearTimeout(window._cooldownExpiryTimeout);
            window._cooldownExpiryTimeout = null;
            window._cooldownExpiryLocationId = null;
        }
        if (window.cooldownManager) {
            window.cooldownManager.clearToast?.();
        }
    }

    if (isArrived) {
        if (isOnCooldown && cooldownStatus?.remainingSeconds !== undefined) {
            if (!window.distanceBoxCountdownInterval) {

                let lastDisplayedText = null;

                const scheduleNext = () => {
                    if (!window.distanceBoxCountdownInterval) return;
                    window._countdownNextFrame = setTimeout(() => {
                        window._countdownNextFrame = null;
                        if (!window.distanceBoxCountdownInterval) return;
                        window._countdownRafId = requestAnimationFrame(tick);
                    }, 1000);
                };

                const tick = () => {
                    window._countdownRafId = null;

                    if (document.hidden) {
                        scheduleNext();
                        return;
                    }

                    const currentClosest = window.lastClosestLocation;
                    if (!currentClosest?.id || !window.cooldownManager) {
                        _stopCountdown();
                        return;
                    }

                    const status = window.cooldownManager.checkCooldown(currentClosest.id);

                    if (!status?.isOnCooldown) {
                        const arrivedText = 'Arrived.';
                        if (lastDisplayedText !== arrivedText) {
                            distanceBox.textContent = arrivedText;
                            applyArrivedStyling(distanceBox);
                            lastDisplayedText = arrivedText;
                        }
                        window.currentlyArrived = true;

                        if (typeof handleProximityAndAutoOpen === 'function') {
                            const currentUserLatLng = userMarker?.getLatLng();
                            const currentUserPos = currentUserLatLng
                                ? { lat: currentUserLatLng.lat, lng: currentUserLatLng.lng }
                                : userPos;
                            handleProximityAndAutoOpen(currentUserPos, performance.now(), currentClosest, window.lastClosestDistance ?? closestDistance);
                        }

                        _stopCountdown();

                        if (window._cooldownExpiryTimeout) {
                            clearTimeout(window._cooldownExpiryTimeout);
                            window._cooldownExpiryTimeout = null;
                            window._cooldownExpiryLocationId = null;
                        }
                        return;
                    }

                    const mins = Math.floor(status.remainingSeconds / 60);
                    const secs = status.remainingSeconds % 60;
                    const newText = `Available in ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                    if (newText !== lastDisplayedText) {
                        distanceBox.textContent = newText;
                        applyArrivedStyling(distanceBox);
                        lastDisplayedText = newText;
                    }

                    scheduleNext();
                };

                window.distanceBoxCountdownInterval = true;
                tick();

                const resumeOnVisible = () => {
                    if (!document.hidden && window.distanceBoxCountdownInterval) {
                        if (!window._countdownNextFrame && !window._countdownRafId) {
                            window._countdownRafId = requestAnimationFrame(tick);
                        }
                    }
                };
                if (window._countdownVisibilityHandler) {
                    document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
                }
                window._countdownVisibilityHandler = resumeOnVisible;
                document.addEventListener('visibilitychange', resumeOnVisible);

                if (cooldownStatus.remainingMs > 0) {
                    if (window._cooldownExpiryTimeout) {
                        clearTimeout(window._cooldownExpiryTimeout);
                    }
                    window._cooldownExpiryLocationId = closestLocation.id;
                    window._cooldownExpiryTimeout = setTimeout(() => {
                        window._cooldownExpiryTimeout = null;
                        const locId = window._cooldownExpiryLocationId;
                        window._cooldownExpiryLocationId = null;

                        const currentUserLatLng = userMarker?.getLatLng();
                        const loc = gameLocations?.find(l => l?.id === locId);
                        if (currentUserLatLng && loc) {
                            const dist = calculateDistance(
                                { lat: currentUserLatLng.lat, lng: currentUserLatLng.lng },
                                { lat: loc.lat, lng: loc.lng }
                            );
                            if ((dist * 3.28084) <= PROXIMITY_THRESHOLD &&
                                typeof window._openLocationPage === 'function') {
                                window._openLocationPage(loc);
                            }
                        }
                    }, cooldownStatus.remainingMs + 200);
                }
            }

        } else {
            if (window.distanceBoxCountdownInterval) {
                _stopCountdown();
            }
            if (window._cooldownExpiryTimeout) {
                clearTimeout(window._cooldownExpiryTimeout);
                window._cooldownExpiryTimeout = null;
                window._cooldownExpiryLocationId = null;
            }

            distanceBox.textContent = 'Arrived.';
            applyArrivedStyling(distanceBox);
        }

    } else {
        const distanceText = distanceFeet < 5280
            ? `${distanceFeet.toLocaleString()} feet`
            : `${(distanceFeet / 5280).toFixed(2)} miles`;
        distanceBox.textContent = `Closest Stop: ${distanceText}`;
        applyDefaultStyling(distanceBox);

        if (window._countdownVisibilityHandler) {
            document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            window._countdownVisibilityHandler = null;
        }
        if (window._countdownNextFrame) {
            clearTimeout(window._countdownNextFrame);
            window._countdownNextFrame = null;
        }
    }

    window.currentlyArrived = isArrived && !isOnCooldown;
}

function calculateDistance(pos1OrLat, pos2OrLng, lat2, lng2) {
    // ── Flat coordinate signature: calculateDistance(lat1, lng1, lat2, lng2) ──
    // Inlined to avoid allocating two temporary objects per call.
    if (typeof lat2 === 'number' && typeof lng2 === 'number') {
        if (typeof pos1OrLat !== 'number' || typeof pos2OrLng !== 'number' ||
            isNaN(pos1OrLat) || isNaN(pos2OrLng) || isNaN(lat2) || isNaN(lng2)) {
            return Infinity;
        }

        // Identical-position shortcut — skips all trig
        if (pos1OrLat === lat2 && pos2OrLng === lng2) return 0;

        const toRad  = Math.PI / 180;
        const lat1r  = pos1OrLat * toRad;
        const lat2r  = lat2 * toRad;
        const dLat   = (lat2 - pos1OrLat) * toRad;
        const dLng   = (lng2 - pos2OrLng) * toRad;

        const sinDLat = Math.sin(dLat * 0.5);
        const sinDLng = Math.sin(dLng * 0.5);

        let a = sinDLat * sinDLat +
                Math.cos(lat1r) * Math.cos(lat2r) * sinDLng * sinDLng;

        // Clamp to [0,1] — prevents NaN when floating-point rounding
        // pushes a slightly above 1 for very close positions
        if (a > 1) a = 1;

        return 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ── Object signature: calculateDistance({lat, lng}, {lat, lng}) ──
    const pos1 = pos1OrLat;
    const pos2 = pos2OrLng;

    if (!pos1 || !pos2 ||
        typeof pos1.lat !== 'number' || typeof pos1.lng !== 'number' ||
        typeof pos2.lat !== 'number' || typeof pos2.lng !== 'number' ||
        isNaN(pos1.lat) || isNaN(pos1.lng) || isNaN(pos2.lat) || isNaN(pos2.lng)) {
        return Infinity;
    }

    // Identical-position shortcut
    if (pos1.lat === pos2.lat && pos1.lng === pos2.lng) return 0;

    const toRad  = Math.PI / 180;
    const lat1r  = pos1.lat * toRad;
    const lat2r  = pos2.lat * toRad;
    const dLat   = (pos2.lat - pos1.lat) * toRad;
    const dLng   = (pos2.lng - pos1.lng) * toRad;

    const sinDLat = Math.sin(dLat * 0.5);
    const sinDLng = Math.sin(dLng * 0.5);

    let a = sinDLat * sinDLat +
            Math.cos(lat1r) * Math.cos(lat2r) * sinDLng * sinDLng;

    // Clamp to [0,1]
    if (a > 1) a = 1;

    return 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getGeolocationOptions(speedMPS = 0) {
    const isStationary = speedMPS < 0.5;
    const isWalking = speedMPS >= 0.5 && speedMPS < 3;
    const isMoving = speedMPS >= 3;
    
    return {
        enableHighAccuracy: true,
        timeout: isMoving ? 10000 : isWalking ? 15000 : 30000,
        maximumAge: isMoving ? 1000 : isWalking ? 3000 : 15000
    };
}

function handleLocationError(error) {
    console.warn("Error getting user location:", error);

    // Early exit for Permission Denied (Code 1).
    // Browsers remember a "Deny" click. Retrying is completely futile and
    // just wastes 3 timeout cycles before finally showing the user the
    // "Please allow access" message. Show it immediately instead.
    if (error?.code === 1) {
        retryCount = 0;
        hideLoadingMessage();
        showPopup("Location Error", "Please allow access to your location to use this feature.");
        if (typeof onLocationFailure === 'function') {
            onLocationFailure(error);
        }
        return;
    }

    // Retry on recoverable errors (including iOS 17's code 0), up to MAX_RETRIES
    if (retryCount < CONFIG.MAX_RETRIES) {
        retryCount++;
        
        // Exponential backoff instead of linear.
        // 1s, 2s, 4s. Capped at 10 seconds. Much kinder to the battery/CPU
        // than hammering the GPS chip with rapid retries.
        const backoffMs = Math.min(10000, CONFIG.RETRY_DELAY * Math.pow(2, retryCount - 1));
        
        console.log(`Retrying to get location (Attempt ${retryCount} of ${CONFIG.MAX_RETRIES} in ${backoffMs}ms)`);

        setTimeout(() => {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("Location retrieved successfully after retry");
                    hideLoadingMessage();
                    updateUserLocation(position, true);
                    retryCount = 0;
                },
                handleLocationError,

                getGeolocationOptions(0) 
            );
        }, backoffMs);
        return;
    }

    // Max retries reached
    retryCount = 0;
    hideLoadingMessage();

    let errorMessage = "An error occurred while getting your location.";
    if (error?.code !== undefined) {
        switch (error.code) {
            case 1:
                errorMessage = "Please allow access to your location to use this feature.";
                break;
            case 2:
                errorMessage = "Your location is currently unavailable. Please try again later.";
                break;
            case 3:
                errorMessage = "Getting your location took too long. Please try again.";
                break;
            case 0:
                // iOS 17 Safari sometimes returns non-standard code 0
                errorMessage = "Unable to determine your location. Please check your device settings and try again.";
                break;
        }
    }

    showPopup("Location Error", errorMessage);
    if (typeof onLocationFailure === 'function') {
        onLocationFailure(error);
    }
}

/* ---------- 2-MINUTE LOCATION COOLDOWN ---------- */
const COOLDOWN_PERIOD_MS = 2 * 60 * 1000;
const STORAGE_KEY = 'locationCooldowns';
const DEBOUNCE_TIME_MS = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 500 : 300;
const CLEANUP_INTERVAL_MS = 60 * 1000;
const MAP_RESET_CHECK_INTERVAL_MS = 5000;
const EXIT_DELAY_MS = 500;

class LocationCooldownManager {
  constructor() {
    this.cooldowns = this.loadFromStorage();
    this.currentLocationId = null;
    this.lastActionTime = 0;
    this.resetCooldownIds = new Set();
    this.wasOverSpeedThreshold = false;
    this._monitoringLocationId = null;
    this._announcedLocations = new Set();
    this._closeFuncPoll = null;
    this._saveTimeout = null;
    
    this._proximityCache = {};
    this._locationCoordCache = {};
    this._lastProximityResult = false;
    this._MAX_PROXIMITY_CACHE_SIZE = 50;
    
    this._sessionPrefs = this._loadSessionPrefs();
    this._prefsChecked = new Set();

    this.cleanupInterval = null;
    this.mapResetInterval = null;
    this.toastInterval = null;
    this.activeToast = null;

    this.cleanupExpiredCooldowns();
    this.startPeriodicCleanup();
    this.startMapResetMonitoring();
    this.patchCloseFunctions();
    this.patchCreateBottomActionBar();
  }

  _loadSessionPrefs() {
    try {
      const raw = sessionStorage.getItem('cooldownSessionPrefs');
      if (!raw) return { hideCooldownUI: false };
      const parsed = JSON.parse(raw);
      return { hideCooldownUI: !!parsed.hideCooldownUI };
    } catch (e) {
      console.warn('Failed to load session prefs:', e);
      return { hideCooldownUI: false };
    }
  }

  _saveSessionPrefs() {
    try {
      sessionStorage.setItem('cooldownSessionPrefs', JSON.stringify(this._sessionPrefs));
    } catch (e) {
      console.error('Failed to save session prefs:', e);
    }
  }

  clearSessionPrefs() {
    sessionStorage.removeItem('cooldownSessionPrefs');
    this._sessionPrefs = { hideCooldownUI: false };
    this._prefsChecked.clear();
  }

  checkCooldown(locationId) {
    if (locationId == null) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const id = String(locationId);
    const startTime = this.cooldowns[id];

    if (!startTime) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const elapsed = Date.now() - startTime;

    if (!isFinite(elapsed) || elapsed < 0) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    if (elapsed >= COOLDOWN_PERIOD_MS) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const remainingMs = COOLDOWN_PERIOD_MS - elapsed;
    return {
      isOnCooldown: true,
      remainingMs: Math.max(0, remainingMs),
      remainingSeconds: Math.max(0, Math.ceil(remainingMs / 1000)),
    };
  }

  _clearCooldownState(id) {
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  enterLocation(locationId) {
    if (locationId == null) {
      return { success: false, reason: 'invalid_id', message: 'Invalid location ID' };
    }
    const id = String(locationId);
    const now = Date.now();
    if (now - this.lastActionTime < DEBOUNCE_TIME_MS) {
      return { success: false, reason: 'debounced', message: 'Action too rapid' };
    }
    this.lastActionTime = now;
    if (this.currentLocationId === id) {
      return { success: false, reason: 'already_inside', message: 'Already in this location' };
    }
    const status = this.checkCooldown(id);
    if (status.isOnCooldown) {
      return {
        success: false,
        reason: 'on_cooldown',
        message: 'This location cannot be revisited for two minutes',
        remainingMs: status.remainingMs,
        remainingSeconds: status.remainingSeconds,
        locationId: id,
      };
    }
    this.currentLocationId = id;
    this.resetCooldownIds.delete(id);
    return { success: true, reason: 'allowed', message: 'Location entry allowed' };
  }

  leaveLocation(locationId = null) {
    const id = locationId ? String(locationId) : this.currentLocationId;
    if (!id || id === 'null' || id === 'undefined') return;

    const wasCurrentLocation = this.currentLocationId === id;
    if (this.currentLocationId === id) this.currentLocationId = null;

    if (!wasCurrentLocation) return;

    if (this.cooldowns[id]) {
        const status = this.checkCooldown(id);
        if (status.isOnCooldown) return;
    }

    this.cooldowns[id] = Date.now();
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  startMapResetMonitoring() {
    this.mapResetInterval = setInterval(() => {
      this.checkAndResetMap();
    }, MAP_RESET_CHECK_INTERVAL_MS);

  checkAndResetMap() {
    const now = Date.now();
    let shouldReset = false;
    let resetReason = null;

    if (typeof window.currentSpeed === 'number' && window.currentSpeed > 6) {
      if (!this.wasOverSpeedThreshold) {
        shouldReset = true;
        resetReason = 'speed_threshold';
        this.wasOverSpeedThreshold = true;
      }
    } else {
      this.wasOverSpeedThreshold = false;
    }

    if (!shouldReset) {
      const cooldownIds = Object.keys(this.cooldowns);
      if (cooldownIds.length > 0) {
        for (const id of cooldownIds) {
          if (this.resetCooldownIds.has(id)) continue;

          const status = this.checkCooldown(id);
          if (!status.isOnCooldown && this.isWithinThreshold(id)) {
            shouldReset = true;
            resetReason = 'cooldown_expired';
            this.resetCooldownIds.add(id);
            break;
          }
        }
      }
    }

    if (shouldReset) {
      console.log(`Map reset triggered: ${resetReason}`);
      this.resetMapToUser();
    }
  }

  resetMapToUser() {

          const userPos = window.userMarker.getLatLng();
          if (userPos && window.map.setView) {
            window.map.flyTo(userPos, window.map.getZoom?.() || 16, {
              animate: true,
              duration: 1.0,

      } catch (e) {

  formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;

  _setProximityCache(cacheKey, result) {
    if (Object.keys(this._proximityCache).length >= this._MAX_PROXIMITY_CACHE_SIZE) {
      let oldestKey = null;
      let oldestTime = Infinity;
      for (const key in this._proximityCache) {
        if (this._proximityCache[key].timestamp < oldestTime) {
          oldestTime = this._proximityCache[key].timestamp;
          oldestKey = key;
        }
      }
      if (oldestKey) delete this._proximityCache[oldestKey];
    }
    this._proximityCache[cacheKey] = { result, timestamp: Date.now() };
  }

  isWithinThreshold(locationId, _skipCache = false) {
    const now = Date.now();
    const cacheKey = String(locationId);

    if (!_skipCache && this._proximityCache[cacheKey]) {
      const cached = this._proximityCache[cacheKey];
      if (now - cached.timestamp < 500) {
        return cached.result;
      }
    }

    try {
      let lat, lng;

      if (this._locationCoordCache[cacheKey]) {
        lat = this._locationCoordCache[cacheKey].lat;
        lng = this._locationCoordCache[cacheKey].lng;
      } else {
        let location = null;
        const sources = [window.gameLocations, window.locations];
        for (const source of sources) {
          if (Array.isArray(source)) {
            location = source.find(loc => loc?.id === locationId);
            if (location) break;
          }
        }
        if (!location && window.locationsMap && typeof window.locationsMap === 'object') {
          location = Object.values(window.locationsMap).find(loc => loc?.id === locationId);
        }

        if (!location) {
          this._setProximityCache(cacheKey, false);
          return false;
        }

        lat = parseFloat(location.lat);
        lng = parseFloat(location.lng);

        if (isFinite(lat) && isFinite(lng)) {
          this._locationCoordCache[cacheKey] = { lat, lng };
        }
      }

      if (!isFinite(lat) || !isFinite(lng)) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      if (typeof calculateDistance !== 'function' || !window.userMarker) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      const userPos = window.userMarker.getLatLng();
      if (!userPos || !isFinite(userPos.lat) || !isFinite(userPos.lng)) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      // ── CalculateDistance returns meters, convert to feet before comparing ──
      const distanceMeters = calculateDistance(userPos.lat, userPos.lng, lat, lng);
      if (!isFinite(distanceMeters) || distanceMeters < 0) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      const distanceFeet = distanceMeters * 3.28084;

      const threshold = (typeof CONFIG?.DISTANCE_THRESHOLD === 'number')
        ? CONFIG.DISTANCE_THRESHOLD
        : 20;

      const result = distanceFeet <= threshold;
      this._setProximityCache(cacheKey, result);
      return result;
    } catch (e) {
      console.error('Error in isWithinThreshold:', e);
      this._setProximityCache(cacheKey, false);
      return false;
    }
  }

  notifyUserWithCountdown(locationId, remainingSeconds) {
    if (this._monitoringLocationId === locationId) {
        return;
    }

    this.clearToastInterval();
    this._monitoringLocationId = locationId;

    if (this._sessionPrefs.hideCooldownUI) {
        this._prefsChecked.add(locationId);
    }

    const updateCheck = () => {
        if (this._monitoringLocationId !== locationId) {
            this.clearToastInterval();
            return;
        }

        const status = this.checkCooldown(locationId);

        if (!status.isOnCooldown) {
            const isNearby = this.isWithinThreshold(locationId, true);
            this._handleCooldownExpired(locationId, isNearby);
            return;
        }
    };

    updateCheck();
    this.toastInterval = setInterval(updateCheck, 1000);
  }

  _handleCooldownExpired(locationId, isNearby) {
    this.clearToastInterval();
    this._monitoringLocationId = null;
    this._prefsChecked.delete(locationId);

    if (isNearby) {
        const location = window.gameLocations?.find(loc => loc?.id === locationId) ||
                         window.locations?.find(loc => loc?.id === locationId) ||
                         Object.values(window.locationsMap || {}).find(loc => loc?.id === locationId);

        if (location && typeof window._openLocationPage === 'function') {

  loadFromStorage() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (!data) return {};
      const parsed = JSON.parse(data);
      return typeof parsed === 'object' && parsed !== null ? parsed : {};
    } catch (e) {
      console.warn('Failed to load cooldowns:', e);
      return {};
    }
  }

  saveToStorage() {

    this._saveTimeout = setTimeout(() => {
      this._saveTimeout = null;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(this.cooldowns));
      } catch (e) {
        console.error('Failed to save cooldowns:', e);
      }
    }, 0);
  }

  cleanupExpiredCooldowns() {
    const now = Date.now();
    for (const id of [...Object.keys(this.cooldowns)]) {
      const startTime = this.cooldowns[id];
      if (!startTime) continue;
      
      const elapsed = now - startTime;
      if (!isFinite(elapsed) || elapsed < 0 || elapsed >= COOLDOWN_PERIOD_MS) {
        this._clearCooldownState(id);
      }

  }

  startPeriodicCleanup() {
    this.cleanupInterval = setInterval(() => {
      this.cleanupExpiredCooldowns();
    }, CLEANUP_INTERVAL_MS);
  }

  patchCloseFunctions() {
    const names = ['closeLocationHunt', 'closeLocation', 'hideLocationHunt', 'exitLocation'];

    for (const name of names) {
      if (window[name] && !window[name].__patched) {
        this.patchCloseFunction(name);
      }
    }

    const manager = this;
    let attempts = 0;
    this._closeFuncPoll = setInterval(() => {
      let allPatched = true;
      for (const name of names) {
        if (window[name] && !window[name].__patched) {
          manager.patchCloseFunction(name);
        }
        if (!window[name] || !window[name].__patched) {
          allPatched = false;
        }
      }
      if (allPatched || ++attempts >= 20) {
        clearInterval(manager._closeFuncPoll);
        manager._closeFuncPoll = null;
      }
    }, 500);
  }

  patchCloseFunction(funcName) {
    const original = window[funcName];
    const manager = this;
    window[funcName] = function(locationId) {
      if (manager.currentLocationId) manager.leaveLocation(manager.currentLocationId);
      else if (locationId) manager.leaveLocation(locationId);
      return original.call(this, locationId);
    };
    window[funcName].__patched = true;
    window[funcName].__original = original;
  }

  patchCreateBottomActionBar() {
    if (!window.createBottomActionBar || window.createBottomActionBar.__patched) return;
    const original = window.createBottomActionBar;
    const manager = this;
    window.createBottomActionBar = function(location) {
      const bar = original.call(this, location);
      if (bar && location?.id) {
        const originalOnClick = bar.onclick;
        bar.onclick = function(e) {
          manager.leaveLocation(location.id);
          return originalOnClick?.call(this, e);
        };
      }
      return bar;
    };
    window.createBottomActionBar.__patched = true;
    window.createBottomActionBar.__original = original;
  }

  destroy() {
    this._destroyed = true;
    
    if (this.cleanupInterval) clearInterval(this.cleanupInterval);
    if (this.mapResetInterval) clearInterval(this.mapResetInterval);
    if (this._closeFuncPoll) { clearInterval(this._closeFuncPoll); this._closeFuncPoll = null; }
    if (this._saveTimeout) { clearTimeout(this._saveTimeout); this._saveTimeout = null; }
    
    this.clearToast();
    
    const patchedNames = ['closeLocationHunt', 'closeLocation', 'hideLocationHunt', 'exitLocation', 'createBottomActionBar'];
    for (const name of patchedNames) {
      const fn = window[name];
      if (fn?.__patched && fn.__original) {
        window[name] = fn.__original;
        delete fn.__original;
        delete fn.__patched;
      }
    }
    
    this.currentLocationId = null;
    this.resetCooldownIds.clear();
    this._monitoringLocationId = null;
    this._announcedLocations.clear();
    this._prefsChecked.clear();

    // ── Null the global reference so external code knows it's gone ──
    window.cooldownManager = null;
  }

  resetSessionPreferences() { this.clearSessionPrefs(); }
  isUIHiddenByPreference() { return this._sessionPrefs.hideCooldownUI; }
  getRemainingTime(locationId) { return this.checkCooldown(locationId).remainingSeconds; }
  
  getAllCooldowns() {
    const out = {};
    for (const id of Object.keys(this.cooldowns)) {
      const rem = this.getRemainingTime(id);
      if (rem > 0) out[id] = rem;
    }
    return out;
  }
  
  clearCooldown(locationId) {
    if (locationId == null) return;
    const id = String(locationId);
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }
  
  clearAllCooldowns() {
    this.cooldowns = {};
    this.resetCooldownIds.clear();
    this._announcedLocations.clear();
    this._prefsChecked.clear();
    this.saveToStorage();
  }
