        } else if (rawPos && rawPos.timestamp != null) {
            originLat  = rawPos.lat;
            originLng  = rawPos.lng;
            originTime = rawPos.timestamp;
        } else {
            originLat  = lastPos.lat;
            originLng  = lastPos.lng;
            originTime = window.lastUpdateTimestamp || now;
        }

        // ── Heading change rate (for prediction horizon) ─────────────────────
        const heading = _getHeading();
        if (_lastHeadingDeg != null && heading != null) {
            let delta = heading - _lastHeadingDeg;
            if (delta >  180) delta -= 360;
            if (delta < -180) delta += 360;
            const dtSec = Math.max(dtMs, 16) / 1000;
            const instantRate = Math.abs(delta) / dtSec;
            _headingChangeRate = _headingChangeRate * 0.85 + instantRate * 0.15;
        }
        if (heading != null) _lastHeadingDeg = heading;

        // ── Velocity cache ───────────────────────────────────────────────────
        const vel = _getVelocity();
        const velMag = Math.sqrt(vel.lat * vel.lat + vel.lng * vel.lng);
        if (velMag > 0.001) {
            _lastGoodVelocity = { lat: vel.lat, lng: vel.lng };
            _lastGoodSpeedMPS = speedMPS;
        }

        // ── Dead-reckoning prediction ────────────────────────────────────────
        const rawAgeSec    = Math.max(0, (now - originTime) / 1000);
        const horizon      = _getPredictHorizon(speedMPS, _headingChangeRate);
        const predictDtSec = Math.min(rawAgeSec, horizon);

        let predictedLat, predictedLng;
        if (predictDtSec <= 0 || speedMPS < CFG.LOW_SPEED_CUTOFF_MPS) {
            predictedLat = originLat;
            predictedLng = originLng;
        } else {
            predictedLat = originLat + vel.lat * predictDtSec;
            predictedLng = originLng + vel.lng * predictDtSec;
        }

        // Safety clamp: reject implausibly large jumps.
        const jumpLatM = Math.abs(predictedLat - originLat) * 111111;
        const jumpLngM = Math.abs(predictedLng - originLng) * 111111 *
                         Math.cos(originLat * Math.PI / 180);
        if (jumpLatM > 150 || jumpLngM > 150) {
            predictedLat = originLat;
            predictedLng = originLng;
        }

        _lastPredictedPos = { lat: predictedLat, lng: predictedLng };

        // ── Always keep the marker at the predicted position ─────────────────
        // In centered mode this is mostly for hit-testing / popup anchoring;
        // the icon appears centred because the viewport follows it instantly.
        _setMarkerPosition(predictedLat, predictedLng);

        // ── Mode-specific map movement ───────────────────────────────────────
        if (centered) {
            /*
             * Centered mode: snap the viewport to the predicted position with
             * zero animation. The user icon is always screen-center; the world
             * scrolls under it. No rubber band possible because there is no
             * animation to interrupt.
             */
            if (map && !window._isProximityZoomAnimating) {
                _snapViewportToPosition(predictedLat, predictedLng);
            }
        } else {
            /*
             * Free mode: original animated-panTo behaviour. Only pan when the
             * icon has drifted more than a threshold in screen pixels.
             */
            if (map && !window._isProximityZoomAnimating) {
                const currentCenter = map.getCenter();
                const targetPx = map.latLngToContainerPoint([predictedLat, predictedLng]);
                const centerPx = map.latLngToContainerPoint(currentCenter);
                const driftPx  = Math.hypot(targetPx.x - centerPx.x, targetPx.y - centerPx.y);
                const threshold = _getDriftThresholdPx(speedMPS);

                if (driftPx > threshold) {
                    _queueFreePan(predictedLat, predictedLng, _getPanDuration(speedMPS));
                }
            }
        }

        _rafId = requestAnimationFrame(frame);
    }

    // ── Loop lifecycle ───────────────────────────────────────────────────────

    function _restartIfMoving() {
        if (_active) return;
        if (window.isLocationHuntVisible) return;

        const speedMPS = _getSpeedMPS();
        const centered = _isCenteredMode();

        if (!centered && speedMPS < CFG.MIN_SPEED_MPS) return;
        if (!centered && window.isStationary && speedMPS < 0.8) return;

        if (speedMPS >= CFG.MIN_SPEED_MPS) {
            _seedVelocityOnResume();
        }

        _active        = true;
        _lastFrameTime = _now();
        _interactionEndTime = 0;
        _rafId = requestAnimationFrame(frame);
    }

    // ── Public API (backwards-compatible) ───────────────────────────────────

    window.deadReckoning = {
        stop() {
            if (_rafId != null) {
                cancelAnimationFrame(_rafId);
                _rafId = null;
            }
            _active           = false;
            _panTicking       = false;
            _pendingPanTarget = null;
            _lastCenteredLat  = null;
            _lastCenteredLng  = null;

            const el = _getMarkerEl();
            if (el) {
                el.style.willChange = '';
                el.style.transition = '';
                _markerTransitionSet = false;
            }
        },

        start() {
            _restartIfMoving();
        },

        isActive() {
            return _active;
        },

        onMovementResumed: _restartIfMoving,

        forceUpdate() {
            /*
             * Called by external code when the map interaction ends or a new
             * GPS fix arrives. In centered mode we also reset the deadband so
             * the next frame unconditionally re-locks the viewport.
             */
            _interactionEndTime = _now() + CFG.INTERACTION_FADE_MS;
            _lastCenteredLat    = null;
            _lastCenteredLng    = null;

            // If the loop stalled (e.g. user was stationary in free mode),
            // restart it so the viewport re-centers immediately.
            if (!_active) _restartIfMoving();
        },

        getPredictedPosition() {
            return _lastPredictedPos;
        },

        invalidateMarkerCache() {
            _invalidateMarkerCache();
        }
    };

    _restartIfMoving();

    if (typeof memoryManager !== 'undefined' && memoryManager?.registerCleanupTask) {
        memoryManager.registerCleanupTask(() => {
            window.deadReckoning.stop();
        });
    }
})();
        
/* ──────────────────────────────────────────────
   ZOOM CONTROLLER
   Manages map zoom authority using a priority system.
   ────────────────────────────────────────────── */
(function() {
  const DEFAULT_ZOOM = 17;
  const DEFAULT_LOCK_DURATION_MS = 2000;

  class ZoomController {
    constructor(options = {}) {
      this.config = {
        defaultZoom: options.defaultZoom || DEFAULT_ZOOM,
        lockDurationMs: options.lockDurationMs || DEFAULT_LOCK_DURATION_MS,
        animationOptions: options.animationOptions || {}
      };
      
      // ── ZERO-GC OPTIMIZATION ──
      // Replaced array queue with a Map. Provides O(1) lookups,
      // prevents duplicate sources from spamming the queue, and
      // eliminates array allocations (reduce/filter) on every tick.
      this._requests = new Map();
      
      this._activeSource = null;
      this._activePriority = 0;
      this._activeLevel = this.config.defaultZoom;
      this._activeLockExpiry = 0;
    }

    /**
     * Request zoom authority.
     */
    request(source, level, priority = 1, durationMs) {
      this._requests.set(source, {
        level,
        priority,
        timestamp: Date.now(),
        durationMs: durationMs || this.config.lockDurationMs
      });
      
      this._updateState();
    }

    /**
     * Release zoom authority for a source.
     */
    release(source) {
      if (this._requests.has(source)) {
        this._requests.delete(source);
        
        // If the active source is releasing, immediately clear lock
        // so the next in line doesn't have to wait for expiry.
        if (this._activeSource === source) {
          this._activeSource = null;
          this._activePriority = 0;
          this._activeLockExpiry = 0;
        }
        
        this._updateState();
      }
    }

    /**
     * Force re-application of the current active zoom level.
     */
    applyPendingZoom() {
      if (this._activeSource) {
        this._applyZoom(this._activeLevel);
      }
    }

    /**
     * Returns a snapshot of the current state (backward compatible).
     */
    getState() {
      return {
        source: this._activeSource,
        priority: this._activePriority,
        level: this._activeLevel,
        lockedUntil: this._activeLockExpiry
      };
    }

    /**
     * Halt everything and reset to default.
     */
    stop() {
      this._requests.clear();
      this._activeSource = null;
      this._activePriority = 0;
      this._activeLevel = this.config.defaultZoom;
      this._activeLockExpiry = 0;
    }

    /**
     * Core logic: Evaluates the map of requests and applies the winner.
     * Runs in O(N) where N is the number of unique sources (usually < 3).
     */
    _updateState() {
      const now = Date.now();

      // 1. If our current lock expired, clear the active state
      if (this._activeSource && now >= this._activeLockExpiry) {
        this._activeSource = null;
        this._activePriority = 0;
      }

      // 2. Find the highest priority request currently available
      let topRequest = null;
      let topSource = null;

      for (const [source, req] of this._requests.entries()) {
        // Auto-cleanup: discard requests older than 10 seconds 
        // if the source crashed/forgot to release
        if (now - req.timestamp > 10000) {
          this._requests.delete(source);
          continue;
        }

        if (!topRequest || req.priority > topRequest.priority) {
          topRequest = req;
          topSource = source;
        }
      }

      // 3. Decide whether to apply the new state
      if (!topRequest) return; // No requests left

      const shouldApply = 
        !this._activeSource ||                              
        topSource !== this._activeSource ||                 
        topRequest.priority > this._activePriority ||      
        topRequest.level !== this._activeLevel;             

      if (shouldApply) {
        this._activeSource = topSource;
        this._activePriority = topRequest.priority;
        this._activeLevel = topRequest.level;
        this._activeLockExpiry = now + topRequest.durationMs;
        
        this._applyZoom(this._activeLevel);
      }
    }

    /**
     * Executes the zoom on the Leaflet map.
     */
    _applyZoom(level) {
      if (!window.map) return;
      try { 
        window.map.setZoom(level, { 
          noMoveStart: true, 
          ...this.config.animationOptions 
        }); 
      }
      catch (error) { 
        console.error('ZoomController: apply failed:', error); 
      }
    }
  }

  if (typeof window !== 'undefined') window.zoomController = new ZoomController();
})();

function announceToScreenReader(message, priority = 'polite') {
    const element = priority === 'polite' ?
        cachedElements.proximityAnnouncements :
        cachedElements.accessibilityAnnouncements;
    if (element && message !== accessibilityState.lastAnnouncement) {
        element.textContent = message;
        accessibilityState.lastAnnouncement = message;
        setTimeout(() => {
            if (element.textContent === message) {
                element.textContent = '';
                accessibilityState.lastAnnouncement = '';
            }
        }, 1000);
    }
}

/* ──────────────────────────────────────────────
   TRACKED TIMEOUTS
   ────────────────────────────────────────────── */
const trackedTimeouts = new Set();

function createTrackedTimeout(callback, delay) {
    let id;
    const wrappedCallback = () => { trackedTimeouts.delete(id); callback(); };
    id = setTimeout(wrappedCallback, delay);
    trackedTimeouts.add(id);
    return id;
}

function clearAllTrackedTimeouts() {
    trackedTimeouts.forEach(clearTimeout);
    trackedTimeouts.clear();
}

function isValidPosition(pos) {
    return pos && typeof pos.lat === 'number' && typeof pos.lng === 'number' && !isNaN(pos.lat) && !isNaN(pos.lng);
}

/* ──────────────────────────────────────────────
   MAP INITIALIZATION
   ────────────────────────────────────────────── */
function initMap() {
    // ── Guard: full Leaflet teardown if re-initializing ──
    if (typeof disposeMapLoop === 'function') disposeMapLoop();
    if (map) {
        try { map.remove(); } catch (e) { console.warn('[Map] Remove failed:', e.message); }
        map = null;
    }
    if (markerClusterGroup) {
        try { markerClusterGroup.clearLayers(); } catch (e) {}
        markerClusterGroup = null;
    }

    // ── Storage cleanup ──
    ['lastKnownPos', 'routeHistory'].forEach(k => {
        try { localStorage.removeItem(k); sessionStorage.removeItem(k); } catch (_) {}
    });

    // ── Map creation ──
    map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        zoomSnap: 0.1,
        zoomDelta: 0.5,
        wheelDebounceTime: 100,
        tapTolerance: 15,
        bounceAtZoomLimits: false,
        renderer: L.canvas(),
        fadeAnimation: false,
        zoomAnimationThreshold: 4,
        markerZoomAnimation: false
    }).setView([46.392410, -94.636230], 9);

    // ── Tile layer with required OSM attribution ──
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        minZoom: 7,
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
        updateWhenIdle: true,
        updateWhenZooming: false,
        keepBuffer: 2,
        className: 'map-tiles'
    }).addTo(map);

    // ── Marker cluster ──
    markerClusterGroup = L.markerClusterGroup({
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        spiderfyOnMaxZoom: true,
        animate: false,
        chunkedLoading: true,
        chunkProgress: updateLoadingStatus,
        maxClusterRadius: z => z > 16 ? 40 : 80,
        iconCreateFunction: c => L.divIcon({
            html: `<div><span>${c.getChildCount()}</span></div>`,
            className: 'marker-cluster-custom',
            iconSize: [40, 40]
        })
    }).addTo(map);

    // ── User marker ──
    userMarker = L.marker([0, 0], {
        icon: L.divIcon({
            className: 'user-marker',
            html: '<div class="user-marker-icon"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        }),
        zIndexOffset: 1000
    }).addTo(map);

    showLoadingMessage();

    // ── Geolocation with escalated fallback ──
    if ('geolocation' in navigator) {
        const opts = { enableHighAccuracy: true, timeout: 45000, maximumAge: 5000 };
        
        const onFirstError = (err) => {
            // iOS often denies first prompt due to timing; retry with relaxed constraints
            const isTimeout = err?.code === 3;
            const retryOpts = isTimeout
                ? { enableHighAccuracy: true, timeout: 60000, maximumAge: 10000 }
                : opts;
            
            navigator.geolocation.getCurrentPosition(
                initializeUserLocation,
                handleLocationError,
                retryOpts
            );
        };

        navigator.geolocation.getCurrentPosition(
            initializeUserLocation,
            onFirstError,
            opts
        );
    } else {
        showPopup('Geolocation Error', 'Geolocation is not supported');
        map.setView([44.9778, -93.2650], 17, { animate: false });
        hideLoadingMessage();
    }
}

/* ──────────────────────────────────────────────
   PWA INSTALL BANNER
   ────────────────────────────────────────────── */
let deferredPrompt;
let pwaInstallBanner, closePwaBanner, cancelPwaBanner, installPwaButton;

function getDeviceType() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
    if (/android/i.test(ua)) return 'android';
    return 'desktop';
}

function isRunningAsPWA() {
    if (window.matchMedia('(display-mode: standalone)').matches) return true;
    if (window.navigator.standalone === true) return true;
    if (document.referrer.includes('android-app://')) return true;
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('utm_source') === 'pwa' || urlParams.get('source') === 'pwa') return true;
    return false;
}

function canInstallPWA() {
    const deviceType = getDeviceType();
    if (deviceType === 'android') return 'beforeinstallprompt' in window || /Chrome/.test(navigator.userAgent);
    if (deviceType === 'ios') {
        const isIOS13OrLater = /OS 1[3-9]_|OS [2-9][0-9]_/.test(navigator.userAgent);
        const isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/.test(navigator.userAgent);
        return isIOS13OrLater && isSafari;
    }
    if (deviceType === 'desktop') return 'beforeinstallprompt' in window;
    return false;
}

async function isAppInstalled() {
    if (isRunningAsPWA()) return true;

    // getInstalledRelatedApps API (limited support)
    if ('getInstalledRelatedApps' in navigator) {
        try {
            const relatedApps = await navigator.getInstalledRelatedApps();
            if (relatedApps.length > 0) return true;
        } catch (_) {}
    }

    // iOS: check localStorage flag from previous standalone session
    if (getDeviceType() === 'ios' && localStorage.getItem('pwa-ios-installed') === 'true') {
        return true;
    }

    // NOTE: Do NOT check service worker scope here. Having a SW is a
    // prerequisite for PWA, not evidence of installation. The old check
    // matched every visitor after their first page load, preventing the
    // banner from ever showing.
    return false;
}

function updateBannerContent() {
    if (!pwaInstallBanner) return;

    const deviceType = getDeviceType();
    const titleEl = pwaInstallBanner.querySelector('h3');
    const instructionsEl = pwaInstallBanner.querySelector('.banner-content p');

    if (titleEl) titleEl.textContent = 'Install App';

    if (instructionsEl) {
        if (deviceType === 'ios') {
            instructionsEl.innerHTML = 'Tap the Share button <span aria-hidden="true">⬆️</span> then "Add to Home Screen"';
        } else if (deferredPrompt) {
            instructionsEl.textContent = deviceType === 'desktop'
                ? 'Click "Install" to add this app to your desktop'
                : 'Tap "Install" to add this app to your home screen';
        } else {
            instructionsEl.textContent = 'Use your browser menu to "Add to Home Screen"';
        }
    }

    // Show/hide install button — native prompt only on Android/desktop
    if (installPwaButton) {
        const canShowButton = deviceType !== 'ios' && !!deferredPrompt;
        installPwaButton.style.display = canShowButton ? '' : 'none';
    }
}

async function initPWABanner() {
    if (await isAppInstalled()) return;
    if (!canInstallPWA()) return;

    const deviceType = getDeviceType();

    // Android/desktop: wait for the native prompt event
    if ((deviceType === 'android' || deviceType === 'desktop') && !deferredPrompt) return;

    // iOS: delay prompt until second visit
    if (deviceType === 'ios') {
        const visits = parseInt(localStorage.getItem('pwaVisitCount') || '0', 10);
        localStorage.setItem('pwaVisitCount', String(visits + 1));
        if (visits < 1) return;
    }

    pwaInstallBanner = document.getElementById('pwaInstallBanner');
    closePwaBanner = document.getElementById('closePwaBanner');
    cancelPwaBanner = document.getElementById('cancelPwaBanner');
    installPwaButton = document.getElementById('installPwaButton');

    if (!pwaInstallBanner) return;

    const dismissBanner = () => {
        pwaInstallBanner.classList.remove('show');
        try { sessionStorage.setItem('pwaBannerDismissed', 'true'); } catch (_) {}
    };

    const hideBanner = () => {
        pwaInstallBanner.classList.remove('show');
    };

    if (closePwaBanner) closePwaBanner.addEventListener('click', dismissBanner);
    if (cancelPwaBanner) cancelPwaBanner.addEventListener('click', dismissBanner);

    updateBannerContent();

    createTrackedTimeout(() => {
        try { if (sessionStorage.getItem('pwaBannerDismissed') === 'true') return; } catch (_) {}
        pwaInstallBanner.classList.add('show');
    }, 2000);

    if (installPwaButton) {
        installPwaButton.addEventListener('click', async () => {
            if (deviceType === 'android' || deviceType === 'desktop') {
                if (!deferredPrompt) {
                    alert('Please use your browser menu to "Add to Home Screen" or "Install App"');
                    hideBanner();
                    return;
                }

                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;

                if (outcome === 'accepted') {
                    try {
                        sessionStorage.setItem('appJustInstalled', 'true');
                        localStorage.setItem('pwa-installed', 'true');
                        sessionStorage.setItem('pwaBannerDismissed', 'true');
                    } catch (_) {}

                    const notice = document.getElementById('pwaPostInstallNotice');
                    if (notice) {
                        notice.setAttribute('aria-hidden', 'false');
                        notice.classList.add('show');
                        const dismissBtn = document.getElementById('dismissPostInstall');
                        const hideNotice = () => {
                            notice.classList.remove('show');
                            notice.setAttribute('aria-hidden', 'true');
                        };
                        if (dismissBtn) dismissBtn.onclick = hideNotice;
                        createTrackedTimeout(hideNotice, 12000);
                    }
                } else {
                    try { sessionStorage.setItem('pwaBannerDismissed', 'true'); } catch (_) {}
                }

                deferredPrompt = null;
                hideBanner();

            } else if (deviceType === 'ios') {
                installPwaButton.style.display = 'none';
                const instructionsEl = pwaInstallBanner.querySelector('.banner-content p');
                if (instructionsEl) {
                    instructionsEl.innerHTML = 'Tap the Share button <span aria-hidden="true">⬆️</span> at the bottom of your screen, then select "Add to Home Screen"';
                    instructionsEl.classList.add('pwa-ios-instructions');
                }
                createTrackedTimeout(hideBanner, 6000);
            }
        });
    }
}

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (pwaInstallBanner) updateBannerContent();
});

window.addEventListener('appinstalled', () => {
    try {
        localStorage.setItem('pwa-installed', 'true');
        sessionStorage.setItem('appJustInstalled', 'true');
    } catch (_) {}
    if (pwaInstallBanner?.classList.contains('show')) {
        pwaInstallBanner.classList.remove('show');
    }
});

// iOS: flag when running in standalone mode
if (getDeviceType() === 'ios') {
    if (window.navigator.standalone) {
        try { localStorage.setItem('pwa-ios-installed', 'true'); } catch (_) {}
    }
    document.addEventListener('visibilitychange', () => {
        if (window.navigator.standalone) {
            try { localStorage.setItem('pwa-ios-installed', 'true'); } catch (_) {}
        }
    });
}

document.addEventListener('DOMContentLoaded', async function() {
    try {
        if (sessionStorage.getItem('appJustInstalled') === 'true') return;
        if (sessionStorage.getItem('pwaBannerDismissed') === 'true') return;
    } catch (_) {}

    if (await isAppInstalled()) return;
    await initPWABanner();
});

/* ──────────────────────────────────────────────
   LOADING MESSAGE — CSS-driven styles
   ────────────────────────────────────────────── */
let _loadingProgressInterval;

function showLoadingMessage() {
    if (document.getElementById('loadingMessage')) return;

    loadingMessageMinDisplayTime = Date.now() + 6000;

    const loadingMessage = document.createElement('div');
    loadingMessage.id = 'loadingMessage';

    const card = document.createElement('div');
    card.className = 'loading-card';

    const logo = document.createElement('img');
    logo.className = 'loading-logo';
    logo.src = 'https://mnthen.com/images/logo.webp';
    logo.alt = 'Minnesota Then Logo';

    const title = document.createElement('h1');
    title.className = 'loading-title';
    title.textContent = 'The Museum Without Walls';

    const subtitle = document.createElement('h2');
    subtitle.className = 'loading-subtitle';
    subtitle.textContent = 'Where Every Step Tells a Story';

    const statusContainer = document.createElement('div');
    statusContainer.className = 'loading-status';
    const statusText = document.createElement('p');
    statusText.id = 'loadingStatusText';
    statusText.textContent = 'Location found, proceeding to stabilization...';
    statusContainer.appendChild(statusText);

    const progressTrack = document.createElement('div');
    progressTrack.className = 'loading-progress-track';
    const progressBar = document.createElement('div');
    progressBar.className = 'loading-progress-bar';
    progressBar.id = 'loadingProgressBar';
    progressTrack.appendChild(progressBar);

    const noteContainer = document.createElement('div');
    noteContainer.className = 'loading-note';
    const noteText = document.createElement('p');
    noteText.textContent = 'Preparing your experience.';
    noteContainer.appendChild(noteText);

    card.appendChild(logo);
    card.appendChild(title);
    card.appendChild(subtitle);
    card.appendChild(statusContainer);
    card.appendChild(progressTrack);
    card.appendChild(noteContainer);
    loadingMessage.appendChild(card);
    document.body.appendChild(loadingMessage);

    // Progress animation
    const totalDuration = 6000;
    const updateMs = 100;
    const steps = totalDuration / updateMs;
    let progress = 0;

    const animations = [
    "Loading the map...",                     // Leaflet is initializing tiles
    "Finding your location...",               // navigator.geolocation is pinging
    "Connecting to GPS satellites...",         // Waiting for high-accuracy fix
    "Looking for nearby history...",           // Proximity math is running
    "Almost ready..."                         // Final DOM renders
];

    _loadingProgressInterval = setInterval(() => {
        progress += (100 / steps);
        if (progressBar) progressBar.style.width = `${Math.min(progress, 100)}%`;
        if (statusText) {
            const idx = Math.min(Math.floor(progress / (100 / animations.length)), animations.length - 1);
            statusText.textContent = animations[idx];
        }
        if (progress >= 100) {
            clearInterval(_loadingProgressInterval);
            _loadingProgressInterval = null;
            tryHideLoadingMessage();
        }
    }, updateMs);

    // Register cleanup so interval doesn't survive page unload
    if (memoryManager?.registerCleanupTask) {
        memoryManager.registerCleanupTask(() => {
            if (_loadingProgressInterval) {
                clearInterval(_loadingProgressInterval);
                _loadingProgressInterval = null;
            }
        });
    }
}

function tryHideLoadingMessage() {
    if (Date.now() >= loadingMessageMinDisplayTime) {
        fadeOutLoadingMessage();
    } else {
        const timeRemaining = loadingMessageMinDisplayTime - Date.now();
        createTrackedTimeout(fadeOutLoadingMessage, timeRemaining);
    }
}

function fadeOutLoadingMessage() {
    const loadingMessage = document.getElementById('loadingMessage');
    if (!loadingMessage) return;

    if (_loadingProgressInterval) {
        clearInterval(_loadingProgressInterval);
        _loadingProgressInterval = null;
    }

    const progressBar = document.getElementById('loadingProgressBar');
    if (progressBar) progressBar.style.width = '100%';

    const distanceBox = cachedElements.distanceBox || document.getElementById('distanceBox');
    if (distanceBox) distanceBox.classList.add('show');

    loadingMessage.style.opacity = '0';
    createTrackedTimeout(() => { loadingMessage.remove(); }, 500);
}

function hideLoadingMessage() {
    tryHideLoadingMessage();
}

/* ──────────────────────────────────────────────
   ACCURACY INDICATOR — CSS-driven
   ────────────────────────────────────────────── */
function updateAccuracyIndicator(accuracy) {
    const indicator = document.getElementById('accuracyIndicator');
    if (!indicator) return;

    indicator.classList.remove('accuracy-high', 'accuracy-medium', 'accuracy-low');
    if (accuracy < 20) indicator.classList.add('accuracy-high');
    else if (accuracy < 50) indicator.classList.add('accuracy-medium');
    else indicator.classList.add('accuracy-low');
}

/* ──────────────────────────────────────────────
   USER LOCATION INITIALIZATION
   ────────────────────────────────────────────── */
function initializeUserLocation(position) {
    if (!position?.coords) {
        handleLocationError(new Error('Invalid initial position'));
        return;
    }

    const { latitude: lat, longitude: lng, accuracy, heading, speed } = position.coords;

    if (isNaN(lat) || isNaN(lng)) {
        handleLocationError(new Error('Invalid initial coordinates'));
        return;
    }

    if (Math.abs(lat) > 90 || Math.abs(lng) > 180) {
        handleLocationError(new Error('Coordinates out of valid range'));
        return;
    }

    // Already initialized — just update the marker
    if (window._initializationComplete) {
        if (userMarker) userMarker.setLatLng([lat, lng]);
        if (map) map.panTo([lat, lng], { animate: false });
        return;
    }

    // Guard against concurrent initialization
    if (window._initializationInProgress) {
        window._pendingInitPosition = position;
        return;
    }
    window._initializationInProgress = true;

    // Announce accuracy
    if (typeof announceToScreenReader === 'function') {
        if (accuracy > 100) {
            announceToScreenReader(`Location acquired with ${accuracy.toFixed(0)} meter accuracy. Map loading.`);
        } else {
            announceToScreenReader('Location acquired. Map ready for navigation.');
        }
    }

    try {
        // Retry if userMarker isn't ready yet
        if (!userMarker) {
            window._markerRetryCount = (window._markerRetryCount || 0) + 1;

            if (window._markerRetryCount <= 3) {
                window._initializationInProgress = false;
                createTrackedTimeout(() => {
                    const latestPosition = window._pendingInitPosition || position;
                    window._pendingInitPosition = null;
                    initializeUserLocation(latestPosition);
                }, 100 * window._markerRetryCount);
                return;
            }

            // Exhausted retries
            window._initializationInProgress = false;
            window._markerRetryCount = 0;
            handleLocationError(new Error('Map marker initialization failed'));
            return;
        }

        window._markerRetryCount = 0;
        userMarker.setLatLng([lat, lng]);

        if (!map) throw new Error('Map not initialized');

        const initialZoom = 17;
        map.setView([lat, lng], initialZoom, { animate: false });

        // Seed the position buffer for smoothing — one entry only
        // so the Kalman filter gets a clean baseline without a
        // false zero-velocity prior from multiple identical copies.
        if (typeof seedPositionBuffer === 'function') {
            seedPositionBuffer({
                lat, lng, accuracy,
                timestamp: position.timestamp || Date.now(),
                heading: heading ?? null,
                speedMPS: speed || 0
            });
        }

        // ── Pre-seed Kalman filter with initial velocity ──
        // The Kalman filter initializes with zero velocity (x[2]=x[3]=0)
        // and high variance (v0=225.0), meaning it treats the first 1-2
        // seconds of movement as noise until it converges. If the GPS
        // already reports speed/heading, seed it directly so the icon
        // tracks movement immediately instead of lagging behind.
        if (window.sensorFusion && window.sensorFusion._kalmanFilter) {
            const kf = window.sensorFusion._kalmanFilter;
            if (speed > 0.3 && heading != null && isFinite(heading)) {
                const rad = heading * Math.PI / 180;
                kf.seedVelocity(
                    speed * Math.cos(rad),
                    speed * Math.sin(rad),
                    10.0   // Low variance = "trust this prior"
                );
            } else if (speed > 0.3) {
                // Speed available but no heading — seed with high variance
                // so the filter learns direction from the first updates
                kf.seedVelocity(0, 0, 50.0);
            }
            // If speed <= 0.3 m/s, user is likely stationary — zero-velocity
            // initialization is correct, do nothing.
        }

        if (typeof hideLoadingMessage === 'function') hideLoadingMessage();

        // Start the hunt
        if (typeof startHunt === 'function' && !window._huntStarted) {
            window._huntStarted = true;
            startHunt();
        }

        // Start idle proximity check
        if (typeof startIdleProximityCheck === 'function' && !window._proximityCheckStarted) {
            window._proximityCheckStarted = true;
            startIdleProximityCheck();
        }

        window._initializationComplete = true;
        window._initializationInProgress = false;
        window._lastSuccessfulInit = Date.now();
        window._initRecoveryAttempts = 0;

        // Start the GPS watch synchronously — no deferral.
        // The 6-second splash screen already provided GPS warm-up time,
        // so we start directly with tight options instead of the
        // fast-start swap that adds an unnecessary watch restart gap.
        const watchId = startPositionUpdates();
        if (watchId === null) {
            createTrackedTimeout(() => {
                if (!window.positionWatchId) startPositionUpdates();
            }, 3000);
        }

        // Apply any position that arrived while we were initializing
        if (window._pendingInitPosition) {
            const pending = window._pendingInitPosition;
            window._pendingInitPosition = null;
            const pLat = pending?.coords?.latitude;
            const pLng = pending?.coords?.longitude;
            if (userMarker && pLat != null && pLng != null && !isNaN(pLat) && !isNaN(pLng)) {
                userMarker.setLatLng([pLat, pLng]);
            }
        }

    } catch (err) {
        console.error('Error during location initialization:', err);
        window._initializationInProgress = false;

        if (!window._initializationComplete) {
            window._huntStarted = false;
            window._proximityCheckStarted = false;
        }

        handleLocationError(err);

        window._initRecoveryAttempts = (window._initRecoveryAttempts || 0) + 1;

        if (window._initRecoveryAttempts <= 3) {
            const backoffMs = Math.min(15000, Math.pow(2, window._initRecoveryAttempts) * 1000);
            createTrackedTimeout(() => {
                if (navigator.geolocation && !window._initializationComplete) {
                    navigator.geolocation.getCurrentPosition(
                        initializeUserLocation,
                        handleLocationError,
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                }
            }, backoffMs);
        } else if (typeof showPopup === 'function') {
            showPopup(
                'Location Error',
                'Unable to get your location after multiple attempts. Please check your GPS settings and refresh the page.',
                'error'
            );
        }
    }
}

/* ──────────────────────────────────────────────
   GPS POWER MODE — shared utility
   ────────────────────────────────────────────── */
function getWatchOptions() {
    const speedMPH = (window.lastPosition?.speedMPS ?? 0) * 2.23694;
    
    const stationary = window.isStationary || speedMPH < 0.3;
    const driving = speedMPH >= 5 || (!window.isStationary && speedMPH >= 4);
    
    return {
        enableHighAccuracy: true,
        maximumAge: stationary ? 5000 : driving ? 1000 : 2000,
        timeout: stationary ? 20000 : driving ? 10000 : 15000,
    };
}

/* ──────────────────────────────────────────────
   POSITION UPDATES — GPS watch + power manager
   ────────────────────────────────────────────── */
function startPositionUpdates() {
    try {
        if (window.positionWatchId != null) {
            navigator.geolocation.clearWatch(window.positionWatchId);
            window.positionWatchId = null;
        }

        const opts = getWatchOptions();
        
        // OPTIMIZATION: Use opts.maximumAge instead of 0.
        // Since initializeUserLocation just fetched a fresh position, 
        // the OS has a hot fix ready. Setting this to 0 ignores that hot fix
        // and forces a wait for the next satellite cycle.
        window.positionWatchId = navigator.geolocation.watchPosition(
            handlePositionUpdate,
            handleLocationError,
            { 
                enableHighAccuracy: true, 
                timeout: opts.timeout, 
                maximumAge: opts.maximumAge // <--- CHANGED FROM 0
            }
        );

        if (!window._positionUpdatesListenersSetup) {
            window._positionUpdatesListenersSetup = true;

            const onlineHandler = () => {
                if (window.onlineRestartTimeout) clearTimeout(window.onlineRestartTimeout);
                window.onlineRestartTimeout = createTrackedTimeout(() => {
                    if (window.positionWatchId == null) {
                        const restartOpts = getWatchOptions();
                        window.positionWatchId = navigator.geolocation.watchPosition(
                            handlePositionUpdate,
                            handleLocationError,
                            { 
                                enableHighAccuracy: true, 
                                timeout: restartOpts.timeout, 
                                maximumAge: restartOpts.maximumAge 
                            }
                        );
                    }
                    window.onlineRestartTimeout = null;
                }, 500);
            };

            const offlineHandler = () => {
                if (window.onlineRestartTimeout) {
                    clearTimeout(window.onlineRestartTimeout);
                    window.onlineRestartTimeout = null;
                }
            };

            window.addEventListener('online', onlineHandler);
            window.addEventListener('offline', offlineHandler);

            // Safety check for memory manager (in case it loads late)
            if (typeof memoryManager?.trackEventListener === 'function') {
                memoryManager.trackEventListener(window, 'online', onlineHandler);
                memoryManager.trackEventListener(window, 'offline', offlineHandler);
            }
        }

        return window.positionWatchId;

    } catch (err) {
        console.error('Geolocation unavailable:', err);
        handleLocationError({ code: 0, message: 'Geolocation unavailable' });
        return null;
    }
}
        
/* ──────────────────────────────────────────────
   POSITION UPDATE HANDLER
   ────────────────────────────────────────────── */
function handlePositionUpdate(position) {
    if (!position?.coords ||
        isNaN(position.coords.latitude) ||
        isNaN(position.coords.longitude)) {
        return;
    }

    const positionTimestamp = position.timestamp || Date.now();
    const currentTime = Date.now();

    // Discard stale fixes (> 30 seconds old)
    if (currentTime - positionTimestamp > 30_000) return;

    // Background throttle: one fix per 30s when tab is hidden
    if (document.hidden) {
        if (!window._lastBackgroundUpdate || currentTime - window._lastBackgroundUpdate > 30_000) {
            window._lastBackgroundUpdate = currentTime;
        } else {
            return;
        }
    }

    const rawLat = position.coords.latitude;
    const rawLng = position.coords.longitude;
    const rawAccuracy = position.coords.accuracy || 20;
    const rawSpeedMPS = position.coords.speed || 0;
    const rawHeading = position.coords.heading ?? null;

    let fusedLat = rawLat;
    let fusedLng = rawLng;
    let fusedHeading = rawHeading;
    let isMoving = rawSpeedMPS > 0.5;

    if (window.sensorFusion) {
        // Pre-boost Kalman velocity variance if the device
        // just started moving from a stationary state. Without this,
        // smoothPosition() processes the fix with low velocity variance
        // (from the stationary period), causing the filter to resist
        // tracking the new movement for an entire GPS cycle (~1s).
        if (window.isStationary && window.sensorFusion.isDeviceMoving(rawSpeedMPS)) {
            const kf = window.sensorFusion._kalmanFilter;
            if (kf && kf.P && kf.x) {
                kf.P[2][2] = 225;
                kf.P[3][3] = 225;
                kf.P[0][2] = 0; kf.P[2][0] = 0;
                kf.P[1][3] = 0; kf.P[3][1] = 0;
            }
        }

        const smoothed = window.sensorFusion.smoothPosition(
            rawLat, rawLng, rawAccuracy, positionTimestamp,
            rawSpeedMPS, rawSpeedMPS >= 0.5 ? rawHeading : null
        );
        fusedLat = smoothed.lat;
        fusedLng = smoothed.lng;
        fusedHeading = window.sensorFusion.getHeading(rawHeading, rawSpeedMPS);
        isMoving = window.sensorFusion.isDeviceMoving(rawSpeedMPS);
    }

    window.lastPositionAccuracy = rawAccuracy;
    window.lastValidPosition = {
        lat: fusedLat,
        lng: fusedLng,
        timestamp: positionTimestamp,
        accuracy: rawAccuracy,
        speedMPS: rawSpeedMPS,
        heading: fusedHeading,
        isMoving
    };

    if (window.lastUpdateTime) {
        window.timeSinceLastUpdate = currentTime - window.lastUpdateTime;
    }
    window.lastUpdateTime = currentTime;

    const enhancedPosition = {
        timestamp: positionTimestamp,
        coords: {
            latitude: fusedLat,
            longitude: fusedLng,
            accuracy: rawAccuracy,
            altitude: position.coords.altitude,
            altitudeAccuracy: position.coords.altitudeAccuracy,
            heading: fusedHeading,
            speed: rawSpeedMPS
        }
    };

    // Force update at high speed so map keeps up
    const forceUpdate = rawSpeedMPS > 10;
    updateUserLocation(enhancedPosition, forceUpdate);
}
        
/* ──────────────────────────────────────────────
   VISIBILITY CHANGE HANDLER
   ────────────────────────────────────────────── */
function handleVisibilityChange() {
    if (document.hidden) {
        // Tab/app going to background
        window.lastHiddenTime = Date.now();
        lastKnownPosition = userMarker?.getLatLng() ?? null;
        resetInactivityTimer(false);

        disposeMapLoop();
        window.isReWaking = false;

        if (window.visibilityDebounceTimer) {
            clearTimeout(window.visibilityDebounceTimer);
            window.visibilityDebounceTimer = null;
        }
    } else {
        // Tab/app returning to foreground
        const awayMs = Date.now() - (window.lastHiddenTime || 0);
        const threshold = CONFIG?.BACKGROUND_THRESHOLD ?? 30_000;

        // Cancel any pending debounce
        if (window.visibilityDebounceTimer) {
            clearTimeout(window.visibilityDebounceTimer);
            window.visibilityDebounceTimer = null;
        }

        if (awayMs > threshold) {
            // Debounce to handle rapid tab switches
            window.visibilityDebounceTimer = createTrackedTimeout(() => {
                window.visibilityDebounceTimer = null;

                // Recalculate time away to ensure freshness
                const currentAwayMs = Date.now() - (window.lastHiddenTime || 0);
                if (currentAwayMs <= threshold) return;

                if (window.isReWaking) return;

                window.isReWaking = true;

                Promise.resolve(updateLocationAfterBackground())
                    .catch((error) => {
                        console.error("Background location update failed:", error);
                    })
                    .finally(() => {
                        createTrackedTimeout(() => { window.isReWaking = false; }, 2000);
                    });
            }, 500);
        } else {
            // Short absence → immediate refresh
            if (map && lastKnownPosition) {
                map.invalidateSize({ pan: false });
                userMarker?.setLatLng(lastKnownPosition);
            }
        }
        resetInactivityTimer(true);
    }
}

/* ──────────────────────────────────────────────
   BACKGROUND LOCATION UPDATE
   ────────────────────────────────────────────── */
let geolocationRequestPending = false;
let warmupWatchId = null;
let _backgroundUpdateTimeout = null;

function updateLocationAfterBackground() {
    window.lastHiddenTime = window.lastHiddenTime || Date.now();

    // Don't refresh if we recently got a background update
    const timeSinceLastBg = Date.now() - (window._lastBackgroundUpdate || 0);
    if (timeSinceLastBg < 30_000 && window.lastPosition) {
        if (map) {
            map.invalidateSize({ pan: false });
            userMarker?.setLatLng([window.lastPosition.lat, window.lastPosition.lng]);
        }
        return;
    }

    if (window._isLocationUpdateInProgress) return;

    if (!("geolocation" in navigator)) return;

    window._isLocationUpdateInProgress = true;

    // Only dispose map loop if away longer than 30s
    const awayMs = Date.now() - (window.lastHiddenTime || 0);
    if (awayMs > 30000) {
        disposeMapLoop();
    }

    // Reset stale speed averages after long background absence
    if (awayMs > 10000) {
        window._modeSpeedEMA = undefined;
        window._visualSpeedEMA = undefined;
        window._proxSpeedEMA = null;
        if (window.sensorFusion && window.sensorFusion._kalmanFilter) {
            window.sensorFusion._kalmanFilter.reset();
        }
    }

    // Clean up any existing watch
    if (warmupWatchId !== null) {
        navigator.geolocation.clearWatch(warmupWatchId);
        warmupWatchId = null;
    }

    // Clear any existing timeout
    if (_backgroundUpdateTimeout) {
        clearTimeout(_backgroundUpdateTimeout);
        _backgroundUpdateTimeout = null;
    }

    geolocationRequestPending = true;
    const startTime = Date.now();
    const MAX_DURATION = 30000;

    const cleanup = () => {
        geolocationRequestPending = false;
        if (warmupWatchId !== null) {
            navigator.geolocation.clearWatch(warmupWatchId);
            warmupWatchId = null;
        }
        if (_backgroundUpdateTimeout) {
            clearTimeout(_backgroundUpdateTimeout);
            _backgroundUpdateTimeout = null;
        }
        window._isLocationUpdateInProgress = false;
    };

    // ── Retry Modal (CSS-driven) ──
    const showRetryModal = () => {
        if (document.getElementById('geolocation-retry-modal')) return;

        const overlay = document.createElement('div');
        overlay.id = 'geolocation-retry-modal';
        overlay.className = 'geo-retry-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        overlay.setAttribute('aria-label', 'Location retry');

        const card = document.createElement('div');
        card.className = 'geo-retry-card';

        const title = document.createElement('div');
        title.className = 'geo-retry-title';
        title.textContent = 'Location Needed';

        const text = document.createElement('p');
        text.className = 'geo-retry-text';
        text.innerHTML = 'We\'re still locating your device.<br>Please ensure location services are enabled, and try again.';

        const retryBtn = document.createElement('button');
        retryBtn.className = 'geo-retry-btn';
        retryBtn.textContent = '↻ Try Again';
        retryBtn.addEventListener('click', () => {
            overlay.remove();
            updateLocationAfterBackground();
        });

        const closeBtn = document.createElement('button');
        closeBtn.className = 'geo-retry-cancel';
        closeBtn.textContent = 'Cancel';
        closeBtn.addEventListener('click', () => { overlay.remove(); });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.remove();
        });

        card.appendChild(title);
        card.appendChild(text);
        card.appendChild(retryBtn);
        card.appendChild(closeBtn);
        overlay.appendChild(card);
        document.body.appendChild(overlay);
    };

    const safeToShowModal = () => {
        const speedMPH = (window.lastPosition?.speedMPS || 0) * 2.23694;
        return speedMPH < 5;
    };

    // ── Handle successful position acquisition
    const onPositionSuccess = (position) => {
        const coords = position?.coords;
        if (!coords ||
            isNaN(coords.latitude) ||
            isNaN(coords.longitude) ||
            coords.accuracy == null ||
            coords.accuracy <= 0) {
            return;
        }

        if (Date.now() - position.timestamp > 30000) return;

        // Cleanup immediately on success — this clears the timeout too
        cleanup();

        window._lastBackgroundUpdate = Date.now();

        const { latitude, longitude } = coords;

        const currentCenter = map.getCenter();
        const distanceMoved = currentCenter.distanceTo([latitude, longitude]);

        if (distanceMoved < 5) {
            // Small movement — just update
            updateUserLocation(position, true);
            if (typeof updateDistanceBox === 'function') updateDistanceBox();
            if (typeof isSignificantMovement === 'function' &&
                isSignificantMovement({ lat: latitude, lng: longitude })) {
                if (typeof resetInactivityTimer === 'function') resetInactivityTimer(false);
            }
            return;
        }

        // Significant movement — full reset
        requestAnimationFrame(() => {
            try {
                const currentZoom = map.getZoom();

                window.lastPosition = null;
                if (window.positionBuffer) window.positionBuffer.length = 0;
                if (window.lastVelocity) window.lastVelocity = { lat: 0, lng: 0 };
                window.isStationary = false;
                window.stationaryStartTime = null;
                window.stationaryCount = 0;
                window.lastUpdateTime = Date.now();

                updateUserLocation(position, true);
                map.setView([latitude, longitude], currentZoom, {
                    animate: false,
                    duration: 0,
                    noMoveStart: true
                });

                if (typeof isSignificantMovement === 'function' &&
                    isSignificantMovement({ lat: latitude, lng: longitude })) {
                    if (typeof resetInactivityTimer === 'function') resetInactivityTimer(false);
                }
                if (typeof updateDistanceBox === 'function') updateDistanceBox();
            } catch (error) {
                console.error("Error applying location:", error);
            }
        });
    };

    const onPositionError = (error) => {
        console.warn("Geolocation error:", error.message, "Code:", error.code);
        // Don't cleanup here — let the timeout handle it
    };

    // Start watching for position
    warmupWatchId = navigator.geolocation.watchPosition(
        onPositionSuccess,
        onPositionError,
        {
            enableHighAccuracy: true,
            timeout: 25000,
            maximumAge: 10000
        }
    );

    // Timeout handler — tracked so it's cleaned up on page unload
    _backgroundUpdateTimeout = createTrackedTimeout(() => {
        if (geolocationRequestPending) {
            cleanup();
            if (safeToShowModal()) {
                showRetryModal();
            }
        }
    }, MAX_DURATION);
}

/* ──────────────────────────────────────────────
   POSITION BUFFER
   ────────────────────────────────────────────── */

        if (window.isGPSSearching) {
            window.isGPSSearching = false;
            if (typeof hideGPSSearchingState === 'function') hideGPSSearchingState();
        }
    } else {
        if (window._gpsTimeoutTimer) clearTimeout(window._gpsTimeoutTimer);
        window._gpsTimeoutTimer = createTrackedTimeout(function() {
            if (!window.isGPSSearching) {
                window.isGPSSearching = true;
                if (typeof showGPSSearchingState === 'function') showGPSSearchingState();
            }
        }, 30000);
        return;
    }

    var lastPos = window.lastPosition;

    // ── First fix: init path ─────────────────────────────────────────
    if (!lastPos) {
        _initializeUserLocationState(fix, fix.timestamp, forceUpdate);
        return;
    }
        
    var timeDelta = (lastPos && window.lastUpdateTime)
        ? (fix.timestamp - window.lastUpdateTime) / 1000
        : 0;

    // ── STEP 2: Handle gaps and seed velocity ────────────────────
    _handleGPSGap(fix, lastPos, timeDelta);

    // ── STEP 3: Run sensor fusion (THE SINGLE SOURCE OF TRUTH) ───
    var fusionResult = _runSensorFusion(fix, lastPos, timeDelta, forceUpdate);
    if (!fusionResult) {
        // Quality gate rejected this fix
        window.lastUpdateTime = fix.timestamp;
        return;
    }

    // ── STEP 4: Update global state from fusion result ───────────
    _publishFusionState(fusionResult, fix);

    // ── STEP 5: Compute proximity, speed tiers, look-ahead ───────
    var renderState = _buildRenderState(fusionResult, fix, lastPos, timeDelta);

    // ── STEP 6: Schedule unified render (marker + map in RAF) ────
    _scheduleUnifiedRender(renderState);

    // ── STEP 7: Update legacy state for backward compatibility ────
    window.lastPosition = {
        lat: fix.lat, lng: fix.lng,
        accuracy: fix.accuracy,
        heading: fusionResult.heading,
        timestamp: fix.timestamp,
        speedMPS: fusionResult.speedMPS
    };
    window.lastUpdateTime = fix.timestamp;
    window.lastUpdateTimestamp = fix.timestamp;

    // ── STEP 8: Dead reckoning control ────────────────────────────
    _controlDeadReckoning(fusionResult);

    // ── STEP 9: Final callbacks ───────────────────────────────────
    if (typeof updateDistanceBox === 'function') {
        updateDistanceBox(forceUpdate, window.lastPosition,
            renderState.closestLocation, renderState.closestDistance);
    }

    if (typeof _ensureWillChange === 'function') _ensureWillChange();
    if (typeof _scheduleWillChangeReset === 'function') _scheduleWillChangeReset();

/* ──────────────────────────────────────────────
   STEP 1: GPS Fix Extraction & Validation
   ────────────────────────────────────────────── */
function _extractGPSFix(position, forceUpdate) {
    var coords = (position || {}).coords;
    if (!coords || !Number.isFinite(coords.latitude) || !Number.isFinite(coords.longitude)) {
        return null;
    }

    var gpsAge = (Date.now() - (position.timestamp || 0)) / 1000;
    if (!forceUpdate && gpsAge > 4.0) return null;

    var rawHeading = coords.heading !== undefined && coords.heading !== null
        ? coords.heading
        : null;

    return {
        lat: coords.latitude,
        lng: coords.longitude,
        accuracy: coords.accuracy || 20,
        heading: rawHeading,
        speedMPS: Math.max(0, coords.speed || 0),
        timestamp: (position.timestamp && isFinite(position.timestamp))
            ? position.timestamp
            : Date.now()

/* ──────────────────────────────────────────────
   STEP 2: Gap Handling & Velocity Seeding
   ────────────────────────────────────────────── */
function _handleGPSGap(fix, lastPos, timeDelta) {
    if (!lastPos) return;

    // Small gap (10-300s): seed velocity from displacement, don't reset
    if (timeDelta > 10 && timeDelta < 300) {
        var dt = timeDelta;
        var cosLat = Math.cos(fix.lat * Math.PI / 180);
        var vNorth = ((fix.lat - lastPos.lat) / dt) * 111111;
        var vEast = ((fix.lng - lastPos.lng) / dt) * 111111 * cosLat;

        if (Math.abs(vNorth) > 0.1 || Math.abs(vEast) > 0.1) {
            window.sensorFusion._kalmanFilter.scheduleVelocitySeed(vNorth, vEast);
        }

        window.isStationary = false;
        window.stationaryStartTime = null;
        window.stationaryLockPosition = null;
        return;
    }

    // Large gap (>300s) or first fix: full reset
    if (timeDelta >= 300) {
        if (window.sensorFusion && window.sensorFusion._kalmanFilter) {
            window.sensorFusion._kalmanFilter.reset();
        }
        window.smoothedVelocity = { lat: 0, lng: 0 };
        window.isStationary = false;
        window.stationaryStartTime = null;
        window.stationaryLockPosition = null;
    }

/* ──────────────────────────────────────────────
   STEP 3: Sensor Fusion (Single Source of Truth)
   ────────────────────────────────────────────── */
function _runSensorFusion(fix, lastPos, timeDelta, forceUpdate) {
    if (!window.sensorFusion) {
        // Fallback if sensor fusion not available
        return {
            lat: fix.lat, lng: fix.lng,
            speedMPS: fix.speedMPS,
            heading: fix.heading,
            isConverged: false,
            blendFactor: 0,
            isFrozen: false,
            vNorth: 0, vEast: 0
        };
    }

    var kf = window.sensorFusion._kalmanFilter;

    // Handle large jumps (>50m or force update)
    if (lastPos && !forceUpdate) {
        var jumpDist = calculateDistance(lastPos, fix);
        var dynamicThreshold = Math.max(50, fix.speedMPS * 3, fix.accuracy * 2.5);

        if (jumpDist > dynamicThreshold) {
            // Large jump: reset Kalman and use raw position
            if (kf) kf.reset();
            window.sensorFusion.smoothPosition(fix.lat, fix.lng, fix.accuracy,
                fix.timestamp, fix.speedMPS, fix.heading);
            return {
                lat: fix.lat, lng: fix.lng,
                speedMPS: fix.speedMPS,
                heading: fix.heading,
                isConverged: false,
                blendFactor: 0,
                isFrozen: false,
                vNorth: 0, vEast: 0
            };
        }
    }

    // Normal path: run sensor fusion
    var result = window.sensorFusion.smoothPosition(
        fix.lat, fix.lng, fix.accuracy,
        fix.timestamp, fix.speedMPS, fix.heading
    );

    // Reject impossible acceleration (only when not converged yet)
    if (!result.isConverged && lastPos && timeDelta > 0 && timeDelta < 8) {
        var lastSpeed = (lastPos.speedMPS || 0);
        var accel = Math.abs(result.speedMPS - lastSpeed) / timeDelta;
        var speedMPH = result.speedMPS * 2.23694;

        if ((speedMPH < 3 && accel > 25) ||
            (speedMPH < 8 && accel > 22) ||
            (speedMPH < 15 && accel > 18) ||
            (speedMPH < 45 && accel > 15) ||
            (speedMPH < 80 && accel > 12) ||
            (speedMPH >= 80 && accel > 10)) {
            return null; // Reject this fix
        }
    }

    return result;
}

/* ──────────────────────────────────────────────
   STEP 4: Publish Fusion State Globally
   ────────────────────────────────────────────── */
function _publishFusionState(fusionResult, fix) {

    window._predictedPosition = {
        lat: fusionResult.lat,
        lng: fusionResult.lng
    };

    // Velocity: zero when frozen, otherwise from fusion
    if (fusionResult.isFrozen) {
        window.smoothedVelocity = { lat: 0, lng: 0 };
        window.isStationary = true;
        window.stationaryLockPosition = { lat: fusionResult.lat, lng: fusionResult.lng };
    } else {
        var velDegPerSec = window.sensorFusion.getSmoothedVelocityDegPerSec();
        window.smoothedVelocity = velDegPerSec;
        window.isStationary = false;
        window.stationaryLockPosition = null;
    }

    window._isKalmanConverged = fusionResult.isConverged;
    window._kalmanBlendFactor = fusionResult.blendFactor;

/* ──────────────────────────────────────────────
   STEP 5: Build Render State
   ────────────────────────────────────────────── */
function _buildRenderState(fusionResult, fix, lastPos, timeDelta) {

        position: { lat: fusionResult.lat, lng: fusionResult.lng },
        lookAhead: lookAheadPos,
        heading: heading,
        speedMPS: speedMPS,
        speedMPH: speedMPH,
        isConverged: fusionResult.isConverged,
        isFrozen: fusionResult.isFrozen,
        timestamp: fix.timestamp,
        tier: tier,
        mapState: {

            eastWestMove: eastWestMove,
            speedMPH: speedMPH,
            modeSpeedMPH: speedMPH,
            lookAheadSeconds: lookAheadSeconds,
            isInCenteredMode: isInCenteredMode,
            modeChanged: modeChanged

        closestDistance: proximity.closestDistance

/* ──────────────────────────────────────────────

/* ──────────────────────────────────────────────
   STEP 7: Dead Reckoning Control
   ────────────────────────────────────────────── */
function _controlDeadReckoning(fusionResult) {

    var shouldRun = !fusionResult.isFrozen &&
                    !window.isLocationHuntVisible &&
                    fusionResult.speedMPS >= 0.15;

    if (shouldRun && !window.deadReckoning.isActive()) {
        window.deadReckoning.start();
    } else if (!shouldRun && window.deadReckoning.isActive()) {
        window.deadReckoning.stop();
    }

/* ──────────────────────────────────────────────
   HELPER: Speed Tier Computation
   ────────────────────────────────────────────── */
function _computeSpeedTier(speedMPH, rawAccuracy) {
    var panDuration, easeLinearity, mapUpdateInterval, mapUpdateDistance,

    if (speedMPH >= 65) {

        mapUpdateDistance = 12.0; maxAccuracy = 18; minDistThreshold = 2.0; maxSpeedThreshold = 160;
    } else if (speedMPH >= 30) {
        panDuration = 0.10; easeLinearity = 0.25; mapUpdateInterval = 110;
        mapUpdateDistance = 8.0; maxAccuracy = 20; minDistThreshold = 1.2; maxSpeedThreshold = 100;
    } else if (speedMPH >= 15) {
        panDuration = 0.12; easeLinearity = 0.22; mapUpdateInterval = 150;
        mapUpdateDistance = 6.5; maxAccuracy = 20; minDistThreshold = 0.85; maxSpeedThreshold = 60;
    } else if (speedMPH >= 8) {
        panDuration = 0.25; easeLinearity = 0.18; mapUpdateInterval = 400;
        mapUpdateDistance = 4.0; maxAccuracy = 25; minDistThreshold = 0.5; maxSpeedThreshold = 15;
    } else if (speedMPH >= 3) {
        panDuration = 0.35; easeLinearity = 0.15; mapUpdateInterval = 800;
        mapUpdateDistance = 3.0; maxAccuracy = 28; minDistThreshold = 0.35; maxSpeedThreshold = 8;
    } else {
        panDuration = 0.60; easeLinearity = 0.12; mapUpdateInterval = 1000;
        mapUpdateDistance = 2.0; maxAccuracy = 32; minDistThreshold = 0.25; maxSpeedThreshold = 3;
    }

        mapUpdateDistance *= noiseScale;

        panDuration: panDuration,
        easeLinearity: easeLinearity,
        mapUpdateInterval: Math.max(33, mapUpdateInterval),

/* ──────────────────────────────────────────────

        var R = 0.015 + 0.01 * speedFactor;

        for (var i = 0; i < window.gameLocations.length; i++) {
            var loc = window.gameLocations[i];
            if (!loc || !loc.lat || loc.lat < fix.lat - R || loc.lat > fix.lat + R ||
                loc.lng < fix.lng - R || loc.lng > fix.lng + R) continue;

            var dist = calculateDistance(fix, loc);
            locationsWithDistance.push({ location: loc, distance: dist });

                closestLocation = loc;

    window._lastClosestDistance = closestDistance;
    window._lastClosestLocation = closestLocation;

        ? { closestLocation: closestLocation, distanceMeters: closestDistance }

        if (cacheFn) {

/* ──────────────────────────────────────────────
   LEGACY: _confirmStationary (kept for compatibility)

    // This function is kept for backward compatibility but does nothing
    window.isStationary = true;
    window.stationaryLockPosition = { lat: position.lat, lng: position.lng };

function _estimateApproachSpeedMPS() {
    if (!window.proximityState || !window.lastVelocity) return 0;

    const closest = window.proximityState.closestLocation;
    if (!closest || !closest.lat || !closest.lng) return 0;

    const userPos = window.lastPosition;
    if (!userPos) return 0;

    const dLat = closest.lat - userPos.lat;
    const dLng = closest.lng - userPos.lng;
    const bearingToLoc = Math.atan2(dLng * Math.cos(userPos.lat * Math.PI / 180), dLat);

    const vNorth = window.lastVelocity.lat * 111111;
    const vEast = window.lastVelocity.lng * 111111 *
                  Math.cos(userPos.lat * Math.PI / 180);
    const userBearing = Math.atan2(vEast, vNorth);

    const speed = Math.sqrt(vNorth * vNorth + vEast * vEast);
    let angleDiff = Math.abs(userBearing - bearingToLoc);
    if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;

    if (angleDiff > Math.PI / 2) return 0;
    return speed * Math.cos(angleDiff);

/* ──────────────────────────────────────────────
   Compute map center that keeps user in center 60%
   and location visible. Returns { lat, lng }.
   If location is already visible, returns userLL unchanged.
   ────────────────────────────────────────────── */
function _computeFramingCenter(userLL, locationLL, zoom) {
    if (!userLL || !locationLL) return userLL;

    // Check if location is already visible at current zoom
    const bounds = map.getBounds();
    if (bounds.contains(locationLL)) return userLL;

    // Location is off-screen. Compute minimal shift to bring it in
    // while keeping user in center 60% of viewport.
    const size = map.getSize();
    const userPx = map.project(userLL, zoom);
    const locPx = map.project(locationLL, zoom);

    // Center 60% box: ±30% from center in each dimension
    const maxOffsetX = size.x * 0.30;
    const maxOffsetY = size.y * 0.30;

    const centerPx = map.project(map.getCenter(), zoom);
    const dx = locPx.x - centerPx.x;
    const dy = locPx.y - centerPx.y;

    // How much do we need to shift center so location is at edge of 60% box?
    let shiftX = 0, shiftY = 0;

    if (Math.abs(dx) > maxOffsetX) {
        shiftX = dx > 0 ? dx - maxOffsetX : dx + maxOffsetX;
    }
    if (Math.abs(dy) > maxOffsetY) {
        shiftY = dy > 0 ? dy - maxOffsetY : dy + maxOffsetY;
    }

    // If shift is tiny, don't bother
    if (Math.abs(shiftX) < 5 && Math.abs(shiftY) < 5) return userLL;

    const newCenterPx = L.point(centerPx.x + shiftX, centerPx.y + shiftY);

            distanceBox.textContent = 'Initializing...';
            resetDistanceBoxStyling(distanceBox);
            return;
        }

        let userLat = userLatLng.lat;
        let userLng = userLatLng.lng;

        if (userLat === 0 && userLng === 0) {
            const center = map.getCenter();
            userLat = center.lat;
            userLng = center.lng;
        }

        closestDistance = Infinity;
        closestLocation = null;
        userPos = { lat: userLat, lng: userLng };

        for (const location of gameLocations) {
            if (!location || typeof location.lat !== 'number' || typeof location.lng !== 'number') {
                continue;
            }
            const locationPos = { lat: location.lat, lng: location.lng };
            const distance = calculateDistance(userPos, locationPos);
            if (isFinite(distance) && distance < closestDistance) {
                closestDistance = distance;
                closestLocation = location;
            }
        }

        if (!isFinite(closestDistance) || closestDistance === Infinity || !closestLocation) {
            distanceBox.textContent = 'Initializing...';
            resetDistanceBoxStyling(distanceBox);
            return;
        }
    }

    window.lastClosestDistance = closestDistance;
    window.lastClosestLocation = closestLocation;

    const currentTime = performance.now();
    if (typeof handleProximityAndAutoOpen === 'function') {
        handleProximityAndAutoOpen(userPos, currentTime, closestLocation, closestDistance);
    }

    const distanceFeet = Math.round(closestDistance * 3.28084);

    const PROXIMITY_THRESHOLD = (typeof CONFIG !== 'undefined' && CONFIG.DISTANCE_THRESHOLD)
        ? CONFIG.DISTANCE_THRESHOLD
        : 20;
    const isArrived = distanceFeet <= PROXIMITY_THRESHOLD;

    let cooldownStatus = null;
    let isOnCooldown = false;
    if (isArrived && closestLocation?.id && window.cooldownManager) {
        cooldownStatus = window.cooldownManager.checkCooldown(closestLocation.id);
        isOnCooldown = !!cooldownStatus?.isOnCooldown;
    }

    function _stopCountdown() {
        if (window._countdownRafId) {
            cancelAnimationFrame(window._countdownRafId);
            window._countdownRafId = null;
        }
        if (window._countdownNextFrame) {
            clearTimeout(window._countdownNextFrame);
            window._countdownNextFrame = null;
        }
        window.distanceBoxCountdownInterval = null;

        if (window._countdownVisibilityHandler) {
            document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            window._countdownVisibilityHandler = null;
        }
    }

    if (window.distanceBoxCountdownInterval && !isArrived) {
        _stopCountdown();

        if (window._cooldownExpiryTimeout) {
            clearTimeout(window._cooldownExpiryTimeout);
            window._cooldownExpiryTimeout = null;
            window._cooldownExpiryLocationId = null;
        }
        if (window.cooldownManager) {
            window.cooldownManager.clearToast?.();
        }
    }

    if (isArrived) {
        if (isOnCooldown && cooldownStatus?.remainingSeconds !== undefined) {
            if (!window.distanceBoxCountdownInterval) {

                let lastDisplayedText = null;

                const scheduleNext = () => {
                    if (!window.distanceBoxCountdownInterval) return;
                    window._countdownNextFrame = setTimeout(() => {
                        window._countdownNextFrame = null;
                        if (!window.distanceBoxCountdownInterval) return;
                        window._countdownRafId = requestAnimationFrame(tick);
                    }, 1000);
                };

                const tick = () => {
                    window._countdownRafId = null;

                    if (document.hidden) {
                        scheduleNext();
                        return;
                    }

                    const currentClosest = window.lastClosestLocation;
                    if (!currentClosest?.id || !window.cooldownManager) {
                        _stopCountdown();
                        return;
                    }

                    const status = window.cooldownManager.checkCooldown(currentClosest.id);

                    if (!status?.isOnCooldown) {
                        const arrivedText = 'Arrived.';
                        if (lastDisplayedText !== arrivedText) {
                            distanceBox.textContent = arrivedText;
                            applyArrivedStyling(distanceBox);
                            lastDisplayedText = arrivedText;
                        }
                        window.currentlyArrived = true;

                        if (typeof handleProximityAndAutoOpen === 'function') {
                            const currentUserLatLng = userMarker?.getLatLng();
                            const currentUserPos = currentUserLatLng
                                ? { lat: currentUserLatLng.lat, lng: currentUserLatLng.lng }
                                : userPos;
                            handleProximityAndAutoOpen(currentUserPos, performance.now(), currentClosest, window.lastClosestDistance ?? closestDistance);
                        }

                        _stopCountdown();

                        if (window._cooldownExpiryTimeout) {
                            clearTimeout(window._cooldownExpiryTimeout);
                            window._cooldownExpiryTimeout = null;
                            window._cooldownExpiryLocationId = null;
                        }
                        return;
                    }

                    const mins = Math.floor(status.remainingSeconds / 60);
                    const secs = status.remainingSeconds % 60;
                    const newText = `Available in ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                    if (newText !== lastDisplayedText) {
                        distanceBox.textContent = newText;
                        applyArrivedStyling(distanceBox);
                        lastDisplayedText = newText;
                    }

                    scheduleNext();
                };

                window.distanceBoxCountdownInterval = true;
                tick();

                const resumeOnVisible = () => {
                    if (!document.hidden && window.distanceBoxCountdownInterval) {
                        if (!window._countdownNextFrame && !window._countdownRafId) {
                            window._countdownRafId = requestAnimationFrame(tick);
                        }
                    }
                };
                if (window._countdownVisibilityHandler) {
                    document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
                }
                window._countdownVisibilityHandler = resumeOnVisible;
                document.addEventListener('visibilitychange', resumeOnVisible);

                if (cooldownStatus.remainingMs > 0) {
                    if (window._cooldownExpiryTimeout) {
                        clearTimeout(window._cooldownExpiryTimeout);
                    }
                    window._cooldownExpiryLocationId = closestLocation.id;
                    window._cooldownExpiryTimeout = setTimeout(() => {
                        window._cooldownExpiryTimeout = null;
                        const locId = window._cooldownExpiryLocationId;
                        window._cooldownExpiryLocationId = null;

                        const currentUserLatLng = userMarker?.getLatLng();
                        const loc = gameLocations?.find(l => l?.id === locId);
                        if (currentUserLatLng && loc) {
                            const dist = calculateDistance(
                                { lat: currentUserLatLng.lat, lng: currentUserLatLng.lng },
                                { lat: loc.lat, lng: loc.lng }
                            );
                            if ((dist * 3.28084) <= PROXIMITY_THRESHOLD &&
                                typeof window._openLocationPage === 'function') {
                                window._openLocationPage(loc);
                            }
                        }
                    }, cooldownStatus.remainingMs + 200);
                }
            }

        } else {
            if (window.distanceBoxCountdownInterval) {
                _stopCountdown();
            }
            if (window._cooldownExpiryTimeout) {
                clearTimeout(window._cooldownExpiryTimeout);
                window._cooldownExpiryTimeout = null;
                window._cooldownExpiryLocationId = null;
            }

            distanceBox.textContent = 'Arrived.';
            applyArrivedStyling(distanceBox);
        }

    } else {
        const distanceText = distanceFeet < 5280
            ? `${distanceFeet.toLocaleString()} feet`
            : `${(distanceFeet / 5280).toFixed(2)} miles`;
        distanceBox.textContent = `Closest Stop: ${distanceText}`;
        applyDefaultStyling(distanceBox);

        if (window._countdownVisibilityHandler) {
            document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            window._countdownVisibilityHandler = null;
        }
        if (window._countdownNextFrame) {
            clearTimeout(window._countdownNextFrame);
            window._countdownNextFrame = null;
        }
    }

    window.currentlyArrived = isArrived && !isOnCooldown;
}
