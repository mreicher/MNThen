<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08111F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/images/icons/icon-192x192.png">
<title>Offline — Minnesota Then</title>
<style>
  :root {
    --navy:      #08111F;
    --navy-mid:  #0D1E35;
    --accent:    #E55A00;
    --accent-hov:#CC5000;
    --white:     #FFFFFF;
    --off-white: #F7F5F0;
    --muted:     rgba(255,255,255,0.55);
    --radius:    6px;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html { font-size:100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height:100vh;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .icon-wrap {
    width:72px; height:72px;
    border-radius:50%;
    background: rgba(229,90,0,0.08);
    border: 1px solid rgba(229,90,0,0.18);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:1.5rem;
    font-size:1.4rem;
    color: var(--accent);
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.5rem, 5vw, 1.85rem);
    font-weight:700;
    margin-bottom:0.65rem;
    letter-spacing: -0.02em;
    line-height:1.2;
  }
  p {
    font-size:0.95rem;
    color: var(--muted);
    max-width:320px;
    line-height:1.75;
    margin-bottom:1.75rem;
  }
  .status {
    margin:0 0 1.5rem;
    padding:0.85rem 1.25rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    max-width:380px;
    width:100%;
    font-size:0.875rem;
    color: var(--muted);
  }
  .actions {
    display:flex;
    flex-direction:column;
    gap:0.6rem;
    width:100%;
    max-width:320px;
  }
  button {
    width:100%;
    background: var(--accent);
    color: var(--white);
    border:none;
    border-radius: var(--radius);
    padding:0.9rem 1.5rem;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    letter-spacing:0.01em;
    transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { background: var(--accent-hov); transform: translateY(-1px); }
  button:disabled {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.25);
    cursor: not-allowed;
    transform: none;
  }
  button.secondary {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
  }
  button.secondary:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.18);
    color: var(--white);
  }
  button.secondary:disabled {
    border-color: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.2);
  }
  .hint {
    margin-top:1.25rem;
    font-size:0.75rem;
    color: rgba(255,255,255,0.22);
  }
</style>
<base target="_blank">
</head>
<body>
  <div class="icon-wrap" aria-hidden="true">📡</div>
  <h1>You're Offline</h1>
  <p>Minnesota Then needs a connection to load new content. Previously visited pages are still available.</p>

  <section class="status" id="cacheStatus" role="status" aria-live="polite">
    Checking cached content…
  </section>

  <div class="actions">
    <button id="retryBtn">Try Connection Again</button>
    <button id="homeBtn" class="secondary">View Cached Home</button>
    <button id="exploreBtn" class="secondary" disabled>View Cached Map</button>
  </div>

  <p class="hint">Thanks for exploring Minnesota's history.</p>

  <script>
    (function () {
      const statusEl   = document.getElementById('cacheStatus');
      const homeBtn    = document.getElementById('homeBtn');
      const exploreBtn = document.getElementById('exploreBtn');

      if (!('caches' in window)) {
        statusEl.textContent = 'Your browser does not support offline caching.';
        homeBtn.disabled = true;
        exploreBtn.disabled = true;
        return;
      }

      // Must match sw.js cache names exactly
      const cacheNames = [
        'mnthen-v4-ios-5',
        'mnthen-runtime-v5',
        'mnthen-audio-v5',
        'mnthen-tiles-v5',
        'mnthen-shell-v5'
      ];

      let totalItems   = 0;
      let failedCaches = 0;

      function checkIfInCache(url) {
        return Promise.all(
          cacheNames.map(name =>
            caches.open(name)
                  .then(c => c.match(url))
                  .then(match => !!match)
                  .catch(() => false)
          )
        ).then(results => results.some(Boolean));
      }

      // Count all cached items
      Promise.all(
        cacheNames.map(name =>
          caches.open(name)
                .then(c => c.keys())
                .then(keys => { totalItems += keys.length; })
                .catch(() => { failedCaches++; })
        )
      ).finally(() => {
        // Check which pages are available
        Promise.all([
          checkIfInCache('/index.html'),
          checkIfInCache('/map.html')
        ]).then(([homeCached, mapCached]) => {
          if (totalItems > 0) {
            statusEl.innerHTML = '<strong>' + totalItems + '</strong> item' + (totalItems === 1 ? '' : 's') + ' cached and available offline.';
          } else {
            statusEl.textContent = 'No cached content found. Visit pages online first to cache them.';
          }

          homeBtn.disabled = !homeCached;
          exploreBtn.disabled = !mapCached;

          if (!homeCached) homeBtn.title = 'Home page not cached yet — visit it online first.';
          if (!mapCached)  exploreBtn.title = 'Map page not cached yet — visit it online first.';
        });

        if (failedCaches) {
          console.warn(failedCaches + ' cache(s) could not be opened — they may not exist yet.');
        }
      });

      // Retry button
      document.getElementById('retryBtn').addEventListener('click', () => location.reload());

      // Home button
      homeBtn.addEventListener('click', () => {
        location.replace('/index.html');
      });

      // Map button
      exploreBtn.addEventListener('click', () => {
        caches.open('mnthen-shell-v5')
              .then(c => c.match('/map.html'))
              .then(response => {
                if (response) {
                  location.replace('/map.html');
                } else {
                  alert('Map page not found in cache. Please go online and visit the map once to cache it.');
                }
              })
              .catch(err => {
                console.error('Error retrieving cached map:', err);
                alert('Something went wrong while trying to open the cached map.');
              });
      });

      // Focus primary button on load
      window.addEventListener('load', () => {
        document.getElementById('retryBtn').focus();
      });
    })();
  </script>
</body>
</html>
