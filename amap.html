    if (!mapContainer) return;
    
    window.isZooming = true;
    const originalOverflow = mapContainer.style.overflow;
    mapContainer.style.overflow = 'hidden';

    let cleanupExecuted = false;
    let zoomEndHandler = null;
    
    const cleanup = () => {
        if (cleanupExecuted) return;
        cleanupExecuted = true;
        
        if (mapContainer && mapContainer.isConnected) {
            mapContainer.style.overflow = originalOverflow;
        }
        
        window.isZooming = false;
        
        if (window.intelligentZoomTimeout) {
            clearTimeout(window.intelligentZoomTimeout);
            window.intelligentZoomTimeout = null;
        }
        
        if (zoomEndHandler) {
            window.map.off('zoomend', zoomEndHandler);
            zoomEndHandler = null;
        }
    };

    if (window.intelligentZoomTimeout) {
        clearTimeout(window.intelligentZoomTimeout);
    }

    try {
        const center = window.map.getCenter();
        if (!center) {
            cleanup();
            return;
        }
        
        window.map.flyTo(center, targetZoom, {
            duration: adjustedDuration,
            easeLinearity: 0.25

        window.intelligentZoomTimeout = setTimeout(
            cleanup,
            adjustedDuration * 1000 + 150

/* Viewport Safety */
function _enforceViewportSafety(speedMPH, currentMarkerPos) {
    const map    = window.map;
    const marker = window.userMarker;

    // Standard guards
    if (!map || !marker) return;
    if (window.isMapInteracting) return;
    if (window.followUser === false) return;

    const pos = currentMarkerPos || (marker.getLatLng ? marker.getLatLng() : null);
    if (!pos || !isFinite(pos.lat) || !isFinite(pos.lng)) return;

    // Mode determination
    const isCentered = (typeof ModeManager !== 'undefined' &&
                        typeof ModeManager.isCentered === 'function')
                        ? ModeManager.isCentered()
                        : window.followUser;

    // ── Per-mode soft corrections (edge nudging, centering, etc.)
    if (isCentered) {
        if (typeof _enforceCenteredMode === 'function') {
            _enforceCenteredMode(pos, map, marker);
        }
    } else {
        if (typeof _enforceRoamingMode === 'function') {
            _enforceRoamingMode(pos, map, marker, speedMPH);
        }
    }

    // ── EMERGENCY OFF-SCREEN RECOVERY (roaming mode only)
    // In centered mode the pan/zoom system already keeps the marker on screen
    // continuously — emergency recovery there would fight those animations.
    if (isCentered) return;

    const mapSize = map.getSize ? map.getSize() : null;
    if (!mapSize || !mapSize.x || !mapSize.y) return;

    // Recompute pixel AFTER roaming mode may have panned the map.
    // V4.0's instant pan (animate:false) completes synchronously, so
    // if it already recovered the marker, this check sees the updated
    // position and won't fire a redundant second pan.
    const pixel = map.latLngToContainerPoint ? map.latLngToContainerPoint(pos) : null;
    if (!pixel || typeof pixel.x !== 'number') return;

    // Tighter margins than original — V4.0 handles near-edge cases at 150px+,
    // so this is a last-resort safety net for when the marker is truly off screen.
    const emergencyMargin = speedMPH > 30 ? 60 : 30;

    const isOffScreen = (
        pixel.x < -emergencyMargin ||
        pixel.x > (mapSize.x + emergencyMargin) ||
        pixel.y < -emergencyMargin ||
        pixel.y > (mapSize.y + emergencyMargin)
    );

    if (!isOffScreen) {
        // Marker is back in bounds — clear the correction lock so the next genuine
        // off-screen event triggers a fresh recovery rather than waiting for a timer.
        window._viewportSafetyEnforced = false;
        clearTimeout(window._viewportSafetyResetTimer);
        window._viewportSafetyResetTimer = null;
        return;
    }

    // Prevent thrashing: skip if we corrected this frame and the animation is
    // still in flight. The lock is cleared above as soon as the marker is back
    // in bounds, so it will not block a second correction if the first one failed.
    if (window._viewportSafetyEnforced) return;

    if (window.DEBUG_PANNING) {
        console.warn(`[Viewport] Marker off-screen (${speedMPH.toFixed(1)} mph), emergency recovery`);
    }

    try {
        map.panTo([pos.lat, pos.lng], {
            animate:      true,
            duration:     0.4,
            easeLinearity: 0.25,
            noMoveStart:  false
        });

        window._viewportSafetyEnforced = true;

        // Safety-valve reset: if the marker somehow never re-enters bounds
        // (e.g. GPS jumps again mid-animation), release the lock after the
        // animation would have completed so recovery can try again.
        clearTimeout(window._viewportSafetyResetTimer);
        window._viewportSafetyResetTimer = setTimeout(() => {
            window._viewportSafetyEnforced  = false;
            window._viewportSafetyResetTimer = null;
        }, 600); // slightly longer than the 0.4 s pan animation

    } catch (error) {
        console.error('[Viewport] Emergency recovery failed, falling back:', error);
        // Last resort only
        if (map.setView) {
            map.setView([pos.lat, pos.lng], map.getZoom(), { animate: false });
        }
    }

function _enforceCenteredMode(markerPos, map, marker) {
    const mapSize = map.getSize();
    if (!mapSize || mapSize.x <= 0 || mapSize.y <= 0) return;

    const markerPixel = map.latLngToContainerPoint(markerPos);

    const distanceFromCenter = Math.hypot(
        markerPixel.x - mapSize.x / 2,
        markerPixel.y - mapSize.y / 2
    );

    // No meaningful drift — nothing to do.
    if (distanceFromCenter <= 5) return;

    const edgeMargin = mapSize.x * 0.10;
    const nearEdge = (
        markerPixel.x < edgeMargin ||
        markerPixel.x > mapSize.x - edgeMargin ||
        markerPixel.y < edgeMargin ||
        markerPixel.y > mapSize.y - edgeMargin
    );

    // Significant drift: marker is far enough off-centre that smooth animation
    // would visibly lag. Viewport-proportional threshold avoids a hard-coded
    // pixel value that breaks on small or large screens.
    const significantDrift = distanceFromCenter > Math.min(50, mapSize.x * 0.08);

    if (nearEdge || significantDrift) {
        if (window.__debugLocation) {
            console.warn('[Centered] Emergency recenter — distance:', distanceFromCenter.toFixed(1));
        }
        map.setView([markerPos.lat, markerPos.lng], map.getZoom(), {
            animate:     false,
            noMoveStart: true,
            noMoveEnd:   true
        });
        return;
    }

    // Normal drift correction: gentle animated re-centre.
    // marker.setLatLng is intentionally omitted — the marker's visual position
    // is already managed by scheduleMarkerUpdate upstream; calling it here
    // would teleport the marker and fight that animation.
    map.setView([markerPos.lat, markerPos.lng], map.getZoom(), {
        animate:      true,
        duration:     0.08,
        easeLinearity: 0.5,
        noMoveStart:  true
    });

function _enforceRoamingMode(markerPos, map, marker, speedMPH) {
    // Guards are handled by _enforceViewportSafety before this is called,
    // but defend in depth in case this function is ever invoked directly.
    if (!map || !marker) return;
    if (window.isMapInteracting) return;
    if (window.followUser === false) return;

    const mapSize = map.getSize();
    if (!mapSize || mapSize.x <= 0 || mapSize.y <= 0) return;

    const markerPixel = map.latLngToContainerPoint(markerPos);

    const isOutsideBounds = (
        markerPixel.x < 0 ||
        markerPixel.x > mapSize.x ||
        markerPixel.y < 0 ||
        markerPixel.y > mapSize.y
    );

    if (isOutsideBounds) {
        if (window.__debugLocation) {
            console.warn('[Roaming] Emergency: marker escaped viewport');
        }
        // Set the lock BEFORE calling setView so that _enforceViewportSafety's
        // own emergency block — which runs immediately after this function returns —
        // does not re-evaluate against stale pixel coordinates and issue a second pan.
        window._viewportSafetyEnforced = true;
        clearTimeout(window._viewportSafetyResetTimer);
        window._viewportSafetyResetTimer = setTimeout(() => {
            window._viewportSafetyEnforced  = false;
            window._viewportSafetyResetTimer = null;
        }, 100);

        map.setView([markerPos.lat, markerPos.lng], map.getZoom(), {
            animate:     false,
            noMoveStart: true,
            noMoveEnd:   true
        });
        return;
    }

    // Soft edge-nudge: pan gently when the marker drifts within the margin band.
    const margin = mapSize.x * 0.15;
    const isNearEdge = (
        markerPixel.x < margin ||
        markerPixel.x > mapSize.x - margin ||
        markerPixel.y < margin ||
        markerPixel.y > mapSize.y - margin
    );

    if (isNearEdge) {
        map.panTo([markerPos.lat, markerPos.lng], {
            animate:      true,
            duration:     speedMPH > 10 ? 0.15 : 0.25,
            easeLinearity: 0.25,
            noMoveStart:  true
        });
    }
}
        
function updateDistanceBox() {
    const distanceBox = cachedElements.distanceBox || document.getElementById('distanceBox');
    if (!distanceBox) {
        console.warn('Distance box element not found');
        return;
    }
    if (document.hidden) return;

    if (!userMarker || !gameLocations || gameLocations.length === 0) {
        distanceBox.textContent = 'Initializing...';
        resetDistanceBoxStyling(distanceBox);
        return;
    }

    const userLatLng = userMarker.getLatLng();
    let userLat = userLatLng.lat;
    let userLng = userLatLng.lng;

    if (!isFinite(userLat) || !isFinite(userLng)) {
        console.warn('Invalid user coordinates:', userLat, userLng);
        distanceBox.textContent = 'Initializing...';
        resetDistanceBoxStyling(distanceBox);
        return;
    }

    if (userLat === 0 && userLng === 0) {
        const center = map.getCenter();
        userLat = center.lat;
        userLng = center.lng;
    }

    let closestDistance = Infinity;
    let closestLocation = null;
    const userPos = { lat: userLat, lng: userLng };

    for (const location of gameLocations) {
        if (!location || typeof location.lat !== 'number' || typeof location.lng !== 'number') {
            console.warn('Invalid location data:', location);
            continue;
        }
        const locationPos = { lat: location.lat, lng: location.lng };
        const distance = calculateDistance(userPos, locationPos);
        if (isFinite(distance) && distance < closestDistance) {
            closestDistance = distance;
            closestLocation = location;
        }
    }

    if (!isFinite(closestDistance) || closestDistance === Infinity || !closestLocation) {
        console.warn('No valid distances calculated - locations may not be ready');
        distanceBox.textContent = 'Initializing...';
        resetDistanceBoxStyling(distanceBox);
        return;
    }

    window.lastClosestDistance = closestDistance;
    window.lastClosestLocation = closestLocation;

    const currentTime = performance.now();
    if (typeof handleProximityAndAutoOpen === 'function') {
        handleProximityAndAutoOpen(userPos, currentTime, closestLocation, closestDistance);
    }

    const distanceFeet = Math.round(closestDistance * 3.28084);

    const PROXIMITY_THRESHOLD = (typeof CONFIG !== 'undefined' && CONFIG.DISTANCE_THRESHOLD) ? CONFIG.DISTANCE_THRESHOLD : 20;
    const isArrived = distanceFeet <= PROXIMITY_THRESHOLD;

    let cooldownStatus = null;
    let isOnCooldown = false;
    if (isArrived && closestLocation?.id && window.cooldownManager) {
        cooldownStatus = window.cooldownManager.checkCooldown(closestLocation.id);
        isOnCooldown = !!cooldownStatus?.isOnCooldown;
    }

    // Clear any existing countdown interval before starting a new one
    if (window.distanceBoxCountdownInterval) {
        clearInterval(window.distanceBoxCountdownInterval);
        window.distanceBoxCountdownInterval = null;
    }

    if (isArrived) {
        if (isOnCooldown && cooldownStatus?.remainingSeconds !== undefined) {
            const updateCountdown = () => {
                // Pause countdown updates when tab is hidden
                if (document.hidden) return;

                if (!closestLocation?.id || !window.cooldownManager) {
                    if (window.distanceBoxCountdownInterval) {
                        clearInterval(window.distanceBoxCountdownInterval);
                        window.distanceBoxCountdownInterval = null;
                    }
                    return;
                }
                
                const status = window.cooldownManager.checkCooldown(closestLocation.id);
                if (!status?.isOnCooldown) {
                    distanceBox.textContent = 'Arrived.';
                    applyArrivedStyling(distanceBox);
                    window.currentlyArrived = true;
                    if (window.distanceBoxCountdownInterval) {
                        clearInterval(window.distanceBoxCountdownInterval);
                        window.distanceBoxCountdownInterval = null;
                    }
                } else {
                    const mins = Math.floor(status.remainingSeconds / 60);
                    const secs = status.remainingSeconds % 60;
                    const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
                    distanceBox.textContent = `Open in ${timeStr}`;
                    applyArrivedStyling(distanceBox);
                }
            };
            
            updateCountdown();
            window.distanceBoxCountdownInterval = setInterval(updateCountdown, 1000);

            // Also refresh the countdown display when the tab becomes visible again
            const resumeCountdownOnVisible = () => {
                if (!document.hidden && window.distanceBoxCountdownInterval) {
                    updateCountdown();
                }
            };
            // Store reference so we can remove it when interval is cleared
            if (window._countdownVisibilityHandler) {
                document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            }
            window._countdownVisibilityHandler = resumeCountdownOnVisible;
            document.addEventListener('visibilitychange', resumeCountdownOnVisible);

        } else {
            distanceBox.textContent = 'Arrived.';
            applyArrivedStyling(distanceBox);
        }
    } else {
        const distanceText = distanceFeet < 5280
            ? `${distanceFeet.toLocaleString()} feet`
            : `${(distanceFeet / 5280).toFixed(2)} miles`;
        distanceBox.textContent = `Closest Stop: ${distanceText}`;
        applyDefaultStyling(distanceBox);

        // Clean up visibility handler if user has moved away from the location
        if (window._countdownVisibilityHandler) {
            document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
            window._countdownVisibilityHandler = null;
        }
    }

    applyBorderStyling(distanceBox, closestLocation, distanceFeet, isArrived);

    window.currentlyArrived = isArrived && !isOnCooldown;
}

function applyBorderStyling(element, closestLocation, distanceFeet, isArrived) {

    } else if (closestLocation && closestLocation.markerColor) {

function calculateDistance(pos1OrLat, pos2OrLng, lat2, lng2) {
    if (typeof pos1OrLat === 'number' && typeof pos2OrLng === 'number' && 
        typeof lat2 === 'number' && typeof lng2 === 'number') {
        return calculateDistance(
            { lat: pos1OrLat, lng: pos2OrLng },
            { lat: lat2, lng: lng2 }
        );
    }

    const pos1 = pos1OrLat;
    const pos2 = pos2OrLng;

    if (!pos1 || !pos2 || 
        typeof pos1.lat !== 'number' || typeof pos1.lng !== 'number' || 
        typeof pos2.lat !== 'number' || typeof pos2.lng !== 'number' ||
        !isFinite(pos1.lat) || !isFinite(pos1.lng) || 
        !isFinite(pos2.lat) || !isFinite(pos2.lng)) {
        return Infinity;
    }
    
    const R = 6371000;
    const toRad = Math.PI / 180;
    const lat1 = pos1.lat * toRad;
    const lat2r = pos2.lat * toRad;
    const deltaLat = (pos2.lat - pos1.lat) * toRad;
    const deltaLng = (pos2.lng - pos1.lng) * toRad;
    
    const sinDeltaLat = Math.sin(deltaLat / 2);
    const sinDeltaLng = Math.sin(deltaLng / 2);
    
    const a = sinDeltaLat * sinDeltaLat +
              Math.cos(lat1) * Math.cos(lat2r) * sinDeltaLng * sinDeltaLng;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    
    return R * c;
}

function getGeolocationOptions(speedMPS = 0) {
    const isStationary = speedMPS < 0.5;
    const isMoving = speedMPS >= 2;

    return {
        enableHighAccuracy: true,
        timeout: isMoving ? 15000 : isStationary ? 25000 : 20000,
        maximumAge: isStationary ? 15000 : isMoving ? 5000 : 10000
    };
}

function handleLocationError(error) {
    console.warn("Error getting user location:", error);

    if (retryCount < CONFIG.MAX_RETRIES) {
        retryCount++;
        console.log(`Retrying to get location (Attempt ${retryCount} of ${CONFIG.MAX_RETRIES})`);

        const currentRetryDelay = CONFIG.RETRY_DELAY * retryCount;

        setTimeout(() => {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("Location retrieved successfully after retry");
                    hideLoadingMessage();
                    updateUserLocation(position, true);
                    retryCount = 0;
                },
                handleLocationError,
                getGeolocationOptions(window.lastPosition?.speedMPS || 0)
            );
        }, currentRetryDelay);
        return;
    }

    retryCount = 0;
    hideLoadingMessage();

    let errorMessage = "An error occurred while getting your location.";
    if (error?.code !== undefined) {
        switch (error.code) {
            case 1:
                errorMessage = "Please allow access to your location to use this feature.";
                break;
            case 2:
                errorMessage = "Your location is currently unavailable. Please try again later.";
                break;
            case 3:
                errorMessage = "Getting your location took too long. Please try again.";
                break;
            case 0:
                errorMessage = "Unable to determine your location. Please check your device settings and try again.";
                break;
        }
    }

    showPopup("Location Error", errorMessage);
    if (typeof onLocationFailure === 'function') {
        onLocationFailure(error);
    }
}

function showPopup(title, message, type = "info", callback = null) {
    console.log("showPopup called with:", title, message);
    
    const existingPopups = document.querySelectorAll(".popup-overlay");
    existingPopups.forEach(popup => {
        document.body.removeChild(popup);
    });
    
    const overlay = document.createElement("div");
    overlay.className = "popup-overlay";
    overlay.style.position = "fixed";
    overlay.style.left = "0";
    overlay.style.top = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.backgroundColor = "rgba(0, 0, 0, 0.7)";
    overlay.style.zIndex = "9999";
    
    const popupContainer = document.createElement("div");
    popupContainer.className = "popup-container";
    popupContainer.style.position = "absolute";
    popupContainer.style.left = "50%";
    popupContainer.style.top = "50%";
    popupContainer.style.transform = "translate(-50%, -50%)";
    popupContainer.style.backgroundColor = "white";
    popupContainer.style.borderRadius = "8px";
    popupContainer.style.padding = "20px";
    popupContainer.style.width = "300px";
    popupContainer.style.maxWidth = "90%";
    popupContainer.style.boxShadow = "0 4px 15px rgba(0, 0, 0, 0.2)";
    
    const titleElement = document.createElement("h3");
    titleElement.textContent = title;
    titleElement.style.margin = "0 0 15px 0";
    titleElement.style.textAlign = "center";
    titleElement.style.color = "#333";
    
    const messageElement = document.createElement("p");
    messageElement.textContent = message;
    messageElement.style.margin = "0 0 20px 0";
    messageElement.style.textAlign = "center";
    messageElement.style.color = "#555";
    
    const button = document.createElement("button");
    button.textContent = "OK";
    button.style.display = "block";
    button.style.margin = "0 auto";
    button.style.padding = "8px 20px";
    button.style.backgroundColor = "#2c5282";
    button.style.color = "white";
    button.style.border = "none";
    button.style.borderRadius = "4px";
    button.style.cursor = "pointer";
    
    button.addEventListener("click", function() {
        document.body.removeChild(overlay);
        if (callback && typeof callback === 'function') {
            callback();
        }
    });
    
    overlay.addEventListener("click", function(e) {
        if (e.target === overlay) {
            document.body.removeChild(overlay);
        }
    });
    
    popupContainer.appendChild(titleElement);
    popupContainer.appendChild(messageElement);
    popupContainer.appendChild(button);
    overlay.appendChild(popupContainer);
    document.body.appendChild(overlay);
    
    button.focus();
}

let recenterTimer;            

function recenterMap() {
    const btn = cachedElements?.recenterButton ?? document.getElementById('recenterButton');
    if (!btn || !userMarker?.getLatLng()) return;

    btn.disabled = true;                 // block spam
    btn.style.backgroundColor = 'var(--primary-color)';
    btn.style.color = 'white';

    map.closePopup();
    map.panTo(userMarker.getLatLng(), {
        animate: true,
        duration: 0.5,
        easeLinearity: 0.25,
        noZoom: true
    });

    followUser = true;
    announceToScreenReader('Map re-centred on your location');

    clearTimeout(recenterTimer);
    recenterTimer = setTimeout(() => {
        btn.style.backgroundColor = 'white';
        btn.style.color = 'var(--primary-color)';
        btn.disabled = false;
    }, 500);
}

/* ---------- 2-MINUTE LOCATION COOLDOWN ---------- */
const COOLDOWN_PERIOD_MS = 2 * 60 * 1000;
const STORAGE_KEY = 'locationCooldowns';
const DEBOUNCE_TIME_MS = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 500 : 300;
const CLEANUP_INTERVAL_MS = 60 * 1000;
const MAP_RESET_CHECK_INTERVAL_MS = 1000;
const CENTERED_POPUP_DURATION_MS = 3000;
const EXIT_DELAY_MS = 500;

class LocationCooldownManager {
  constructor() {
    this.cooldowns = this.loadFromStorage();
    this.currentLocationId = null;
    this.lastActionTime = 0;
    this.resetCooldownIds = new Set();
    this.wasOverSpeedThreshold = false;
    this._monitoringLocationId = null;
    this._announcedLocations = new Set();
    this._centeredPopupTimeout = null;
    this._exitTimeout = null;
    this._badgeDismissed = false;
    this._currentDisplayMode = null;
    this._closeFuncObserver = null;
    this._closeFuncPoll = null;
    
    this._sessionPrefs = this._loadSessionPrefs();
    this._prefsChecked = new Set();

    this.cleanupInterval = null;
    this.mapResetInterval = null;
    this.toastInterval = null;
    this.activeToast = null;

    this.cleanupExpiredCooldowns();
    this.startPeriodicCleanup();
    this.startMapResetMonitoring();
    // DO NOT patch showLocationHunt - _openLocationPage handles entry
    this.patchCloseFunctions();
    this.patchCreateBottomActionBar();
  }

  _loadSessionPrefs() {
    try {
      const raw = sessionStorage.getItem('cooldownSessionPrefs');
      if (!raw) return { hideCooldownUI: false };
      const parsed = JSON.parse(raw);
      return { hideCooldownUI: !!parsed.hideCooldownUI };
    } catch (e) {
      console.warn('Failed to load session prefs:', e);
      return { hideCooldownUI: false };
    }
  }

  _saveSessionPrefs() {
    try {
      sessionStorage.setItem('cooldownSessionPrefs', JSON.stringify(this._sessionPrefs));
    } catch (e) {
      console.error('Failed to save session prefs:', e);
    }
  }

  clearSessionPrefs() {
    sessionStorage.removeItem('cooldownSessionPrefs');
    this._sessionPrefs = { hideCooldownUI: false };
    this._prefsChecked.clear();
  }

  checkCooldown(locationId) {
    if (locationId == null) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const id = String(locationId);
    const startTime = this.cooldowns[id];

    if (!startTime) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const elapsed = Date.now() - startTime;

    if (!isFinite(elapsed) || elapsed < 0) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    if (elapsed >= COOLDOWN_PERIOD_MS) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const remainingMs = COOLDOWN_PERIOD_MS - elapsed;
    return {
      isOnCooldown: true,
      remainingMs: Math.max(0, remainingMs),
      remainingSeconds: Math.max(0, Math.ceil(remainingMs / 1000)),
    };
  }

  _clearCooldownState(id) {
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  enterLocation(locationId) {
    if (locationId == null) {
      return { success: false, reason: 'invalid_id', message: 'Invalid location ID' };
    }
    const id = String(locationId);
    const now = Date.now();
    if (now - this.lastActionTime < DEBOUNCE_TIME_MS) {
      return { success: false, reason: 'debounced', message: 'Action too rapid' };
    }
    this.lastActionTime = now;
    if (this.currentLocationId === id) {
      return { success: false, reason: 'already_inside', message: 'Already in this location' };
    }
    const status = this.checkCooldown(id);
    if (status.isOnCooldown) {
      return {
        success: false,
        reason: 'on_cooldown',
        message: 'This location cannot be revisited for two minutes',
        remainingMs: status.remainingMs,
        remainingSeconds: status.remainingSeconds,
        locationId: id,
      };
    }
    this.currentLocationId = id;
    this.resetCooldownIds.delete(id);
    return { success: true, reason: 'allowed', message: 'Location entry allowed' };
  }

  leaveLocation(locationId = null) {
    const id = locationId ? String(locationId) : this.currentLocationId;
    if (!id || id === 'null' || id === 'undefined') return;

    const wasCurrentLocation = this.currentLocationId === id;
    if (this.currentLocationId === id) this.currentLocationId = null;

    if (!wasCurrentLocation) return;

    if (this.cooldowns[id]) {
        const status = this.checkCooldown(id);
        if (status.isOnCooldown) return;
    }

    this.cooldowns[id] = Date.now();
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  startMapResetMonitoring() {
    this.mapResetInterval = setInterval(() => {
      this.checkAndResetMap();
    }, MAP_RESET_CHECK_INTERVAL_MS);
  }

  checkAndResetMap() {
    const now = Date.now();
    let shouldReset = false;
    let resetReason = null;

    if (typeof window.currentSpeed === 'number' && window.currentSpeed > 6) {
      if (!this.wasOverSpeedThreshold) {
        shouldReset = true;
        resetReason = 'speed_threshold';
        this.wasOverSpeedThreshold = true;
      }
    } else {
      this.wasOverSpeedThreshold = false;
    }

    if (!shouldReset && Object.keys(this.cooldowns).length > 0) {
      for (const id of Object.keys(this.cooldowns)) {
        if (this.resetCooldownIds.has(id)) continue;

        const status = this.checkCooldown(id);
        if (!status.isOnCooldown && this.isWithinThreshold(id)) {
          shouldReset = true;
          resetReason = 'cooldown_expired';
          this.resetCooldownIds.add(id);
          break;
        }
      }
    }

    if (shouldReset) {
      console.log(`Map reset triggered: ${resetReason}`);
      this.resetMapToUser();
    }
  }

  resetMapToUser() {
    if (typeof window.updateUserLocation === 'function' && window.lastPosition) {
      const fakePosition = {
        coords: {
          latitude: window.lastPosition.lat,
          longitude: window.lastPosition.lng,
          accuracy: window.lastPosition.accuracy || 20,
          speed: (window.currentSpeed || 0) / 2.23694,
          heading: window.lastPosition.heading || null
        },
        timestamp: Date.now()
      };

      updateUserLocation(fakePosition, false);

      window.followUser = true;
      window.isMapInteracting = false;

      window.blockSpeedZoom = true;
      if (typeof window.blockProximityZoom !== 'undefined') {
        window.blockProximityZoom = true;
      }
      
      setTimeout(() => {
        window.blockSpeedZoom = false;
        if (typeof window.blockProximityZoom !== 'undefined') {
          window.blockProximityZoom = false;
        }
      }, 2000);

    } else {
      try {
        if (typeof window.recenterMap === 'function') {
          window.recenterMap();
        } else if (window.map && window.userMarker) {
          const userPos = window.userMarker.getLatLng();
          if (userPos && window.map.setView) {
            window.map.flyTo(userPos, window.map.getZoom?.() || 16, {
              animate: true,
              duration: 1.0,
              easeLinearity: 0.25
            });
          }
        }

        window.isMapInteracting = false;
        window.followUser = true;
      } catch (e) {
        console.error('Fallback map reset failed:', e);
      }
    }
  }

  formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  isWithinThreshold(locationId) {
    try {
      let location = null;
      const sources = [window.gameLocations, window.locations];
      for (const source of sources) {
        if (Array.isArray(source)) {
          location = source.find(loc => loc?.id === locationId);
          if (location) break;
        }
      }
      if (!location && window.locationsMap && typeof window.locationsMap === 'object') {
        location = Object.values(window.locationsMap).find(loc => loc?.id === locationId);
      }

      if (!location) return false;

      const lat = parseFloat(location.lat);
      const lng = parseFloat(location.lng);
      if (!isFinite(lat) || !isFinite(lng)) return false;

      if (typeof calculateDistance !== 'function' || !window.userMarker) return false;

      const userPos = window.userMarker.getLatLng();
      if (!userPos || !isFinite(userPos.lat) || !isFinite(userPos.lng)) return false;

      const distanceFeet = calculateDistance(userPos.lat, userPos.lng, lat, lng);
      if (!isFinite(distanceFeet) || distanceFeet < 0) return false;

      const threshold = (typeof CONFIG?.DISTANCE_THRESHOLD === 'number')
        ? CONFIG.DISTANCE_THRESHOLD
        : 20;
      return distanceFeet <= threshold;
    } catch (e) {
      console.error('Error in isWithinThreshold:', e);
      return false;
    }
  }

 notifyUserWithCountdown(locationId, remainingSeconds) {
    if (this._monitoringLocationId === locationId) {
        return;
    }

    this.clearToastInterval();
    this._badgeDismissed = false;
    this._currentDisplayMode = null;

    if (this._centeredPopupTimeout) {
        clearTimeout(this._centeredPopupTimeout);
        this._centeredPopupTimeout = null;
    }
    if (this._exitTimeout) {
        clearTimeout(this._exitTimeout);
        this._exitTimeout = null;
    }

    this._monitoringLocationId = locationId;

    // If hideCooldownUI is set at call time, record the pref but do NOT
    // return early — the interval must still run so we catch cooldown
    // expiry on a 1-second tick instead of waiting for the 10-second
    // idle fallback.
    if (this._sessionPrefs.hideCooldownUI) {
        this._prefsChecked.add(locationId);
    }

    const updatePopup = () => {
        if (this._monitoringLocationId !== locationId) {
            this.clearToastInterval();
            return;
        }

        // ── COOLDOWN EXPIRY (always runs) ────────────────────────────
        // Must execute before any UI guards so that auto-open fires
        // within 1 second of expiry regardless of badge/pref state.
        const status = this.checkCooldown(locationId);

        if (!status.isOnCooldown) {
            const isNearby = this.isWithinThreshold(locationId);
            this._handleCooldownExpired(locationId, isNearby);
            return;
        }

        // ── UI DISPLAY (suppressed when hidden or dismissed) ─────────
        // Cooldown is still active below this point. Skip visual
        // updates if the user opted out or dismissed the badge, but
        // keep the interval alive so the expiry check above still runs.
        if (this._sessionPrefs.hideCooldownUI) return;
        if (this._badgeDismissed) return;

        const isNearby = this.isWithinThreshold(locationId);

        if (isNearby) {
            this._handleNearbyWithCooldown(locationId, status.remainingSeconds);
        } else {
            this._handleLeftProximity();
        }
    };

    updatePopup();
    this.toastInterval = setInterval(updatePopup, 1000);
}

 _handleCooldownExpired(locationId, isNearby) {
    this.clearToastInterval();
    this._monitoringLocationId = null;
    this._currentDisplayMode = null;
    this._prefsChecked.delete(locationId);

    if (isNearby) {
        const location = window.gameLocations?.find(loc => loc?.id === locationId) ||
                         window.locations?.find(loc => loc?.id === locationId) ||
                         Object.values(window.locationsMap || {}).find(loc => loc?.id === locationId);

        if (location && typeof window._openLocationPage === 'function') {
            console.log('[Cooldown] Expired while user nearby - auto-opening:', locationId);
            window._openLocationPage(location);
        }
    }
}

_handleNearbyWithCooldown(locationId, remainingSeconds) {
    if (this._exitTimeout) {
        clearTimeout(this._exitTimeout);
        this._exitTimeout = null;
    }
    const targetMode = this._announcedLocations.has(locationId) ? 'corner' : 'center';
    if (this._currentDisplayMode !== targetMode) {
        this._transitionToMode(targetMode, remainingSeconds, locationId);
    } else {
        this._updateCountdownDisplay(remainingSeconds);
    }
}

  _handleLeftProximity() {
    if (!this._exitTimeout) {
      this._exitTimeout = setTimeout(() => {
        this._hideAll();
        this._currentDisplayMode = null;
        this._badgeDismissed = false;
        this._exitTimeout = null;
      }, EXIT_DELAY_MS);
    }
  }

  _transitionToMode(targetMode, remainingSeconds, locationId) {
    if (targetMode === 'center') {
      this._currentDisplayMode = 'center';
      this._hideCornerBadge();
      this._showCenteredPopup(remainingSeconds);
      this._announcedLocations.add(locationId);
      
      if (this._centeredPopupTimeout) clearTimeout(this._centeredPopupTimeout);
      this._centeredPopupTimeout = setTimeout(() => {
        if (this._currentDisplayMode === 'center') {
          this._currentDisplayMode = 'corner';
          this._removeCenteredPopup();
          this._showOrUpdateCornerBadge(remainingSeconds);
        }
        this._centeredPopupTimeout = null;
      }, CENTERED_POPUP_DURATION_MS);
      
    } else {
      this._currentDisplayMode = 'corner';
      this._removeCenteredPopup();
      this._showOrUpdateCornerBadge(remainingSeconds);
    }
  }

  _updateCountdownDisplay(remainingSeconds) {
    if (this._currentDisplayMode === 'center') {
      const countdownEl = document.getElementById('cd-centered-countdown');
      if (countdownEl) {
        countdownEl.textContent = this.formatTime(remainingSeconds);
      }
    } else if (this._currentDisplayMode === 'corner') {
      const textEl = document.getElementById('cd-corner-text');
      if (textEl) {
        textEl.textContent = this.formatTime(remainingSeconds);
      }
    }
  }

  _showCenteredPopup(remainingSeconds) {
    let popup = document.getElementById('cd-centered-popup');
    
    if (!popup) {
      popup = document.createElement('div');
      popup.id = 'cd-centered-popup';
      popup.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10001;
        background: rgba(0, 0, 0, 0.88);
        color: #fff;
        border-radius: 16px;
        padding: 24px 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        max-width: 320px;
        width: 90%;
        user-select: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      `;

      popup.innerHTML = `
        <div style="margin-bottom: 14px;">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#FFB74D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div style="font-size: 17px; font-weight: 600; margin-bottom: 8px; line-height: 1.4;">
          This location is in a cooldown period
        </div>
        <div style="font-size: 14px; color: #B0B0B0; margin-bottom: 14px; line-height: 1.4;">
          You are unable to revisit for
        </div>
        <div id="cd-centered-countdown" style="font-size: 40px; font-weight: 700; color: #FFB74D; letter-spacing: 3px; margin-bottom: 6px;">
          ${this.formatTime(remainingSeconds)}
        </div>
        <div style="font-size: 14px; color: #B0B0B0; line-height: 1.4;">
          longer
        </div>
        <div style="margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.1);">
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; color: #B0B0B0; user-select: none; justify-content: center;">
            <input type="checkbox" id="cd-dont-show-again" style="width: 16px; height: 16px; accent-color: #FFB74D; cursor: pointer;">
            <span>Don't show this again today</span>
          </label>
        </div>
      `;

      popup.style.pointerEvents = 'auto';
      popup.addEventListener('click', (e) => {
        e.stopPropagation();
        this._dismissBadge();
      });

      const checkbox = popup.querySelector('#cd-dont-show-again');
      if (checkbox) {
        checkbox.addEventListener('change', (e) => {
          if (e.target.checked) {
            this._sessionPrefs.hideCooldownUI = true;
            this._saveSessionPrefs();
            checkbox.parentElement.style.color = '#FFB74D';
            setTimeout(() => {
              if (checkbox.parentElement) {
                checkbox.parentElement.style.color = '#B0B0B0';
              }
            }, 300);
          }
        });
      }

      document.body.appendChild(popup);
    } else {
      popup.style.display = '';
      const countdownEl = popup.querySelector('#cd-centered-countdown');
      if (countdownEl) {
        countdownEl.textContent = this.formatTime(remainingSeconds);
      }
    }

    requestAnimationFrame(() => {
      popup.style.opacity = '1';
    });
  }

  _removeCenteredPopup() {
    const popup = document.getElementById('cd-centered-popup');
    if (popup) {
      popup.style.opacity = '0';
      setTimeout(() => {
        if (popup.parentNode && popup.style.opacity === '0') {
          popup.remove();
        }
      }, 300);
    }
  }

  _showOrUpdateCornerBadge(remainingSeconds) {
    let badge = document.getElementById('cd-corner-badge');
    
    if (!badge) {
      badge = document.createElement('div');
      badge.id = 'cd-corner-badge';
      badge.style.cssText = `
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 99999;
        background: rgba(26, 58, 138, 0.98);
        color: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.2;
        box-shadow: 0 3px 10px rgba(0,0,0,0.35);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        max-width: 180px;
        user-select: none;
        opacity: 0;
        transform: translateX(-10px);
        transition: opacity 0.2s ease, transform 0.2s ease;
        pointer-events: auto;
        border: 1px solid rgba(255,255,255,0.15);
      `;

      badge.innerHTML = `
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:0.95;">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="cd-corner-text" style="white-space:nowrap;font-variant-numeric:tabular-nums;">${this.formatTime(remainingSeconds)}</span>
        </div>
      `;

      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        this._dismissBadge();
      });

      document.body.appendChild(badge);
    } else {
      const textEl = badge.querySelector('#cd-corner-text');
      if (textEl) textEl.textContent = this.formatTime(remainingSeconds);
    }

    requestAnimationFrame(() => {
      badge.style.opacity = '1';
      badge.style.transform = 'translateX(0)';
    });
  }

  _hideCornerBadge() {
    const badge = document.getElementById('cd-corner-badge');
    if (badge) {
      badge.style.opacity = '0';
      badge.style.transform = 'translateX(-10px)';
    }
  }

  _hideAll() {
    const popup = document.getElementById('cd-centered-popup');
    if (popup && popup.style.display !== 'none') {
      popup.style.opacity = '0';
      setTimeout(() => {
        if (popup.style.opacity === '0') popup.style.display = 'none';
      }, 300);
    }

    const badge = document.getElementById('cd-corner-badge');
    if (badge) {
      badge.style.opacity = '0';
      badge.style.transform = 'translateX(-10px)';
    }
  }

  _dismissBadge() {
    this._badgeDismissed = true;
    this._currentDisplayMode = null;
    
    if (this._centeredPopupTimeout) {
      clearTimeout(this._centeredPopupTimeout);
      this._centeredPopupTimeout = null;
    }
    if (this._exitTimeout) {
      clearTimeout(this._exitTimeout);
      this._exitTimeout = null;
    }

    this._removeCenteredPopup();
    const badge = document.getElementById('cd-corner-badge');
    if (badge) {
      badge.style.opacity = '0';
      badge.style.transform = 'translateX(-10px)';
      setTimeout(() => {
        if (badge.parentNode) badge.remove();
      }, 200);
    }
  }

  clearToast() {
    this.clearToastInterval();
    this._monitoringLocationId = null;
    this._badgeDismissed = false;
    this._currentDisplayMode = null;

    if (this._centeredPopupTimeout) {
      clearTimeout(this._centeredPopupTimeout);
      this._centeredPopupTimeout = null;
    }
    if (this._exitTimeout) {
      clearTimeout(this._exitTimeout);
      this._exitTimeout = null;
    }
    
    const centered = document.getElementById('cd-centered-popup');
    if (centered) {
      centered.style.opacity = '0';
      setTimeout(() => {
        if (centered.parentNode) centered.remove();
      }, 300);
    }
    
    const corner = document.getElementById('cd-corner-badge');
    if (corner) {
      corner.style.opacity = '0';
      corner.style.transform = 'translateX(-10px)';
      setTimeout(() => {
        if (corner.parentNode) corner.remove();
      }, 200);
    }
    
    this.activeToast = null;
  }

  clearToastInterval() {
    if (this.toastInterval) {
      clearInterval(this.toastInterval);
      this.toastInterval = null;
    }
  }

  loadFromStorage() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (!data) return {};
      const parsed = JSON.parse(data);
      return typeof parsed === 'object' && parsed !== null ? parsed : {};
    } catch (e) {
      console.warn('Failed to load cooldowns:', e);
      return {};
    }
  }

  saveToStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.cooldowns));
    } catch (e) {
      console.error('Failed to save cooldowns:', e);
    }
  }

  cleanupExpiredCooldowns() {
    const now = Date.now();
    for (const id of [...Object.keys(this.cooldowns)]) {
      const startTime = this.cooldowns[id];
      if (!startTime) continue;
      
      const elapsed = now - startTime;
      if (!isFinite(elapsed) || elapsed < 0 || elapsed >= COOLDOWN_PERIOD_MS) {
        this._clearCooldownState(id);
      }
    }
  }

  startPeriodicCleanup() {
    this.cleanupInterval = setInterval(() => {
      this.cleanupExpiredCooldowns();
    }, CLEANUP_INTERVAL_MS);
  }

  patchCloseFunctions() {
    const names = ['closeLocationHunt', 'closeLocation', 'hideLocationHunt', 'exitLocation'];

    for (const name of names) {
      if (window[name] && !window[name].__patched) {
        this.patchCloseFunction(name);
      }
    }

    const manager = this;
    const tryPatch = () => {
      for (const name of names) {
        if (window[name] && !window[name].__patched) {
          manager.patchCloseFunction(name);
        }
      }
    };

    if (document.body) {
      this._closeFuncObserver = new MutationObserver(tryPatch);
      this._closeFuncObserver.observe(document.body, { childList: true, subtree: true });
    } else {
      window.addEventListener('DOMContentLoaded', () => {
        this._closeFuncObserver = new MutationObserver(tryPatch);
        this._closeFuncObserver.observe(document.body, { childList: true, subtree: true });
      }, { once: true });
    }

    let attempts = 0;
    this._closeFuncPoll = setInterval(() => {
      tryPatch();
      if (++attempts >= 20) {
        clearInterval(this._closeFuncPoll);
        this._closeFuncPoll = null;
      }
    }, 500);
  }

  patchCloseFunction(funcName) {
    const original = window[funcName];
    const manager = this;
    window[funcName] = function(locationId) {
      if (manager.currentLocationId) manager.leaveLocation(manager.currentLocationId);
      else if (locationId) manager.leaveLocation(locationId);
      return original.call(this, locationId);
    };
    window[funcName].__patched = true;
    window[funcName].__original = original;
  }

  patchCreateBottomActionBar() {
    if (!window.createBottomActionBar || window.createBottomActionBar.__patched) return;
    const original = window.createBottomActionBar;
    const manager = this;
    window.createBottomActionBar = function(location) {
      const bar = original.call(this, location);
      if (bar && location?.id) {
        const originalOnClick = bar.onclick;
        bar.onclick = function(e) {
          manager.leaveLocation(location.id);
          return originalOnClick?.call(this, e);
        };
      }
      return bar;
    };
    window.createBottomActionBar.__patched = true;
    window.createBottomActionBar.__original = original;
  }

  destroy() {
    this._destroyed = true;
    
    if (this.cleanupInterval) clearInterval(this.cleanupInterval);
    if (this.mapResetInterval) clearInterval(this.mapResetInterval);
    if (this._closeFuncPoll) { clearInterval(this._closeFuncPoll); this._closeFuncPoll = null; }
    if (this._closeFuncObserver) { this._closeFuncObserver.disconnect(); this._closeFuncObserver = null; }
    
    this.clearToast();
    
    const patchedNames = ['closeLocationHunt', 'closeLocation', 'hideLocationHunt', 'exitLocation', 'createBottomActionBar'];
    for (const name of patchedNames) {
      const fn = window[name];
      if (fn?.__patchedBy === 'LocationCooldownManager' && fn.__original) {
        window[name] = fn.__original;
        delete fn.__original;
        delete fn.__patchedBy;
      }
    }
    
    this.currentLocationId = null;
    this.resetCooldownIds.clear();
    this._monitoringLocationId = null;
    this._announcedLocations.clear();
    this._currentDisplayMode = null;
    this._prefsChecked.clear();
  }

  resetSessionPreferences() { this.clearSessionPrefs(); }
  isUIHiddenByPreference() { return this._sessionPrefs.hideCooldownUI; }
  getRemainingTime(locationId) { return this.checkCooldown(locationId).remainingSeconds; }
  
  getAllCooldowns() {
    const out = {};
    for (const id of Object.keys(this.cooldowns)) {
      const rem = this.getRemainingTime(id);
      if (rem > 0) out[id] = rem;
    }
    return out;
  }
  
  clearCooldown(locationId) {
    if (locationId == null) return;
    const id = String(locationId);
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }
  
  clearAllCooldowns() {
    this.cooldowns = {};
    this.resetCooldownIds.clear();
    this._announcedLocations.clear();
    this._prefsChecked.clear();
    this.saveToStorage();
  }
  
  getCurrentLocation() { return this.currentLocationId; }
}

  if (window.cooldownManager) {
    const status = window.cooldownManager.checkCooldown(location.id);
    
    if (status.isOnCooldown) {
      window.cooldownManager.notifyUserWithCountdown(location.id, status.remainingSeconds);
      return;
    }
    
    // Clean up stale state before entering
    if (window.cooldownManager.currentLocationId === String(location.id)) {

      const pageIsActuallyOpen = lochuntContainer && lochuntContainer.style.display !== 'none';
      if (!pageIsActuallyOpen) {
        window.cooldownManager.currentLocationId = null;
      }
    }
    
    const result = window.cooldownManager.enterLocation(location.id);
    if (!result.success) return;
  }
  
  if (typeof window.showLocationHunt === 'function') {
    window.showLocationHunt(location);
  }
};
        
/* Optimized showLocationHunt */
function showLocationHunt(location) {
    // --- VALIDATION ---
    if (!location?.id) {
        console.error('[showLocationHunt] Invalid location data:', location);
        return;
    }

    // --- DEBOUNCE & IDEMPOTENCY ---
    const now = Date.now();
    const DEBOUNCE_TIME = CONFIG?.DEBOUNCE_TIME ?? 300;

    window.lastFunctionCall ??= 0;
    if (now - window.lastFunctionCall < DEBOUNCE_TIME) return;
    if (window.lastVisitedLocationId === location.id && window.isLocationHuntVisible) return;

    window.lastFunctionCall = now;
    window.lastVisitedLocationId = location.id;
    window.isLocationHuntVisible = true;
    window.isMapInteracting = true;

    // --- CONTAINER ---
    const container = cachedElements.lochuntContainer ?? document.querySelector('.lochunt-container');
    if (!container) {
        console.error('[showLocationHunt] .lochunt-container not found in DOM.');
        return;
    }

    // --- HELPERS ---
    // Concise element creator to reduce verbosity
    const el = (tag, styles = '', className = '') => {
        const node = document.createElement(tag);
        if (styles) node.style.cssText = styles;
        if (className) node.className = className;
        return node;
    };

    // --- BUILD: Image ---
    const image = el('img', `
        width: 100%;
        height: 45vh;
        object-fit: cover;
        object-position: center;
        display: block;
    `);
    image.src = location.image ?? '';
    image.alt = location.name ?? '';
    image.loading = 'eager';

    // --- BUILD: Info (name, city, creator) ---
    const info = el('div', 'text-align: center; width: 100%; margin-bottom: 15px;', 'lochunt-info');

    const name = el('h1', `
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 8px;
        line-height: 1.2;
    `);
    // SECURITY: textContent prevents HTML injection
    name.textContent = location.name ?? 'Unknown Location';

    const city = el('p', `
        font-size: clamp(1.1rem, 2vw, 1.3rem);
        color: #2c5282;
        font-weight: 600;
        margin-bottom: 4px;
    `);
    city.textContent = location.city ?? '';

    const creator = el('p', `
        font-size: calc(0.9rem + 0.4vw);
        color: #666;
        font-weight: 500;
    `);
    creator.textContent = location.creator ? `Created by: ${location.creator}` : '';

    info.append(name, city, creator);

    // --- BUILD: Content container ---
    const content = el('div', `
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 800px;
        margin: 0 auto;
    `, 'lochunt-content');
    content.appendChild(info);

    // Audio player (backwards-compatible; resets playback position)
    if (typeof createAudioPlayer === 'function') {
        const audioPlayer = createAudioPlayer(location.audio);
        const audioEl = audioPlayer.querySelector('#locationAudio');
        if (audioEl) audioEl.currentTime = 0;
        content.appendChild(audioPlayer);
    }

    // --- BUILD: Scrollable wrapper ---
    const scrollable = el('div', `
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
    `);
    scrollable.append(image, content);

    // --- BUILD: Bottom action bar ---
    let actionBar = null;
    if (typeof createBottomActionBar === 'function') {
        actionBar = createBottomActionBar(location);
        // Ensure it sticks to the bottom visually
        actionBar.style.cssText += 'position: sticky; bottom: 0; width: 100%; z-index: 10;';
    }

    // --- RENDER (single reflow via DocumentFragment) ---
    const fragment = document.createDocumentFragment();
    fragment.appendChild(scrollable);
    if (actionBar) fragment.appendChild(actionBar);

    // PERFORMANCE: replaceChildren is faster and cleaner than innerHTML = ''
    container.replaceChildren(fragment);
    container.style.display = 'flex';
    container.classList.add('fade-in');

    // --- ACCESSIBILITY ---
    // 1. Dialog Role
    container.setAttribute('role', 'dialog');
    container.setAttribute('aria-modal', 'true');
    container.setAttribute('aria-label', `Location details for ${location.name}`);

    // 2. Focus Management
    // We move focus to the title so keyboard users start reading there immediately.
    // tabindex="-1" makes it focusable programmatically but not via Tab key (initially).
    name.setAttribute('tabindex', '-1');
    name.focus();

    // --- POST-RENDER ---
    announceToScreenReader?.(`Opened location: ${location.name}`);

    // Initialize audio slightly after render to ensure DOM is ready
    setTimeout(() => {
        window.audioPlayerCleanup = initAudioPlayer?.();
    }, 50);

    // Service Worker audio prefetch
    if (navigator.serviceWorker?.controller) {
        const userPos = userMarker?.getLatLng?.() ?? null;
        if (userPos && window.gameLocations) {
            try {
                navigator.serviceWorker.controller.postMessage({
                    type: 'PREFETCH_AUDIO',
                    data: {
                        userLocation: { lat: userPos.lat, lng: userPos.lng },
                        locations: window.gameLocations,
                    },
                });
            } catch (e) {
                console.warn('[showLocationHunt] Service Worker postMessage failed:', e);
            }
        }
    }
}

const preloadedUrls = new Set();

function preloadLocationData(location) {
    if (!location?.id) return;

    const preloadImage = (url) => {
        if (!url || preloadedUrls.has(url)) return;
        preloadedUrls.add(url);
        const img = new Image();
        img.src = url;
    };

    preloadImage(location.image);

    if (location.audio && !preloadedUrls.has(location.audio)) {
        preloadedUrls.add(location.audio);
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = location.audio;
        link.as = 'audio';
        document.head.appendChild(link);
        setTimeout(() => {
            if (link.parentNode) link.parentNode.removeChild(link);
        }, 30000);
    }

    const NEARBY_FEET = 500;
    const userPos = window.userMarker?.getLatLng();
    if (userPos && window.gameLocations) {
        window.gameLocations
            .filter(loc =>
                loc.id !== location.id &&
                loc.image &&
                calculateDistance(userPos, loc) * 3.28084 <= NEARBY_FEET
            )
            .slice(0, 3)
            .forEach(loc => preloadImage(loc.image));
    }

    console.debug('[Preload] Location data preloaded for:', location.name || location.id);
}
