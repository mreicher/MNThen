//
// Runs a rAF loop between GPS fixes to deliver smooth 60 fps marker movement.
// The pipeline remains the authority for all position state; the interpolator
// only touches the visual marker and never writes to window.lastPosition.
//
// v8.0 additions
// ──────────────
//  • Acceleration tracking (_accLat/_accLng): every setTarget call measures
//    the change in velocity since the last call and maintains a low-pass
//    filtered acceleration estimate. _tick uses pos + vel·t + ½·acc·t² for
//    the prediction goal, so the marker dead-reckons curved paths rather than
//    just extrapolating straight lines.
//
//  • Speed-adaptive convergence: _converge is multiplied by a speed knob that
//    scales 1×→3.5× from 0 to 15 m/s, so the marker keeps up with the device
//    at highway speeds while staying smooth at walking pace.
//
//  • Speed-adaptive heading rate: _headRate scales 1×→3.3× across the same
//    range, making the icon snap through sharp driving turns rather than
//    drifting through them with walking-pace inertia.
//
//  • predFade window: fading now starts at 1.5 s stale and reaches zero at
//    4.0 s, preventing early lookahead cancellation during normal 2-second
//    GPS gaps under poor signal conditions.

const _interp = {
    _active:    false,
    _rafId:     null,
    _lastFrame: 0,

    // Visual state (written every frame by _tick)
    _vLat: null, _vLng: null, _vHead: null,

    // Current target (written by setTarget)
    _tLat: 0, _tLng: 0, _tHead: null,
    _tSpeed: 0, _tTime: 0,

    // Smoothed velocity (deg/s) — EMA across setTarget calls
    _velLat: 0, _velLng: 0,

    // Acceleration (deg/s²) — estimated from velocity deltas, low-pass filtered
    _accLat: 0, _accLng: 0,

    // Previous velocity snapshot used to compute acceleration each setTarget
    _prevVelLat: 0, _prevVelLng: 0,
    _velUpdateTime: 0,

    // ── Runtime-configurable thresholds ───────────────────────────────────────
    // All tunable from the browser console without a deploy, e.g.:
    //   window._interpMinSpeed = 2.0
    get _minSpeed()      { return window._interpMinSpeed      ?? 1.5;  },
    get _converge()      { return window._interpConverge      ?? 10.0; },
    get _convergeMax()   { return window._interpConvergeMax   ?? 35.0; }, // NEW
    get _headRate()      { return window._interpHeadRate      ?? 6.0;  },
    get _headRateMax()   { return window._interpHeadRateMax   ?? 20.0; }, // NEW
    get _predSec()       { return window._interpPredSec       ?? 0.35; },
    get _staleFadeStart(){ return window._interpStaleFadeStart ?? 1.5;  }, // NEW (was implicit 0)
    get _staleFadeEnd()  { return window._interpStaleFadeEnd  ?? 4.0;  }, // NEW (was 2.5)
    get _staleMax()      { return window._interpStaleMax      ?? 5.0;  }, // raised from 3.0
    get _accAlpha()      { return window._interpAccAlpha      ?? 0.30; }, // NEW
    get _accMaxDeg()     { return window._interpAccMaxDeg     ?? 0.002;}, // NEW — clamp runaway

    // ── setTarget ─────────────────────────────────────────────────────────────
    // Called by stageVisuals every time a new smoothed position is ready.
    // velLat/velLng are the pipeline's smoothVel — always real velocity from
    // stageSmooth, never the zero sentinel from _makeCtx.
    setTarget(lat, lng, heading, speedMPS, velLat, velLng) {
        const now = performance.now();

        // Seed visual position on the very first call so there is no snap
        if (this._vLat === null) {
            this._vLat = lat; this._vLng = lng; this._vHead = heading;
        }

        // ── Velocity EMA ──────────────────────────────────────────────────────
        if (velLat != null && velLng != null) {
            // Lower alpha at high speed to suppress GPS jitter swinging the prediction
            const alpha = speedMPS > 10 ? 0.20 : (speedMPS > 3 ? 0.35 : 0.55);
            this._velLat = this._velLat * (1 - alpha) + velLat * alpha;
            this._velLng = this._velLng * (1 - alpha) + velLng * alpha;
        }

        // ── Acceleration estimation ───────────────────────────────────────────
        // Measure how much velocity changed since the last setTarget call.
        // dt guard: only trust estimates between 50 ms and 2 s apart.
        const dtVel = (now - this._velUpdateTime) / 1000;
        if (dtVel >= 0.05 && dtVel <= 2.0 && velLat != null && velLng != null) {
            const rawAccLat = (this._velLat - this._prevVelLat) / dtVel;
            const rawAccLng = (this._velLng - this._prevVelLng) / dtVel;
            // Low-pass: acceleration signal is inherently noisy
            const a = this._accAlpha;
            this._accLat = this._accLat * (1 - a) + rawAccLat * a;
            this._accLng = this._accLng * (1 - a) + rawAccLng * a;
            // Clamp to suppress momentary GPS position explosions
            const cap = this._accMaxDeg;
            this._accLat = U.clamp(this._accLat, -cap, cap);
            this._accLng = U.clamp(this._accLng, -cap, cap);
        }
        this._prevVelLat    = this._velLat;
        this._prevVelLng    = this._velLng;
        this._velUpdateTime = now;

        // ── Target update ─────────────────────────────────────────────────────
        this._tLat = lat; this._tLng = lng; this._tHead = heading;
        this._tSpeed = speedMPS; this._tTime = now;

        if (!this._active && speedMPS >= this._minSpeed) this._start();
    },

    // Hard snap: jump the visual marker immediately and zero all kinematic state.
    // Used on large jumps, GPS recovery, fast-pass, and session gaps.
    snapTo(lat, lng, heading) {
        this._vLat = lat; this._vLng = lng;
        if (heading != null) this._vHead = heading;
        this._tLat = lat; this._tLng = lng; this._tHead = heading;
        this._tTime = performance.now();
        this._velLat    = 0; this._velLng    = 0;
        this._accLat    = 0; this._accLng    = 0;
        this._prevVelLat = 0; this._prevVelLng = 0;
        if (userMarker) {
            try { userMarker.setLatLng([lat, lng]); } catch (_) {}
        }
    },

    halt() {
        this._active = false;
        if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    },

    isActive() { return this._active; },

    _start() {
        if (this._active) return;
        this._active = true;
        // Seed visual position from the live marker to avoid a pop on first start
        if (userMarker) {
            try {
                const ll = userMarker.getLatLng();
                if (ll) { this._vLat = ll.lat; this._vLng = ll.lng; }
            } catch (_) {}
        }
        if (this._vLat === null) { this._vLat = this._tLat; this._vLng = this._tLng; }
        this._lastFrame = performance.now();
        this._tick();
    },

    _tick() {
        if (!this._active) return;
        const now = performance.now();
        const dt  = Math.min(0.1, (now - this._lastFrame) / 1000);
        this._lastFrame = now;

        // Stop the loop when the device is effectively stationary
        if (this._tSpeed < this._minSpeed * 0.5) { this.halt(); return; }

        const staleSec = (now - this._tTime) / 1000;
        if (staleSec > this._staleMax) { this.halt(); return; }

        // ── Speed-adaptive convergence ────────────────────────────────────────
        // Scales linearly from _converge (base) to _convergeMax at 15 m/s.
        // Frame-rate independent: blend = 1 − e^(−k·dt)
        const speedKnob = U.clamp(this._tSpeed / 15, 0, 1);
        const converge  = U.lerp(this._converge, this._convergeMax, speedKnob);
        const blend     = 1 - Math.exp(-converge * dt);

        // ── Prediction with dead-reckoning (vel + acc) ────────────────────────
        // predFade starts at 1.0 until the fix is _staleFadeStart seconds old,
        // then ramps to 0 by _staleFadeEnd. This keeps the lookahead alive
        // through normal 2-second GPS gaps rather than killing it prematurely.
        const fadeRange = Math.max(0.001, this._staleFadeEnd - this._staleFadeStart);
        const predFade  = U.clamp(1 - (staleSec - this._staleFadeStart) / fadeRange, 0, 1);
        const predSec   = this._predSec * predFade;

        // pos + vel·t + ½·acc·t²
        const goalLat = this._tLat
            + this._velLat * predSec
            + 0.5 * this._accLat * predSec * predSec;
        const goalLng = this._tLng
            + this._velLng * predSec
            + 0.5 * this._accLng * predSec * predSec;

        // Blend visual position toward the predicted goal
        this._vLat += (goalLat - this._vLat) * blend;
        this._vLng += (goalLng - this._vLng) * blend;

        // ── Speed-adaptive heading blend ──────────────────────────────────────
        // Same knob as convergence: faster rotation at driving speeds.
        if (this._tHead != null) {
            if (this._vHead == null) {
                this._vHead = this._tHead;
            } else {
                const headRate  = U.lerp(this._headRate, this._headRateMax, speedKnob);
                const hBlend    = 1 - Math.exp(-headRate * dt);
                const targetH   = U.normH(this._vHead, this._tHead);
                this._vHead    += (targetH - this._vHead) * hBlend;
            }
        }

        _interpUpdateMarker(this._vLat, this._vLng, this._vHead);

        this._rafId = requestAnimationFrame(() => this._tick());
    }
};

function _interpUpdateMarker(lat, lng, head) {
    if (!userMarker) return;
    try {
        userMarker.setLatLng([lat, lng]);
        if (head != null) {
            if (typeof userMarker.setHeading === 'function') {
                userMarker.setHeading(head);
            } else if (typeof userMarker.setRotationAngle === 'function') {
                userMarker.setRotationAngle(head);
            }
        }
    } catch (_) {
        // Silent fail — interpolator must never crash the pipeline
    }
}

// Lifecycle hooks: halt the rAF loop when the page is hidden or unloading
document.addEventListener('visibilitychange', () => { if (document.hidden) _interp.halt(); });
window.addEventListener('beforeunload', () => { _interp.halt(); });

// ─── INACTIVITY RE-CENTER ─────────────────────────────────────────────────────
// Called by the external inactivity timer. Uses flyTo instead of setView so the
// animation is smooth. Sets window._recentering for the duration so stageVisuals
// does not interrupt the flyTo with a competing pan.

function _onInactivityTimeout() {
    const pos = window.lastPosition;
    if (!map || !pos) return;

    const timeSinceInteraction = Date.now() - (window.lastInteractionTime || 0);
    if (timeSinceInteraction < C.RECENTER_GUARD_MS) return;

    const markerLL  = L.latLng(pos.lat, pos.lng);
    const markerPx  = map.latLngToContainerPoint(markerLL);
    const centerPx  = map.latLngToContainerPoint(map.getCenter());
    const pixelDist = markerPx.distanceTo(centerPx);
    if (pixelDist < C.RECENTER_MIN_PX) return;

    const currentZoom = map.getZoom();
    const targetZoom  = (typeof getSpeedBasedZoom === 'function')
        ? getSpeedBasedZoom(pos.speedMPS || 0)
        : currentZoom;
    const zoom = Math.abs(targetZoom - currentZoom) > C.RECENTER_ZOOM_THRESH
        ? targetZoom
        : currentZoom;

    const duration = Math.min(C.RECENTER_MAX_DUR,
        Math.max(C.RECENTER_MIN_DUR, pixelDist / C.RECENTER_PX_PER_SEC));

    window.isMapInteracting = false;
    window.followUser       = true;
    window._recentering     = true;

    map.flyTo([pos.lat, pos.lng], zoom, {
        animate: true, duration, easeLinearity: C.RECENTER_EASE, noMoveStart: true
    });

    if (window._recenteringTimer) clearTimeout(window._recenteringTimer);
    window._recenteringTimer = setTimeout(() => {
        window._recentering      = false;
        window._recenteringTimer = null;
    }, duration * 1000 + 100);
}

window._onInactivityTimeout = _onInactivityTimeout;

// ─── PIPELINE CONTEXT ─────────────────────────────────────────────────────────

function _makeCtx(position, forceUpdate) {
    return {
        position, forceUpdate,
        now: performance.now(), currentTime: Date.now(),
        coords: null, lat: 0, lng: 0,
        rawAcc: 20, rawHead: null, rawSpeed: 0,
        newPos: null, lastPos: window.lastPosition || null, timeDelta: 0,
        reliableSpeed: 0, modeMPH: 0, displayMPH: 0, speedMPS: 0,
        emaFast: 0, emaSlow: 0,
        modeChanged: false, centered: false,
        closestDist: Infinity, closestLoc: null, locsWithDist: [],
        distance: 0, eastWest: false, speedFactor: 0,
        validHead: null, displayHead: null, hDiff: 0, dirFactor: 1.0,
        speedTier: null, tierParams: null,
        bufferedPos: null, instantVel: { lat: 0, lng: 0 }, smoothVel: { lat: 0, lng: 0 },
        buffer: null,
        finalSF: 0, smoothedPos: null, boost: 1.0,
        finalDur: 0, finalEase: 0, lookAhead: 0,
        useInterp: false
    };
}

// Single synchronous commit point for all halt paths
function _commit(position, time, force, buffer) {
    window.lastPosition        = position;
    window.lastUpdateTime      = time;
    window.lastUpdateTimestamp = time;
    if (buffer !== undefined) window.positionBuffer = buffer;
    updateDistanceBox?.(force);
}

// Debug-only phase assertions — no-ops when _gpsDebug is false
function _assertPhase(phase, ctx) {
    if (!window._gpsDebug) return;
    const req = {
        1: ['coords', 'lat', 'lng', 'currentTime', 'newPos'],
        2: ['reliableSpeed', 'modeMPH', 'displayMPH', 'speedMPS'],
        3: ['closestDist'],
        4: ['distance', 'speedTier', 'tierParams', 'dirFactor']
    }[phase];
    if (!req) return;
    for (const f of req) {
        if (ctx[f] === undefined || ctx[f] === null) {
            console.error(`[Pipeline] Phase ${phase} assertion: ctx.${f} is ${ctx[f]}`);
        }
    }
}

// ─── PIPELINE STAGES ──────────────────────────────────────────────────────────
// Every stage returns { ctx, sig }. No exceptions. No void returns.

function stageValidate(ctx) {
    if (map && !window._interactionHandlersSetup) setupMapInteractionHandlers();
    const c = ctx.position?.coords;
    if (!U.valid(c)) return { ctx, sig: SIG.HALT };
    const age = (ctx.currentTime - (ctx.position.timestamp || 0)) / 1000;
    if (!ctx.forceUpdate && age > C.GPS_MAX_AGE_SEC) return { ctx, sig: SIG.HALT };
    ctx.coords = c;
    return { ctx, sig: SIG.CONTINUE };
}

function stageDebounce(ctx) {
    const { now, forceUpdate, coords, lastPos } = ctx;
    let stat = false;
    if (lastPos && !forceUpdate) {
        stat = Math.abs(coords.latitude  - lastPos.lat) < C.STAT_COORD_THRESH &&
               Math.abs(coords.longitude - lastPos.lng) < C.STAT_COORD_THRESH;
    }
    const delay   = stat ? C.DEBOUNCE_STAT_MS : C.DEBOUNCE_MOVE_MS;
    const lastDeb = window._lastDebounceTime || 0;

    if (!forceUpdate && (now - lastDeb) < delay) {
        if (window._debounceTimeoutId) clearTimeout(window._debounceTimeoutId);
        window._pendingPosition    = ctx.position;
        window._pendingForceUpdate = false;
        const gen = (window._locationUpdateGeneration || 0) + 1;
        window._locationUpdateGeneration = gen;
        window._debounceTimeoutId = setTimeout(() => {
            if ((window._locationUpdateGeneration || 0) !== gen) {
                window._debounceTimeoutId = null;
                return;
            }
            const pp = window._pendingPosition;
            window._pendingPosition   = null;
            window._debounceTimeoutId = null;
            if (pp) updateUserLocation(pp, false);
        }, delay - (now - lastDeb));
        return { ctx, sig: SIG.DEFER };
    }

    window._lastDebounceTime = now;
    if (window._debounceTimeoutId) {
        clearTimeout(window._debounceTimeoutId);
        window._debounceTimeoutId = null;
    }
    window._locationUpdateGeneration = (window._locationUpdateGeneration || 0) + 1;
    if (window._nextLocationUpdateRAF) {
        cancelAnimationFrame(window._nextLocationUpdateRAF);
        window._nextLocationUpdateRAF = null;
    }
    return { ctx, sig: SIG.CONTINUE };
}

function stageWatchdog(ctx) {
    if (window._gpsTimeoutTimer) clearTimeout(window._gpsTimeoutTimer);
    window._gpsTimeoutTimer = setTimeout(() => {
        if (!window.isGPSSearching) {
            window.isGPSSearching = true;
            showGPSSearchingState?.();
        }
    }, C.GPS_TIMEOUT_MS);
    return { ctx, sig: SIG.CONTINUE };
}

function stageNormalize(ctx) {
    const { coords, currentTime, lastPos } = ctx;
    ctx.lat      = coords.latitude;
    ctx.lng      = coords.longitude;
    ctx.rawAcc   = coords.accuracy || 20;
    ctx.rawHead  = coords.heading ?? null;
    ctx.rawSpeed = Math.max(0, coords.speed || 0);
    ctx.timeDelta = (lastPos && window.lastUpdateTime)
        ? (currentTime - window.lastUpdateTime) / 1000
        : 0;

    if (ctx.timeDelta > C.SESSION_GAP_SEC) {
        window.positionBuffer      = [];
        window.smoothedVelocity    = { lat: 0, lng: 0 };
        window.isStationary        = false;
        window.stationaryStartTime = null;
        // Hard reset: halt the interpolator and clear all kinematic state so
        // the next fix starts fresh rather than blending across a session gap
        _interp.halt();
        _interp._vLat = null;
    }

    ctx.newPos = {
        lat: ctx.lat, lng: ctx.lng, accuracy: ctx.rawAcc,
        heading: ctx.rawHead, speedMPS: ctx.rawSpeed, timestamp: currentTime
    };
    return { ctx, sig: SIG.CONTINUE };
}

// ─── stageSpeed ───────────────────────────────────────────────────────────────
//
// v8.0: EMA alphas are time-normalised so the effective smoothing constant is
// identical regardless of GPS fix rate. Without normalisation, a device firing
// at 4 Hz applies EMA_FAST four times per second while one at 0.5 Hz applies
// it once every two seconds — an 8× difference in effective smoothing. The
// formula α_t = 1 − (1−α)^dtSec maps the per-fix alpha to a per-second
// equivalent, then scales it to the actual elapsed time.
//
// High-speed raw override is unchanged: when raw GPS or calculated speed
// exceeds the HIGH_SPEED threshold we trust the raw value directly so the
// tier system reacts immediately to sudden acceleration.

function stageSpeed(ctx) {
    const { lastPos, timeDelta, rawSpeed } = ctx;
    let reliable = rawSpeed;

    if (lastPos && timeDelta > 0.15 && timeDelta < 5.0) {
        const dist = calculateDistance(lastPos, ctx.newPos);
        const calc = Math.min(dist / timeDelta, C.SPEED_CAP_MPS);
        if (!(dist > C.JUMP_DIST_M && timeDelta < C.JUMP_TIME_SEC)) {
            if ((reliable < 0.5 && calc > 1.0) || (calc > reliable * 1.5 && calc > 2.0)) {
                reliable = calc;
            }
        }
    }

    // Time-normalise the EMA alphas so behaviour is fix-rate independent.
    // Clamp dtSec to [0.1, 2.0] to avoid wild exponents on stale fixes.
    const dtSec    = U.clamp(timeDelta || 1.0, 0.1, 2.0);
    const alphaF   = 1 - Math.pow(1 - C.EMA_FAST, dtSec);
    const alphaS   = 1 - Math.pow(1 - C.EMA_SLOW, dtSec);

    const ef = window._emaSpeedFast ?? reliable;
    const es = window._emaSpeedSlow ?? reliable;
    ctx.emaFast = alphaF * reliable + (1 - alphaF) * ef;
    ctx.emaSlow = alphaS * reliable + (1 - alphaS) * es;

    ctx.modeMPH       = Math.min(ctx.emaFast * C.MPS_MPH, C.SPEED_CAP_MPH);
    ctx.displayMPH    = Math.min(ctx.emaSlow * C.MPS_MPH, C.SPEED_CAP_MPH);
    ctx.speedMPS      = ctx.emaSlow;
    ctx.reliableSpeed = reliable;

    // Raw high-speed override: trust GPS/calculated value directly above threshold
    const high    = SPEED_THRESHOLDS?.HIGH_SPEED ?? 45;
    const rawGPS  = rawSpeed * C.MPS_MPH;
    const rawCalc = (lastPos && timeDelta > 0.15)
        ? Math.min(
            (calculateDistance(lastPos, ctx.newPos) / timeDelta) * C.MPS_MPH,
            C.SPEED_CAP_MPS * C.MPS_MPH
          )
        : 0;
    if (rawGPS  >= high) ctx.modeMPH = rawGPS;
    else if (rawCalc >= high) ctx.modeMPH = rawCalc;

    return { ctx, sig: SIG.CONTINUE };
}

function stageMode(ctx) {
    ctx.modeChanged = ModeManager.update(ctx.rawSpeed * C.MPS_MPH);
    ctx.centered    = ModeManager.isCentered();

    if (ctx.displayMPH >= 1.0) _clearInactivityTimer();
    else _startInactivityTimer();

    return { ctx, sig: SIG.CONTINUE };
}

function stageGPSRecovery(ctx) {
    if (!window.isGPSSearching) return { ctx, sig: SIG.CONTINUE };
    window.isGPSSearching         = false;
    window.positionBuffer         = [ctx.newPos];
    window.lastVelocity           = { lat: 0, lng: 0 };
    window.smoothedVelocity       = { lat: 0, lng: 0 };
    window.isStationary           = false;
    window.stationaryStartTime    = null;
    window.stationaryLockPosition = null;
    // Snap the interpolator to the recovery fix so it doesn't try to blend
    // from wherever it was before signal loss
    _interp.snapTo(ctx.lat, ctx.lng, ctx.rawHead);
    hideGPSSearchingState?.();
    return { ctx, sig: SIG.CONTINUE };
}

function stageProximity(ctx) {
    const { lat, lng, newPos, lastPos } = ctx;
    const locs    = window.gameLocations;
    const changed = lastPos && (
        Math.abs(lat - lastPos.lat) > 1e-7 ||
        Math.abs(lng - lastPos.lng) > 1e-7
    );

    if (!changed && window._lastClosestDistance !== undefined && window._lastClosestLocation) {
        ctx.closestDist = window._lastClosestDistance;
        ctx.closestLoc  = window._lastClosestLocation;
        return { ctx, sig: SIG.CONTINUE };
    }

    let cd = Infinity, cl = null;
    const out = [];
    if (Array.isArray(locs) && locs.length) {
        const R      = C.PROX_RADIUS;
        const latMin = lat - R, latMax = lat + R;
        const lngMin = lng - R, lngMax = lng + R;
        for (const loc of locs) {
            if (!loc?.lat) continue;
            if (loc.lat < latMin || loc.lat > latMax || loc.lng < lngMin || loc.lng > lngMax) continue;
            const d = calculateDistance(newPos, loc);
            out.push({ location: loc, distance: d });
            if (d < cd) { cd = d; cl = loc; }
        }
    }
    window._lastClosestDistance = cd;
    window._lastClosestLocation = cl;
    ctx.closestDist  = cd;
    ctx.closestLoc   = cl;
    ctx.locsWithDist = out;
    window.proximityState = (cl && cd !== Infinity)
        ? { closestLocation: cl, distanceMeters: cd }
        : null;
    return { ctx, sig: SIG.CONTINUE };
}

function stageCache(ctx) {
    const { currentTime, locsWithDist, newPos } = ctx;
    if (!locsWithDist?.length) return { ctx, sig: SIG.CONTINUE };
    if (window._lastCacheUpdate && (currentTime - window._lastCacheUpdate) <= C.CACHE_INTERVAL_MS) {
        return { ctx, sig: SIG.CONTINUE };
    }
    const fn = window.enterpriseCacheManager?.cacheLocationData;
    if (fn) {
        for (const { location, distance } of locsWithDist) {
            if (distance <= C.CACHE_MAX_DIST_M) fn(location, newPos);
        }
    }
    window._lastCacheUpdate = currentTime;
    return { ctx, sig: SIG.CONTINUE };
}

function stageFirstFix(ctx) {
    if (ctx.lastPos) return { ctx, sig: SIG.CONTINUE };
    _initializeUserLocationState(ctx.newPos, ctx.currentTime, ctx.forceUpdate);
    return { ctx, sig: SIG.HALT };
}

function stageMotion(ctx) {
    const { lastPos, lat, lng, rawHead, rawSpeed, displayMPH, speedMPS, timeDelta } = ctx;
    if (!lastPos) return { ctx, sig: SIG.HALT };

    const dist = calculateDistance(lastPos, ctx.newPos);
    const latD = Math.abs(lat - lastPos.lat);
    const lngD = Math.abs(lng - lastPos.lng);
    const ew   = lngD > latD * 1.2;
    const sf   = Math.min(1, Math.max(0.01, speedMPS / 15));

    if (timeDelta > 0 && timeDelta < 5) {
        const lastMPH = (lastPos.speedMPS || 0) * C.MPS_MPH;
        const accel   = Math.abs(displayMPH - lastMPH) / timeDelta;
        for (const { belowMPH, maxAccel } of ACCEL_REJECT) {
            if (displayMPH < belowMPH && accel > maxAccel) return { ctx, sig: SIG.HALT };
        }
    }

    let vHead      = rawHead;
    const lastHead = lastPos.heading ?? null;
    if (lastHead != null && rawHead != null) {
        const fs = (displayMPH < 8) ? 1.5 : C.HEAD_FILT_MPS;
        if (rawSpeed < fs && U.hDiff(rawHead, lastHead) > C.HEAD_FILT_DEG) vHead = lastHead;
    }

    const dHead = U.normH(lastHead, vHead);
    const hd    = U.hDiff(vHead, lastHead);
    const df    = hd > C.HEAD_SMOOTH_DEG ? Math.max(0.5, 1 - hd / 240) : 1.0;

    ctx.distance    = dist;
    ctx.eastWest    = ew;
    ctx.speedFactor = sf;
    ctx.validHead   = vHead;
    ctx.displayHead = dHead;
    ctx.hDiff       = hd;
    ctx.dirFactor   = df;
    return { ctx, sig: SIG.CONTINUE };
}

function stageTier(ctx) {
    const t  = resolveTier(ctx.modeMPH);
    const ew = ctx.eastWest ? C.EW_ADJ : 1.0;
    ctx.tierParams = t.p;
    ctx.speedTier  = {
        micro:   t.p.micro,
        minDist: t.p.minDist * (ctx.eastWest ? 0.92 : 1.0),
        maxAcc:  t.p.maxAcc,
        maxSpd:  t.p.maxSpd,
        mapInt:  Math.max(33, t.p.mapInt  * ew),
        mapDist: t.p.mapDist,
        panDur:  t.p.panDur  * ew,
        easeLin: t.p.easeLin * (ctx.eastWest ? 0.92 : 1.0)
    };
    _TM.meta('tier', t.name);
    return { ctx, sig: SIG.CONTINUE };
}

function stageLargeJump(ctx) {
    if (ctx.distance > C.LARGE_JUMP_M || ctx.forceUpdate) {
        _handleLargeDistanceJump(ctx.newPos, ctx.currentTime);
        // Snap the interpolator so it doesn't animate across the jump gap
        _interp.snapTo(ctx.lat, ctx.lng, ctx.validHead);
        _commit(ctx.newPos, ctx.currentTime, ctx.forceUpdate);
        return { ctx, sig: SIG.HALT };
    }
    return { ctx, sig: SIG.CONTINUE };
}

function stageStationary(ctx) {
    const { distance, lat, lng, currentTime, forceUpdate, lastPos } = ctx;

    if (distance < C.STAT_THRESH_M) {
        if (!window.stationaryStartTime) window.stationaryStartTime = currentTime;
        const dur = currentTime - window.stationaryStartTime;

        if (!window.isStationary && dur >= C.STAT_CONFIRM_MS) {
            _confirmStationary(ctx.newPos, currentTime);
            _interp.halt();
            _cleanupMarkerStyles?.();
            return { ctx, sig: SIG.HALT };
        }

        if (window.isStationary) {
            const lock = Math.max(C.STAT_LOCK_M, Math.min(ctx.newPos.accuracy * 0.25, 2.0));
            const dfl  = window.stationaryLockPosition
                ? calculateDistance(window.stationaryLockPosition, ctx.newPos)
                : Infinity;
            if (dfl < lock && ctx.newPos.accuracy < lastPos.accuracy * C.ACC_STAT) {
                scheduleMarkerUpdate(lat, lng);
                window.lastPosition           = ctx.newPos;
                window.stationaryLockPosition = { lat, lng };
                updateDistanceBox?.(forceUpdate);
            }
            return { ctx, sig: SIG.HALT };
        }

        if (distance > 0.15) {
            const cur = userMarker?.getLatLng?.();
            const tgt = L.latLng(lat, lng);
            if (cur && cur.distanceTo(tgt) > 0.3) {
                scheduleMarkerUpdate(lat, lng, { animate: true, duration: 1.2, easeLinearity: 0.05 });
                _commit(ctx.newPos, currentTime, forceUpdate);
            }
        }
        return { ctx, sig: SIG.HALT };
    }

    // Movement confirmed — clear all stationary state
    window.stationaryStartTime    = null;
    window.isStationary           = false;
    window.stationaryLockPosition = null;
    if (window.stationaryCheckTimeout) {
        clearTimeout(window.stationaryCheckTimeout);
        window.stationaryCheckTimeout = null;
    }
    return { ctx, sig: SIG.CONTINUE };
}

function stageQuality(ctx) {
    const { distance, timeDelta, displayMPH, newPos, forceUpdate, lastPos } = ctx;
    const st = ctx.speedTier;
    window._poorAccuracyStreak = window._poorAccuracyStreak || 0;

    if (!forceUpdate) {
        if (newPos.accuracy > st.maxAcc) {
            window._poorAccuracyStreak++;
            if (window._poorAccuracyStreak > C.POOR_ACC_LIMIT) return { ctx, sig: SIG.HALT };
        } else {
            window._poorAccuracyStreak = 0;
        }
        if (distance < st.minDist) return { ctx, sig: SIG.HALT };
        if (timeDelta > 0 && distance / timeDelta > st.maxSpd) return { ctx, sig: SIG.HALT };
    } else {
        window._poorAccuracyStreak = 0;
    }

    // Near-stationary: only update if accuracy genuinely improved
    if (window.isStationary || (displayMPH < 0.5 && distance < 0.1)) {
        if (newPos.accuracy < lastPos.accuracy * C.ACC_IMPROVE) {
            scheduleMarkerUpdate(ctx.lat, ctx.lng);
            _commit(newPos, ctx.currentTime, forceUpdate, [newPos]);
        } else if (window.isStationary) {
            const dfl = window.stationaryLockPosition
                ? calculateDistance(window.stationaryLockPosition, newPos)
                : Infinity;
            if (newPos.accuracy < lastPos.accuracy * C.ACC_STAT && dfl < C.STAT_LOCK_M) {
                scheduleMarkerUpdate(ctx.lat, ctx.lng);
                window.lastPosition           = newPos;
                window.stationaryLockPosition = { lat: ctx.lat, lng: ctx.lng };
                updateDistanceBox?.(forceUpdate);
            }
        }
        return { ctx, sig: SIG.HALT };
    }

    // Fast-pass: large movement or accuracy jump — skip smoothing pipeline
    if (distance > C.FAST_PASS_M || newPos.accuracy < lastPos.accuracy * C.ACC_IMPROVE) {
        scheduleMarkerUpdate(ctx.lat, ctx.lng);
        _interp.snapTo(ctx.lat, ctx.lng, ctx.validHead);
        _commit(newPos, ctx.currentTime, forceUpdate, [newPos]);
        return { ctx, sig: SIG.HALT };
    }

    return { ctx, sig: SIG.CONTINUE };
}

// ─── stageSmooth ──────────────────────────────────────────────────────────────
//
// v8.0: Buffer weighting now projects each historical sample forward to the
// current timestamp using the smoothed velocity before averaging. The old
// approach weighted positions as-recorded, which introduced a systematic
// rearward bias: the weighted centroid was always slightly behind the device's
// actual position at the moment the fix was processed.
//
// By projecting each sample to "now" via:
//
//   projLat = p.lat + smoothedVelocity.lat * age
//   projLng = p.lng + smoothedVelocity.lng * age
//
// the weighted average converges to where the device is now rather than where
// it was on average across the buffer window. At walking pace the difference
// is sub-pixel; at 60 mph with a 1-second fix interval the forward correction
// is ~27 m — enough to be clearly visible as trailing without it.
//
// Everything else (prediction, buffer management, velocity EMA) is unchanged.

function stageSmooth(ctx) {
    const { lat, lng, timeDelta, rawAcc, validHead, speedMPS,
            speedFactor, displayMPH, currentTime, distance, lastPos } = ctx;

    window.lastVelocity     = window.lastVelocity     || { lat: 0, lng: 0 };
    window.smoothedVelocity = window.smoothedVelocity || { lat: 0, lng: 0 };

    const iv = {
        lat: timeDelta > 0 ? (lat - lastPos.lat) / timeDelta : 0,
        lng: timeDelta > 0 ? (lng - lastPos.lng) / timeDelta : 0
    };

    const va = Math.max(0.15, Math.min(0.5, 0.4 - displayMPH * 0.003));
    window.smoothedVelocity = {
        lat: window.smoothedVelocity.lat * va + iv.lat * (1 - va),
        lng: window.smoothedVelocity.lng * va + iv.lng * (1 - va)
    };

    const cosLat = Math.cos(lat * Math.PI / 180);
    let eff = speedMPS;
    if (eff == null && timeDelta > 0) eff = distance / timeDelta;

    const conf = Math.min(1, Math.max(0.1, 10 / (rawAcc || 20)));
    const pw   = Math.min(C.PRED_MAX_SEC, (0.3 + speedFactor * 0.5) * conf);

    let pl, pg;
    if (validHead !== null) {
        const r = validHead * Math.PI / 180;
        pl = lat + (eff * Math.cos(r) / C.EARTH_M_DEG) * pw;
        pg = lng + (eff * Math.sin(r) / (C.EARTH_M_DEG * cosLat)) * pw;
    } else {
        pl = lat + window.smoothedVelocity.lat * pw;
        pg = lng + window.smoothedVelocity.lng * pw;
    }

    const dr  = {
        lat: pl, lng: pg, accuracy: rawAcc,
        heading: validHead, speedMPS: eff, timestamp: currentTime
    };
    let buf = window.positionBuffer || [];
    buf.push(dr);
    if (buf.length > C.BUFFER_MAX) buf.shift();

    // Weight each historical sample and project it forward to "now" using the
    // current smoothed velocity. This eliminates the systematic rearward bias
    // that caused the smoothed position to trail the device at speed.
    const decay = 0.45 + speedFactor * 0.45;
    const sv    = window.smoothedVelocity;   // capture for inner loop
    let tw = 0, wl = 0, wg = 0;
    for (const p of buf) {
        const age  = (currentTime - p.timestamp) / 1000;
        const w    = Math.exp(-age * decay) * (p.accuracy > 0 ? Math.min(1, 20 / p.accuracy) : 0.5);
        // Project this historical sample forward to the current moment
        const projLat = p.lat + sv.lat * age;
        const projLng = p.lng + sv.lng * age;
        wl += projLat * w;
        wg += projLng * w;
        tw += w;
    }

    ctx.bufferedPos = {
        lat: wl / tw, lng: wg / tw,
        accuracy: dr.accuracy, heading: dr.heading,
        speedMPS: dr.speedMPS, timestamp: currentTime
    };
    ctx.instantVel = iv;
    ctx.smoothVel  = { ...window.smoothedVelocity };
    ctx.buffer     = buf;
    return { ctx, sig: SIG.CONTINUE };
}

function stageSmoothFactor(ctx) {
    const { tierParams: tp, speedFactor, distance, timeDelta, hDiff,
            eastWest, dirFactor, modeChanged, currentTime,
            displayMPH, centered, lastPos, bufferedPos } = ctx;

    const base = Math.min(tp.sMax, Math.max(tp.sMin, tp.sBase + speedFactor * tp.sMult));
    const sfD  = Math.min(0.05, distance * 0.0035);
    const sfT  = timeDelta > 0 ? Math.min(0.03, Math.max(-0.015, (timeDelta - 0.35) * 0.045)) : 0;
    const sfH  = (hDiff > 20 && (displayMPH < 45 || hDiff > 45))
        ? Math.max(0, 0.04 - hDiff / 200 * 0.06) : 0;
    const sfEW = eastWest ? 0.018 : 0;

    // Mode transition boost — directional, quadratic-out easing
    let boost = 1.0, maxSF = 0.52;
    let transTime = window._modeTransitionTime || 0;

    if (modeChanged) {
        transTime = currentTime;
        boost = centered ? C.BOOST_ENTRY_PEAK    : C.BOOST_EXIT_PEAK;
        maxSF = centered ? C.BOOST_ENTRY_MAX_SF  : C.BOOST_EXIT_MAX_SF;
    } else if (transTime) {
        const age = currentTime - transTime;
        if (age < C.BOOST_DURATION_MS) {
            const t     = age / C.BOOST_DURATION_MS;
            const eased = 1 - t * t;
            const peak  = centered ? C.BOOST_ENTRY_PEAK   : C.BOOST_EXIT_PEAK;
            maxSF       = centered ? C.BOOST_ENTRY_MAX_SF : C.BOOST_EXIT_MAX_SF;
            boost       = peak - (peak - 1.0) * eased;
        } else {
            transTime = 0;
        }
    }

    const raw   = (base + sfD + sfT - sfH + sfEW) * dirFactor * boost;
    const final = Math.min(maxSF, Math.max(0.11, raw));

    ctx.finalSF    = final;
    ctx.boost      = boost;
    ctx.smoothedPos = {
        lat:      lastPos.lat * (1 - final) + bufferedPos.lat * final,
        lng:      lastPos.lng * (1 - final) + bufferedPos.lng * final,
        accuracy: bufferedPos.accuracy,
        heading:  bufferedPos.heading,
        speedMPS: bufferedPos.speedMPS,
        timestamp: currentTime
    };
    window._modeTransitionTime = transTime;
    _TM.meta('boost', boost);
    return { ctx, sig: SIG.CONTINUE };
}

function stageAnim(ctx) {
    const { speedTier, tierParams: tp, distance, timeDelta, hDiff,
            eastWest, dirFactor, speedFactor, displayMPH } = ctx;

    const dur  = speedTier.panDur;
    const dd   = Math.min(0.02, distance * 0.001);
    const dt   = timeDelta > 0 ? Math.max(-0.01, Math.min(0.02, (0.25 - timeDelta) * 0.04)) : 0;
    const dH   = hDiff > 20 ? Math.min(0.04, hDiff / 300 * 0.08) : 0;
    const dEW  = eastWest ? Math.min(0.025, distance * 0.0005) : 0;
    ctx.finalDur = Math.max(0.03, (dur - dd + dt + dH + dEW) * dirFactor);

    ctx.finalEase = eastWest
        ? Math.max(0.07, Math.min(0.19, (0.13 - displayMPH * 0.0006) * dirFactor))
        : Math.max(0.08, Math.min(0.23, (0.15 - displayMPH * 0.0011) * dirFactor));

    const laB   = tp.laBase + speedFactor * tp.laMult;
    const laBst = displayMPH < 15 ? Math.min(0.08, distance * 0.0055) : 0;
    const laD   = hDiff > 25 ? Math.min(0.14, hDiff / 200 * 0.22) : 0;
    const laEW  = (displayMPH < 15 && eastWest) ? Math.min(0.055, distance * 0.0013) : 0;
    ctx.lookAhead = Math.max(0.01, Math.min(tp.laMax, laB + laBst - laD + laEW));
    return { ctx, sig: SIG.CONTINUE };
}

function stageVisuals(ctx) {
    const { smoothedPos, displayHead, finalDur, finalEase, speedTier, displayMPH, modeMPH,
            distance, modeChanged, centered, dirFactor, eastWest, bufferedPos,
            lastPos, lookAhead, currentTime } = ctx;

    // ── Marker decision ────────────────────────────────────────────────
    const useInterp = ctx.speedMPS >= _interp._minSpeed;

    if (useInterp) {
        _interp.setTarget(
            smoothedPos.lat, smoothedPos.lng,
            displayHead, smoothedPos.speedMPS,
            ctx.smoothVel.lat, ctx.smoothVel.lng
        );
    } else {
        if (_interp.isActive()) _interp.halt();
        const opts = { animate: true, duration: finalDur, easeLinearity: finalEase };
        if (displayHead != null) opts.heading = displayHead;
        scheduleMarkerUpdate(smoothedPos.lat, smoothedPos.lng, opts);
    }

    ctx.useInterp = useInterp;
    _TM.meta('interp', useInterp ? 'ACTIVE' : 'OFF');

    // ── Map pan decision ──────────────────────────────────────────────
    const agg = typeof highSpeedAggressiveness === 'function'
        ? Math.max(0.1, highSpeedAggressiveness(displayMPH)) : 0.5;
    let mapDist = speedTier.mapDist * (1 - 0.4 * agg);
    if (eastWest) mapDist *= C.EW_ADJ;

    const high        = SPEED_THRESHOLDS?.HIGH_SPEED ?? 45;
    const isHighDrift = distance > 8.0 && modeMPH >= high;
    const newDrift    = isHighDrift ? (window._driftCounter || 0) + 1 : 0;

    let interacting = window.isMapInteracting;
    if (interacting && displayMPH > C.MAP_TRAP_MPH &&
        currentTime - (window.lastMapUpdateTime || 0) > C.MAP_TRAP_MS) {
        interacting       = false;
        window.followUser = true;
    }

    const shouldMap = !window._recentering && (
        (modeChanged && centered) ||
        (currentTime - (window.lastMapUpdateTime || 0)) > speedTier.mapInt ||
        distance > mapDist ||
        newDrift >= 2
    );

    if (shouldMap && map) {
        const laPos = {
            lat: smoothedPos.lat + (bufferedPos.lat - lastPos.lat) * lookAhead,
            lng: smoothedPos.lng + (bufferedPos.lng - lastPos.lng) * lookAhead
        };
        const bounds = map.getBounds?.();

        if (bounds && !interacting && window.followUser) {
            if (centered) {
                const mLL  = L.latLng(smoothedPos.lat, smoothedPos.lng);
                const ms   = map.getSize();
                const mp   = map.latLngToContainerPoint(mLL);
                const ep   = Math.max(60, ms.x * 0.18);
                const epY  = Math.max(80, ms.y * 0.20);
                const near = mp.x < ep || mp.x > (ms.x - ep) ||
                             mp.y < epY || mp.y > (ms.y - epY);
                if ((modeChanged && centered) || near || newDrift >= 2) {
                    _panMapToCenter(laPos, speedTier, dirFactor, eastWest, displayMPH, lookAhead);
                }
            } else if (_isNearViewportEdge(smoothedPos, bounds, displayMPH)) {
                _panMapIfNearEdge(laPos, speedTier, dirFactor, eastWest, bounds, displayMPH);
            }
        }
        window.lastMapUpdateTime = currentTime;
    }

    _enforceViewportSafety?.(displayMPH, userMarker?.getLatLng?.());

    // ── RAF / fallback scheduling (only when interpolator is off) ─────
    if (!useInterp) {
        if (window._nextLocationUpdateRAF) cancelAnimationFrame(window._nextLocationUpdateRAF);
        window._visualFallbackActive = true;

        window._nextLocationUpdateRAF = requestAnimationFrame(() => {
            window._visualFallbackActive  = false;
            window._nextLocationUpdateRAF = null;
        });

        if (window._visualFallbackTimer) clearTimeout(window._visualFallbackTimer);
        window._visualFallbackTimer = setTimeout(() => {
            if (window._visualFallbackActive && window._nextLocationUpdateRAF) {
                cancelAnimationFrame(window._nextLocationUpdateRAF);
                window._nextLocationUpdateRAF = null;
                window._visualFallbackActive  = false;
            }
            window._visualFallbackTimer = null;
        }, C.VISUAL_FB_MS);
    }

    // ── Synchronous state commit ───────────────────────────────────────
    // window.lastPosition always holds the pipeline's smoothedPos.
    // The interpolator is purely visual and never writes here.
    window.lastPosition        = smoothedPos;
    window.lastVelocity        = ctx.instantVel;
    window.lastUpdateTime      = currentTime;
    window.lastUpdateTimestamp = currentTime;
    window.positionBuffer      = ctx.buffer;
    window.smoothedVelocity    = ctx.smoothVel;
    window._emaSpeedFast       = ctx.emaFast;
    window._emaSpeedSlow       = ctx.emaSlow;
    window._driftCounter       = newDrift;
    window.isMapInteracting    = interacting;
    updateDistanceBox?.(ctx.forceUpdate);

    return { ctx, sig: SIG.CONTINUE };
}

// ─── INSTRUMENTED STAGE WRAPPER ────────────────────────────────────────────────

function _run(name, fn, ctx, optional = false) {
    if (!_CB.ok(name)) {
        if (optional) { _TM.stage(name, 0, 'SKIP_CB'); return { ctx, sig: SIG.SKIP }; }
        console.warn(`[GPS] Circuit open for ${name}, attempting anyway`);
    }
    const t0 = performance.now();
    try {
        const result = fn(ctx);
        const ms     = performance.now() - t0;
        _TM.stage(name, ms,
            result.sig === SIG.HALT  ? 'HALT'  :
            result.sig === SIG.DEFER ? 'DEFER' :
            result.sig === SIG.SKIP  ? 'SKIP'  : 'OK');
        _CB.clear(name);
        return result;
    } catch (err) {
        _TM.stage(name, performance.now() - t0, 'ERROR');
        const tripped = _CB.hit(name);
        console.error(`[GPS] Stage ${name} failed:`, err);
        if (optional || tripped) return { ctx, sig: SIG.SKIP };
        throw err;
    }
}

// ─── MAIN PIPELINE ────────────────────────────────────────────────────────────

function updateUserLocation(position, forceUpdate = false) {
    _TM.start(forceUpdate);
    let ctx = _makeCtx(position, forceUpdate);

    // ── Phase 1: Input ────────────────────────────────────────────────
    let r = _run('validate', stageValidate, ctx);
    if (r.sig !== SIG.CONTINUE) { _TM.end('validate', 'HALT'); return; }
    ctx = r.ctx;

    r = _run('debounce', stageDebounce, ctx);
    if (r.sig !== SIG.CONTINUE) { _TM.end('debounce', r.sig === SIG.DEFER ? 'DEFER' : 'HALT'); return; }
    ctx = r.ctx;

    r = _run('watchdog', stageWatchdog, ctx, true);
    ctx = r.ctx;

    r = _run('normalize', stageNormalize, ctx);
    ctx = r.ctx;

    _assertPhase(1, ctx);

    // ── Phase 2: Speed & Mode ─────────────────────────────────────────
    r = _run('speed', stageSpeed, ctx);
    ctx = r.ctx;

    r = _run('mode', stageMode, ctx);
    ctx = r.ctx;

    r = _run('gpsRecovery', stageGPSRecovery, ctx);
    ctx = r.ctx;

    _assertPhase(2, ctx);

    // ── Phase 3: Context ──────────────────────────────────────────────
    r = _run('proximity', stageProximity, ctx);
    ctx = r.ctx;

    r = _run('cache', stageCache, ctx, true);
    ctx = r.ctx;

    // Proximity zoom must fire even when subsequent stages halt
    // (stationary lock, quality reject, large jump, etc.).
    // At this point displayMPH and eastWest haven't been computed for this
    // frame, so we use cached values from the previous run — EMA slow
    // changes so slowly the difference is negligible, and the east/west
    // heuristic is identical to the one in stageMotion.
    _handleProximityZoomLogic(
        (window._emaSpeedSlow != null ? window._emaSpeedSlow : ctx.rawSpeed) * C.MPS_MPH,
        ctx.lastPos
            ? Math.abs(ctx.lng - ctx.lastPos.lng) > Math.abs(ctx.lat - ctx.lastPos.lat) * 1.2
            : false
    );

    r = _run('firstFix', stageFirstFix, ctx);
    if (r.sig === SIG.HALT) { _TM.end('firstFix', 'HALT'); return; }
    ctx = r.ctx;

    _assertPhase(3, ctx);

    // ── Phase 4: Motion ───────────────────────────────────────────────
    r = _run('motion', stageMotion, ctx);
    if (r.sig === SIG.HALT) { _TM.end('motion', 'HALT'); return; }
    ctx = r.ctx;

    r = _run('tier', stageTier, ctx);
    ctx = r.ctx;

    r = _run('largeJump', stageLargeJump, ctx);
    if (r.sig === SIG.HALT) { _TM.end('largeJump', 'HALT'); return; }
    ctx = r.ctx;

    r = _run('stationary', stageStationary, ctx);
    if (r.sig === SIG.HALT) { _TM.end('stationary', 'HALT'); return; }
    ctx = r.ctx;

    r = _run('quality', stageQuality, ctx);
    if (r.sig === SIG.HALT) { _TM.end('quality', 'HALT'); return; }
    ctx = r.ctx;

    _assertPhase(4, ctx);

    // ── Phase 5: Smoothing & Rendering ────────────────────────────────
    if (!window._markerStylesOptimized && userMarker?.getElement) {
        const el = userMarker.getElement();
        if (el) {
            el.style.willChange         = 'transform';
            el.style.backfaceVisibility = 'hidden';
            el.style.transform          = 'translateZ(0)';
            window._markerStylesOptimized = true;
        }
    }

    try {
        r = _run('smooth', stageSmooth, ctx);
        ctx = r.ctx;

        r = _run('smoothFactor', stageSmoothFactor, ctx);
        ctx = r.ctx;

        r = _run('anim', stageAnim, ctx);
        ctx = r.ctx;

        r = _run('visuals', stageVisuals, ctx);
        ctx = r.ctx;

    } catch (err) {
        console.error('[GPS] Phase 5 error:', err);
        if (window._nextLocationUpdateRAF) cancelAnimationFrame(window._nextLocationUpdateRAF);
        if (window._visualFallbackTimer)   clearTimeout(window._visualFallbackTimer);
        window._visualFallbackActive = false;
        _interp.halt();
        scheduleMarkerUpdate(ctx.lat, ctx.lng, { animate: true, duration: 0.6, easeLinearity: 0.10 });
        _commit(ctx.newPos, ctx.currentTime, ctx.forceUpdate, ctx.newPos ? [ctx.newPos] : []);
        _TM.end('phase5', 'ERROR');
        return;
    }

    _TM.end(null, 'COMPLETE');
}

/* Proximity zoom logic */
function _handleProximityZoomLogic(speedMPH, eastWestMove) {
    const PROX_NEAR_M = 13.716;       // 45 ft — full zoom-in
    const PROX_FAR_M = 21.336;        // 70 ft — entry threshold
    const PROX_EXIT_FAR_M = 24.384;   // 80 ft — exit hysteresis (must reach to leave zone)
    const PROX_ZOOM_IN = 19;
    const PROX_ZOOM_OUT = 17;
    const PROX_THROTTLE_MS = 250;

    if (!window.proximityState || !map || window.isMapInteracting) {
        window._zoomAuthorityThisFrame = false;
        if (typeof _handleProximityZoom === 'function') {
            _handleProximityZoom(speedMPH, eastWestMove);
        }
        return;
    }

    const distM = window.proximityState.distanceMeters;

    /* ── INSIDE zone (or entering) ── */
    if (distM <= PROX_FAR_M) {

        // Smoothstep interpolation within the near→far band.
        // t=0 at PROX_NEAR_M (full zoom-in), t=1 at PROX_FAR_M (full zoom-out).
        const t_raw = (distM - PROX_NEAR_M) / (PROX_FAR_M - PROX_NEAR_M);
        const t = Math.max(0, Math.min(1, t_raw));
        const s = t * t * (3 - 2 * t);   // smoothstep — zero derivative at both ends
        const targetZoom = PROX_ZOOM_IN + s * (PROX_ZOOM_OUT - PROX_ZOOM_IN);

        const currentZoom = map.getZoom();
        const zoomDelta = Math.abs(targetZoom - currentZoom);
        const nowMs = Date.now();
        const throttleOk = !window._lastProxZoomRequest ||
            (nowMs - window._lastProxZoomRequest) >= PROX_THROTTLE_MS;
        const proxZoomBlocked = window._zoomAuthorityThisFrame === true;
        window._zoomAuthorityThisFrame = false;

        if (zoomDelta >= 0.15 && throttleOk && !proxZoomBlocked) {
            window._lastProxZoomRequest = nowMs;
            const zoomDur = Math.min(2.0, Math.max(0.6, zoomDelta * 0.55));

            const userLL = userMarker?.getLatLng?.();
            const proxLoc = window.proximityState.closestLocation;
            const poiLL = (proxLoc?.lat != null && proxLoc?.lng != null)
                ? L.latLng(proxLoc.lat, proxLoc.lng)
                : null;

            if (userLL && poiLL) {
                // Original fitBounds call — untouched
                map.fitBounds(L.latLngBounds([userLL, poiLL]), {
                    paddingTopLeft:     L.point(64, 64),
                    paddingBottomRight: L.point(64, 96),
                    animate:  true,
                    duration: zoomDur,
                    maxZoom:  PROX_ZOOM_IN
                });
            } else if (userLL) {
                map.flyTo(userLL, targetZoom, {
                    duration:     zoomDur,
                    easeLinearity: 0.25
                });
            }
        }

        window._inProximityZone = true;

    /* ── EXITING zone (hysteresis: must reach PROX_EXIT_FAR_M to truly leave) ── */
    } else if (distM >= PROX_EXIT_FAR_M && window._inProximityZone) {
        window._zoomAuthorityThisFrame = false;

        const currentZoom = map.getZoom();
        const exitDelta = Math.abs(currentZoom - PROX_ZOOM_OUT);

        if (exitDelta >= 0.15) {
            const exitDur = Math.min(2.0, Math.max(0.6, exitDelta * 0.55));
            const userLL = userMarker?.getLatLng?.();

            if (userLL) {
                map.flyTo(userLL, PROX_ZOOM_OUT, {
                    duration:     exitDur,
                    easeLinearity: eastWestMove ? 0.13 : 0.15
                });
            } else {
                map.flyTo(map.getCenter(), PROX_ZOOM_OUT, {
                    duration:     exitDur,
                    easeLinearity: 0.15
                });
            }
        }

        window._inProximityZone = false;
        window._lastProxZoomRequest = null;

    /* ── IN HYSTERESIS BAND (between FAR_M and EXIT_FAR_M) — hold current state ── */
    } else {
        window._zoomAuthorityThisFrame = false;
    }
}

/* Calculates a new map center in roaming mode when user approaches viewport edge. */
function _calculateRoamingTarget(userPos, bounds, speedMPH) {
    const currentCenter = map.getCenter();

    if (!_isNearViewportEdge(userPos, bounds, speedMPH)) {
        return currentCenter;
    }

    const viewportWidth  = bounds.getEast()  - bounds.getWest();
    const viewportHeight = bounds.getNorth() - bounds.getSouth();

    // Pan distance scales with speed: 0.25 at walking pace, 0.40 at highway.
    // Capped at 0.40 so the user never wakes up to find the map in another county.
    const speedFactor = Math.min(1.0, speedMPH / 70);
    const panDist     = 0.25 + speedFactor * 0.15;

    const marginLat = viewportHeight * 0.20;
    const marginLng = viewportWidth  * 0.20;

    let adjustedLat = currentCenter.lat;
    let adjustedLng = currentCenter.lng;

    const distFromNorth = bounds.getNorth() - userPos.lat;
    const distFromSouth = userPos.lat - bounds.getSouth();
    const distFromEast  = bounds.getEast()  - userPos.lng;
    const distFromWest  = userPos.lng - bounds.getWest();

    if (distFromNorth < marginLat) {
        adjustedLat = userPos.lat + (viewportHeight * panDist);
    } else if (distFromSouth < marginLat) {
        adjustedLat = userPos.lat - (viewportHeight * panDist);
    }

    if (distFromEast < marginLng) {
        adjustedLng = userPos.lng + (viewportWidth * panDist);
    } else if (distFromWest < marginLng) {
        adjustedLng = userPos.lng - (viewportWidth * panDist);
    }

    // Clamp to valid coordinate ranges
    adjustedLat = Math.max(-85.051129, Math.min(85.051129, adjustedLat));
    adjustedLng = ((adjustedLng + 180) % 360) - 180;

    return { lat: adjustedLat, lng: adjustedLng };
}
        
/* Pans the map in roaming mode when the user approaches a viewport edge. */
function panMapInRoaming(
    target,
    speedTier,
    directionChangeFactor,
    eastWestMovement,
    speedMPH
) {
    const PAN_THROTTLE_MS = 50;
    const now = Date.now();

    // ── Guards ────────────────────────────────────────────────────────
    if (!map || typeof map.getBounds !== 'function') return;
    if (!target || typeof target.lat !== 'number' || typeof target.lng !== 'number') return;
    if (!speedTier || typeof speedTier !== 'object') return;
    if (typeof ModeManager?.isCentered !== 'function') return;
    if (ModeManager.isCentered()) return;

    // ── State init ────────────────────────────────────────────────────
    if (!window.centeringState || typeof window.centeringState !== 'object') {
        window.centeringState = {
            isCentered: false,
            lastPanPosition: null,
            panVelocity: { x: 0, y: 0 }
        };
    } else {
        window.centeringState.isCentered = false;
    }

    const bounds = map.getBounds();
    if (!bounds) return;

    const mapSize = map.getSize();
    if (!mapSize || !mapSize.x || !mapSize.y) return;

    const targetPixel = map.latLngToContainerPoint(target);
    if (!targetPixel || typeof targetPixel.x !== 'number') return;

    // ── Edge detection ────────────────────────────────────────────────
    // Three zones: EDGE (start panning), CRITICAL (urgent), OFF_SCREEN (emergency).
    // Margins are speed-scaled so at highway speed the pan fires earlier,
    // giving the pipeline time to keep up rather than playing catch-up.
    const CRITICAL_MARGIN = 40;
    const safeSpeed       = (Number.isFinite(speedMPH) && speedMPH > 0) ? speedMPH : 0;
    const dynamicMargin   = Math.min(
        150 + safeSpeed * 2.0,
        Math.min(mapSize.x, mapSize.y) * 0.45
    );
    const marginPx = Math.max(dynamicMargin, CRITICAL_MARGIN);

    const nearLeft   = targetPixel.x < marginPx;
    const nearRight  = targetPixel.x > mapSize.x - marginPx;
    const nearTop    = targetPixel.y < marginPx;
    const nearBottom = targetPixel.y > mapSize.y - marginPx;
    const isNearEdge = nearLeft || nearRight || nearTop || nearBottom;

    const critLeft   = targetPixel.x < CRITICAL_MARGIN;
    const critRight  = targetPixel.x > mapSize.x - CRITICAL_MARGIN;
    const critTop    = targetPixel.y < CRITICAL_MARGIN;
    const critBottom = targetPixel.y > mapSize.y - CRITICAL_MARGIN;
    const isCritical = critLeft || critRight || critTop || critBottom;

    const isOffScreen = (
        targetPixel.x < 0 || targetPixel.x > mapSize.x ||
        targetPixel.y < 0 || targetPixel.y > mapSize.y
    );

    // Nothing to do — user comfortably inside the viewport
    if (!isNearEdge && !isCritical && !isOffScreen) {
        window.centeringState.lastPanPosition = null;
        return;
    }

    // ── Throttle ──────────────────────────────────────────────────────
    // Emergency zones bypass throttle entirely — every ms matters when
    // the marker is about to leave the screen.
    // Normal edge zone respects the 50ms throttle (≈20fps cap).
    const lastPanTime = window._lastPanTime || 0;
    const isEmergency = isOffScreen || isCritical;
    if (!isEmergency && (now - lastPanTime) < PAN_THROTTLE_MS) {
        return;
    }

    // ── Velocity-based pan intensity ──────────────────────────────────
    // Smoothed via exponential moving average (70% old, 30% new).
    // Plain x/y arithmetic avoids Leaflet Point API surface — works
    // whether lastPanPosition is a Leaflet Point or a plain object.
    let panIntensity = 1.0;

    if (window.centeringState.lastPanPosition && safeSpeed > 0) {
        const elapsedMs = now - lastPanTime;
        if (elapsedMs > 0) {
            const last    = window.centeringState.lastPanPosition;
            const deltaX  = targetPixel.x - last.x;
            const deltaY  = targetPixel.y - last.y;
            const invSec  = 1000 / elapsedMs;

            window.centeringState.panVelocity = {
                x: deltaX * invSec * 0.3 + window.centeringState.panVelocity.x * 0.7,
                y: deltaY * invSec * 0.3 + window.centeringState.panVelocity.y * 0.7
            };

            // 0.5× at low speed, 1.5× at 45+ mph — keeps pans proportional
            panIntensity = Math.min(1.5, Math.max(0.5, safeSpeed / 30));
        }
    }

    // ── Execute pan ───────────────────────────────────────────────────
    try {
        if (isEmergency) {
            // Immediate snap — no animation budget when marker is leaving screen
            map.panTo(target, { animate: false, noMoveStart: true });

            // Allow one normal-cadence frame before throttle re-engages,
            // rather than 0 (which floods the next tick) or full reset (which
            // starves recovery). 16ms ≈ one 60fps frame.
            window._lastPanTime = now - PAN_THROTTLE_MS + 16;

            if (window._gpsDebug) {
                console.debug('[PanRoaming] Emergency pan —',
                    isOffScreen ? 'off-screen' : 'critical zone');
            }
        } else {
            _executeRoamingModePan(
                target,
                speedTier,
                directionChangeFactor * panIntensity,
                eastWestMovement,
                speedMPH,
                bounds
            );
            window._lastPanTime = now;
        }

        window.centeringState.lastPanPosition = { x: targetPixel.x, y: targetPixel.y };

    } catch (err) {
        console.error('[PanRoaming] Pan execution failed:', err);

        // Reset velocity tracking so a bad frame doesn't poison the next one
        window.centeringState.lastPanPosition = null;
        window.centeringState.panVelocity     = { x: 0, y: 0 };

        // Best-effort fallback — if this also throws, let it bubble
        try {
            map.panTo(target, { animate: true, duration: 0.5 });
        } catch (_) {
            // Nothing left to try
        }
    }
}

/*  Pans the map to keep the user centered — **centered mode only**. */
function _panMapToCenter(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor = 0) {
    if (!map) {
        console.warn('[PanCenter] Map not available');
        return;
    }
    
    const bounds = map.getBounds?.();
    if (!bounds) {
        console.warn('[PanCenter] Bounds not available');
        return;
    }
    
    if (
        !target ||
        typeof target.lat !== 'number' ||
        typeof target.lng !== 'number' ||
        !isFinite(target.lat) ||
        !isFinite(target.lng)
    ) {
        console.warn('[PanCenter] Invalid target coordinates:', target);
        return;
    }
    
    // Enforce mode contract: this function is ONLY for centered mode
    if (!ModeManager.isCentered()) {
        console.warn('[PanCenter] Called outside centered mode — ignored');
        return;
    }
    
    // Initialize centering state if needed
    if (!window.centeringState) {
        window.centeringState = { isCentered: true };
    }
    window.centeringState.isCentered = true;
    
    // Execute centered-mode panning
    _executeCenteredModePan(target, speedTier, directionChangeFactor, eastWestMovement, speedMPH, lookAheadFactor);
}

/* Optional cleanup that can be called when the UI switches out of roaming mode. It resets all globals that this module touches, ensuring a clean slate. */
function cleanupRoamingState() {
    if (window.centeringState) {
        window.centeringState.lastPanPosition = null;
        window.centeringState.panVelocity = { x: 0, y: 0 };
    }
    window._lastPanTime = 0;
    window._centeredModeWarningShown = false;
}

/* ROAMING MODE (< HIGH_SPEED MPH): Only pan when near viewport edges */
function _executeRoamingModePan(
    target,
    speedTier,
    directionChangeFactor,
    eastWestMovement,
    speedMPH,
    bounds
) {
    if (!map || !target || !Number.isFinite(target.lat) || !Number.isFinite(target.lng)) return;

    const mapSize = map.getSize();
    if (!mapSize || !mapSize.x || !mapSize.y) return;

    const targetPixel = map.latLngToContainerPoint(target);
    if (!targetPixel || typeof targetPixel.x !== 'number' || typeof targetPixel.y !== 'number') return;

    const safeSpeed = (Number.isFinite(speedMPH) && speedMPH > 0) ? speedMPH : 0;
    const safeDCF   = (Number.isFinite(directionChangeFactor) && directionChangeFactor > 0)
        ? directionChangeFactor : 1.0;

    // ── Edge detection ────────────────────────────────────────────────
    // Three zones, consistent with panMapInRoaming:
    //   EDGE     — start panning gently
    //   CRITICAL — urgent correction needed
    //   OFF_SCREEN — emergency, no animation budget
    const CRITICAL_MARGIN = 40;
    const dynamicMargin   = Math.min(
        150 + safeSpeed * 2.0,
        Math.min(mapSize.x, mapSize.y) * 0.45
    );
    const marginPx = Math.max(dynamicMargin, CRITICAL_MARGIN);

    const nearLeft   = targetPixel.x < marginPx;
    const nearRight  = targetPixel.x > mapSize.x - marginPx;
    const nearTop    = targetPixel.y < marginPx;
    const nearBottom = targetPixel.y > mapSize.y - marginPx;
    const isNearEdge = nearLeft || nearRight || nearTop || nearBottom;

    const critLeft   = targetPixel.x < CRITICAL_MARGIN;
    const critRight  = targetPixel.x > mapSize.x - CRITICAL_MARGIN;
    const critTop    = targetPixel.y < CRITICAL_MARGIN;
    const critBottom = targetPixel.y > mapSize.y - CRITICAL_MARGIN;
    const isCritical = critLeft || critRight || critTop || critBottom;

    const isOffScreen = (
        targetPixel.x < 0 || targetPixel.x > mapSize.x ||
        targetPixel.y < 0 || targetPixel.y > mapSize.y
    );

    if (!isNearEdge && !isCritical && !isOffScreen) return;

    // ── Normalized distance from center ───────────────────────────────
    // Used to shorten duration when the marker is already close to center —
    // a short pan shouldn't take as long as a long one.
    const currentCenter = map.getCenter();
    const centerPixel   = map.latLngToContainerPoint(currentCenter);
    const pixelDistance = Math.hypot(
        targetPixel.x - centerPixel.x,
        targetPixel.y - centerPixel.y
    );
    const maxDistance   = Math.hypot(mapSize.x / 2, mapSize.y / 2);
    const normalizedDist = Math.min(1.0, pixelDistance / maxDistance);

    // ── Emergency: critical zone or off-screen ────────────────────────
    // No animation — every frame counts when the marker is leaving the screen.
    if (isOffScreen || isCritical) {
        if (window._gpsDebug) {
            console.debug('[RoamingPan] Emergency —',
                isOffScreen ? 'off-screen' : 'critical zone');
        }
        try {
            map.panTo([target.lat, target.lng], { animate: false, noMoveStart: true });
        } catch (err) {
            console.error('[RoamingPan] Emergency pan failed:', err);
        }
        return;
    }

    // ── Pan duration ──────────────────────────────────────────────────
    // Dual property fallback: panDur (v5) → panDuration (legacy) → default.
    let panDuration = ((speedTier?.panDur ?? speedTier?.panDuration) ?? 0.3) * safeDCF;

    if (eastWestMovement)       panDuration *= 0.90;
    if (normalizedDist < 0.20)  panDuration *= 0.75; // close to center → snap faster

    panDuration = Math.max(0.10, Math.min(1.0, panDuration));

    // ── Ease linearity ────────────────────────────────────────────────
    // Dual property fallback: easeLin (v5) → easeLinearity (legacy) → default.
    let easeLinearity = (speedTier?.easeLin ?? speedTier?.easeLinearity) ?? 0.2;
    easeLinearity = Math.max(0.10, Math.min(0.40, easeLinearity));

    // ── Execute ───────────────────────────────────────────────────────
    try {
        map.panTo([target.lat, target.lng], {
            animate:       true,
            duration:      panDuration,
            easeLinearity: easeLinearity,
            noMoveStart:   true
        });
    } catch (err) {
        console.error('[RoamingPan] panTo failed:', err);
        try {
            map.panTo([target.lat, target.lng], { animate: false });
        } catch (_) { /* nothing left to try */ }
        return;
    }

    if (window._gpsDebug) {
        console.debug(
            `[RoamingPan] ${safeSpeed.toFixed(1)}mph ` +
            `dist=${normalizedDist.toFixed(2)} ` +
            `dur=${(panDuration * 1000).toFixed(0)}ms ` +
            `ease=${easeLinearity.toFixed(3)} ` +
            `ew=${eastWestMovement}`
        );
    }
}

/* Pans the map in centered mode, keeping the marker at center with velocity look-ahead. */
function _executeCenteredModePan(
    target,
    speedTier,
    directionChangeFactor,
    eastWestMovement,
    speedMPH,
    lookAheadFactor
) {
    if (!map || !target || typeof target.lat !== 'number' || typeof target.lng !== 'number') return;

    const safeSpeed = (Number.isFinite(speedMPH) && speedMPH >= 0) ? speedMPH : 0;
    const safeDCF   = (Number.isFinite(directionChangeFactor) && directionChangeFactor > 0)
        ? directionChangeFactor : 1.0;

    // ── Look-ahead ────────────────────────────────────────────────────
    // smoothedVelocity is in degrees/sec (written by stageSmooth).
    // We project forward by lookAheadFactor seconds, capped at 1.0s to
    // prevent wild jumps on noisy GPS ticks.
    // No magic scaling constants — degrees/sec × seconds = degrees of offset.
    let centerLat = target.lat;
    let centerLng = target.lng;

    const sv = window.smoothedVelocity;
    if (
        lookAheadFactor > 0 &&
        sv && Number.isFinite(sv.lat) && Number.isFinite(sv.lng)
    ) {
        const lookAheadSec  = Math.min(1.0, lookAheadFactor);
        const lngMultiplier = eastWestMovement ? 0.85 : 1.0;

        // Clamp individual bias to ≈111m (0.001°) so a stale velocity spike
        // cannot teleport the map center off-screen.
        const MAX_BIAS_DEG = 0.001;
        const biasLat = Math.max(-MAX_BIAS_DEG, Math.min(MAX_BIAS_DEG,
            sv.lat * lookAheadSec
        ));
        const biasLng = Math.max(-MAX_BIAS_DEG, Math.min(MAX_BIAS_DEG,
            sv.lng * lookAheadSec * lngMultiplier
        ));

        centerLat += biasLat;
        centerLng += biasLng;
    }

    // Clamp to valid Web Mercator range
    centerLat = Math.max(-85.051129, Math.min(85.051129, centerLat));
    centerLng = ((centerLng + 180) % 360) - 180;

    // ── Pan duration ──────────────────────────────────────────────────
    // Property is panDur in v5 speedTier (stageVisuals / resolveTier).
    // Fall back gracefully if called with a legacy object that has panDuration.
    let panDuration = ((speedTier?.panDur ?? speedTier?.panDuration) ?? 0.2) * safeDCF;

    // Speed multipliers ordered HIGH → LOW so the first match wins.
    const HIGH_SPEED = SPEED_THRESHOLDS?.HIGH_SPEED ?? 45;

    if      (safeSpeed >= HIGH_SPEED) panDuration *= 0.60;
    else if (safeSpeed >= 30)         panDuration *= 0.70;
    else if (safeSpeed >= 20)         panDuration *= 0.80;

    if (eastWestMovement) panDuration *= 0.90;

    panDuration = Math.max(0.05, Math.min(0.5, panDuration));

    // ── Ease linearity ────────────────────────────────────────────────
    // Property is easeLin in v5 speedTier. Fall back to easeLinearity for
    // any legacy callers.
    let easeLinearity = (speedTier?.easeLin ?? speedTier?.easeLinearity) ?? 0.15;

    // Higher speed → slightly more linear (less elastic feel at 70mph)
    if      (safeSpeed >= HIGH_SPEED) easeLinearity = Math.min(0.30, easeLinearity * 1.6);
    else if (safeSpeed >= 30)         easeLinearity = Math.min(0.25, easeLinearity * 1.4);
    else if (safeSpeed >= 20)         easeLinearity = Math.min(0.20, easeLinearity * 1.2);

    easeLinearity = Math.max(0.10, Math.min(0.50, easeLinearity));

    // ── Execute ───────────────────────────────────────────────────────
    try {
        map.panTo([centerLat, centerLng], {
            animate:       true,
            duration:      panDuration,
            easeLinearity: easeLinearity,
            noMoveStart:   true
        });
    } catch (err) {
        console.error('[CenteredPan] panTo failed:', err);
        try {
            map.panTo([target.lat, target.lng], { animate: false });
        } catch (_) { /* nothing left to try */ }
        return;
    }

    if (window._gpsDebug) {
        console.debug(
            `[CenteredPan] ${safeSpeed.toFixed(1)}mph ` +
            `la=${lookAheadFactor?.toFixed(3)} ` +
            `dur=${(panDuration * 1000).toFixed(0)}ms ` +
            `ease=${easeLinearity.toFixed(3)} ` +
            `ew=${eastWestMovement}`
        );
    }
}

// --- CLEANUP FUNCTION ---
function disposeMapLoop() {
    // RAFs
    if (window._nextLocationUpdateRAF) {
        cancelAnimationFrame(window._nextLocationUpdateRAF);
        window._nextLocationUpdateRAF = null;
    }
    if (window.animationFrameId) {
        cancelAnimationFrame(window.animationFrameId);
        window.animationFrameId = null;
    }
    
    // Timeouts - Pipeline (v5)
    if (window._gpsTimeoutTimer) {
        clearTimeout(window._gpsTimeoutTimer);
        window._gpsTimeoutTimer = null;
    }
    if (window._debounceTimeoutId) {
        clearTimeout(window._debounceTimeoutId);
        window._debounceTimeoutId = null;
    }
    if (window._visualFallbackTimer) {
        clearTimeout(window._visualFallbackTimer);
        window._visualFallbackTimer = null;
    }
    if (window._recenteringTimer) {
        clearTimeout(window._recenteringTimer);
        window._recenteringTimer = null;
    }
    if (window._markerFallbackTimer) {
        clearTimeout(window._markerFallbackTimer);
        window._markerFallbackTimer = null;
    }
    
    // Inactivity timer
    if (window.inactivityTimer) {
        clearTimeout(window.inactivityTimer);
        window.inactivityTimer = null;
    }
    
    // Reset gate flags so the pipeline doesn't freeze if re-initialized
    window._visualFallbackActive = false;
    window._recentering = false;
    
    console.log("[Dispose] Map loop timers/RAF cleared. State preserved.");
}
        
/* Core function that resets the map to a new position. Shared logic between initialization and jump handling. */
function _resetMapToPosition(newPosition, options = {}) {
    if (!map || !userMarker || !newPosition) return;

    const currentTime  = options.currentTime    || Date.now();
    const resetType    = options.resetType      || 'jump';
    const forceUpdate  = options.forceUpdate    || false;
    const clearStat    = options.clearStationary !== false;
    const cancelPipe   = options.cancelPipeline  !== false;

    // ── Pipeline disposal ────────────────────────────────────────────────────
    if (cancelPipe) {
        if (window._nextLocationUpdateRAF) {
            cancelAnimationFrame(window._nextLocationUpdateRAF);
            window._nextLocationUpdateRAF = null;
        }
        if (window._visualFallbackTimer) {
            clearTimeout(window._visualFallbackTimer);
            window._visualFallbackTimer = null;
        }
        // Kill queued debounce — prevents stale position re-entry
        if (window._debounceTimeoutId) {
            clearTimeout(window._debounceTimeoutId);
            window._debounceTimeoutId  = null;
            window._pendingPosition    = null;
        }
        window._visualFallbackActive = false;
    }

    // Snapshot position — buffer must own its copy, not a shared reference
    const snap = { ...newPosition };

    // ── Type-specific state reset ────────────────────────────────────────────
    if (resetType === 'init') {
        setupMapInteractionHandlers();
        window.positionBuffer             = [snap];   // fresh copy
        window.stationaryStartTime        = currentTime;
        window.isMapInteracting           = false;
        window.lastInteractionTime        = currentTime;
        window.blockSpeedZoom             = false;
        window.zoomedInState              = false;
        window._lastCenteredMode          = false;
        window._viewportSafetyEnforced    = false;
    } else {
        if (clearStat && window.stationaryCheckTimeout) {
            clearTimeout(window.stationaryCheckTimeout);
            window.stationaryCheckTimeout = null;
        }
        window.positionBuffer      = [snap];
        window.stationaryStartTime = null;
    }

    // ── Shared state ─────────────────────────────────────────────────────────
    window.lastPosition          = snap;
    window.lastUpdateTime        = currentTime;
    window.lastUpdateTimestamp   = currentTime;
    window.lastVelocity          = { lat: 0, lng: 0 };
    window.smoothedVelocity      = { lat: 0, lng: 0 };
    window.isStationary          = false;
    window.stationaryLockPosition = null;
    window.followUser            = true;

    // ── Map operations ───────────────────────────────────────────────────────
    const mapContainer       = map.getContainer();
    const originalTransition = mapContainer.style.transition;
    mapContainer.style.transition = 'none';

    const currentZoom     = map.getZoom();
    const intelligentZoom = typeof getSpeedBasedZoom === 'function'
        ? getSpeedBasedZoom(snap.speedMPS)
        : -1;
    const targetZoom = (typeof intelligentZoom === 'number' && intelligentZoom > 0)
        ? intelligentZoom
        : (resetType === 'init' ? 17 : currentZoom);

    // try/catch so transition is always restored and safety always runs
    let mapSetOk = false;
    try {
        userMarker.setLatLng([snap.lat, snap.lng]);
        map.setView([snap.lat, snap.lng], targetZoom, {
            animate: false, noMoveStart: true, noMoveEnd: true
        });
        mapSetOk = true;
    } catch (err) {
        console.error(`[GPS] _resetMapToPosition ${resetType} setView failed:`, err);
        try {
            map.setView([snap.lat, snap.lng], resetType === 'init' ? 17 : currentZoom, { animate: false });
            userMarker.setLatLng([snap.lat, snap.lng]);
            mapSetOk = true;
        } catch (err2) {
            console.error('[GPS] _resetMapToPosition fallback also failed:', err2);
        }
    }

    // Always restore transition (FIX 2: runs even if setView threw)

                return;

            state.currentLocationId = locationId;
            state.lastZoomInTime = now;
            state.lastTransitionTime = now;
            state.controlGranted = true;

            window.zoomedInState = true;
            window.isNearLocation = true;
            window.blockSpeedZoom = true;

            if (CONFIG.DEBUG) {
                console.log('[PZ] Zooming IN:', {
                    location: locationId,
                    distance: Math.round(distanceFeet) + 'ft',
                    zoom: CONFIG.PROXIMITY_ZOOM_IN_LEVEL

            }

            _performProximityZoomIn(proximityData, eastWestMovement, CONFIG.PROXIMITY_ZOOM_IN_LEVEL);
        }

            const zoomState = window.zoomController.getState();

                state.currentLocationId = null;
                state.controlGranted = false;
                window.zoomedInState = false;
                window.isNearLocation = false;
                window.blockSpeedZoom = false;
                return;
            }

            window.zoomController.release('proximity');

            state.isZoomedIn = false;
            state.lastZoomOutTime = now;
            state.lastTransitionTime = now;
            state.controlGranted = false;

            window.zoomedInState = false;
            window.isNearLocation = false;
            window.blockSpeedZoom = false;

            if (CONFIG.DEBUG) {
                console.log('[PZ] Zooming OUT:', {
                    location: locationId,
                    distance: Math.round(distanceFeet) + 'ft',
                    zoom: CONFIG.PROXIMITY_ZOOM_OUT_LEVEL
                });

            _performProximityZoomOut(eastWestMovement, CONFIG.PROXIMITY_ZOOM_OUT_LEVEL);
        }

    } catch (error) {
        console.error('[PZ] Proximity zoom error:', error);
        try {
            _resetProximityZoom();
        } catch (cleanupError) {
            console.error('[PZ] Cleanup error:', cleanupError);
        }
    }

/* Returns true when the target position (usually the user) is within a speed-scaled margin of any viewport edge. */
function _isNearViewportEdge(targetPos, bounds, speedMPH) {
    // --- Safety Checks ---
    if (!targetPos) return false;

    if (
        !window.map ||
        typeof window.map.latLngToContainerPoint !== 'function' ||
        typeof window.map.getSize !== 'function'
    ) return false;

    // --- Configuration ---
    const MIN_MARGIN   = 150;  // Minimum pixel buffer from edge
    const SPEED_FACTOR = 2.0;  // Additional pixels per MPH
    const CRITICAL_ZONE = 60;  // Hard minimum regardless of speed

    // --- Map Size ---
    let mapSize;
    try {
        mapSize = window.map.getSize();
    } catch (e) {
        return false;
    }

    if (!mapSize || typeof mapSize.x !== 'number' || typeof mapSize.y !== 'number') return false;
    if (mapSize.x <= 0 || mapSize.y <= 0) return false;

    // --- Dynamic Margin ---
    const safeSpeed = (isFinite(speedMPH) && speedMPH > 0) ? speedMPH : 0;
    const dynamicMargin  = MIN_MARGIN + (safeSpeed * SPEED_FACTOR);
    const maxSafeMargin  = Math.min(mapSize.x, mapSize.y) * 0.45;
    const marginPx       = Math.min(dynamicMargin, maxSafeMargin);
    const effectiveMargin = Math.max(marginPx, CRITICAL_ZONE);

    // --- Lat/Lng → Screen Pixel Conversion ---
    let pixel;
    try {
        pixel = window.map.latLngToContainerPoint(targetPos);
    } catch (e) {
        return false;
    }

    if (!pixel || typeof pixel.x !== 'number' || typeof pixel.y !== 'number') return false;
    if (!isFinite(pixel.x) || !isFinite(pixel.y)) return false;

    // --- Boundary Checks ---
    const nearLeft   = pixel.x < effectiveMargin;
    const nearRight  = pixel.x > (mapSize.x - effectiveMargin);
    const nearTop    = pixel.y < effectiveMargin;
    const nearBottom = pixel.y > (mapSize.y - effectiveMargin);

    return nearLeft || nearRight || nearTop || nearBottom;

function _applyIntelligentZoom(speedMPS, speedTier, directionChangeFactor, speedMPH) {

        speedMPS == null ||
        !speedTier ||
        !window.map ||
        window.blockSpeedZoom ||
        window.isZooming

        return;
    }

    if (typeof getSpeedBasedZoom !== 'function') {
        console.warn('[Intelligent Zoom] getSpeedBasedZoom not defined');
        return;
    }
    
    const targetZoom = getSpeedBasedZoom(speedMPS);

    if (targetZoom == null || targetZoom < 0) {
        return;
    }

    const currentZoom = window.map.getZoom();
    if (!isFinite(currentZoom)) return;
    
    const zoomThreshold = speedTier.zoomThreshold ?? 0.5;

    if (Math.abs(currentZoom - targetZoom) < zoomThreshold) {

    }

    const baseDuration = speedTier.zoomDuration ?? 0.2;
    const adjustedDuration = Math.max(
        0.05,
        Math.min(1.0, baseDuration * (directionChangeFactor || 1))
