        <style>   
    /* 1. LOADING GATE — keep exactly as-is */
    html {
      visibility: hidden !important;
    }
    html.unlock {
      visibility: visible !important;
    }
    
    /* 2. DESIGN TOKENS */
    :root {
      --primary-color: #0066cc;
      --hover-color: #e6f0ff;
      --dark-blue: #1a3a8a;
      --dark-blue-hover: #0d2c6e;
      --success-color: #28a745;
      --warning-color: #ffc107;
      --error-color: #dc3545;
    
      /* Layout tokens (new — used below, no visual change) */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 14px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
    
    /* 3. RESET & GLOBAL */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
      background-color: #f8f9fa;
    }

    /* Kill iOS ghost clicks by removing the 300ms tap delay */
    button,
    a,
    [role="button"],
    .map-button,
    .modal-button,
    .continue-btn,
    .audio-button,
    .btn {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Prevent iOS default blue active state flash on map buttons */
    @supports (-webkit-touch-callout: none) {
      .map-button:active {
        background-color: white !important; 
        color: var(--primary-color) !important; 
      }
    }
    
    /* 4. MAP CANVAS — optimized with containment */
    #map {
      position: fixed;
      inset: 0;                          /* shorthand: top/right/bottom/left: 0 */
      z-index: 1;
      width: 100vw;
      height: 100dvh;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      /* will-change removed — apply via JS only during pan/zoom animations */
      contain: layout paint;             /* isolate map from page reflows */
    }
    
    /* iOS 100vh / dvh fix */
    @supports (-webkit-touch-callout: none) {
      #map,
      .lochunt-container {
        height: -webkit-fill-available;
      }
    }
    
    @supports not (height: 100dvh) {
      #map {
        height: 100vh;
      }
    }
    
    /* 5. DISTANCE INDICATOR — containment + logical props */
    #distanceBox {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1003;
      background: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 20px;
      text-align: center;
      min-width: 200px;
      box-shadow: var(--shadow-md);
      border: 3px solid var(--dark-blue);
      transition: all 0.3s ease;
      opacity: 0;
      visibility: hidden;
      contain: layout paint;             /* self-contained animations */
    }
    
    #distanceBox.show {
      opacity: 1;
      visibility: visible;
    }
    
    #distanceBox.proximity-close {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: #fff;
      animation: pulse 1.5s infinite;
    }
    
    #distanceBox.proximity-medium {
      background: linear-gradient(135deg, #ffc107, #fd7e14);
      color: #fff;
    }
    
    #distanceBox.proximity-far {
      background: #fff;
      color: var(--dark-blue);
      border-color: var(--dark-blue);
    }
    
    /* 6. MAP ACTION BUTTONS */
    .map-buttons {
      position: absolute;
      inset: auto 0 0 0;                 /* bottom: 0; left: 0; right: 0 */
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 30px;
    }
    
    /* 7. PWA INSTALL BANNER — flattened selectors, containment */
    #pwaInstallBanner {

      inset: auto 20px 20px 20px;        /* bottom/right/left: 20px */

      border: 1px solid #e2e8f0;
      contain: layout paint;             /* isolate banner repaints */
    }
    
    #pwaInstallBanner.show {
      display: block;
    }
    
    /* Flattened: was #pwaInstallBanner .banner-header — now just .banner-header

    .banner-header {

    }

      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #718096;
      font-size: 20px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    
    .close-btn:hover {
      background: #edf2f7;
      color: #4a5568;
    }
    
    .banner-content {
      margin-bottom: 20px;

    .banner-content p {

    .banner-actions {

    .cancel-btn {
      background: transparent;

      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 14px;

    .cancel-btn:hover {

    .install-btn {

      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;

    }
    
    .install-btn::before {
      content: '';
      position: absolute;

      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);

    .install-btn:hover {

    .install-btn:active {

    /* 8. POST-INSTALL NOTICE — containment + logical props */
    .pwa-post-install-notice {

      bottom: 20px;

      font-size: 15px;
      line-height: 1.4;
      contain: layout paint;             /* isolate notice animations */

    .pwa-post-install-notice.show {

      visibility: visible;
      -webkit-overflow-scrolling: touch;
    }
    
    .pwa-notice-content p:first-of-type {
      margin-top: 0;
      font-weight: 600;
      color: #66d9ef;
    }
    
    .pwa-notice-content ol {

    }
    
    .pwa-notice-content li {
      margin-bottom: 6px;
    }
    
    .pwa-notice-button {
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);

      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

    .pwa-notice-button:hover,

    }
    
    /* 9. MARKERS */
    .user-marker-icon {
      width: 22px;
      height: 22px;
      background: radial-gradient(circle, #dc3545 0%, #a71e2a 70%);
      border: 3px solid #fff;

      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      backface-visibility: hidden;       /* GPU hint */
    }
    
    .user-marker-icon.moving {
      animation: pulse 2s infinite;
      /* will-change: transform; — toggle via JS when tracking starts */
    }
    
    .marker-cluster-custom {
      background: rgba(44, 82, 130, 0.9);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;

    #accuracyIndicator {

      height: 20px;

      transition: background-color 0.3s ease;
      contain: layout paint;
    }
    
    /* 10. KEYFRAMES — GPU-only properties */
    @keyframes pulse {
      0%, 100% {
        opacity: 0.8;
      }
      50% {
        opacity: 1;
      }
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    @keyframes gradientShift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }
    
    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }
    
    .fade-out {
      animation: fadeOut 0.3s ease forwards;
    }
    
    /* 11. UTILITIES */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);

      border: 0;
    }
    
    /* 12. ACCESSIBILITY — enhanced reduced-motion */
    @media (prefers-reduced-motion: reduce) {

        <script>
(function () {
  if (window.foucBusterActive) return;
  window.foucBusterActive = true;

  let unlocked = false;

  function unlock() {
    if (unlocked) return;
    unlocked = true;
    document.documentElement.classList.add('unlock');

    const ann = document.createElement('div');
    ann.setAttribute('aria-live', 'polite');
    ann.setAttribute('aria-atomic', 'true');
    ann.style.cssText = 'position:absolute;left:-10000px;width:1px;height:1px;overflow:hidden';
    ann.textContent = 'Application loaded';
    document.body.appendChild(ann);
    setTimeout(() => ann.remove(), 3000);

    window.dispatchEvent(new CustomEvent('foucUnlocked', { detail: { ts: performance.now() } }));
  }

  const cssReady = (() => {
    let promise;
    return () => promise ?? (promise = new Promise(resolve => {
      if (!document.body) return resolve(false);

      const d = document.createElement('div');
      d.style.cssText = 'color:var(--primary-color);position:absolute;visibility:hidden';
      document.body.appendChild(d);
      const ok = getComputedStyle(d).color !== 'var(--primary-color)';
      d.remove();
      resolve(ok);
    }));
  })();

  const fontsReady = () =>
    document.fonts ? document.fonts.ready.catch(() => {}) : Promise.resolve();

  function performChecks() {
    Promise.all([cssReady(), fontsReady()]).then(unlock);
  }

  if (document.readyState === 'complete' ||
      (document.readyState === 'interactive' && document.body)) {
    performChecks();
  } else {
    document.addEventListener('DOMContentLoaded', performChecks, { once: true });
  }

  window.addEventListener('load', () => requestAnimationFrame(unlock), { once: true });

  ['click', 'touchstart', 'keydown'].forEach(e =>
    window.addEventListener(e, unlock, { once: true, capture: true, passive: true })
  );
})();

    <script>
        //* Enterprise Service Worker */
        (function setupEnterpriseSW() {
          const DEBUG = location.search.includes('sw_debug');
          let updateInterval = null;
        
          const msgHandler = e => {
            if (e?.data?.type === 'SW_ACTIVATED' && DEBUG) {
              console.log('Enterprise SW activated, version:', e.data.version);
            }
            if (e?.data?.type === 'UPDATE_READY') {
              if (confirm('A new version is available. Reload now?')) location.reload();
            }
          };
        
          const handleUpdate = reg => {
            const newWorker = reg.installing || reg.waiting;
            if (!newWorker) return;
        
            const askToSkip = () => {
              try {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
                if (DEBUG) console.log('Sent SKIP_WAITING to SW');
              } catch (err) {
                console.warn('SKIP_WAITING failed:', err);
              }
            };
        
            if (newWorker.state === 'installed' || newWorker.state === 'waiting') {
              askToSkip();
              return;
            }
            newWorker.addEventListener('statechange', function onStateChange() {
              if (newWorker.state === 'installed' || newWorker.state === 'waiting') {
                askToSkip();
                newWorker.removeEventListener('statechange', onStateChange);
              }
            });
          };
        
          const onLoad = () => {
            if (!('serviceWorker' in navigator)) return;
            navigator.serviceWorker.register('/sw.js').then(reg => {
              if (DEBUG) console.log('SW registered:', reg);
              navigator.serviceWorker.addEventListener('message', msgHandler);
              if (reg.installing) handleUpdate(reg);
              else if (reg.waiting) {
                try { reg.waiting.postMessage({ type: 'SKIP_WAITING' }); }
                catch (err) { console.warn('SKIP_WAITING failed:', err); }
              }
              reg.addEventListener('updatefound', () => handleUpdate(reg));
              updateInterval = setInterval(() => {
                if (!navigator.onLine) return;
                navigator.serviceWorker.getRegistration('/sw.js').then(r => {
                  if (r) r.update().catch(err => console.warn('SW update failed:', err));
                }).catch(err => console.warn('SW reg lookup failed:', err));
              }, 60 * 60 * 1000);
            }).catch(err => console.error('SW registration failed:', err));
          };
        
          const onUnload = () => {
            if (updateInterval) { clearInterval(updateInterval); updateInterval = null; }
            if (navigator.serviceWorker) navigator.serviceWorker.removeEventListener('message', msgHandler);
          };
        
          window.addEventListener('load', onLoad, { once: true });
          window.addEventListener('beforeunload', onUnload);
          window.addEventListener('pagehide', onUnload);
          window.teardownEnterpriseSW = onUnload;
        })();
        
        /* Cache Manager */
        class EnterpriseCacheManager {
          constructor() {
            this.cachePrefix = 'mnthen-enterprise-';
            this.maxCacheAge = 7 * 24 * 60 * 60 * 1000;
            this.proximityThresholdMeters = 1000;
          }
        
          async init() {
            this.cleanupExpiredCache();
            setInterval(() => this.cleanupExpiredCache(), 60 * 60 * 1000);
            return Promise.resolve();
          }
        
          async cacheLocationData(location, userPosition) {
            if (!userPosition || !location?.id) return;
            const dist = this._calculateDistance(userPosition, location);
            if (dist > this.proximityThresholdMeters) return;
            try {
              localStorage.setItem(
                `${this.cachePrefix}location_${location.id}`,
                JSON.stringify({ location, timestamp: Date.now(), distanceMeters: dist })
              );
            } catch (e) {
              if (e.name === 'QuotaExceededError') this.cleanupOldestEntries();
            }
          }
        
          // DEPRECATED — preserved for backwards compatibility
          async encryptData(data) { return data; }
          async decryptData(data) { return data; }
          async getEncryptionKey() { return null; }
          async getOrCreateKeyData() { return new Uint8Array(32); }
        
          getCachedLocation(locationId) {
            const key = `${this.cachePrefix}location_${locationId}`;
            const data = localStorage.getItem(key);
            if (!data) return null;
            try {
              const parsed = JSON.parse(data);
              if (Date.now() - parsed.timestamp > this.maxCacheAge) {
                localStorage.removeItem(key);
                return null;
              }
              return parsed.location;
            } catch (e) {
              localStorage.removeItem(key);
              return null;
            }
          }
        
          cleanupExpiredCache() {
            const now = Date.now();
            for (let i = localStorage.length - 1; i >= 0; i--) {
              const key = localStorage.key(i);
              if (!key?.startsWith(this.cachePrefix) || key.endsWith('crypto-key')) continue;
              try {
                const parsed = JSON.parse(localStorage.getItem(key));
                if (!parsed?.timestamp || now - parsed.timestamp > this.maxCacheAge) {
                  localStorage.removeItem(key);
                }
              } catch (e) { localStorage.removeItem(key); }
            }
          }
        
          cleanupOldestEntries() {
            const entries = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (!key?.startsWith(this.cachePrefix) || key.endsWith('crypto-key')) continue;
              try {
                const parsed = JSON.parse(localStorage.getItem(key));
                if (parsed?.timestamp != null) entries.push({ key, timestamp: parsed.timestamp });
              } catch (e) {}
            }
            entries.sort((a, b) => a.timestamp - b.timestamp);
            const removeCount = Math.ceil(entries.length * 0.2);
            for (let i = 0; i < removeCount; i++) localStorage.removeItem(entries[i].key);
          }
        
          stopPeriodicCleanup() {} // No-op: interval not tracked
        
          _calculateDistance(pos1, pos2) {
            return calculateDistance(pos1, pos2);
          }
        }

        /* Performance Monitor */
        class EnterprisePerformanceMonitor {
          constructor(options = {}) {
            this._config = {
              updateInterval: options.updateInterval || 1000,
              memoryCheckInterval: options.memoryCheckInterval || 5000
            };
            this.metrics = { fps: 0, memory: 0, loadedLocations: 0, cacheHits: 0, networkRequests: 0 };
            this.customMetrics = {};
            this.dataSource = () => (window.gameLocations ? window.gameLocations.length : 0);
            this.isMonitoring = false;
            this.intervals = [];
            this.rafId = null;
            this.frameCount = 0;
            this.lastTime = performance.now();
          }
        
          startMonitoring() {
            if (this.isMonitoring) return;
            this.isMonitoring = true;
            this.intervals.push(setInterval(() => {
              if (!this.isMonitoring) return;
              this.metrics.loadedLocations = this.dataSource();
            }, this._config.updateInterval));
            if (performance.memory) {
              this.intervals.push(setInterval(() => {
                if (!this.isMonitoring) return;
                this.metrics.memory = Math.round(performance.memory.usedJSHeapSize / 1048576);
              }, this._config.memoryCheckInterval));
            }
            const tick = (now) => {
              if (!this.isMonitoring) return;
              this.frameCount++;
              if (now - this.lastTime >= 1000) {
                this.metrics.fps = Math.round((this.frameCount * 1000) / (now - this.lastTime));
                this.frameCount = 0;
                this.lastTime = now;
              }
              this.rafId = requestAnimationFrame(tick);
            };
            this.rafId = requestAnimationFrame(tick);
          }
        
          getMetrics() { return { ...this.metrics, ...this.customMetrics }; }
        
          stopMonitoring() {
            this.isMonitoring = false;
            if (this.rafId) { cancelAnimationFrame(this.rafId); this.rafId = null; }
            this.intervals.forEach(clearInterval);
            this.intervals = [];
          }
        
          setDataSource(fn) { if (typeof fn === 'function') this.dataSource = fn; }
          trackMetric(key, value) { this.customMetrics[key] = value; }

          _startMemoryMonitor() {}

        /* Background Sync */
        class EnterpriseBackgroundSync {
          constructor(options = {}) {
            this._config = {
              maxRetries: options.maxRetries || 3,
              baseDelay: options.baseDelay || 100,
              backoffFactor: options.backoffFactor || 2,
              maxQueueSize: options.maxQueueSize || 100
            };
            this.syncQueue = [];
            this.isOnline = navigator.onLine;
            this.processing = false;
        
            this._onlineHandler = () => { this.isOnline = true; this.process(); };
            this._offlineHandler = () => { this.isOnline = false; };
            window.addEventListener('online', this._onlineHandler);
            window.addEventListener('offline', this._offlineHandler);
          }
        
          addToSyncQueue(data) {
            if (this.syncQueue.length >= this._config.maxQueueSize) this.syncQueue.shift();
            this.syncQueue.push({ data, retries: 0, timestamp: Date.now() });
            if (this.isOnline) queueMicrotask(() => this.process());
          }
        
          async process() {
            if (this.processing || !this.isOnline || !this.syncQueue.length) return;
            this.processing = true;
            while (this.syncQueue.length > 0 && this.isOnline) {
              const item = this.syncQueue.shift();
              if (typeof item.data?.handler !== 'function') {
                console.error('Sync item missing handler:', item.data);
                continue;
              }
              try {
                await item.data.handler(item.data);
              } catch (error) {
                item.retries++;
                if (item.retries < this._config.maxRetries) {
                  const delay = this._config.baseDelay * Math.pow(this._config.backoffFactor, item.retries);
                  await new Promise(r => setTimeout(r, delay));
                  this.syncQueue.unshift(item);
                } else {
                  console.error('Sync permanently failed:', item.data);
                }
              }
            }
            this.processing = false;
          }
        
          stop() {
            window.removeEventListener('online', this._onlineHandler);
            window.removeEventListener('offline', this._offlineHandler);
            this.processing = false;
          }
        }
        
        /* Zoom Controller */
        (function() {
          const DEFAULT_ZOOM = 17;
          const DEFAULT_LOCK_DURATION_MS = 2000;
        
          class ZoomController {
            constructor(options = {}) {
              this.state = {
                source: null,
                priority: 0,
                level: options.defaultZoom || DEFAULT_ZOOM,
                lockedUntil: 0
              };
              this.config = {
                defaultZoom: options.defaultZoom || DEFAULT_ZOOM,
                lockDurationMs: options.lockDurationMs || DEFAULT_LOCK_DURATION_MS,
                animationOptions: options.animationOptions || {}
              };
              this.requestQueue = [];
              this.isProcessingQueue = false;
            }
        
            request(source, level, priority = 1) {
              this.requestQueue.push({ source, level, priority, timestamp: Date.now() });
              this._processQueue();
            }
        
            release(source) {
              if (this.state.source === source) {
                this._setState({ source: null, priority: 0, lockedUntil: 0 });
                this._processQueue();
              }
            }
        
            applyPendingZoom() {
              if (this.state.source) this._applyZoom(this.state.level);
            }
        
            getState() { return { ...this.state }; }
        
            stop() {
              this.requestQueue = [];
              this.isProcessingQueue = false;
              this.state = { source: null, priority: 0, level: this.config.defaultZoom, lockedUntil: 0 };
            }
        
            _processQueue() {
              if (this.isProcessingQueue || this.requestQueue.length === 0) return;
              this.isProcessingQueue = true;
        
              const now = Date.now();
              const hasActiveLock = now < this.state.lockedUntil;
        
              if (!hasActiveLock && this.state.source) {
                this._setState({ source: null, priority: 0, lockedUntil: 0 });
              }
        
              // Find highest priority request
              const highest = this.requestQueue.reduce((max, req) =>
                req.priority > max.priority ? req : max, this.requestQueue[0]);
        
              if (!this.state.source) {
                // No active controller — grant to highest priority
                this._setState({
                  source: highest.source,
                  priority: highest.priority,
                  level: highest.level,
                  lockedUntil: now + this.config.lockDurationMs
                });
                this._applyZoom(highest.level);
              } else if (hasActiveLock && highest.priority > this.state.priority) {
                // Override: higher priority request bumps current controller
                this._setState({
                  source: highest.source,
                  priority: highest.priority,
                  level: highest.level,
                  lockedUntil: now + this.config.lockDurationMs
                });
                this._applyZoom(highest.level);
              }
        
              // Prune stale requests (>5s old)
              this.requestQueue = this.requestQueue.filter(req => req.timestamp > now - 5000);
              this.isProcessingQueue = false;
            }
        
            _setState(newState) { this.state = { ...this.state, ...newState }; }
        
            _applyZoom(level) {
              if (!window.map) { console.error('ZoomController: map not found'); return; }
              try {
                window.map.setZoom(level, { noMoveStart: true, ...this.config.animationOptions });
              } catch (error) { console.error('ZoomController: apply failed:', error); }
            }
          }

        })();

function calculateBearing(from, to) {
    const lat1 = from.lat * Math.PI / 180;
    const lat2 = to.lat * Math.PI / 180;
    const deltaLng = (to.lng - from.lng) * Math.PI / 180;
    
    const y = Math.sin(deltaLng) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(deltaLng);
    
    const bearing = Math.atan2(y, x) * 180 / Math.PI;
    return (bearing + 360) % 360;
}

function isApproachingLocation(userPos, userBearing, locationPos) {
    // Always trigger within the distance threshold - you're at the location
    const distanceInFeet = calculateDistance(userPos, locationPos) * 3.28084; // Convert to feet
    if (distanceInFeet <= CONFIG.DISTANCE_THRESHOLD) return true;
    
    // If we don't have bearing data, be permissive
    if (!userBearing) return true;
    
    const bearingToLocation = calculateBearing(userPos, locationPos);
    const bearingDiff = Math.abs(userBearing - bearingToLocation);
    const normalizedDiff = Math.min(bearingDiff, 360 - bearingDiff);
    
    return normalizedDiff <= CONFIG.BEARING_TOLERANCE;
}

const trackedTimeouts = new Set();

function createTrackedTimeout(callback, delay) {
    let id;
    const wrappedCallback = () => {
        trackedTimeouts.delete(id);
        callback();
    };
    id = setTimeout(wrappedCallback, delay);
    trackedTimeouts.add(id);
    return id;
}

// Add a cleanup utility
function clearAllTrackedTimeouts() {
    trackedTimeouts.forEach(clearTimeout);
    trackedTimeouts.clear();
}

function isValidPosition(pos) {
    return pos && 
           typeof pos.lat === 'number' && 
           typeof pos.lng === 'number' && 
           !isNaN(pos.lat) && 
           !isNaN(pos.lng);
}

function setupMemoryManagement({
    markerClusterGroup      = window.markerClusterGroup,
    animationFrameId        = window.animationFrameId,
    stationaryCheckTimeout  = window.stationaryCheckTimeout,
    inactivityTimer         = window.inactivityTimer,
    positionWatchId         = window.positionWatchId,
    gameLocations           = window.gameLocations,
    positionBuffer          = window.positionBuffer,
    stationaryBuffer        = window.stationaryBuffer,
    visitedLocations        = window.visitedLocations,
    locationTriggerState    = window.locationTriggerState,
    accessibilityState      = window.accessibilityState,
    activePopups            = window.activePopups,
    lastVelocity            = window.lastVelocity,
    lastSmoothedPosition    = window.lastSmoothedPosition,
    stationaryCount         = window.stationaryCount,
} = {}) {

    const cleanupTasks  = [];
    const trackedTimers = new Set();
    const eventListeners = [];

    /* safe timer helpers  */
    const createTrackedTimeout = (cb, delay, ...args) => {
        const id = setTimeout(() => {
            trackedTimers.delete(id);
            cb(...args);
        }, delay);
        trackedTimers.add(id);
        return id;
    };
    const createTrackedInterval = (cb, interval) => {
        const id = setInterval(cb, interval);
        trackedTimers.add(id);
        return id;
    };

    /* safe event helper */
    const trackEventListener = (el, ev, h, opts) => {
        el.addEventListener(ev, h, opts);
        eventListeners.push({ element: el, event: ev, handler: h, options: opts });
    };

    /* core cleanup routines */
    const cleanupAudioResources = () => {
    try {
        document.querySelectorAll('audio').forEach(audio => {

            // 1. Pause playback immediately
            audio.pause();

            // 2. Fire-and-forget: release wake lock if the player
            //    registered one. The player's own cleanup will also
            //    try this — calling it twice is safe.
            if (typeof releaseWakeLock === 'function') {
                releaseWakeLock().catch(() => {});
            }

            // 3. Save position before we touch src, in case the
            //    player's own visibilityHandler hasn't run yet.
            if (!isNaN(audio.currentTime) && audio.currentTime > 0) {
                try {
                    localStorage.setItem('audioPosition', audio.currentTime.toString());
                } catch (_) {}
            }

            //  Clear the src WITHOUT using audio.src = ''
            //    and WITHOUT calling audio.load().
            //
            //    WHY: On iOS, setting .src = '' detaches the element
            //    from its MediaElementSource node in the Web Audio
            //    graph permanently — subsequent play() calls produce
            //    silence even after src is restored, with no error
            //    thrown. Calling .load() after clearing src compounds
            //    this by resetting the element's entire network state.
            //
            //    removeAttribute('src') avoids detaching the Web Audio
            //    binding. The browser unloads the media resource but
            //    the AudioContext source node remains intact so the
            //    player can reconnect cleanly on next open.
            //
            //    We deliberately skip audio.load() here for the same
            //    reason: calling load() with no src on iOS suspends
            //    the AudioContext, requiring another user gesture to
            //    resume it.
            audio.removeAttribute('src');

            //  DO NOT call audio.remove().
            //
            //    WHY: The audio element is created fresh by
            //    createAudioPlayer() every time a location opens, so
            //    removing it here destroys the element that
            //    initAudioPlayer() has already bound its WeakMap
            //    entry and event listeners to. On the next location
            //    open, createAudioPlayer() makes a new element,
            //    initAudioPlayer() finds it via getElementById, and
            //    tries createMediaElementSource() on it — which works
            //    once, but the orphaned WeakMap entry from the
            //    removed element persists as a memory leak and the
            //    cycle repeats on every location visit.
            //
            //    Leaving the element in the DOM is safe: showLocationHunt
            //    calls lochuntContainer.innerHTML = '' before rebuilding,
            //    which detaches and garbage-collects the old element
            //    naturally, and the WeakMap releases the entry when the
            //    element is GC'd.
        });
    } catch (e) {
        console.warn('Audio cleanup failed:', e);
    }
};

    const cleanupMapResources = () => {
        try {
            if (markerClusterGroup) markerClusterGroup.clearLayers();
            if (window.animationFrameId !== null && window.animationFrameId !== undefined) {
                cancelAnimationFrame(window.animationFrameId);
                window.animationFrameId = null;
            }
            if (window.stationaryCheckTimeout) {
                clearTimeout(window.stationaryCheckTimeout);
                window.stationaryCheckTimeout = null;
            }
            if (window.inactivityTimer) {
                clearTimeout(window.inactivityTimer);
                window.inactivityTimer = null;
            }
            trackedTimers.forEach(id => { 
                clearTimeout(id); 
                clearInterval(id); 
            });
            trackedTimers.clear();
            if (window.positionWatchId !== undefined && window.positionWatchId !== null) {
                navigator.geolocation.clearWatch(window.positionWatchId);
                window.positionWatchId = null;
            }
        } catch (e) {
            console.warn('Map resource cleanup failed:', e);
        }
    };

    const cleanupDOMAndData = () => {
        try {
            // DOM cleanup
            document.querySelectorAll('.popup-overlay, .modal, .navigation-tips-overlay, .source-info-content')
                    .forEach(el => el.remove());

            // Event listeners cleanup
            eventListeners.forEach(({ element, event, handler, options }) => {
                try {
                    element.removeEventListener(event, handler, options);
                } catch (e) {
                    console.warn('Failed to remove event listener:', e);
                }
            });
            eventListeners.length = 0;

            // Array cleanup - check if they exist and are arrays
            if (Array.isArray(window.gameLocations)) {
                window.gameLocations.length = 0;
            }
            if (Array.isArray(window.positionBuffer)) {
                window.positionBuffer.length = 0;
            }
            if (Array.isArray(window.stationaryBuffer)) {
                window.stationaryBuffer.length = 0;
            }
            if (Array.isArray(window.visitedLocations)) {
                window.visitedLocations.length = 0;
            }

            // Map/Set cleanup - check if they exist and have the clear method
            if (window.locationTriggerState) {
                if (window.locationTriggerState.cooldowns?.clear) {
                    window.locationTriggerState.cooldowns.clear();
                }
                if (window.locationTriggerState.dwellTimers?.clear) {
                    window.locationTriggerState.dwellTimers.clear();
                }
                if (window.locationTriggerState.approachingLocations?.clear) {
                    window.locationTriggerState.approachingLocations.clear();
                }
                if (window.locationTriggerState.lastVibrations?.clear) {
                    window.locationTriggerState.lastVibrations.clear();
                }
            }
            
            if (window.accessibilityState?.proximityAlerts?.clear) {
                window.accessibilityState.proximityAlerts.clear();
            }
            
            if (window.activePopups?.clear) {
                window.activePopups.clear();
            }

            // Scalar cleanup
            if (window.lastVelocity && typeof window.lastVelocity === 'object') {
                Object.keys(window.lastVelocity).forEach(k => window.lastVelocity[k] = 0);
            }
            window.lastSmoothedPosition = null;
            window.stationaryCount = 0;
            
        } catch (e) {
            console.warn('DOM and data cleanup failed:', e);
        }
    };

    /* register built-in tasks */
    const registerCleanupTask = (t) => { cleanupTasks.push(t); };
    registerCleanupTask(disposeMapLoop); 
    registerCleanupTask(cleanupAudioResources);
    registerCleanupTask(cleanupMapResources);
    registerCleanupTask(cleanupDOMAndData);

    /* execute */
    const executeCleanup = () => cleanupTasks.forEach(t => {
        try { 
            t(); 
        } catch (e) { 
            console.error('Cleanup task failed:', e); 
        }
    });

const onVisibility = () => {
    if (document.hidden) {
        // When the tab hides, we only want to PAUSE playback and
        // save position — not destroy the audio element or src.
        //
        // The full cleanupAudioResources() call here was wrong for
        // three reasons:
        //
        // 1. iOS fires visibilitychange AFTER it has already paused
        //    the audio element. So cleanupAudioResources() was running
        //    removeAttribute('src') on an element the system had just
        //    paused — nuking the src so that when the user returns and
        //    taps play, there is nothing to play back.
        //
        // 2. Android Chrome fires visibilitychange while audio is
        //    still technically playing (before the system pauses it).
        //    So cleanupAudioResources() was racing the audio player's
        //    own visibilityHandler — both trying to read currentTime
        //    and modify the element simultaneously, corrupting the
        //    saved position.
        //
        // 3. cleanupAudioResources() was registered inside
        //    setupMemoryManagement() which has no reference to the
        //    audio player's internal state (wasPlaying, screenWentAway,
        //    lastPlaybackPosition). Calling it from here bypassed all
        //    of that carefully maintained state, so the player's own
        //    recovery logic had nothing reliable to work with on return.
        //
        // The audio player's own visibilityHandler (registered inside
        // initAudioPlayer) already handles everything correctly:
        //   - saves currentTime via _throttledSavePosition
        //   - sets wasPlaying and screenWentAway flags
        //   - pauses and updates the play button
        //
        // All we need to do here is nothing — or at most a soft
        // position save as a belt-and-suspenders backup, in case
        // initAudioPlayer hasn't been initialized yet (e.g. the user
        // backgrounds the app before opening any location).

        const audio = document.getElementById('locationAudio');
        if (audio && !isNaN(audio.currentTime) && audio.currentTime > 0) {
            try {
                localStorage.setItem('audioPosition', audio.currentTime.toString());
            } catch (_) {}
        }

        // DO NOT call cleanupAudioResources() here.
        // DO NOT call audio.pause() here — the audio player's own
        // visibilityHandler owns that responsibility. Calling it from
        // two places creates a race where wasPlaying gets set to false
        // by the pause event before the player's handler can read it.
    }
    // No else branch needed. The audio player's own visibilityHandler
    // handles the return-to-foreground case (showing the resume popup,
    // clearing screenWentAway, etc.). Duplicating that logic here would
    // create a second race in the opposite direction.
};
    
    const onBeforeUnload = () => executeCleanup();

    trackEventListener(document, 'visibilitychange', onVisibility);
    trackEventListener(window, 'beforeunload', onBeforeUnload);

    /* expose */
    window.performCleanup = executeCleanup;

    /* optional full shutdown */
    const shutdown = () => {
        executeCleanup();
        document.removeEventListener('visibilitychange', onVisibility);
        window.removeEventListener('beforeunload', onBeforeUnload);
        cleanupTasks.length = 0;
        trackedTimers.clear();
        eventListeners.length = 0;
        delete window.performCleanup;
    };

    return {
        registerCleanupTask,
        executeCleanup,
        createTrackedTimeout,
        createTrackedInterval,
        trackEventListener,
        shutdown,
    };
}

function initMap() {

    });
    
    if ('caches' in window) {
        caches.keys()
            .then(keys => Promise.all(keys.map(k => caches.delete(k))))
            .catch(() => {});
    }
    
    map = L.map('map', {

        bounceAtZoomLimits: false,
        preferCanvas: true,

        markerZoomAnimation: false
    }).setView([46.392410, -94.636230], 9);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        minZoom: 7,
        maxZoom: 19,

        updateWhenIdle: true,
        updateWhenZooming: false,

        className: 'map-tiles'
    }).addTo(map);
    
    markerClusterGroup = L.markerClusterGroup({
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        spiderfyOnMaxZoom: true,
        animate: false,
        chunkedLoading: true,
        chunkProgress: updateLoadingStatus,
        maxClusterRadius: z => z > 16 ? 40 : 80,
        iconCreateFunction: c => L.divIcon({

    userMarker = L.marker([0, 0], {

            iconAnchor: [10, 10]
        }),
        zIndexOffset: 1000
    }).addTo(map);
    
    showLoadingMessage();
    if ('geolocation' in navigator) {
        const opts = { enableHighAccuracy: true, timeout: 45000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(
            initializeUserLocation,
            () => navigator.geolocation.getCurrentPosition(initializeUserLocation, handleLocationError, opts),
            opts
        );
    } else {
        showPopup('Geolocation Error', 'Geolocation is not supported');
        map.flyTo([44.9778, -93.2650], 17);
        hideLoadingMessage();
    }
}

    console.log("Idle proximity check is already running.");

  _idleProximityCheckInterval = setInterval(() => {
    try {
      // Only run if map and data are ready
      if (!window.map || !window.gameLocations?.length || !window.userMarker) {

      }
      // Trigger the existing proximity logic in updateDistanceBox
      updateDistanceBox();
    } catch (err) {
      console.warn('Idle proximity check error:', err);

  }, 10000); // Run every 10 seconds
  console.log("Idle proximity check started (every 10 seconds).");
}

  if (_idleProximityCheckInterval) {

    _idleProximityCheckInterval = null;
    console.log("Idle proximity check stopped.");
  }
}

// PWA Install Banner functionality
let deferredPrompt;
let pwaInstallBanner, closePwaBanner, cancelPwaBanner, installPwaButton;

// Detect device type
function getDeviceType() {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    
    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        return 'ios';
    } else if (/android/i.test(userAgent)) {
        return 'android';
    } else if (/Windows Phone/i.test(userAgent)) {
        return 'windows';
    }
    return 'desktop';
}

// Check if the app is running as a PWA
function isRunningAsPWA() {
    // Standard PWA detection
    if (window.matchMedia('(display-mode: standalone)').matches) {
        return true;
    }
    
    // iOS Safari standalone mode
    if (window.navigator.standalone === true) {
        return true;
    }
    
    // Android TWA (Trusted Web Activity)
    if (document.referrer.includes('android-app://')) {
        return true;
    }
    
    // Check for PWA-specific URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('utm_source') === 'pwa' || urlParams.get('source') === 'pwa') {
        return true;
    }
    
    return false;
}

// Check if the app can be installed
function canInstallPWA() {
    const deviceType = getDeviceType();
    
    // Android: Check for beforeinstallprompt support or Chrome
    if (deviceType === 'android') {
        return 'beforeinstallprompt' in window || /Chrome/.test(navigator.userAgent);
    }
    
    // iOS: Check for Safari and iOS version
    if (deviceType === 'ios') {
        const isIOS13OrLater = /OS 1[3-9]_|OS [2-9][0-9]_/.test(navigator.userAgent);
        const isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|EdgiOS/.test(navigator.userAgent);
        return isIOS13OrLater && isSafari;
    }
    
    // Desktop: Check for supported browsers
    if (deviceType === 'desktop') {
        return 'beforeinstallprompt' in window;
    }
    
    return false;
}

// Check if the app is already installed
async function isAppInstalled() {
    if (isRunningAsPWA()) {
        return true;
    }
    
    const deviceType = getDeviceType();
    
    // For newer browsers that support getInstalledRelatedApps
    if ('getInstalledRelatedApps' in navigator) {
        try {
            const relatedApps = await navigator.getInstalledRelatedApps();
            return relatedApps.length > 0;
        } catch (error) {
            console.log('getInstalledRelatedApps not supported:', error);
        }
    }
    
    // iOS-specific checks
    if (deviceType === 'ios') {
        // Check if added to home screen previously
        if (window.navigator.standalone !== undefined) {
            // If standalone is false but was previously true, might be installed
            const wasInstalled = localStorage.getItem('pwa-ios-installed');
            if (wasInstalled === 'true') {
                return true;
            }
        }
    }
    
    // Check for service worker that indicates installation
    if ('serviceWorker' in navigator) {
        try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            const hasAppScope = registrations.some(registration => 
                registration.scope.includes('/app/') || registration.scope === `${window.location.origin}/`
            );
            if (hasAppScope) return true;
        } catch (error) {
            console.log('Service worker check failed:', error);
        }
    }
    
    return false;
}

// Get device-specific install instructions
function getInstallInstructions() {
    const deviceType = getDeviceType();
    
    switch (deviceType) {
        case 'ios':
            return {
                title: 'Install App',
                instructions: 'Tap the Share button <span class="share-icon">⬆️</span> then "Add to Home Screen"',
                showNativeButton: false
            };
        case 'android':
            return {
                title: 'Install App',
                instructions: deferredPrompt ? 'Tap "Install" to add this app to your home screen' : 'Use your browser menu to "Add to Home Screen"',
                showNativeButton: !!deferredPrompt
            };
        default:
            return {
                title: 'Install App',
                instructions: deferredPrompt ? 'Click "Install" to add this app to your desktop' : 'Use your browser menu to install this app',
                showNativeButton: !!deferredPrompt
            };
    }
}

// Update banner content based on device
function updateBannerContent() {
    if (!pwaInstallBanner) return;
    
    const instructions = getInstallInstructions();
    const deviceType = getDeviceType();
    
    // Update title
    const titleElement = pwaInstallBanner.querySelector('.pwa-banner-title');
    if (titleElement) {
        titleElement.textContent = instructions.title;
    }
    
    // Update instructions
    const instructionsElement = pwaInstallBanner.querySelector('.pwa-banner-instructions');
    if (instructionsElement) {
        instructionsElement.innerHTML = instructions.instructions;
    }
    
    // Show/hide install button based on device capabilities
    if (installPwaButton) {
        if (instructions.showNativeButton) {
            installPwaButton.style.display = 'block';
            installPwaButton.textContent = deviceType === 'desktop' ? 'Install' : 'Install App';
        } else {
            installPwaButton.style.display = 'none';
        }
    }
    
    // Add device-specific styling
    pwaInstallBanner.className = `pwa-install-banner ${deviceType}`;
}

// Initialize PWA elements after DOM is loaded
async function initPWABanner() {
    if (await isAppInstalled()) {
        console.log('App is already installed, not showing install banner');
        return;
    }

    if (!canInstallPWA()) {
        console.log('Device cannot install PWAs, not showing banner');
        return;
    }

    const deviceType = getDeviceType();

    if ((deviceType === 'android' || deviceType === 'desktop') && !deferredPrompt) {
        console.log('No deferred install prompt available; skipping banner');
        return;
    }

    if (deviceType === 'ios') {
        const visits = parseInt(localStorage.getItem('pwaVisitCount') || '0', 10);
        localStorage.setItem('pwaVisitCount', String(visits + 1));
        if (visits < 1) {
            console.log('iOS: First visit—delaying install prompt');
            return;
        }
    }

    pwaInstallBanner = document.getElementById('pwaInstallBanner');
    closePwaBanner = document.getElementById('closePwaBanner');
    cancelPwaBanner = document.getElementById('cancelPwaBanner');
    installPwaButton = document.getElementById('installPwaButton');

    if (!pwaInstallBanner) {
        console.warn('PWA install banner element not found');
        return;
    }

    const hideBanner = () => {
        pwaInstallBanner.classList.remove('show');
    };

    // Fixed: actually set the sessionStorage flag on dismissal
    const dismissBanner = () => {
        pwaInstallBanner.classList.remove('show');
        try {
            sessionStorage.setItem('pwaBannerDismissed', 'true');
            console.log('PWA banner dismissed for this session');
        } catch (e) {
            console.warn('Could not store PWA banner dismissal');
        }
    };

    if (closePwaBanner) {
        closePwaBanner.addEventListener('click', dismissBanner);
    }
    
    if (cancelPwaBanner) {
        cancelPwaBanner.addEventListener('click', dismissBanner);
    }

    updateBannerContent();

    createTrackedTimeout(() => {
        // Check dismissal flag again at show-time in case it was set between init and display
        try {
            if (sessionStorage.getItem('pwaBannerDismissed') === 'true') {
                console.log('Banner was dismissed before show timeout fired');
                return;
            }
        } catch (e) {}
        pwaInstallBanner.classList.add('show');
        console.log('PWA install banner shown');
    }, 2000);

    if (installPwaButton) {
        installPwaButton.addEventListener('click', async () => {
            if (deviceType === 'android' || deviceType === 'desktop') {
                if (!deferredPrompt) {
                    alert('Please use your browser menu to "Add to Home Screen" or "Install App"');
                    hideBanner();
                    return;
                }

                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;

                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                    try {
                        sessionStorage.setItem('appJustInstalled', 'true');
                        localStorage.setItem('pwa-installed', 'true');
                        // Also mark banner as dismissed so it never shows again this session
                        sessionStorage.setItem('pwaBannerDismissed', 'true');
                    } catch (e) {

function initializeUserLocation(position) {
    console.log('Initializing user location:', {
        lat: position?.coords?.latitude,
        lng: position?.coords?.longitude,
        accuracy: position?.coords?.accuracy
    });

    if (!position?.coords) {
        console.error('Invalid initial position - missing coords');
        handleLocationError(new Error('Invalid initial position'));
        return;
    }

    const { latitude: lat, longitude: lng, accuracy, heading, speed } = position.coords;

    if (isNaN(lat) || isNaN(lng)) {
        console.error('Invalid coordinates (NaN):', { lat, lng });
        handleLocationError(new Error('Invalid initial coordinates'));
        return;
    }

    if (Math.abs(lat) > 90 || Math.abs(lng) > 180) {
        console.error('Out-of-range coordinates:', { lat, lng });
        handleLocationError(new Error('Coordinates out of valid range'));
        return;
    }

    if (window._initializationComplete) {
        console.warn('initializeUserLocation: already completed, updating position only');
        if (userMarker) userMarker.setLatLng([lat, lng]);
        if (map) map.panTo([lat, lng], { animate: false });
        return;
    }

    if (window._initializationInProgress) {
        console.warn('Initialization already in progress, queueing position');
        window._pendingInitPosition = position;
        return;
    }
    window._initializationInProgress = true;

    if (accuracy > 100) {
        console.warn(`Initial position has poor accuracy: ${accuracy.toFixed(0)}m`);
        announceToScreenReader?.(`Location acquired with ${accuracy.toFixed(0)} meter accuracy. Map loading.`);
    } else {
        announceToScreenReader?.('Location acquired. Map ready for navigation.');
    }

    try {
        if (!userMarker) {
            console.warn('User marker not ready — scheduling retry');
            const maxRetries = 3;
            const retryDelay = 100;

            window._markerRetryCount = (window._markerRetryCount || 0) + 1;

            if (window._markerRetryCount <= maxRetries) {
                window._initializationInProgress = false;

                setTimeout(() => {
                    const latestPosition = window._pendingInitPosition || position;
                    window._pendingInitPosition = null;
                    initializeUserLocation(latestPosition);
                }, retryDelay * window._markerRetryCount);

                return;
            } else {
                console.error('User marker unavailable after multiple retries');
                window._initializationInProgress = false;
                // FIX 1: reset retry counter on hard failure so a future
                // recovery attempt gets a full 3 retries
                window._markerRetryCount = 0;
                handleLocationError(new Error('Map marker initialization failed'));
                return;
            }
        }
        // reset on successful marker access so future
        // re-initializations (e.g. after a page soft-reset) aren't penalised
        // by a counter left over from a prior failed session
        window._markerRetryCount = 0;

        userMarker.setLatLng([lat, lng]);

        if (!map) {
            throw new Error('Map not initialized');
        }
        const initialZoom = 17;
        map.setView([lat, lng], initialZoom, { animate: false });
        console.debug(`Map view set to [${lat.toFixed(6)}, ${lng.toFixed(6)}] at zoom ${initialZoom}`);

        if (typeof seedPositionBuffer === 'function') {
            const seedPos = {
                lat,
                lng,
                accuracy,
                timestamp: position.timestamp || Date.now(),
                heading: heading ?? null,
                speedMPS: speed || 0
            };
            seedPositionBuffer(seedPos);
            console.debug('Position buffer seeded');
        }

        hideLoadingMessage?.();

        if (typeof startHunt === 'function' && !window._huntStarted) {
            window._huntStarted = true;
            startHunt();
            console.debug('Hunt started');
        } else if (!window._huntStarted) {
            console.warn('startHunt function not available');
        }

        if (typeof startIdleProximityCheck === 'function' && !window._proximityCheckStarted) {
            window._proximityCheckStarted = true;
            startIdleProximityCheck();
            console.debug('Idle proximity check started');
        }

        if (typeof _handleProximityZoom === 'function') {
            _handleProximityZoom(0, false);
        }

        const distBox = cachedElements?.distanceBox ?? document.getElementById('distanceBox');
        if (distBox) {
            distBox.classList.add('pulse');
            const pulseTimeout = setTimeout(() => distBox.classList.remove('pulse'), 3000);
            window._pulseTimeout = pulseTimeout;
        }

        window._initializationComplete = true;
        window._initializationInProgress = false;
        window._lastSuccessfulInit = Date.now();
        // reset recovery counter on success so a second failure later
        // in the session gets the full 3 retry budget rather than the remainder
        window._initRecoveryAttempts = 0;

        console.log('User location initialization complete');

        setTimeout(() => {
            const watchId = startPositionUpdates();
            if (watchId === null) {
                console.warn('Failed to start position updates');
                setTimeout(() => {
                    if (!window.positionWatchId) {
                        console.debug('Retrying position watch start');
                        startPositionUpdates();
                    }
                }, 3000);
            }
        }, 0);

    } catch (err) {
        console.error('Error during location initialization:', err);
        window._initializationInProgress = false;

        // if an exception fires after _huntStarted or _proximityCheckStarted
        // were set but before _initializationComplete, clear those flags so a
        // recovery attempt can restart those subsystems cleanly
        if (!window._initializationComplete) {
            window._huntStarted = false;
            window._proximityCheckStarted = false;
        }

        handleLocationError(err);

        window._initRecoveryAttempts = (window._initRecoveryAttempts || 0) + 1;

        if (window._initRecoveryAttempts <= 3) {
            const backoffMs = Math.min(15000, Math.pow(2, window._initRecoveryAttempts) * 1000);
            console.debug(`Recovery attempt ${window._initRecoveryAttempts}/3 in ${backoffMs}ms`);

            setTimeout(() => {
                if (navigator.geolocation && !window._initializationComplete) {
                    navigator.geolocation.getCurrentPosition(
                        initializeUserLocation,
                        handleLocationError,
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                }
            }, backoffMs);
        } else {
            console.error('Max initialization recovery attempts reached');
            if (typeof showPopup === 'function') {
                showPopup(
                    'Location Error',
                    'Unable to get your location after multiple attempts. Please check your GPS settings and refresh the page.',
                    'error'
                );
            }
        }
    }

    // validate pending position coords before using them
    if (window._initializationComplete && window._pendingInitPosition) {
        const pending = window._pendingInitPosition;
        window._pendingInitPosition = null;
        const pLat = pending?.coords?.latitude;
        const pLng = pending?.coords?.longitude;
        if (userMarker && pLat != null && pLng != null && !isNaN(pLat) && !isNaN(pLng)) {
            userMarker.setLatLng([pLat, pLng]);
        }
    }
}

/* Starts or restarts the geolocation watch with power-appropriate settings. */
function startPositionUpdates() {
    try {
        // ── Cleanup any existing watch first ──
        if (window.positionWatchId !== null && window.positionWatchId !== undefined) {
            navigator.geolocation.clearWatch(window.positionWatchId);
            window.positionWatchId = null;
        }
        
        // ── Cleanup existing power manager interval ──
        if (window._gpsPowerInterval) {
            clearInterval(window._gpsPowerInterval);
            window._gpsPowerInterval = null;
            window._gpsPowerManagerSetup = false; // FIX: Allow power manager to be recreated
        }
        
        // ── Remove old beforeunload listener before adding new one ──
        if (window._positionUpdatesBeforeUnload) {
            window.removeEventListener('beforeunload', window._positionUpdatesBeforeUnload);
            window._positionUpdatesListenersSetup = false; // FIX: Allow listeners to be re-attached
            window._positionUpdatesBeforeUnload = null;
        }

        // ── GPS Power Mode Selection ──
                function getWatchOptions() {
            const speedMPS = window.lastPosition?.speedMPS ?? 0;
            const speedMPH = speedMPS * 2.23694;

            if (window.isStationary || speedMPH < 0.5) {
                // Parked: allow stale data, save battery
                return { enableHighAccuracy: true, maximumAge: 15000, timeout: 30000 };
            } else if (speedMPH < 5) {
                // Walking: tighten from 5000ms → 2000ms to catch acceleration sooner
                return { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 };
            } else {
                // Driving: always use fresh data (<1s old)
                return { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 };
            }
        }

        // ── Start the watch ──
        const opts = getWatchOptions();
        window.positionWatchId = navigator.geolocation.watchPosition(
            handlePositionUpdate,
            handleLocationError,
            opts
        );

        // ── Dynamic GPS Power Manager ──
        if (!window._gpsPowerManagerSetup) {
            window._gpsPowerManagerSetup = true;
            let lastPowerMode = null;

            function getCurrentPowerMode() {
                const speedMPS = window.lastPosition?.speedMPS ?? 0;
                const speedMPH = speedMPS * 2.23694;
                if (window.isStationary || speedMPH < 0.5) return 'low';
                if (speedMPH < 5) return 'medium';
                return 'high';
            }

           function adjustGPSPower() {
                if (!navigator.onLine) return; // FIX: Prevent errors when offline
                
                const newMode = getCurrentPowerMode();
                if (newMode === lastPowerMode) return;
                lastPowerMode = newMode;
                
                if (window.positionWatchId !== null) {
                    navigator.geolocation.clearWatch(window.positionWatchId);
                }
                const newOpts = getWatchOptions();
                window.positionWatchId = navigator.geolocation.watchPosition(
                    handlePositionUpdate,
                    handleLocationError,
                    newOpts
                );
            }

            window._gpsPowerInterval = setInterval(adjustGPSPower, 5000);

            // ── Instant-response hooks for stationary state changes ──
            const hookPowerAdjustment = (funcName) => {
                if (typeof window[funcName] === 'function' && !window[funcName]._powerManagerPatched) {
                    const original = window[funcName];
                    window[funcName] = function(...args) {
                        const result = original.apply(this, args);
                        adjustGPSPower();
                        return result;
                    };
                    window[funcName]._powerManagerPatched = true;
                }
            };

            hookPowerAdjustment('_confirmStationary');
            hookPowerAdjustment('_clearStationaryState');
        }

        // ── Network & Lifecycle Listeners ──
        if (!window._positionUpdatesListenersSetup) {
            window._positionUpdatesListenersSetup = true;
            
            window.addEventListener('online', () => {
                if (window.onlineRestartTimeout) clearTimeout(window.onlineRestartTimeout);
                window.onlineRestartTimeout = setTimeout(() => {
                    // FIX: Always restart the watch when coming online
                    if (window.positionWatchId !== null) {
                        navigator.geolocation.clearWatch(window.positionWatchId);
                    }
                    const restartOpts = getWatchOptions();
                    window.positionWatchId = navigator.geolocation.watchPosition(
                        handlePositionUpdate,
                        handleLocationError,
                        restartOpts
                    );
                    window.onlineRestartTimeout = null;
                }, 500);
            });

            window.addEventListener('offline', () => {
                if (window.onlineRestartTimeout) {
                    clearTimeout(window.onlineRestartTimeout);
                    window.onlineRestartTimeout = null;
                }
                if (window.positionWatchId !== null) {
                    navigator.geolocation.clearWatch(window.positionWatchId);
                    window.positionWatchId = null;
                }
            });

            window._positionUpdatesBeforeUnload = () => {
                if (window.positionWatchId !== null) {
                    navigator.geolocation.clearWatch(window.positionWatchId);
                }
                if (window.onlineRestartTimeout) {
                    clearTimeout(window.onlineRestartTimeout);
                }
                if (window._gpsPowerInterval) {
                    clearInterval(window._gpsPowerInterval);
                }
            };
            window.addEventListener('beforeunload', window._positionUpdatesBeforeUnload);
        }

        return window.positionWatchId;
        
    } catch (err) {
        console.error('Geolocation unavailable:', err);
        handleLocationError({ code: 0, message: 'Geolocation unavailable' });
        return null;
    }
}
        
function handlePositionUpdate(position) {
    if (!position || !position.coords ||
        isNaN(position.coords.latitude) ||
        isNaN(position.coords.longitude)) {
        console.warn("Invalid position data received");
        return;
    }

    const positionTimestamp = position.timestamp || Date.now();
    const currentTime = Date.now();

    if (currentTime - positionTimestamp > 30_000) {
        console.warn("Position data too old, ignoring");
        return;
    }

    if (document.hidden) {
        if (window._lastBackgroundUpdate &&
            currentTime - window._lastBackgroundUpdate < 30_000) {
            return;
        }
        window._lastBackgroundUpdate = currentTime;
    } else {
        window._lastBackgroundUpdate = 0;
    }

    const accuracy   = position.coords.accuracy || 0;
    const rawSpeedMPS = position.coords.speed   || 0;
    const rawHeading  = position.coords.heading;
    const validHeading = (rawHeading !== null && rawHeading !== undefined && rawHeading >= 0)
        ? rawHeading
        : null;

    window.lastPositionAccuracy = accuracy;
    window.lastRawSpeedMPS      = rawSpeedMPS;

    window.lastValidPosition = {
        lat:       position.coords.latitude,
        lng:       position.coords.longitude,
        timestamp: positionTimestamp,
        accuracy,
        speedMPS:  rawSpeedMPS,
        heading:   validHeading
    };

    if (window.lastUpdateTime) {
        window.timeSinceLastUpdate = currentTime - window.lastUpdateTime;
    }
    window.lastUpdateTime = currentTime;

    updateUserLocation(position, rawSpeedMPS > 10);
}
        
function handleVisibilityChange() {
    if (typeof lastHiddenTime === 'undefined') {
        lastHiddenTime = Date.now();
    }
    
    if (document.hidden) {
        // Tab/app going to background
        lastHiddenTime = Date.now();
        lastKnownPosition = userMarker?.getLatLng() ?? null;
        resetInactivityTimer(false);
        
        disposeMapLoop();
        window.isReWaking = false;
        if (window.visibilityDebounceTimer) {
            clearTimeout(window.visibilityDebounceTimer);
            window.visibilityDebounceTimer = null;
        }
        
        console.debug("App went to background - timers disposed");
    } else {
        // Tab/app returning to foreground
        const awayMs = Date.now() - (window.lastHiddenTime || lastHiddenTime || 0);
        const threshold = CONFIG?.BACKGROUND_THRESHOLD ?? 30_000;
        
        console.debug(`App returned to foreground after ${(awayMs / 1000).toFixed(1)}s`);
        
        // Cancel any pending debounce
        if (window.visibilityDebounceTimer) {
            clearTimeout(window.visibilityDebounceTimer);

function updatePositionBuffer(position) {
    // Validate input
    if (!position || typeof position.lat !== 'number' || typeof position.lng !== 'number') {
        console.warn('updatePositionBuffer: invalid position, skipping');
        return;
    }
    
    // Validate lat/lng ranges
    if (Math.abs(position.lat) > 90 || Math.abs(position.lng) > 180) {
        console.warn('updatePositionBuffer: out-of-range coordinates, skipping');
        return;
    }
    
    // Add new position
    positionBuffer.push({
        lat: position.lat,
        lng: position.lng,
        accuracy: position.accuracy,
        timestamp: position.timestamp,
        heading: position.heading,
        speedMPS: position.speedMPS
    });
    
    // Remove oldest position if buffer exceeds max size (more efficient)
    if (positionBuffer.length > CONFIG.MAX_BUFFER_SIZE) {
        positionBuffer.shift();
    }
}

function seedPositionBuffer(seedPosition, count = CONFIG.MAX_BUFFER_SIZE || 5) {
    // Validate input
    if (!seedPosition || typeof seedPosition.lat !== 'number' || typeof seedPosition.lng !== 'number') {
        console.warn('seedPositionBuffer: invalid seed position, skipping');
        return;
    }
    
    // Validate count
    const safeCount = Math.max(1, Math.min(count, CONFIG.MAX_BUFFER_SIZE || 10));
    
    // Clear buffer
    positionBuffer.length = 0;
    
    // Create template position (clone once)
    const template = {
        lat: seedPosition.lat,
        lng: seedPosition.lng,
        accuracy: seedPosition.accuracy,
        timestamp: seedPosition.timestamp,
        heading: seedPosition.heading,
        speedMPS: seedPosition.speedMPS
    };
    
    // Fill buffer with clones to prevent shared reference issues
    for (let i = 0; i < safeCount; i++) {
        positionBuffer.push({ ...template });
    }
    
    console.debug(`Position buffer seeded with ${safeCount} positions`);
}

function calculateWeightedPosition(positions) {
    if (!Array.isArray(positions) || positions.length === 0) {
        return null;
    }
    
    const validPositions = positions.filter(pos => 
        pos && 
        typeof pos.lat === 'number' && 
        typeof pos.lng === 'number' && 
        !isNaN(pos.lat) && 
        !isNaN(pos.lng) &&
        Math.abs(pos.lat) <= 90 &&
        Math.abs(pos.lng) <= 180
    );
    
    if (validPositions.length === 0) {
        return null;
    }
    
    // Single position — no weighting needed
    if (validPositions.length === 1) {
        return {
            lat: validPositions[0].lat,
            lng: validPositions[0].lng,
            accuracy: validPositions[0].accuracy || 20,
            timestamp: validPositions[0].timestamp,
            heading: validPositions[0].heading,
            speedMPS: validPositions[0].speedMPS
        };
    }
    
    /* Recency-based weighting: heavily favors recent positions */
    const len = validPositions.length;
    let sumLat = 0, sumLng = 0, totalWeight = 0;
    
    for (let i = 0; i < len; i++) {
        const position = validPositions[i];
        
        // Linear recency: index 0 = oldest, index len-1 = newest
        const recencyFactor = (i + 1) / len;
        
        // Aggressive recency bias: newer positions weighted much more heavily
        const weight = Math.pow(recencyFactor, 2.5);
        
        sumLat += position.lat * weight;
        sumLng += position.lng * weight;
        totalWeight += weight;
    }
    
    // Find best (lowest) accuracy among valid positions
    let bestAccuracy = Infinity;
    for (const pos of validPositions) {
        const acc = pos.accuracy;
        if (typeof acc === 'number' && !isNaN(acc) && acc < bestAccuracy) {
            bestAccuracy = acc;
        }
    }
    
    const mostRecent = validPositions[len - 1];
    
    return {
        lat: sumLat / totalWeight,
        lng: sumLng / totalWeight,
        accuracy: bestAccuracy !== Infinity ? bestAccuracy : 20,
        timestamp: mostRecent.timestamp,
        heading: mostRecent.heading,
        speedMPS: mostRecent.speedMPS
    };
}

function checkStationaryState(newPosition) {
    if (!lastPosition) return;
    
    const distance = calculateDistance(lastPosition, newPosition);
    const now = Date.now();
    
    // Movement detected — exit stationary mode immediately
    if (distance >= CONFIG.MICRO_MOVEMENT_THRESHOLD) {
        const wasStationary = isStationary;
        isStationary = false;
        stationaryStartTime = null;
        
        if (stationaryCheckTimeout) {
            clearTimeout(stationaryCheckTimeout);
            stationaryCheckTimeout = null;
        }
        
        if (wasStationary) {
            console.debug("Movement detected, resuming normal updates");
        }
        return;
    }
    
    // ── No movement — track stationary duration
    if (stationaryStartTime === null) {
        stationaryStartTime = now;
    }
    
    // Check if we should enter stationary state
    if (!isStationary) {
        const duration = now - stationaryStartTime;
        if (duration >= CONFIG.STATIONARY_THRESHOLD) {
            isStationary = true;
            console.debug(`Entered stationary state after ${(duration / 1000).toFixed(1)}s`);
        }
    }
    
    // ── Reset the expiration timer every time we're stationary
    if (stationaryCheckTimeout) {
        clearTimeout(stationaryCheckTimeout);
        stationaryCheckTimeout = null;
    }
    
    // Only set expiration timer if we're actually stationary
    if (isStationary) {
        stationaryCheckTimeout = setTimeout(() => {
            // Check if we're still stationary and no updates received
            if (isStationary && window.lastUpdateTime) {
                const timeSinceLastUpdate = Date.now() - window.lastUpdateTime;
                // Expire if no GPS updates for significantly longer than expected
                if (timeSinceLastUpdate > CONFIG.STATIONARY_CHECK_INTERVAL * 3) {
                    console.debug("Stationary state expired due to no GPS updates");
                    isStationary = false;
                    stationaryStartTime = null;
                }
            }
            stationaryCheckTimeout = null;
        }, CONFIG.STATIONARY_CHECK_INTERVAL);
    }

function throttle(func, limit) {
    let timeoutId = null;
    let lastRan = 0;
    let pendingArgs = null;
    let pendingThis = null;
    
    return function throttled(...args) {
        const now = Date.now();
        const context = this;
        
        if (now - lastRan >= limit) {
            func.apply(context, args);
            lastRan = now;
            pendingArgs = null;
            pendingThis = null; // Added for completeness
        } else {
            pendingArgs = args;
            pendingThis = context;
            
            if (timeoutId) clearTimeout(timeoutId);
            
            timeoutId = setTimeout(() => {
                if (pendingArgs) {
                    func.apply(pendingThis, pendingArgs);
                    lastRan = Date.now();
                    pendingArgs = null;
                    pendingThis = null; // Added for completeness
                }
                timeoutId = null;
            }, limit - (now - lastRan));
        } 
    };
}

    return Math.pow(t, exponent);
}

        window._lastPrefetchCleanup = now;

        window._prefetchState = {};
    }

    const locationId = location.id;
    const state = window._prefetchState[locationId];

    // Only prefetch once per approach
    if (state && state.completed) {

    console.log(`[Proximity] Entering prefetch zone: ${distanceFeet.toFixed(1)}ft from ${location.name || locationId}`);

        } else {
