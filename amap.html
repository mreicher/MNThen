/* Handles trigger zone entry for a location. */
function _handleTriggerZone(location, distanceFeet, now, isOnCooldown) {
    const locationId = location.id;
    console.log(`[Proximity] Within trigger zone: ${distanceFeet.toFixed(1)}ft of ${location.name || locationId}`);

    // ── Gate 1: Is the location page already open? ──
    const lochuntContainer = document.querySelector('.lochunt-container');
    const locationPageOpen = lochuntContainer && lochuntContainer.style.display !== 'none';
    if (locationPageOpen) {
        console.log('[Proximity] Skipped - page already open');
        return;
    }

    // ── Debounce Check (Per-Location) ──
    if (!window._lastProximityTriggerByLocation) {
        window._lastProximityTriggerByLocation = {};
    }
    const lastTriggerForThisLocation = window._lastProximityTriggerByLocation[locationId] || 0;
    const timeSinceLastTrigger = now - lastTriggerForThisLocation;

    // Adaptive debounce: faster approach = shorter debounce
    const MIN_DEBOUNCE = 2000;  // 2s minimum
    const MAX_DEBOUNCE = 5000;  // 5s maximum
    let debounceTime = MIN_DEBOUNCE;

    if (window._prefetchState && window._prefetchState[locationId]) {
        const approach = window._prefetchState[locationId];
        const approachTime = now - approach.startTime;
        const distanceTraveled = approach.startDistance - distanceFeet;

        if (approachTime > 0 && distanceTraveled > 0) {
            const approachSpeed = distanceTraveled / (approachTime / 1000);
            if (approachSpeed > 5) {
                debounceTime = MIN_DEBOUNCE;
            } else if (approachSpeed < 1) {
                debounceTime = MAX_DEBOUNCE;
            } else {
                debounceTime = MIN_DEBOUNCE + (MAX_DEBOUNCE - MIN_DEBOUNCE) * (1 - approachSpeed / 5);
            }
        }
    }

    if (timeSinceLastTrigger < debounceTime) {
        console.log(`[Proximity] Debounced - opened ${locationId} ${(timeSinceLastTrigger / 1000).toFixed(1)}s ago`);
        return;
    }

    // ── Get location object ──
    const locationToOpen = window.preloadedLocation || location;

    // ── Check Cooldown BEFORE stamping debounce ──
    if (window.cooldownManager) {
        const status = window.cooldownManager.checkCooldown(locationToOpen.id);
        if (status.isOnCooldown) {
            // On cooldown: show UI but do NOT stamp debounce
            console.log(`[Proximity] Location ${locationId} on cooldown. Skipping debounce stamp.`);
            if (typeof _openLocationPage === 'function') {
                _openLocationPage(locationToOpen);
            }
            return;
        } else {
            // Cooldown has EXPIRED or never existed — clear any stale debounce stamp
            if (window._lastProximityTriggerByLocation) {
                delete window._lastProximityTriggerByLocation[locationId];
            }
        }
    }

    // ── NOT on cooldown: SAFE to stamp debounce and open ──
    window._lastProximityTriggerByLocation[locationId] = now;

    // ── Last-Chance Data Preload ──
    if (!window.preloadedLocation || window.preloadedLocation.id !== locationId) {
        console.warn('[Proximity] Emergency preload - prefetch zone was skipped!');
        window.preloadedLocation = location;
        if (typeof preloadLocationData === 'function') {
            try {
                preloadLocationData(location);
            } catch (err) {
                console.warn('[Proximity] Emergency preload failed:', err);
            }
        }
    }

    // ── Haptic Feedback ──
    if ('vibrate' in navigator) {
        try {
            navigator.vibrate([80, 40, 80]);
        } catch (err) {}
    }

    // ── Open Location ──
    if (typeof _openLocationPage === 'function') {
        try {
            _openLocationPage(locationToOpen);
            window.preloadedLocation = null;
            if (window._prefetchState && window._prefetchState[locationId]) {
                delete window._prefetchState[locationId];
            }
            console.log('[Proximity] ✅ Location opened successfully');
        } catch (err) {
            console.error('[Proximity] Failed to open location:', err);
        }
    } else {
        console.error('[Proximity] _openLocationPage function not found');
    }
}

// TILE PREFETCH UTILITY
function _prefetchMapTiles(location, now) {
    const prefetchKey = `_didPrefetch19_${location.id}`;

    if (window[prefetchKey]) {
        console.debug('[Proximity] Tiles already prefetched for', location.id);
        return;
    }

    if (!window.map || typeof map.getCenter !== 'function' || typeof map.getZoom !== 'function') {
        console.warn('[Proximity] Map not available for tile prefetch');
        return;
    }

    try {
        const currentZoom = map.getZoom();

        if (currentZoom >= 18) {
            console.debug('[Proximity] Skipping tile prefetch - already at high zoom');
            window[prefetchKey] = true;
            return;
        }

        const center = map.getCenter();
        if (!center || typeof center.lat !== 'number' || typeof center.lng !== 'number') {
            throw new Error('Invalid map center');
        }

        const targetZoom = 19;
        const tileUrlTemplate = window.currentTileLayer?._url 
  || (window.map?._layers ? Object.values(window.map._layers).find(l => l._url)?._url : null)
  || 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

        const targetLat = location.lat || center.lat;
        const targetLng = location.lng || center.lng;

        const latRad = targetLat * Math.PI / 180;
        const n = Math.pow(2, targetZoom);
        const xtile = Math.floor((targetLng + 180) / 360 * n);
        const ytile = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);

        const tilesToPrefetch = [];
        const subdomains = ['a', 'b', 'c'];

        // 3x3 grid centered on location (9 tiles)
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const x = xtile + dx;
                const y = ytile + dy;

                if (x < 0 || x >= n || y < 0 || y >= n) continue;

                const subdomain = subdomains[(x + y) % subdomains.length];

                const url = tileUrlTemplate
                    .replace('{z}', targetZoom)
                    .replace('{x}', x)
                    .replace('{y}', y)
                    .replace('{s}', subdomain);

                tilesToPrefetch.push(url);
            }
        }

        // Capture a batch ID to discard stale tile loads if location changes
        if (!window._tilePrefetchBatchId) {
            window._tilePrefetchBatchId = 0;
        }
        const batchId = ++window._tilePrefetchBatchId;

        let delay = 0;
        const STAGGER_MS = 50;

        tilesToPrefetch.forEach((url) => {
            setTimeout(() => {
                // Abort if a newer prefetch batch has started
                if (window._tilePrefetchBatchId !== batchId) {
                    console.debug('[Prefetch] Stale batch discarded for', url);
                    return;
                }
                const img = new Image();
                img.onerror = () => {
                    console.debug('[Prefetch] Tile load failed (may already be cached):', url);
                };
                img.onload = () => {
                    console.debug('[Prefetch] Tile loaded:', url);
                };
                img.src = url;
            }, delay);

            delay += STAGGER_MS;
        });

        window[prefetchKey] = true;
        console.log(`[Prefetch] Initiated staggered load of ${tilesToPrefetch.length} tiles at zoom ${targetZoom} for`, location.name || location.id);

    } catch (err) {
        console.warn('[Prefetch] Failed to prefetch tiles:', err);
    }
}

;(function () {

    // ── Configuration ────────────────────────────────────────────────────────

    /**
     * How long (ms) after the last position update before the compositor layer
     * is released.  Keeps the layer promoted while the user is moving and frees
     * it shortly after they stop — balancing smoothness against battery/memory.
     */
    var WILL_CHANGE_IDLE_MS = 2000;

    // ── Module state — never written to window ────────────────────────────────

    var _pendingLat    = null;
    var _pendingLng    = null;
    var _rafId         = null;
    var _resetTimer    = null;
    var _willChangeOn  = false;
    var _updateCount   = 0;     // gates compositor promotion (see _ensureWillChange)

    // ── Private helpers ───────────────────────────────────────────────────────

    /** Safely retrieve the DOM element backing userMarker.*/
    function _getMarkerEl() {
        try {
            return (userMarker && typeof userMarker.getElement === 'function')
                ? userMarker.getElement()
                : null;
        } catch (_) {
            return null;
        }
    }

    /**
     * Promote the marker element to its own compositor layer — but only after
     * two consecutive updates.  
     */
    function _ensureWillChange() {
        if (_willChangeOn) return;
        if (++_updateCount < 2) return;
        var el = _getMarkerEl();
        if (!el) return;
        el.style.willChange = 'transform';
        _willChangeOn = true;
    }

    /**
     * (Re)schedule releasing the compositor layer after WILL_CHANGE_IDLE_MS of
     * inactivity. */
    function _scheduleWillChangeReset() {
        if (_resetTimer !== null) {
            clearTimeout(_resetTimer);
        }
        _resetTimer = setTimeout(function () {
            _resetTimer   = null;
            _willChangeOn = false;
            _updateCount  = 0;
            var el = _getMarkerEl();
            if (el) el.style.willChange = 'auto';
        }, WILL_CHANGE_IDLE_MS);
    }

    /* RAF callback. */
    function _commitMarkerUpdate() {
        _rafId = null;

        if (_pendingLat === null || !userMarker) {
            _pendingLat = _pendingLng = null;
            return;
        }

        var lat = _pendingLat;
        var lng = _pendingLng;
        _pendingLat = _pendingLng = null;

        try {
            userMarker.setLatLng([lat, lng]);
        } catch (err) {
            // Surface in development; fail silently in production
            if (typeof process === 'undefined' ||
                !process.env ||
                process.env.NODE_ENV !== 'production') {
                console.warn('[scheduleMarkerUpdate] setLatLng failed:', err);
            }
        }

        _scheduleWillChangeReset();
    }

    /**
     * Schedule a marker position update coalesced to the next animation frame.
     */
    function scheduleMarkerUpdate(lat, lng, options) { // eslint-disable-line no-unused-vars
        // Always overwrite pending coords.  The RAF callback reads the latest
        // value at paint time — intermediate positions are intentionally dropped.
        _pendingLat = lat;
        _pendingLng = lng;

        // Arm willChange *before* the paint so the browser can promote the
        // compositor layer ahead of the transform change, not after.
        _ensureWillChange();

        // Guard: if a RAF is already queued it will pick up the new coords above.
        if (_rafId !== null) return;

        _rafId = requestAnimationFrame(_commitMarkerUpdate);
    }

    /**
     * Release all resources and cancel any pending update.
     */
    function cancelMarkerUpdate() {
        if (_rafId !== null) {
            cancelAnimationFrame(_rafId);
            _rafId = null;
        }

        if (_resetTimer !== null) {
            clearTimeout(_resetTimer);
            _resetTimer = null;
        }

        _pendingLat   = null;
        _pendingLng   = null;
        _willChangeOn = false;
        _updateCount  = 0;

        var el = _getMarkerEl();
        if (el) el.style.willChange = 'auto';
    }

    /**
     * _cleanupMarkerStyles — backwards-compatible alias.
     */
    function _cleanupMarkerStyles() {
        cancelMarkerUpdate();
    }

    // Expose on window so existing call-sites require zero changes.

    window.scheduleMarkerUpdate  = scheduleMarkerUpdate;
    window.cancelMarkerUpdate    = cancelMarkerUpdate;
    window._cleanupMarkerStyles  = _cleanupMarkerStyles;

/* updateUserLocation — v8.0
 *
 * Changes from v7.1:
 *
 *  INTERPOLATOR
 *  ─ Acceleration estimation: tracks Δvelocity/Δtime across setTarget calls,
 *    low-pass filtered (α=0.30). _tick now uses pos + vel·t + ½·acc·t² for
 *    goal projection instead of pos + vel·t, giving the marker genuine
 *    dead-reckoning between GPS fixes rather than a simple linear lookahead.
 *  ─ Speed-adaptive convergence: blend factor scales from 10 (stationary) to
 *    35 (highway) so the marker catches up faster at speed without jittering
 *    at walking pace.
 *  ─ Speed-adaptive heading rate: rotation snaps from 6 (walking) to 20
 *    (highway) so the icon accurately tracks sharp turns at driving speeds.
 *  ─ predFade window shifted: fade starts at 1.5 s stale (was 0 s), reaches
 *    zero at 4.0 s (was 2.5 s). Prevents cutting lookahead during normal
 *    2-second GPS gaps in poor signal.
 *  ─ All new tuning knobs exposed as window._ overrides for live console
 *    adjustment with no deploy.
 *
 *  SMOOTH STAGE
 *  ─ Buffer weighting now projects each historical sample forward to "now"
 *    using the current smoothed velocity before averaging. This eliminates
 *    the systematic rearward bias that caused the smoothed position to always
 *    trail the device; the icon now leads correctly instead of lagging.
 *
 *  SPEED STAGE
 *  ─ EMA alphas are time-normalised: α_t = 1 − (1−α)^dtSec. GPS fixes can
 *    arrive anywhere from 250 ms to 2 s apart; without normalisation the
 *    effective smoothing constant varies by 8× across platforms. Normalised
 *    alphas produce identical speed curves regardless of fix rate.
 *
 *  Everything else is identical to v7.1. External API, window.* state keys,
 *  stage names, signal values, and circuit-breaker names are all unchanged.
 */

// ─── ZERO-COST TELEMETRY ──────────────────────────────────────────────────────

const _TM = (() => {
    if (window._gpsDebug !== true) {
        return Object.freeze({
            start: () => {}, stage: () => {}, meta: () => {},
            end: () => {}, report: () => 'Telemetry disabled', reset: () => {}
        });
    }
    const runs = [], MAX = 50;
    let cur = null;
    return {
        start(force) {
            cur = { t0: performance.now(), force, stages: [], halt: null, signal: null, total: 0, m: {} };
        },
        stage(name, ms, result) {
            if (!cur) return;
            cur.stages.push({ name, ms, result });
            if (ms > 5) console.debug(`[GPS] Slow ${name}: ${ms.toFixed(2)}ms`);
        },
        meta(k, v) { if (cur) cur.m[k] = v; },
        end(halt, sig) {
            if (!cur) return;
            cur.total = performance.now() - cur.t0;
            cur.halt = halt;
            cur.signal = sig;
            runs.push(cur);
            if (runs.length > MAX) runs.shift();
            cur = null;
        },
        report() {
            if (!runs.length) return 'No runs.';
            const last = runs[runs.length - 1];
            const avg  = runs.reduce((s, r) => s + r.total, 0) / runs.length;
            const avgs = {};
            for (const r of runs) {
                for (const s of r.stages) {
                    avgs[s.name] = avgs[s.name] || { sum: 0, n: 0, max: 0 };
                    avgs[s.name].sum += s.ms;
                    avgs[s.name].n++;
                    avgs[s.name].max = Math.max(avgs[s.name].max, s.ms);
                }
            }
            return [
                `GPS Pipeline v8.0 (${runs.length} runs)`,
                `Avg: ${avg.toFixed(2)}ms | Last: ${last.total.toFixed(2)}ms`,
                `Halt: ${last.halt || 'none'} (${last.signal || 'COMPLETE'})`,
                `Tier: ${last.m.tier || 'n/a'} | Boost: ${last.m.boost?.toFixed(2) || 'n/a'}`,
                `Interp: ${last.m.interp || 'n/a'}`,
                ...Object.entries(avgs).map(([n, d]) =>
                    `  ${n}: ${(d.sum / d.n).toFixed(2)}ms max=${d.max.toFixed(2)} (${d.n}x)`)
            ].join('\n');
        },
        reset() { runs.length = 0; cur = null; }
    };
})();

Object.defineProperty(window, '_pipelineMetrics', {

const _CB = {
    f: new Map(), MAX: 3, COOL: 30000,
    ok(n) {
        const e = this.f.get(n);
        if (!e || e.c < this.MAX) return true;
        if (Date.now() - e.t >= this.COOL) { e.c = 0; return true; }
        return false;
    },
    hit(n) {
        const e = this.f.get(n) || { c: 0, t: 0 };
        e.c++; e.t = Date.now(); this.f.set(n, e);
        if (e.c >= this.MAX) console.warn(`[GPS] Circuit OPEN: ${n}`);
        return e.c >= this.MAX;
    },
    clear(n) { n ? this.f.delete(n) : this.f.clear(); }
};

// ─── PURE UTILITIES ────────────────────────────────────────────────────────────

const U = {
    valid(c)         { return c && Number.isFinite(c.latitude) && Number.isFinite(c.longitude); },
    hDiff(a, b)      { if (a == null || b == null) return 0; const d = Math.abs(a - b); return d > 180 ? 360 - d : d; },
    normH(f, t)      { if (f == null || t == null) return t; let d = t - f; if (d > 180) d -= 360; if (d < -180) d += 360; return f + d; },
    smoothstep(t)    { const c = Math.min(1, Math.max(0, t)); return c * c * (3 - 2 * c); },
    lerp(a, b, t)    { return a + (b - a) * t; },
    clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
};

function resolveTier(mph) {
    if (mph <= TIERS[0].maxMPH) return { p: TIERS[0].p, name: TIERS[0].name, blend: 0 };
    for (let i = 1; i < TIERS.length; i++) {
        if (mph <= TIERS[i].maxMPH) {
            const lo = TIERS[i - 1].maxMPH, hi = TIERS[i].maxMPH;
            const t  = hi > lo ? (mph - lo) / (hi - lo) : 0;
            const s  = U.smoothstep(t), a = TIERS[i - 1].p, b = TIERS[i].p;
            return {
                p: {
                    micro:   U.lerp(a.micro,   b.micro,   s), minDist: U.lerp(a.minDist, b.minDist, s),
                    maxAcc:  U.lerp(a.maxAcc,  b.maxAcc,  s), maxSpd:  U.lerp(a.maxSpd,  b.maxSpd,  s),
                    mapInt:  U.lerp(a.mapInt,  b.mapInt,  s), mapDist: U.lerp(a.mapDist, b.mapDist, s),
                    panDur:  U.lerp(a.panDur,  b.panDur,  s), easeLin: U.lerp(a.easeLin, b.easeLin, s),
                    sBase:   U.lerp(a.sBase,   b.sBase,   s), sMult:   U.lerp(a.sMult,   b.sMult,   s),
                    sMax:    U.lerp(a.sMax,    b.sMax,    s), sMin:    U.lerp(a.sMin,    b.sMin,    s),
                    laBase:  U.lerp(a.laBase,  b.laBase,  s), laMult:  U.lerp(a.laMult,  b.laMult,  s),
                    laMax:   U.lerp(a.laMax,   b.laMax,   s)
                },
                name: TIERS[i - 1].name + '→' + TIERS[i].name,
                blend: t
            };
        }
    }
    return { p: TIERS[TIERS.length - 1].p, name: TIERS[TIERS.length - 1].name, blend: 1 };
}
