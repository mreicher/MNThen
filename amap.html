/* ---------- 2-MINUTE LOCATION COOLDOWN ---------- */
const COOLDOWN_PERIOD_MS = 2 * 60 * 1000;
const STORAGE_KEY = 'locationCooldowns';
const DEBOUNCE_TIME_MS = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 500 : 300;
const CLEANUP_INTERVAL_MS = 60 * 1000;
const MAP_RESET_CHECK_INTERVAL_MS = 5000;
const EXIT_DELAY_MS = 500; // Kept because patchCloseFunctions/polling might rely on constants existing, though unused by UI now

class LocationCooldownManager {
  constructor() {
    this.cooldowns = this.loadFromStorage();
    this.currentLocationId = null;
    this.lastActionTime = 0;
    this.resetCooldownIds = new Set();
    this.wasOverSpeedThreshold = false;
    this._monitoringLocationId = null;
    this._announcedLocations = new Set();
    this._closeFuncPoll = null;
    this._saveTimeout = null;
    
    this._proximityCache = {};
    this._locationCoordCache = {};
    this._lastProximityResult = false;
    this._MAX_PROXIMITY_CACHE_SIZE = 50;
    
    this._sessionPrefs = this._loadSessionPrefs();
    this._prefsChecked = new Set();

    this.cleanupInterval = null;
    this.mapResetInterval = null;
    this.toastInterval = null;
    this.activeToast = null;

    // REMOVED: All state related to centered popups, corner badges, dismissals, and exit delays
    // REMOVED: _centeredPopupTimeout, _exitTimeout, _badgeDismissed, _currentDisplayMode

    this.cleanupExpiredCooldowns();
    this.startPeriodicCleanup();
    this.startMapResetMonitoring();
    this.patchCloseFunctions();
    this.patchCreateBottomActionBar();
  }

  _loadSessionPrefs() {
    try {
      const raw = sessionStorage.getItem('cooldownSessionPrefs');
      if (!raw) return { hideCooldownUI: false };
      const parsed = JSON.parse(raw);
      return { hideCooldownUI: !!parsed.hideCooldownUI };
    } catch (e) {
      console.warn('Failed to load session prefs:', e);
      return { hideCooldownUI: false };
    }
  }

  _saveSessionPrefs() {
    try {
      sessionStorage.setItem('cooldownSessionPrefs', JSON.stringify(this._sessionPrefs));
    } catch (e) {
      console.error('Failed to save session prefs:', e);
    }
  }

  clearSessionPrefs() {
    sessionStorage.removeItem('cooldownSessionPrefs');
    this._sessionPrefs = { hideCooldownUI: false };
    this._prefsChecked.clear();
  }

  checkCooldown(locationId) {
    if (locationId == null) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const id = String(locationId);
    const startTime = this.cooldowns[id];

    if (!startTime) {
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const elapsed = Date.now() - startTime;

    if (!isFinite(elapsed) || elapsed < 0) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    if (elapsed >= COOLDOWN_PERIOD_MS) {
      this._clearCooldownState(id);
      return { isOnCooldown: false, remainingMs: 0, remainingSeconds: 0 };
    }

    const remainingMs = COOLDOWN_PERIOD_MS - elapsed;
    return {
      isOnCooldown: true,
      remainingMs: Math.max(0, remainingMs),
      remainingSeconds: Math.max(0, Math.ceil(remainingMs / 1000)),
    };
  }

  _clearCooldownState(id) {
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  enterLocation(locationId) {
    if (locationId == null) {
      return { success: false, reason: 'invalid_id', message: 'Invalid location ID' };
    }
    const id = String(locationId);
    const now = Date.now();
    if (now - this.lastActionTime < DEBOUNCE_TIME_MS) {
      return { success: false, reason: 'debounced', message: 'Action too rapid' };
    }
    this.lastActionTime = now;
    if (this.currentLocationId === id) {
      return { success: false, reason: 'already_inside', message: 'Already in this location' };
    }
    const status = this.checkCooldown(id);
    if (status.isOnCooldown) {
      return {
        success: false,
        reason: 'on_cooldown',
        message: 'This location cannot be revisited for two minutes',
        remainingMs: status.remainingMs,
        remainingSeconds: status.remainingSeconds,
        locationId: id,
      };
    }
    this.currentLocationId = id;
    this.resetCooldownIds.delete(id);
    return { success: true, reason: 'allowed', message: 'Location entry allowed' };
  }

  leaveLocation(locationId = null) {
    const id = locationId ? String(locationId) : this.currentLocationId;
    if (!id || id === 'null' || id === 'undefined') return;

    const wasCurrentLocation = this.currentLocationId === id;
    if (this.currentLocationId === id) this.currentLocationId = null;

    if (!wasCurrentLocation) return;

    if (this.cooldowns[id]) {
        const status = this.checkCooldown(id);
        if (status.isOnCooldown) return;
    }

    this.cooldowns[id] = Date.now();
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }

  startMapResetMonitoring() {
    this.mapResetInterval = setInterval(() => {
      this.checkAndResetMap();
    }, MAP_RESET_CHECK_INTERVAL_MS);
  }

  checkAndResetMap() {
    const now = Date.now();
    let shouldReset = false;
    let resetReason = null;

    if (typeof window.currentSpeed === 'number' && window.currentSpeed > 6) {
      if (!this.wasOverSpeedThreshold) {
        shouldReset = true;
        resetReason = 'speed_threshold';
        this.wasOverSpeedThreshold = true;
      }
    } else {
      this.wasOverSpeedThreshold = false;
    }

    if (!shouldReset) {
      const cooldownIds = Object.keys(this.cooldowns);
      if (cooldownIds.length > 0) {
        for (const id of cooldownIds) {
          if (this.resetCooldownIds.has(id)) continue;

          const status = this.checkCooldown(id);
          if (!status.isOnCooldown && this.isWithinThreshold(id)) {
            shouldReset = true;
            resetReason = 'cooldown_expired';
            this.resetCooldownIds.add(id);
            break;
          }
        }
      }
    }

    if (shouldReset) {
      console.log(`Map reset triggered: ${resetReason}`);
      this.resetMapToUser();
    }
  }

  resetMapToUser() {
    if (typeof window.updateUserLocation === 'function' && window.lastPosition) {
      const fakePosition = {
        coords: {
          latitude: window.lastPosition.lat,
          longitude: window.lastPosition.lng,
          accuracy: window.lastPosition.accuracy || 20,
          speed: (window.currentSpeed || 0) / 2.23694,
          heading: window.lastPosition.heading || null
        },
        timestamp: Date.now()
      };

      updateUserLocation(fakePosition, false);

      window.followUser = true;
      window.isMapInteracting = false;

      window.blockSpeedZoom = true;
      if (typeof window.blockProximityZoom !== 'undefined') {
        window.blockProximityZoom = true;
      }
      
      setTimeout(() => {
        window.blockSpeedZoom = false;
        if (typeof window.blockProximityZoom !== 'undefined') {
          window.blockProximityZoom = false;
        }
      }, 2000);

    } else {
      try {
        if (typeof window.recenterMap === 'function') {
          window.recenterMap();
        } else if (window.map && window.userMarker) {
          const userPos = window.userMarker.getLatLng();
          if (userPos && window.map.setView) {
            window.map.flyTo(userPos, window.map.getZoom?.() || 16, {
              animate: true,
              duration: 1.0,
              easeLinearity: 0.25
            });
          }
        }

        window.isMapInteracting = false;
        window.followUser = true;
      } catch (e) {
        console.error('Fallback map reset failed:', e);
      }
    }
  }

  formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  _setProximityCache(cacheKey, result) {
    if (Object.keys(this._proximityCache).length >= this._MAX_PROXIMITY_CACHE_SIZE) {
      let oldestKey = null;
      let oldestTime = Infinity;
      for (const key in this._proximityCache) {
        if (this._proximityCache[key].timestamp < oldestTime) {
          oldestTime = this._proximityCache[key].timestamp;
          oldestKey = key;
        }
      }
      if (oldestKey) delete this._proximityCache[oldestKey];
    }
    this._proximityCache[cacheKey] = { result, timestamp: Date.now() };
  }

  isWithinThreshold(locationId, _skipCache = false) {
    const now = Date.now();
    const cacheKey = String(locationId);

    if (!_skipCache && this._proximityCache[cacheKey]) {
      const cached = this._proximityCache[cacheKey];
      if (now - cached.timestamp < 500) {
        return cached.result;
      }
    }

    try {
      let lat, lng;

      if (this._locationCoordCache[cacheKey]) {
        lat = this._locationCoordCache[cacheKey].lat;
        lng = this._locationCoordCache[cacheKey].lng;
      } else {
        let location = null;
        const sources = [window.gameLocations, window.locations];
        for (const source of sources) {
          if (Array.isArray(source)) {
            location = source.find(loc => loc?.id === locationId);
            if (location) break;
          }
        }
        if (!location && window.locationsMap && typeof window.locationsMap === 'object') {
          location = Object.values(window.locationsMap).find(loc => loc?.id === locationId);
        }

        if (!location) {
          this._setProximityCache(cacheKey, false);
          return false;
        }

        lat = parseFloat(location.lat);
        lng = parseFloat(location.lng);

        if (isFinite(lat) && isFinite(lng)) {
          this._locationCoordCache[cacheKey] = { lat, lng };
        }
      }

      if (!isFinite(lat) || !isFinite(lng)) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      if (typeof calculateDistance !== 'function' || !window.userMarker) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      const userPos = window.userMarker.getLatLng();
      if (!userPos || !isFinite(userPos.lat) || !isFinite(userPos.lng)) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      const distanceFeet = calculateDistance(userPos.lat, userPos.lng, lat, lng);
      if (!isFinite(distanceFeet) || distanceFeet < 0) {
        this._setProximityCache(cacheKey, false);
        return false;
      }

      const threshold = (typeof CONFIG?.DISTANCE_THRESHOLD === 'number')
        ? CONFIG.DISTANCE_THRESHOLD
        : 20;

      const result = distanceFeet <= threshold;
      this._setProximityCache(cacheKey, result);
      return result;
    } catch (e) {
      console.error('Error in isWithinThreshold:', e);
      this._setProximityCache(cacheKey, false);
      return false;
    }
  }

  // Stripped out all dead UI rendering logic. The interval 
  // remains because it is necessary to detect the exact second the 
  // cooldown expires to trigger the auto-open functionality.
  notifyUserWithCountdown(locationId, remainingSeconds) {
    if (this._monitoringLocationId === locationId) {
        return;
    }

    this.clearToastInterval();
    this._monitoringLocationId = locationId;

    if (this._sessionPrefs.hideCooldownUI) {
        this._prefsChecked.add(locationId);
    }

    const updateCheck = () => {
        if (this._monitoringLocationId !== locationId) {
            this.clearToastInterval();
            return;
        }

        const status = this.checkCooldown(locationId);

        if (!status.isOnCooldown) {
            const isNearby = this.isWithinThreshold(locationId, true);
            this._handleCooldownExpired(locationId, isNearby);
            return;
        }
        
        // The upper right distance box handles its own UI updates via its own mechanisms.
        // No custom UI rendering needed here anymore.
    };

    updateCheck();
    this.toastInterval = setInterval(updateCheck, 1000);
  }

  _handleCooldownExpired(locationId, isNearby) {
    this.clearToastInterval();
    this._monitoringLocationId = null;
    this._prefsChecked.delete(locationId);

    if (isNearby) {
        const location = window.gameLocations?.find(loc => loc?.id === locationId) ||
                         window.locations?.find(loc => loc?.id === locationId) ||
                         Object.values(window.locationsMap || {}).find(loc => loc?.id === locationId);

        if (location && typeof window._openLocationPage === 'function') {
            console.log('[Cooldown] Expired while user nearby - auto-opening:', locationId);
            window._openLocationPage(location);
        }
    }
  }

  // No more complex state transitions, 
  // DOM elements, or timeouts to manage.
  clearToast() {
    this.clearToastInterval();
    this._monitoringLocationId = null;
  }

  clearToastInterval() {
    if (this.toastInterval) {
      clearInterval(this.toastInterval);
      this.toastInterval = null;
    }
  }

  loadFromStorage() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (!data) return {};
      const parsed = JSON.parse(data);
      return typeof parsed === 'object' && parsed !== null ? parsed : {};
    } catch (e) {
      console.warn('Failed to load cooldowns:', e);
      return {};
    }
  }

  saveToStorage() {
    if (this._saveTimeout) clearTimeout(this._saveTimeout);
    this._saveTimeout = setTimeout(() => {
      this._saveTimeout = null;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(this.cooldowns));
      } catch (e) {
        console.error('Failed to save cooldowns:', e);
      }
    }, 0);
  }

  cleanupExpiredCooldowns() {
    const now = Date.now();
    for (const id of [...Object.keys(this.cooldowns)]) {
      const startTime = this.cooldowns[id];
      if (!startTime) continue;
      
      const elapsed = now - startTime;
      if (!isFinite(elapsed) || elapsed < 0 || elapsed >= COOLDOWN_PERIOD_MS) {
        this._clearCooldownState(id);
      }
    }
  }

  startPeriodicCleanup() {
    this.cleanupInterval = setInterval(() => {
      this.cleanupExpiredCooldowns();
    }, CLEANUP_INTERVAL_MS);
  }

  patchCloseFunctions() {
    const names = ['closeLocationHunt', 'closeLocation', 'hideLocationHunt', 'exitLocation'];

    for (const name of names) {
      if (window[name] && !window[name].__patched) {
        this.patchCloseFunction(name);
      }
    }

    const manager = this;
    let attempts = 0;
    this._closeFuncPoll = setInterval(() => {
      let allPatched = true;
      for (const name of names) {
        if (window[name] && !window[name].__patched) {
          manager.patchCloseFunction(name);
        }
        if (!window[name] || !window[name].__patched) {
          allPatched = false;
        }
      }
      if (allPatched || ++attempts >= 20) {
        clearInterval(manager._closeFuncPoll);
        manager._closeFuncPoll = null;
      }
    }, 500);
  }

  patchCloseFunction(funcName) {
    const original = window[funcName];
    const manager = this;
    window[funcName] = function(locationId) {
      if (manager.currentLocationId) manager.leaveLocation(manager.currentLocationId);
      else if (locationId) manager.leaveLocation(locationId);
      return original.call(this, locationId);
    };
    window[funcName].__patched = true;
    window[funcName].__original = original;
  }

  patchCreateBottomActionBar() {
    if (!window.createBottomActionBar || window.createBottomActionBar.__patched) return;
    const original = window.createBottomActionBar;
    const manager = this;
    window.createBottomActionBar = function(location) {
      const bar = original.call(this, location);
      if (bar && location?.id) {
        const originalOnClick = bar.onclick;
        bar.onclick = function(e) {
          manager.leaveLocation(location.id);
          return originalOnClick?.call(this, e);
        };
      }
      return bar;
    };
    window.createBottomActionBar.__patched = true;
    window.createBottomActionBar.__original = original;
  }

  destroy() {
    this._destroyed = true;
    
    if (this.cleanupInterval) clearInterval(this.cleanupInterval);
    if (this.mapResetInterval) clearInterval(this.mapResetInterval);
    if (this._closeFuncPoll) { clearInterval(this._closeFuncPoll); this._closeFuncPoll = null; }
    if (this._saveTimeout) { clearTimeout(this._saveTimeout); this._saveTimeout = null; }
    
    this.clearToast();
    
    const patchedNames = ['closeLocationHunt', 'closeLocation', 'hideLocationHunt', 'exitLocation', 'createBottomActionBar'];
    for (const name of patchedNames) {
      const fn = window[name];
      if (fn?.__patched && fn.__original) {
        window[name] = fn.__original;
        delete fn.__original;
        delete fn.__patched;
      }
    }
    
    this.currentLocationId = null;
    this.resetCooldownIds.clear();
    this._monitoringLocationId = null;
    this._announcedLocations.clear();
    this._prefsChecked.clear();
  }

  resetSessionPreferences() { this.clearSessionPrefs(); }
  isUIHiddenByPreference() { return this._sessionPrefs.hideCooldownUI; }
  getRemainingTime(locationId) { return this.checkCooldown(locationId).remainingSeconds; }
  
  getAllCooldowns() {
    const out = {};
    for (const id of Object.keys(this.cooldowns)) {
      const rem = this.getRemainingTime(id);
      if (rem > 0) out[id] = rem;
    }
    return out;
  }
  
  clearCooldown(locationId) {
    if (locationId == null) return;
    const id = String(locationId);
    delete this.cooldowns[id];
    this.resetCooldownIds.delete(id);
    this._announcedLocations.delete(id);
    this._prefsChecked.delete(id);
    this.saveToStorage();
  }
  
  clearAllCooldowns() {
    this.cooldowns = {};
    this.resetCooldownIds.clear();
    this._announcedLocations.clear();
    this._prefsChecked.clear();
    this.saveToStorage();
  }
  
  getCurrentLocation() { return this.currentLocationId; }
}

if (typeof window !== 'undefined') {
  if (window.cooldownManager) window.cooldownManager.destroy();
  window.cooldownManager = new LocationCooldownManager();
}

window._openLocationPage = function(location) {
  if (!location?.id) return;
  
  if (window.cooldownManager) {
    const status = window.cooldownManager.checkCooldown(location.id);
    
    if (status.isOnCooldown) {
      window.cooldownManager.notifyUserWithCountdown(location.id, status.remainingSeconds);
      return;
    }
    
    if (window.cooldownManager.currentLocationId === String(location.id)) {
      const lochuntContainer = document.querySelector('.lochunt-container');
      const pageIsActuallyOpen = lochuntContainer && lochuntContainer.style.display !== 'none';
      if (!pageIsActuallyOpen) {
        window.cooldownManager.currentLocationId = null;
      }
    }
    
    const result = window.cooldownManager.enterLocation(location.id);
    if (!result.success) return;
  }
  
  if (typeof window.showLocationHunt === 'function') {
    window.showLocationHunt(location);
  }
};
        
function showLocationHunt(location) {
    const now = Date.now();

    // Use the mobile-aware debounce constant (500ms for touch devices, 
    // 300ms for desktop) to prevent double-tap issues on mobile screens.
    const DEBOUNCE_TIME = (typeof DEBOUNCE_TIME_MS !== 'undefined') 
        ? DEBOUNCE_TIME_MS 
        : ((typeof CONFIG !== 'undefined' && CONFIG.DEBOUNCE_TIME) ? CONFIG.DEBOUNCE_TIME : 300);

    // Initialize lastFunctionCall if it doesn't exist
    if (typeof window.lastFunctionCall === 'undefined') {
        window.lastFunctionCall = 0;
    }

    // Debounce check
    if (now - window.lastFunctionCall < DEBOUNCE_TIME) {
        return;
    }
    window.lastFunctionCall = now;

    // Set location state
    window.lastVisitedLocationId = location.id;
    window.isLocationHuntVisible = true;
    window.isMapInteracting = true;

    // Clean up any previous audio player instance before replacing the DOM
    if (typeof window.audioPlayerCleanup === 'function') {
        window.audioPlayerCleanup();
        window.audioPlayerCleanup = null;
    }

    // Clear any saved audio position so the new location always starts fresh
    try { localStorage.removeItem('audioPosition'); } catch (e) {}

    // Get or create container
    const lochuntContainer = cachedElements.lochuntContainer || document.querySelector('.lochunt-container');
    if (!lochuntContainer) {
        return;
    }

    lochuntContainer.innerHTML = '';
    lochuntContainer.style.display = 'flex';
    lochuntContainer.classList.add('fade-in');

    // Announce to screen readers
    if (typeof announceToScreenReader === 'function') {
        announceToScreenReader(`Opened location: ${location.name}`);
    }

    // Create scrollable content container
    const scrollableContent = document.createElement('div');
    scrollableContent.style.cssText = `
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
        will-change: scroll-position;
    `;

    // Create and append location image
    const locationImage = document.createElement('img');
    locationImage.src = location.image;
    locationImage.alt = location.name;
    locationImage.style.cssText = `
        width: 100%;
        height: 45vh;
        object-fit: cover;
        object-position: center;
    `;
    locationImage.loading = 'eager';
    scrollableContent.appendChild(locationImage);

    // Create content container
    const contentContainer = document.createElement('div');
    contentContainer.classList.add('lochunt-content');
    contentContainer.style.cssText = `
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 800px;
        margin: 0 auto;
    `;

    // Create location info section
    const locationInfo = document.createElement('div');
    locationInfo.classList.add('lochunt-info');
    locationInfo.style.cssText = `
        text-align: center;
        width: 100%;
        margin-bottom: 15px;
    `;

    // Location name
    const locationName = document.createElement('h1');
    locationName.id = 'locationTitle';
    locationName.textContent = location.name;
    locationName.style.cssText = `
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 8px;
        line-height: 1.2;
    `;

    // Location city
    const locationCity = document.createElement('p');
    locationCity.textContent = location.city;
    locationCity.style.cssText = `
        font-size: clamp(1.1rem, 2vw, 1.3rem);
        color: #2c5282;
        font-weight: 600;
        margin-bottom: 4px;
    `;

    // Location creator
    const locationCreator = document.createElement('p');
    locationCreator.id = 'locationCreator';
    locationCreator.textContent = `Created by: ${location.creator}`;
    locationCreator.style.cssText = `
        font-size: calc(0.9rem + 0.4vw);
        color: #666666;
        font-weight: 500;
    `;

    // Append location info elements
    locationInfo.appendChild(locationName);
    locationInfo.appendChild(locationCity);
    locationInfo.appendChild(locationCreator);
    contentContainer.appendChild(locationInfo);

    // Create and append audio player
    if (typeof createAudioPlayer === 'function') {
        const audioPlayerContainer = createAudioPlayer(location.audio);
        contentContainer.appendChild(audioPlayerContainer);
    }

    scrollableContent.appendChild(contentContainer);
    lochuntContainer.appendChild(scrollableContent);

    // Create and append bottom action bar
    if (typeof createBottomActionBar === 'function') {
        const bottomActionBar = createBottomActionBar(location);
        bottomActionBar.style.cssText += `
            position: sticky;
            bottom: 0;
            width: 100%;
        `;
        lochuntContainer.appendChild(bottomActionBar);
    }

    // Use requestAnimationFrame instead of setTimeout(100).
    // This ensures the DOM has actually painted the newly inserted elements
    // before we try to bind the audio player to them, eliminating the
    // arbitrary 100ms delay and preventing race conditions on slow devices.
    requestAnimationFrame(() => {
        if (typeof initAudioPlayer === 'function') {
            window.audioPlayerCleanup = initAudioPlayer();
        }
    });

    // Prefetch nearby audio if service worker is available
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        const userPos = userMarker ? userMarker.getLatLng() : null;
        if (userPos && gameLocations) {
            navigator.serviceWorker.controller.postMessage({
                type: 'PREFETCH_AUDIO',
                data: {
                    userLocation: { lat: userPos.lat, lng: userPos.lng },
                    locations: gameLocations
                }
            });
        }
    }
}

        width: 100%;

function createAudioButton(iconName, id, ariaLabel) {
    const button = document.createElement('button');
    button.id = id;
    button.classList.add('audio-button');
    button.setAttribute('aria-label', ariaLabel);
    
    // Added aria-hidden="true" to the icon so screen readers 
    // don't announce the icon class alongside the button's aria-label
    button.innerHTML = `<i class="bi bi-${iconName}" aria-hidden="true"></i>`;
    
    button.style.cssText = `
        background-color: white;
        color: var(--primary-color);
        border: 2px solid var(--primary-color);
        border-radius: 50%;
        width: 55px;
        height: 55px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease; /* Replaced 'all' with specific properties */
        touch-action: manipulation; /* Removes 300ms click delay on mobile */
        user-select: none;          /* Prevents text selection on rapid taps */
        -webkit-tap-highlight-color: transparent; /* Removes default iOS tap flash */
    `;

    button.addEventListener('mouseover', () => {
        button.style.backgroundColor = 'var(--hover-color)';
    });
    button.addEventListener('mouseout', () => {
        button.style.backgroundColor = 'white';
    });
    button.addEventListener('click', () => {
        button.style.backgroundColor = 'var(--primary-color)';
        button.style.color = 'white';
        button.style.transform = 'scale(0.95)';
        setTimeout(() => {
            button.style.backgroundColor = 'white';
            button.style.color = 'var(--primary-color)';
            button.style.transform = 'scale(1)';
        }, 200);
    });

    return button;
}

function createBottomActionBar(location) {
    const actionBar = document.createElement('div');
    actionBar.className = 'location-action-bar';
    actionBar.style.cssText = `
        width: 100%;
        height: 60px;

        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        position: sticky;
        bottom: 0;
    `;

    const support     = (location && location.support)      ? location.support      : '';
    const supportLink = (location && location.support_link) ? location.support_link : '';

    // Sanitize the URL to prevent XSS (e.g. javascript: protocol)
    let safeSupportLink = '';
    if (supportLink) {
        try {
            const url = new URL(supportLink);
            if (url.protocol === "http:" || url.protocol === "https:") {
                safeSupportLink = url.href;
            }
        } catch (e) {
            // Invalid URL, ignore
        }
    }

    // Escape the support text to prevent HTML injection
    const escapeHTML = (str) => typeof str === 'string' 
        ? str.replace(/[&<>"']/g, match => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[match])) 
        : '';
    const safeSupport = escapeHTML(support);

    const supportHTML = safeSupport
        ? safeSupportLink
            ? `<span>Supported by <a href="${safeSupportLink}" target="_blank" rel="noopener noreferrer" style="color: white; text-decoration: underline;">${safeSupport}</a></span>`
            : `<span>Supported by ${safeSupport}</span>`
        : '';

    actionBar.innerHTML = `

            <i class="bi bi-envelope-fill" aria-hidden="true" style="font-size: 1.5rem;"></i>
        </a>
    `;

    actionBar.querySelector('.source-info-button').onclick = () => {
        showSourcePopup(

function showSourcePopup(title, content) {
    const existingPopup = document.getElementById('sourceInfoPopup');
    if (existingPopup) {
        existingPopup.remove();
    }

    const overlay = document.createElement('div');
    overlay.id = 'sourceInfoPopup';
    overlay.setAttribute('role', 'dialog');          
    overlay.setAttribute('aria-modal', 'true');      
    overlay.setAttribute('aria-label', title);       
    overlay.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(3px);
    `;

    const popup = document.createElement('div');
    popup.classList.add('source-info-content');
    popup.style.cssText = `
        background-color: white;
        border-radius: 8px;
        padding: 24px;
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
    `;

    const popupTitle = document.createElement('h3');
    popupTitle.textContent = title;
    popupTitle.style.cssText = `
        font-size: 1.5rem;
        font-weight: 600;
        color: #2c5282;
        margin-bottom: 16px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 12px;
    `;

    const popupContent = document.createElement('div');
    popupContent.style.cssText = `
        margin-bottom: 20px;
        line-height: 1.6;
        font-size: 1rem;
    `;
    popupContent.textContent = content;

    // Unified close function to handle all cleanup
    const closePopup = () => {
        document.body.style.overflow = "";              // Restore background scroll
        document.removeEventListener('keydown', handleEscape); // Clean up escape listener
        overlay.remove();
    };

    // Escape key handler
    const handleEscape = (e) => {
        if (e.key === 'Escape') {
            closePopup();
        }
    };

    const closeButton = document.createElement('button');
    closeButton.textContent = 'Close';
    closeButton.classList.add('source-close-button', 'btn');
    closeButton.style.cssText = `
        background: linear-gradient(to right, #2c5282, #2b6cb0);
        border: none;
        color: white;
        padding: 8px 24px;
        border-radius: 4px;
        font-weight: 500;
        cursor: pointer;
        align-self: flex-end;
        transition: opacity 0.2s ease;                 
        touch-action: manipulation;                   
        user-select: none;                              
        -webkit-tap-highlight-color: transparent;       
    `;

    closeButton.addEventListener('mouseover', () => { closeButton.style.opacity = '0.9'; });
    closeButton.addEventListener('mouseout',  () => { closeButton.style.opacity = '1';   });
    closeButton.addEventListener('click', closePopup);

    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) { closePopup(); }
    });

    popup.appendChild(popupTitle);
    popup.appendChild(popupContent);
    popup.appendChild(closeButton);
    overlay.appendChild(popup);
    document.body.appendChild(overlay);
    
    // Lock background scrolling when popup is open
    document.body.style.overflow = "hidden";
    
    // Add escape key listener
    document.addEventListener('keydown', handleEscape);

    overlay.style.opacity = '0';
    popup.style.transform = 'translateY(20px)';
    popup.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    overlay.style.transition = 'opacity 0.3s ease';

    // Use requestAnimationFrame instead of setTimeout(10) for reliable animation trigger
    requestAnimationFrame(() => {
        overlay.style.opacity = '1';
        popup.style.transform = 'translateY(0)';
    });

    // Auto-focus the close button for keyboard/screen reader users
    closeButton.focus();
}

function initAudioPlayer() {
    const audio             = document.getElementById('locationAudio');
    const playPauseBtn      = document.getElementById('playPauseBtn');
    const rewindBtn         = document.getElementById('rewindBtn');
    const forwardBtn        = document.getElementById('forwardBtn');
    const progressBar       = document.getElementById('progressBar');
    const progressContainer = document.querySelector('.progress');
    const currentTimeSpan   = document.getElementById('currentTime');
    const durationSpan      = document.getElementById('duration');

    if (!audio || !playPauseBtn || !progressBar) {
        console.error('[Audio] Required elements missing');
        return function noop() {};
    }

    // ─── Platform Detection ───────────────────────────────────────────────
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    // Removed unused isAndroid variable

    // ─── Save original source ─────────────────────────────────────────────
    if (audio.src && audio.src !== window.location.href && !audio.dataset.originalSrc) {
        audio.dataset.originalSrc = audio.src;
    }

    // ─── State ────────────────────────────────────────────────────────────
    let wakeLock             = null;
    let isPlayerActive       = true;
    let retryCount           = 0;
    const maxRetries         = 3;
    let lastPlaybackPosition = 0;
    let userWantsPlayback    = false;
    let screenWentAway       = false;
    let wasPlayingWhenHidden = false;
    let mediaSessionReady    = false;

    // ─── Shared AudioContext ───────────────────────────────────────────────
    function getSharedAudioContext() {
        if (window._sharedAudioCtx && window._sharedAudioCtx.state !== 'closed') {
            if (window._sharedAudioCtx.state === 'suspended' ||
                window._sharedAudioCtx.state === 'interrupted') {
                window._sharedAudioCtx.resume().catch(() => {});
            }
            return window._sharedAudioCtx;
        }
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return null;
            window._sharedAudioCtx = new AC();

            if (isIOS) {
                window._sharedAudioCtx.onstatechange = () => {
                    const ctx = window._sharedAudioCtx;
                    if (ctx && ctx.state === 'interrupted') {
                        setTimeout(() => {
                            if (window._sharedAudioCtx &&
                                window._sharedAudioCtx.state === 'interrupted') {
                                window._sharedAudioCtx.resume().catch(() => {});
                            }
                        }, 100);
                    }
                };
            }
            return window._sharedAudioCtx;
        } catch (e) {
            console.warn('[Audio] AudioContext creation failed:', e);
            return null;
        }
    }

    // ─── Media Session API ────────────────────────────────────────────────
    function setupMediaSession() {
        if (mediaSessionReady || !('mediaSession' in navigator)) return;
        mediaSessionReady = true;

        try {
            navigator.mediaSession.metadata = new MediaMetadata({
                title:  document.getElementById('locationTitle')?.textContent   || 'Minnesota Then',
                artist: document.getElementById('locationCreator')?.textContent || 'Historical Audio',
                album:  'Minnesota Then Tour',
                artwork: [
                    { src: 'https://www.mnthen.com/images/icon-192.png', sizes: '192x192', type: 'image/png' },
                    { src: 'https://www.mnthen.com/images/icon-512.png', sizes: '512x512', type: 'image/png' }
                ]
            });

            navigator.mediaSession.setActionHandler('play',         () => { if (audio.paused)  togglePlay(); });
            navigator.mediaSession.setActionHandler('pause',        () => { if (!audio.paused) togglePlay(); });
            navigator.mediaSession.setActionHandler('seekbackward', (d) => { seek(-(d.seekOffset || 10)); });
            navigator.mediaSession.setActionHandler('seekforward',  (d) => { seek(d.seekOffset || 10);   });

            updateMediaSessionPosition();
        } catch (e) {
            console.warn('[Audio] Media Session setup failed:', e);
        }
    }

    function updateMediaSessionPosition() {
        if (!('mediaSession' in navigator) || !navigator.mediaSession.setPositionState) return;
        if (!isFinite(audio.duration)) return;
        try {
            navigator.mediaSession.setPositionState({
                duration:     audio.duration,
                playbackRate: audio.playbackRate,
                position:     Math.min(audio.currentTime, audio.duration)
            });
        } catch (e) {}
    }

    // ─── Wake Lock ────────────────────────────────────────────────────────
    const supportsWakeLock = 'wakeLock' in navigator;

    async function requestWakeLock() {
        if (!supportsWakeLock || !isPlayerActive || wakeLock) return;
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { wakeLock = null; });
        } catch (err) {}
    }

    async function releaseWakeLock() {
        if (wakeLock) {
            try { await wakeLock.release(); } catch (e) {}
            wakeLock = null;
        }
    }

    // ─── Position Throttle ────────────────────────────────────────────────
    let _lastSaveTime = 0;
    function throttledSavePosition(time) {
        const now = Date.now();
        if (now - _lastSaveTime >= 1000) {
            _lastSaveTime = now;
            try { localStorage.setItem('audioPosition', time.toString()); } catch (e) {}
        }
    }

    // ─── Visibility / Background Handling ─────────────────────────────────
    const visibilityHandler = () => {
        if (document.hidden) {
            if (!isNaN(audio.currentTime) && audio.currentTime > 0) {
                lastPlaybackPosition = audio.currentTime;
                throttledSavePosition(audio.currentTime);
            }

            if (userWantsPlayback) {
                wasPlayingWhenHidden = true;
                screenWentAway = true;

                if (!audio.paused) {
                    audio.pause();
                }

                playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
                playPauseBtn.setAttribute('aria-label', 'Play');
                releaseWakeLock();
            }
        } else {
            if (screenWentAway && wasPlayingWhenHidden) {
                if (window._sharedAudioCtx &&
                    (window._sharedAudioCtx.state === 'suspended' ||
                     window._sharedAudioCtx.state === 'interrupted')) {
                    window._sharedAudioCtx.resume().catch(() => {});
                }

                setTimeout(() => {
                    if (screenWentAway && audio.paused) {
                        showSourcePopup(
                            'Audio Paused',
                            `Press play to resume from ${formatTime(lastPlaybackPosition)}`
                        );
                        screenWentAway = false;
                        wasPlayingWhenHidden = false;
                    }
                }, 300);
            }
        }
    };
    document.addEventListener('visibilitychange', visibilityHandler);

    const blurHandler = () => {
        if (!isNaN(audio.currentTime) && audio.currentTime > 0) {
            lastPlaybackPosition = audio.currentTime;
        }
    };
    window.addEventListener('blur', blurHandler);

    // ─── Audio Element Events ─────────────────────────────────────────────
    audio.addEventListener('play', () => {
        playPauseBtn.innerHTML = '<i class="bi bi-pause" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Pause');
        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader('Audio playback started');
        }
    });

    audio.addEventListener('pause', () => {
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Play');
        releaseWakeLock();
        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader('Audio playback paused');
        }
    });

    // ─── Core Playback Toggle ─────────────────────────────────────────────
    function togglePlay() {
        if (!isPlayerActive) return;

        const hasValidSrc = audio.src &&
                            audio.src !== window.location.href &&
                            audio.src !== '' &&
                            audio.src !== 'about:blank';
        if (!hasValidSrc) return;

        if (audio.paused) {
            const resumePos = audio.dataset.resumePosition;
            if (resumePos && parseFloat(resumePos) > 0) {
                audio.currentTime = parseFloat(resumePos);
                delete audio.dataset.resumePosition;
            }

            getSharedAudioContext();

            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        userWantsPlayback = true;
                        requestWakeLock();
                        setupMediaSession();
                        retryCount = 0;
                    })
                    .catch((error) => {
                        if (error.name === 'AbortError') return;
                        handlePlayError(error);
                    });
            }
        } else {
            audio.pause();
            userWantsPlayback = false;
            if (!isNaN(audio.currentTime)) {
                lastPlaybackPosition = audio.currentTime;
            }
        }
    }

    // ─── Error Handling ───────────────────────────────────────────────────
    function handlePlayError(error) {
        console.error('[Audio] Play failed:', error?.name, error?.message);

        releaseWakeLock();
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>';
        playPauseBtn.setAttribute('aria-label', 'Play');

        if (error?.name === 'NotAllowedError') {
            showSourcePopup(
                'Tap to Play Audio',
                'Please tap the play button again to start audio playback.'
            );
        } else if (error?.name === 'NotSupportedError') {
            showSourcePopup(
                'Audio Error',
                'This audio format is not supported on your device.'
            );
        } else if (screenWentAway || wasPlayingWhenHidden) {
            const pos = lastPlaybackPosition || 0;
            audio.dataset.resumePosition = pos.toString();
            showSourcePopup(
                'Audio Interrupted',
                `Audio was paused when you left the screen. Press play to resume from ${formatTime(pos)}.`
            );
            screenWentAway = false;
            wasPlayingWhenHidden = false;
        } else if (retryCount < maxRetries) {
            retryCount++;
            setTimeout(() => attemptRecovery(), 1000 * retryCount);
        } else {
            playPauseBtn.innerHTML = '<i class="bi bi-exclamation-triangle" aria-hidden="true"></i>'; 
            playPauseBtn.setAttribute('aria-label', 'Audio Error');
            showSourcePopup(
                'Audio Error',
                'Unable to play audio after multiple attempts. Please refresh and try again.'
            );
        }
    }

    // ─── Recovery ─────────────────────────────────────────────────────────
    function attemptRecovery() {
        if (!isPlayerActive) return;

        console.log(`[Audio] Recovery attempt ${retryCount}/${maxRetries}`);

        const savedPos  = lastPlaybackPosition || 0;
        const targetSrc = audio.dataset.originalSrc || audio.getAttribute('data-src');

        if (targetSrc && (!audio.src || audio.src === window.location.href)) {
            audio.src = targetSrc;
        }

        if (audio.error || !audio.src || audio.src === window.location.href) {
            audio.load();
        }

        const onReady = () => {
            if (savedPos > 0 && !screenWentAway) {
                audio.currentTime = savedPos;
            } else if (screenWentAway) {
                audio.currentTime = 0;
            }
            retryCount = 0;
            audio.removeEventListener('loadedmetadata', onReady);
            audio.removeEventListener('canplay', onReady);
        };

        audio.addEventListener('loadedmetadata', onReady);
        audio.addEventListener('canplay', onReady);
    }

    // ─── Seek ─────────────────────────────────────────────────────────────
    function seek(seconds) {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        audio.currentTime = Math.max(0, Math.min(audio.currentTime + seconds, audio.duration));
        updateMediaSessionPosition();
        if (typeof announceToScreenReader === 'function') {
            const direction = seconds > 0 ? 'forward' : 'backward';
            announceToScreenReader(`Skipped ${Math.abs(seconds)} seconds ${direction}`);
        }
    }

    // ─── Progress UI ──────────────────────────────────────────────────────
    function updateProgress() {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        const percent = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = `${percent}%`;
        currentTimeSpan.textContent = formatTime(audio.currentTime);

        if (audio.currentTime > 0) {
            lastPlaybackPosition = audio.currentTime;
            throttledSavePosition(audio.currentTime);
        }
    }

    function setProgress(e) {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        const rect = progressContainer.getBoundingClientRect();
        const clientX = e.clientX ?? e.touches?.[0]?.clientX;
        if (clientX === undefined || rect.width <= 0) return;
        audio.currentTime = Math.max(0, Math.min(((clientX - rect.left) / rect.width) * audio.duration, audio.duration)); 
        updateMediaSessionPosition();
        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader(`Jumped to ${formatTime(audio.currentTime)}`);
        }
    }

    function setDuration() {
        if (!isPlayerActive || !isFinite(audio.duration)) return;
        durationSpan.textContent = formatTime(audio.duration);
        updateMediaSessionPosition();
    }

    function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // ─── Event Bindings ───────────────────────────────────────────────────
    playPauseBtn.addEventListener('click', togglePlay);
    rewindBtn?.addEventListener('click',  () => seek(-10));
    forwardBtn?.addEventListener('click', () => seek(10));

    audio.addEventListener('timeupdate',    updateProgress);
    audio.addEventListener('loadedmetadata', setDuration);
    audio.addEventListener('durationchange', setDuration);

    audio.addEventListener('ended', () => {
        userWantsPlayback = false;
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Play');
        releaseWakeLock();
        progressBar.style.width = '0%';

        try { localStorage.removeItem('audioPosition'); } catch (e) {}

        if ('mediaSession' in navigator) {
            navigator.mediaSession.playbackState = 'none';
        }

        if (typeof announceToScreenReader === 'function') {
            announceToScreenReader('Audio playback completed');
        }
        if (typeof showAdditionalInfo === 'function') {
            showAdditionalInfo();
        }
    });

    audio.addEventListener('error', (e) => {
        console.error('[Audio] Element error:', audio.error?.code, audio.error?.message);
        if (!isPlayerActive) return;

        releaseWakeLock();
        playPauseBtn.innerHTML = '<i class="bi bi-play" aria-hidden="true"></i>'; 
        playPauseBtn.setAttribute('aria-label', 'Play');

        if (screenWentAway || wasPlayingWhenHidden) {
            const pos = lastPlaybackPosition || 0;
            audio.dataset.resumePosition = pos.toString();
            showSourcePopup(
                'Audio Interrupted',
                `Audio was paused when you left the screen. Press play to resume from ${formatTime(pos)}.`
            );
            attemptRecovery();
            screenWentAway = false;
            wasPlayingWhenHidden = false;
        } else if (retryCount < maxRetries) {
            retryCount++;
            setTimeout(() => attemptRecovery(), 1000 * retryCount);
        } else {
            playPauseBtn.innerHTML = '<i class="bi bi-exclamation-triangle" aria-hidden="true"></i>'; 
            playPauseBtn.setAttribute('aria-label', 'Audio Error');
            showSourcePopup(
                'Audio Error',
                'Unable to recover audio. Please refresh and try again.'
            );
        }
    });

    // Added touch scrubbing support. The setProgress function 
    // already handled e.touches, but the events were never bound!
    if (progressContainer) {
        progressContainer.addEventListener('click', setProgress);
        
        let isScrubbing = false;
        
        const handleScrubStart = (e) => {
            isScrubbing = true;
            setProgress(e);
        };
        
        const handleScrubMove = (e) => {
            if (!isScrubbing) return;
            setProgress(e);
            e.preventDefault(); // Prevent page scrolling while scrubbing
        };
        
        const handleScrubEnd = () => {
            isScrubbing = false;
        };
        
        progressContainer.addEventListener('touchstart', handleScrubStart, { passive: false });
        progressContainer.addEventListener('touchmove', handleScrubMove, { passive: false });
        progressContainer.addEventListener('touchend', handleScrubEnd);
        progressContainer.addEventListener('touchcancel', handleScrubEnd);
    }

    // Network recovery
    const onlineHandler = () => {
        if (audio.error && isPlayerActive) {
            console.log('[Audio] Network recovered, attempting reload');
            attemptRecovery();
        }
    };
    window.addEventListener('online', onlineHandler);

    // ─── Initial Load ─────────────────────────────────────────────────────
    audio.load();

    const resetToStart = () => {
        audio.currentTime = 0;
        audio.removeEventListener('loadedmetadata', resetToStart);
    };

    if (audio.readyState >= 1) {
        audio.currentTime = 0;
    } else {
        audio.addEventListener('loadedmetadata', resetToStart);
    }

    // ─── Cleanup ──────────────────────────────────────────────────────────
    return function cleanup() {
        console.log('[Audio] Cleanup starting');
        isPlayerActive = false;
        releaseWakeLock();
    
        document.removeEventListener('visibilitychange', visibilityHandler);
        window.removeEventListener('blur',   blurHandler);
        window.removeEventListener('online', onlineHandler);
        
        if (progressContainer && progressContainer.isConnected) {
            progressContainer.removeEventListener('touchstart', handleScrubStart);
            progressContainer.removeEventListener('touchmove', handleScrubMove);
            progressContainer.removeEventListener('touchend', handleScrubEnd);
            progressContainer.removeEventListener('touchcancel', handleScrubEnd);
        }
    
        if (audio && audio.isConnected) {
            audio.pause();
            userWantsPlayback = false;
        }
    
        console.log('[Audio] Cleanup complete');
        };
    }
        
function showAdditionalInfo() {
    const locationId = window.lastVisitedLocationId || lastVisitedLocationId;
    
    if (!locationId) {
        console.error('No location ID available');
        return;
    }
    
    const location = gameLocations.find(loc => loc.id === locationId);
    
    if (!location) {
        console.error('Location not found for ID:', locationId);
        return;
    }

    const additionalInfoContainer = cachedElements.additionalInfoContainer || 
        document.querySelector('.additional-info-container');
    
    if (!additionalInfoContainer) {
        console.error('Additional info container not found in DOM');
        return;
    }
    
    additionalInfoContainer.style.display = 'block';
    additionalInfoContainer.classList.add('fade-in');
    
    const additionalInfoElement = document.getElementById('additionalInfo');
    if (additionalInfoElement) {
        additionalInfoElement.textContent = 
            location.additionalInfo || "No additional information available for this location.";
    }
    
    if (typeof announceToScreenReader === 'function') {
        announceToScreenReader('Additional information is now available');
    }

    const continueButton = document.getElementById('continueButton');
    if (continueButton) {
        continueButton.onclick = () => handleContinueClick();
        
        // Move focus to the Continue button. This ensures screen 
        // readers (VoiceOver/TalkBack) immediately land on the actionable 
        // element after the audio finishes, rather than leaving the user 
        // stranded on the audio player. Using requestAnimationFrame ensures 
        // the browser has painted the fade-in animation before shifting focus.
        requestAnimationFrame(() => {
            continueButton.focus();
        });
    }
}
        
function handleContinueClick() {
    const FADE_DURATION_MS = 300;

    // Clear audio position immediately so next open starts from zero
    try {
        localStorage.removeItem('audioPosition');
    } catch (e) {}

    // Use manager's current ID to prevent desync
    if (window.cooldownManager) {
        const idToLeave = window.cooldownManager.currentLocationId || lastVisitedLocationId;
        
        if (idToLeave != null) {
            window.cooldownManager.leaveLocation(idToLeave);
            console.log(`[Cooldown] Started cooldown for location ${idToLeave}`);
        }
    }
    
    // Also clear the proximity debounce so the location can re-trigger after cooldown
    if (window._lastProximityTriggerByLocation && lastVisitedLocationId != null) {
        delete window._lastProximityTriggerByLocation[lastVisitedLocationId];
    }
    
    // Added missing window. prefix to match the set state
    window.isLocationHuntVisible = false;
    
    clearStationaryState();
    
    window.zoomedInState = false;
    window.isNearLocation = false;
    window.blockSpeedZoom = false;
    window.currentProximityLocationId = null;

    // Clean up countdown visibility handler if it's still attached
    if (window._countdownVisibilityHandler) {
        document.removeEventListener('visibilitychange', window._countdownVisibilityHandler);
        window._countdownVisibilityHandler = null;
    }

    // Clean up the RAF countdown handles introduced in the 
    // updateDistanceBox refactor to prevent ghost frames after close.
    if (window._countdownRafId) {
        cancelAnimationFrame(window._countdownRafId);
        window._countdownRafId = null;
    }
    if (window._countdownNextFrame) {
        clearTimeout(window._countdownNextFrame);
        window._countdownNextFrame = null;
    }

    // Clear any running countdown interval
    if (window.distanceBoxCountdownInterval) {
        clearInterval(window.distanceBoxCountdownInterval);
        window.distanceBoxCountdownInterval = null;
    }
    
    const now = Date.now();
    window.lastProximityZoomOutTime = now;
    window.lastProximityZoomOutLocationId = lastVisitedLocationId; 
    window.lastProximityZoomInTime = now - 2000;
    window.lastProximityZoomTime = now;
    window._didPrefetch19 = false;
    
    if (window.zoomController) {
        const currentSource = window.zoomController.getState()?.currentSource;
        if (currentSource) {
            window.zoomController.release(currentSource);
        }
    }
    
    if (map && window.lastPosition) {
        window.isMapInteracting = false;
        window.followUser = true;
        window._blockAutoMapUpdates = true;
        
        map.setView(
            [window.lastPosition.lat, window.lastPosition.lng], 
            map.getZoom(),
            {
                animate: true,
                duration: 0.6,
                easeLinearity: 0.18
            }
        );
        
        // Use tracked timeout so memory manager can clean it up
        // if the page is backgrounded or closed before the 800ms elapses.
        createTrackedTimeout(() => {
            window._blockAutoMapUpdates = false;
        }, 800);
    }
    
    ensureGPSActive();
    closeModalWithAnimation(FADE_DURATION_MS);
}
        
function clearStationaryState() {
    // Clear stationary detection
    window.isStationary = false;
    window.stationaryLockPosition = null;
    window.stationaryStartTime = null;

    if (window.stationaryCheckTimeout) {
        clearTimeout(window.stationaryCheckTimeout);
        window.stationaryCheckTimeout = null;
    }

    if (window.positionBuffer?.length > 0) {
        const lastPos = window.positionBuffer[window.positionBuffer.length - 1];
        if (Date.now() - lastPos.timestamp > 10000) {
            console.debug("clearStationaryState: Clearing buffer due to stale last position (>10s old)");
            window.positionBuffer = [];
        }
    } else if (!window.positionBuffer) {
        window.positionBuffer = [];
    }

    window.lastUpdateTime = null;
}
        
function ensureGPSActive() {
    if (window.positionWatchId === undefined || window.positionWatchId === null) {
        console.log("GPS watch inactive - restarting");
        startPositionUpdates();
    } else {
        console.log("GPS watch active - awaiting fresh updates");
    }
}

function closeModalWithAnimation(fadeDuration) {
    const additionalInfoContainer = cachedElements.additionalInfoContainer || 
        document.querySelector('.additional-info-container');
    const lochuntContainer = cachedElements.lochuntContainer || 
        document.querySelector('.lochunt-container');

    // Null checks prevent fatal errors if elements are already gone
    if (additionalInfoContainer) {
        additionalInfoContainer.classList.add('fade-out');
        
        setTimeout(() => {
            if (additionalInfoContainer) {
                additionalInfoContainer.style.display = 'none';
                additionalInfoContainer.classList.remove('fade-out', 'fade-in');
            }

            if (lochuntContainer) {
                lochuntContainer.classList.add('fade-out');
                
                setTimeout(() => {
                    if (lochuntContainer) {
                        lochuntContainer.style.display = 'none';
                        lochuntContainer.classList.remove('fade-out');
                    }
                    
                    finalizeModalClose();
                    
                }, fadeDuration);
            } else {
                finalizeModalClose();
            }
        }, fadeDuration);
    } else {
        // If additional info is missing, proceed directly to closing the main container
        if (lochuntContainer) {
            lochuntContainer.classList.add('fade-out');
            
            setTimeout(() => {
                if (lochuntContainer) {
                    lochuntContainer.style.display = 'none';
                    lochuntContainer.classList.remove('fade-out');
                }
                finalizeModalClose();
            }, fadeDuration);
        } else {
            finalizeModalClose();
        }
    }
}
        
function finalizeModalClose() {
    announceToScreenReader('Returned to map view');

    try {
        localStorage.removeItem('audioPosition');
    } catch (e) {}
    
    if (window.audioPlayerCleanup) {
        try {
            window.audioPlayerCleanup();
        } catch (e) {
            console.error('Audio cleanup failed:', e);
        }
        window.audioPlayerCleanup = null;
    }

    if (typeof _restoreFullTracking === 'function') {
        _restoreFullTracking();
    } 
    // Removed fallback block; it used forceUpdate=true which causes map jumps.

    updateDistanceBox();
    
    // Return focus to body so screen readers don't get trapped in hidden modal
    document.body.focus();
}

function _restoreFullTracking() {
    window.followUser = true;
    window.isMapInteracting = false;
    window.isLocationHuntVisible = false;

    if (window.lastPosition?.lat !== undefined && window.lastPosition?.lng !== undefined) {

        const seedPosition = {
            lat: window.lastPosition.lat,
            lng: window.lastPosition.lng,
            accuracy: window.lastPosition.accuracy || 20,
            heading: window.lastPosition.heading ?? null,
            timestamp: Date.now(),
            speedMPS: window.lastPosition.speedMPS || 0
        };

        // Fallback if seedPositionBuffer is unavailable
        if (typeof seedPositionBuffer === 'function') {
            seedPositionBuffer(seedPosition, 5);
        } else {
            window.positionBuffer = [seedPosition];
        }

        const restorationPosition = {
            coords: {
                latitude: seedPosition.lat,
                longitude: seedPosition.lng,
                accuracy: seedPosition.accuracy,
                heading: seedPosition.heading,
                speed: seedPosition.speedMPS
            },
            timestamp: seedPosition.timestamp
        };

        // forceUpdate=false prevents map jumps
        updateUserLocation(restorationPosition, false);
    }
}

function startHunt() {
    gameLocations = [...locations].sort((a, b) => a.id - b.id);
    window.gameLocations = gameLocations;
    lastVisitedLocationId = null;
    loadAllLocations();
    startIdleProximityCheck(); 

    // iOS PWA Recovery
    try {
        const activeLocationId = localStorage.getItem('activeLocationId');
        if (activeLocationId) {
            console.log('[Recovery] Found active location, restoring:', activeLocationId);
            const location = gameLocations.find(loc => String(loc.id) === String(activeLocationId));
            
            if (location) {
                requestAnimationFrame(() => {
                    if (typeof showLocationHunt === 'function') {
                        showLocationHunt(location);
                    }
                });
            } else {
                localStorage.removeItem('activeLocationId');
                localStorage.removeItem('audioPosition');
            }
        }
    } catch (e) {
        console.warn('[Recovery] Failed to restore session:', e);
    }
}
        
function getMarkerColor(tours) {
    if (!tours) return '#0f2bab';
    
    switch (tours.toLowerCase()) {
        case 'person':
            return '#FFA500';
        case 'gangster':
            return '#3f9b0b';
        case 'event':
            return '#8B0000';
        case 'place':
            return '#800080';
        default:
            return '#0f2bab';
    }
}

function createMarkersOnly() {
    if (!gameLocations || !Array.isArray(gameLocations) || gameLocations.length === 0) {
        console.warn("No game locations available");
        return;
    }
    
    if (markerClusterGroup) {
        markerClusterGroup.clearLayers();
    }
    
    activePopups.clear();

    const esc = (str) => typeof str === 'string' 
        ? str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) 
        : '';

    gameLocations.forEach((location) => {
        if (!location || typeof location.lat !== 'number' || typeof location.lng !== 'number') {
            console.warn("Invalid location data:", location);
            return;
        }
        const markerColor = getMarkerColor(location.tours);
        location.markerColor = markerColor;
        
        // Sanitize dynamic data to prevent XSS in popup HTML
        const safeName = esc(String(location.name));
        const safeId = esc(String(location.id));
        const safeImage = esc(String(location.image));
        
        // Validate URL to prevent javascript: protocol injection
        let safeLink = '';
        if (location.link) {
            try {
                const url = new URL(location.link);
                if (url.protocol === "http:" || url.protocol === "https:") safeLink = url.href;
            } catch (e) {}
        }

        const locationMarker = L.marker([location.lat, location.lng], {
            icon: L.divIcon({
                className: 'custom-pin-icon',
                html: `<div class="pin-head" style="background-color: ${markerColor};"></div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 30],
            }),
            riseOnHover: false,
            bubblingMouseEvents: false
        });
        
        const popupContent = `
            <div class="popup-content">
                <img loading="lazy" src="${safeImage}" alt="${safeName}" class="location-image">
                <h4 class="location-name">
                    ${safeLink ? `<a href="${safeLink}" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: inherit;">${safeName}</a>` : safeName}
                </h4>
                <div class="popup-buttons">
                    <button class="button route-button" data-lat="${location.lat}" data-lng="${location.lng}" data-location-id="${safeId}" style="touch-action: manipulation; user-select: none;">Directions</button>
                    <button class="button summary-button" data-location-id="${safeId}" style="touch-action: manipulation; user-select: none;">Summary</button>
                </div>
            </div>
        `;
        
        locationMarker.bindPopup(popupContent, {
            offset: L.point(0, -25),
            className: 'custom-popup',
            maxWidth: 300,
            closeButton: true,
            autoClose: true,
            closeOnClick: true
        });
        
        locationMarker.on('popupopen', function(e) {
            activePopups.add(locationMarker);
            attachPopupEventListeners(e.popup._contentNode, location);
        });
        locationMarker.on('popupclose', function(e) {
            activePopups.delete(locationMarker);
        });
        markerClusterGroup.addLayer(locationMarker);
    });
    
    if (!map.hasLayer(markerClusterGroup)) {
        map.addLayer(markerClusterGroup);
    }
    
    markersCreated = true;
}

function attachPopupEventListeners(popupElement, location) {
    const routeButton = popupElement.querySelector('.route-button');
    const summaryButton = popupElement.querySelector('.summary-button');
    if (routeButton && !routeButton.hasAttribute('data-listener-attached')) {
        routeButton.setAttribute('data-listener-attached', 'true');
        routeButton.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();
            showNavigationModal(location.lat, location.lng);
        });
    }
    if (summaryButton && !summaryButton.hasAttribute('data-listener-attached')) {
        summaryButton.setAttribute('data-listener-attached', 'true');
        summaryButton.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();
            showLocationSummary(location.id);
        });
    }
}

    activePopups.forEach(marker => {

    activePopups.clear();
